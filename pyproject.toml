# taxfill-mcp — uv workspace root (virtual: the repo root is not a package).
#
# The single source of truth for this project is docs/DEV_PLAN.md.
# Status: v0.1 is IN DEVELOPMENT — nothing is published to PyPI yet.
#
# Quickstart for contributors:
#   uv sync        # creates .venv and installs both workspace packages (editable)
#   uv run pytest  # runs the test suite

[tool.uv.workspace]
members = ["packages/core", "packages/mcp-server"]

[dependency-groups]
dev = [
    "pytest>=8.0",
    "reportlab>=4.0",  # test-only: generates synthetic AcroForm PDF fixtures (real IRS PDFs are never vendored)
]

[tool.pytest.ini_options]
testpaths = ["packages/core/tests", "packages/mcp-server/tests", "evals"]
addopts = "-q"
markers = [
    "network: needs internet access to download official blank PDFs from .gov URLs (skips gracefully when offline; deselect with -m 'not network')",
]

[tool.ruff]
line-length = 120
target-version = "py311"

[tool.ruff.lint]
# Ruff's default rule set: Pyflakes (F) + a curated pycodestyle subset (E4/E7/E9).
# E501/line-length is intentionally NOT enabled — long, data-dense lines (field maps,
# citations, relation strings) are idiomatic here and wrapping them hurts readability.
select = ["E4", "E7", "E9", "F"]
