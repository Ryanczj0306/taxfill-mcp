name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"

      - name: Sync workspace
        run: uv sync

      - name: Run tests (offline — network golden round-trips run locally / in the planned nightly drift job)
        run: uv run pytest -m "not network"
