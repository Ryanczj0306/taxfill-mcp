unverified:
- The 760 instructions provide an additional filing extension to July 1, 2024 for taxpayers overseas (Puerto Rico
  mention) on the May 1 due date; the general calendar-year 2023 due date is confirmed as May 1, 2024. No April
  15 due date applies to Virginia (Virginia uniquely uses May 1) - confirm at the DOR if a federal-aligned date
  is assumed elsewhere.
- Treaty pass-through is inferred from (a) federal-AGI starting point and (b) absence of any treaty addback in the
  official Additions list / Schedule ADJ. Virginia provides no explicit statement that treaty-exempt income is excluded;
  it simply flows through federal AGI. Confirm at the Virginia Department of Taxation for any specific treaty-income
  situation.
