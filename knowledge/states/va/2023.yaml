# VA state knowledge — tax year 2023. Fetched + cited from the VA DOR (.gov) and
# assembled by scripts/assemble_state_knowledge.py. Loaded as a StateKnowledge.
# conforms_to_federal_treaties: whether federally treaty-exempt income flows through
# (most states start from federal AGI) or is added back (CA/CT/MD/MS-style). Figures the
# fetch could not independently confirm are in `unverified` — confirm at the cited source.
jurisdiction: states/va
tax_year: 2023
income_tax: true
conforms_to_federal_treaties: true
treaty_note: 'Virginia''s individual income tax computation starts from federal adjusted gross income (Form 760,
  Line 1: "Enter the federal adjusted gross income from your federal return... use the federal adjusted gross income
  amount, NOT federal taxable income"). Virginia''s official Additions list and Schedule ADJ contain NO addback
  for income exempt from federal tax under a U.S. tax treaty or for treaty-excluded foreign income (additions are
  limited to items like interest on other states'' obligations, bonus depreciation, federally-exempt U.S. obligations
  interest, etc.). Because treaty-exempt income is already excluded from federal AGI and Virginia does not add it
  back, it flows through and is NOT re-taxed -> conforms.'
citation:
  source: 2023 Form 760 Resident Individual Income Tax Instructions (Virginia Tax) - Line 1 Federal Adjusted Gross
    Income; due date May 1, 2024; filing thresholds; payment options / check payee; mailing addresses
  url: https://www.tax.virginia.gov/sites/default/files/vatax-pdf/2023-760-instructions.pdf
starts_from: federal AGI (federal adjusted gross income; Form 760 Line 1)
residency:
  summary: 'Resident: a person who is a legal (domiciliary) resident of Virginia, OR an "actual" resident who is
    physically present in / maintains a place of abode in Virginia for more than 183 days during the taxable year.
    Part-year resident: a person who moves into Virginia during the year intending to become a resident, or who
    moves out of Virginia during the year to become a resident of another state. Nonresident: a person who is not
    a resident or part-year resident but who receives taxable income from Virginia sources.'
forms:
  resident: Form 760 (Resident Individual Income Tax Return)
  part_year_or_nonresident: 'Nonresident: Form 763 (Nonresident Individual Income Tax Return). Part-year resident:
    Form 760PY (Part-Year Resident Individual Income Tax Return).'
credits_verification: 'State credits were researched from the cited DOR sources and are not tax advice — confirm
  each amount and your eligibility at the cited source before claiming it. Not independently confirmed (verify the
  figure): Credit for Tax Paid to Another State.'
credits:
- name: Credit for Low-Income Individuals (CLI)
  type: nonrefundable
  eligibility: Virginia residents whose family Virginia Adjusted Gross Income (family VAGI) is at or below the federal
    poverty guideline for their family size, and who do not claim the age deduction, the 65+/blind exemption, the
    Virginia National Guard subtraction (Code 28), basic military pay subtraction (Code 38), or federal/state employee
    subtraction (Code 39), and who are not claimed as a dependent on another return. Cannot be combined with either
    Virginia EITC option.
  amount: $300 per personal and dependent exemption reported on Form 760 (excluding the age 65+ and blind exemptions);
    credit is limited to Virginia income tax liability (Schedule ADJ Line 13)
  income_limit_2023: 'Family VAGI must be at or below the 2023 federal poverty guideline: 1 exemption $14,580; 2
    $19,720; 3 $24,860; 4 $30,000; 5 $35,140; 6 $40,280; 7 $45,420; 8 $50,560; add $5,140 for each additional person'
  claimed_on: Schedule ADJ (Form 760-ADJ) Lines 10-13, carried to Line 17, then Form 760 Line 23
  citation:
    source: 2023 Form 760 Resident Individual Income Tax Instructions, p.26 ('Tax Credit for Low-Income Individuals'
      and Poverty Guideline Table), Virginia Department of Taxation
    url: https://www.tax.virginia.gov/sites/default/files/vatax-pdf/2023-760-instructions.pdf
- name: Virginia Earned Income Credit (nonrefundable, 20% option)
  type: nonrefundable
  eligibility: Virginia residents who claimed the federal Earned Income Tax Credit on their 2023 federal return.
    Mutually exclusive with the Credit for Low-Income Individuals and with the 15% refundable EITC option — taxpayer
    claims only the one option that benefits them most.
  amount: 20% (.20) of the federal Earned Income Tax Credit claimed on the federal return; nonrefundable, limited
    to Virginia income tax liability (Schedule ADJ Line 15 / Line 16a)
  income_limit_2023: No separate Virginia income cap; eligibility tracks the federal EITC income limits since it
    requires a federal EITC claim
  claimed_on: Schedule ADJ (Form 760-ADJ) Lines 14-15 and 16a, carried to Line 17, then Form 760 Line 23
  citation:
    source: 2023 Form 760 Resident Individual Income Tax Instructions, p.26 (Schedule ADJ Lines 14-17 instructions);
      2023 Virginia Schedule ADJ Line 15
    url: https://www.tax.virginia.gov/sites/default/files/vatax-pdf/2023-760-instructions.pdf
- name: Refundable Virginia Earned Income Tax Credit (15% option)
  type: refundable
  eligibility: Virginia residents who claimed the federal Earned Income Tax Credit on their 2023 federal return;
    available for taxable years beginning 1/1/2022 but before 1/1/2026. Mutually exclusive with the Credit for Low-Income
    Individuals and the 20% nonrefundable EITC — taxpayer claims only one of the three.
  amount: 15% (.15) of the federal Earned Income Tax Credit claimed on the federal return; refundable, so it may
    exceed the taxpayer's Virginia tax liability (Schedule ADJ Line 16b)
  income_limit_2023: No separate Virginia income cap; eligibility tracks the federal EITC income limits since it
    requires a federal EITC claim
  claimed_on: Schedule ADJ (Form 760-ADJ) Line 16b, carried to Line 17, then Form 760 Line 23
  citation:
    source: 2023 Form 760 Resident Individual Income Tax Instructions, p.26 ('Refundable Virginia Earned Income
      Tax Credit (EITC), equal to 15 percent of the federal EITC'); 2023 Virginia Schedule ADJ Line 16b
    url: https://www.tax.virginia.gov/sites/default/files/vatax-pdf/2023-760-instructions.pdf
- name: Credit for Tax Paid to Another State
  type: nonrefundable
  eligibility: Virginia residents (and certain part-year residents) who paid income tax to another state on income
    that is also taxed by Virginia, to avoid double taxation. Does not apply to tax paid to a foreign country, and
    special rules apply for the District of Columbia, Kentucky, and other border states.
  income_limit_2023: None stated; the credit equals the qualifying tax paid to the other state subject to a limitation
    based on the proportion of Virginia tax attributable to the out-of-state income (computed on Schedule OSC)
  claimed_on: Schedule OSC, Line 21; entered on Form 760 Line 24
  citation:
    source: 2023 Form 760 Resident Individual Income Tax Instructions, p.32-33 ('Credit for Taxes Paid to Another
      State' / Schedule OSC) and Line 24 instructions, Virginia Department of Taxation
    url: https://www.tax.virginia.gov/sites/default/files/vatax-pdf/2023-760-instructions.pdf
  unverified: true
filing_requirement:
  note: 'Every Virginia resident whose Virginia Adjusted Gross Income (VAGI) is at or above the minimum threshold
    must file Form 760. For tax year 2023 the thresholds are: Single or Married filing separately - VAGI $11,950
    or more; Married filing jointly - combined VAGI $23,900 or more. (Per 2023 Form 760 instructions, "Do You Need
    to File a Virginia Income Tax Return?")'
mailing_addresses:
  refund_or_no_payment: Virginia Department of Taxation, P.O. Box 1498, Richmond, VA 23218-1498 (refund / no-payment
    returns). Alternatively, returns may be filed with the locality (Commissioner of the Revenue / Director of Finance)
    where the taxpayer resided on January 1.
  with_payment: Virginia Department of Taxation, P.O. Box 760, Richmond, VA 23218-0760 (returns with a tax payment
    due). Alternatively, may be filed/paid with the locality where the taxpayer resided on January 1.
  citation:
    source: 2023 Form 760 Resident Individual Income Tax Instructions (Virginia Tax) - Line 1 Federal Adjusted Gross
      Income; due date May 1, 2024; filing thresholds; payment options / check payee; mailing addresses
    url: https://www.tax.virginia.gov/sites/default/files/vatax-pdf/2023-760-instructions.pdf
  verification: Some state facts could not be independently re-confirmed — see the pack's `unverified` list; confirm
    at the cited DOR source before relying on a specific figure/address.
payment:
  check_payee: 'Department of Taxation (make check or money order payable to the Department of Taxation; write Social
    Security Number and "2023 Virginia income tax payment" on the check). NOTE: If filing the return locally rather
    than with the state, make the check payable to the Treasurer or Director of Finance of the city/county of residence.'
  web_pay_url: https://www.tax.virginia.gov/payments
deadlines:
  filing_due_date: '2024-05-01'
  citation:
    source: 2023 Form 760 Resident Individual Income Tax Instructions (Virginia Tax) - Line 1 Federal Adjusted Gross
      Income; due date May 1, 2024; filing thresholds; payment options / check payee; mailing addresses
    url: https://www.tax.virginia.gov/sites/default/files/vatax-pdf/2023-760-instructions.pdf
all_citations:
- source: 2023 Form 760 Resident Individual Income Tax Instructions (Virginia Tax) - Line 1 Federal Adjusted Gross
    Income; due date May 1, 2024; filing thresholds; payment options / check payee; mailing addresses
  url: https://www.tax.virginia.gov/sites/default/files/vatax-pdf/2023-760-instructions.pdf
