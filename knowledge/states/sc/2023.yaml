unverified:
- Exact verbatim definitions of 'resident,' 'part-year resident,' and 'nonresident' as separately labeled terms
  come from the SCDOR General Information and FAQs (functional tests quoted) rather than a single statutory glossary
  in the SC1040 form; the detailed domicile standard is in SCDOR's separate policy document 'Determining a Taxpayer's
  Domicile for Income Tax Purposes' (dor.sc.gov/policy), which was not separately fetched - confirm at the DOR if
  a precise statutory citation is needed.
- Check payee is given as 'SCDOR' in the SCDOR FAQs and in the SC1040 instructions for UT-3 and SC1040ES payments;
  the SC1040 form's printed payment line did not show a literal payee string in the extracted text, so the exact
  wording for a mailed SC1040 balance-due check (SCDOR vs. South Carolina Department of Revenue) should be confirmed
  at the DOR.
