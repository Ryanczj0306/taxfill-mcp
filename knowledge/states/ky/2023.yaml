unverified:
- No KY .gov page explicitly addresses tax-TREATY-exempt income by name; the conformity conclusion is inferred from
  KY beginning at federal AGI plus the absence of any treaty add-back in the Schedule M additions list. This is
  the standard federal-AGI-conformity case but the specific treaty-income treatment is not stated verbatim on a
  KY .gov page.
- The exact 2023 Form 740-V payment-voucher mailing address was not separately pulled; payment-with-return mailing
  is confirmed as Frankfort, KY 40619-0008 from both the packet and the DOR E-file/Payment Options page.
