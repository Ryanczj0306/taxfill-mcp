residency:
  summary: 'Per the 2023 Form 740-NP instructions: individuals who maintain a permanent residence in Kentucky (i.e.,
    are domiciled in Kentucky) for the entire tax year are full-year RESIDENTS and file Form 740. Persons not domiciled
    in Kentucky but who live in Kentucky for more than 183 days during the tax year are ALSO considered residents
    (a statutory-resident rule) but, since they are not full-year residents, file Form 740-NP. Individuals who established
    or abandoned Kentucky residency during the year are PART-YEAR residents (file Form 740-NP), reporting income
    from all sources while a resident plus Kentucky-source income while a nonresident. Full-year NONRESIDENTS report
    only income from Kentucky sources (activities carried on in KY, services performed in KY, and KY-located property)
    on Form 740-NP. Full-year residents of reciprocal states (IL, IN, MI, OH, VA, WV, WI) with only KY wage income
    use Form 740-NP-R.'
forms:
  resident: Form 740 (Kentucky Individual Income Tax Return — Full-Year Resident). Form 740-EZ also exists for simple
    full-year resident returns.
  part_year_or_nonresident: Form 740-NP (Kentucky Individual Income Tax Return — Nonresident or Part-Year Resident).
    Reciprocal-state residents with only KY wages use Form 740-NP-R.
filing_requirement:
  note: 'A Kentucky individual income tax return must be filed if BOTH (1) modified gross income exceeds the threshold
    for your family size in Chart A — 2023 thresholds: family size 1 = $15,650; 2 = $21,150; 3 = $26,650; 4+ = $32,150
    — AND (2) Kentucky adjusted gross income exceeds the Chart B threshold for your filing status/age (e.g., $3,270
    single/married under 65; $4,270 if one is 65+; $5,270 if both 65+/blind). Self-employment exception: must file
    regardless of Chart B if Kentucky self-employment gross receipts exceed the Chart A modified-gross-income amount
    for the family size. Nonresidents/part-year residents apply the same modified-gross-income (Chart A) tests and
    file Form 740-NP if they had KY-source income.'
