# KY state knowledge — tax year 2023. Fetched + cited from the KY DOR (.gov) and
# assembled by scripts/assemble_state_knowledge.py. Loaded as a StateKnowledge.
# conforms_to_federal_treaties: whether federally treaty-exempt income flows through
# (most states start from federal AGI) or is added back (CA/CT/MD/MS-style). Figures the
# fetch could not independently confirm are in `unverified` — confirm at the cited source.
jurisdiction: states/ky
tax_year: 2023
income_tax: true
conforms_to_federal_treaties: true
treaty_note: 'Kentucky''s resident return (Form 740) starts from federal adjusted gross income — Form 740 line 5
  is "Federal Adjusted Gross Income," and the 2023 740 instruction packet states: "Kentucky law requires that the
  individual income tax return begin with federal adjusted gross income and be adjusted for any differences to arrive
  at Kentucky adjusted gross income." Modifications are made on Schedule M. The Schedule M "Additions to Federal
  Adjusted Gross Income" (lines 1-5) are: (1) interest on other states'' obligations / mutual-fund dividends, (2)
  resident adjustment from KY Schedule K-1, (3) special depreciation/Section 179, (4) federal NOL, and (5) "other
  additions" (reservist/National Guard expenses, lump-sum distribution 20% capital-gains portion, passive activity
  loss adjustment, pension/IRA basis differences, intangible-asset gain differences). NONE of these add back federally
  tax-treaty-exempt income. Because treaty-exempt income is already excluded from federal AGI and KY has no add-back
  for it, it is not re-taxed by Kentucky — therefore KY conforms.'
