    - Arkansas Dept. of Finance and Administration. Contains: residency/domicile definitions (p.9), who-must-file
    thresholds and ''When to File'' April 15, 2024 due date (p.10), tax-treaty foreign-student taxation language,
    line-by-line income section (Lines 8-25), mailing addresses, and check-payable instructions.'
  url: https://www.dfa.arkansas.gov/wp-content/uploads/2023_AR1000F_and_AR1000NR_Instructions.pdf
starts_from: Arkansas does NOT start from federal AGI. The AR1000F/AR1000NR income section is built line-by-line
  from source documents (Line 8 W-2 wages, Line 10 interest, Line 11 dividends, ... Line 23 Total Income), then
  computes Arkansas Adjusted Gross Income on Line 25. Effectively the starting point is federal wages / individual
  income items, not federal AGI or federal taxable income.
residency:
  summary: 'Residency is based on domicile (the place you intend as your permanent home and to return to whenever
    away; you can have only one, and it does not change until you move somewhere you intend to make your permanent
    home). FULL YEAR RESIDENT: you lived in Arkansas all of calendar year 2023, or maintained a domicile or Home
    of Record in Arkansas during the tax year (file AR1000F). NONRESIDENT: you did not make your domicile in Arkansas
    (file AR1000NR). PART YEAR RESIDENT: you established a domicile in Arkansas, or moved out of the state, during
    calendar year 2023 (file AR1000NR). The instructions do not state a bright-line day-count statutory-resident
    test (no 183-day rule); residency turns on domicile. (Military: Home of Record in Arkansas keeps you an Arkansas
    resident, though active-duty military compensation is exempt.)'
forms:
  resident: AR1000F - Full Year Resident Individual Income Tax Return
  part_year_or_nonresident: AR1000NR - Part Year or Non-Resident Individual Income Tax Return
filing_requirement:
  note: '2023 minimum gross-income filing thresholds (full-year residents, AR1000F): Single $13,850; Head of Household
    with 1 or no dependents $19,692; Head of Household with 2+ dependents $23,473; Married Filing Joint with 1 or
    no dependents $23,357; Married Filing Joint with 2+ dependents $28,111; Married Filing Separately $9,140; Surviving
    Spouse with 1 or no dependents $19,692; Surviving Spouse with 2+ dependents $23,473. ''Gross income'' is all
    income before deductions other than income specifically exempt, but it DOES include the $6,000 retirement-income
    exemption and U.S. active-duty/military-retirement amounts. If gross income is below your threshold you are
    not required to file, but must file to claim any refund. NONRESIDENTS (AR1000NR): must file if they received
    any gross income from Arkansas sources, regardless of marital/filing status or amount. PART YEAR RESIDENTS (AR1000NR):
    must file if they received any gross income while an Arkansas resident, regardless of amount.'
