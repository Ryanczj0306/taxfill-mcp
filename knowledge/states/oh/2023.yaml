# OH state knowledge — tax year 2023. Fetched + cited from the OH DOR (.gov) and
# assembled by scripts/assemble_state_knowledge.py. Loaded as a StateKnowledge.
# conforms_to_federal_treaties: whether federally treaty-exempt income flows through
# (most states start from federal AGI) or is added back (CA/CT/MD/MS-style). Figures the
# fetch could not independently confirm are in `unverified` — confirm at the cited source.
jurisdiction: states/oh
tax_year: 2023
income_tax: true
conforms_to_federal_treaties: true
treaty_note: 'Ohio IT 1040 line 1 starts from federal adjusted gross income (federal 1040/1040-SR/1040-NR line 11)
  and the instructions state "Line 1 of your Ohio income tax return must match your federal adjusted gross income
  as defined in the Internal Revenue Code." Ohio AGI = line 1 + additions (Schedule of Adjustments) - deductions.
  The additions list (Sched. of Adjustments lines 8-11: 168(k)/179 depreciation add-backs, U.S. obligation interest/dividends
  exempt federally but not by the state, and federal conformity additions) contains NO add-back of federally treaty-exempt
  income. Therefore income excluded from federal AGI under a U.S. tax treaty flows through and is not re-taxed by
  Ohio. Federal-AGI common case, no treaty addback -> conforms.'
