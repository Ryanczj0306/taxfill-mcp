# OH state knowledge — tax year 2023. Fetched + cited from the OH DOR (.gov) and
# assembled by scripts/assemble_state_knowledge.py. Loaded as a StateKnowledge.
# conforms_to_federal_treaties: whether federally treaty-exempt income flows through
# (most states start from federal AGI) or is added back (CA/CT/MD/MS-style). Figures the
# fetch could not independently confirm are in `unverified` — confirm at the cited source.
jurisdiction: states/oh
tax_year: 2023
income_tax: true
conforms_to_federal_treaties: true
treaty_note: 'Ohio IT 1040 line 1 starts from federal adjusted gross income (federal 1040/1040-SR/1040-NR line 11)
  and the instructions state "Line 1 of your Ohio income tax return must match your federal adjusted gross income
  as defined in the Internal Revenue Code." Ohio AGI = line 1 + additions (Schedule of Adjustments) - deductions.
  The additions list (Sched. of Adjustments lines 8-11: 168(k)/179 depreciation add-backs, U.S. obligation interest/dividends
  exempt federally but not by the state, and federal conformity additions) contains NO add-back of federally treaty-exempt
  income. Therefore income excluded from federal AGI under a U.S. tax treaty flows through and is not re-taxed by
  Ohio. Federal-AGI common case, no treaty addback -> conforms.'
citation:
  source: 2023 Ohio IT 1040 / SD 100 Instruction Booklet (Ohio Department of Taxation) - Line 1 federal AGI, Schedule
    of Adjustments additions/deductions, Who Must File, Ohio Residency, mailing addresses, due date, payment/check
    payee
  url: https://dam.assets.ohio.gov/image/upload/tax.ohio.gov/forms/ohio_individual/individual/2023/it1040-sd100-instructionbooklet.pdf
starts_from: federal AGI (Ohio IT 1040 line 1 = federal 1040/1040-SR/1040-NR line 11; must match federal AGI as
  defined in the IRC)
residency:
  summary: 'Resident: domiciled in Ohio ("domiciled" and "resident" mean the same thing under Ohio law). Any individual
    with an abode (owned or rented) in Ohio is presumed a resident; temporary absence, no matter how long, does
    not change residency. Part-year resident: a resident for part of the tax year and a nonresident for the rest
    (permanently moved into or out of Ohio during the year); entitled to the nonresident credit for income earned
    while a resident of another state. Nonresident: a resident of another state for the entire tax year. The presumption
    of Ohio residency can be challenged using the contact period test: with fewer than 213 contact periods in Ohio,
    the taxpayer must show by a preponderance (more likely than not) that they were a nonresident; with 213 or more
    contact periods, clear and convincing documentation is required. Certain individuals can establish an irrebuttable
    presumption of non-Ohio residency by filing the Ohio Nonresident Statement (form IT NRS). A contact period requires
    an abode outside Ohio, being away overnight from it, and spending any portion of two consecutive days in Ohio.
    Authorities: R.C. 5747.01(I)(1), R.C. 5747.24(A)-(D), Info Release IT 2018-01, Cunningham v. Testa, 2015-Ohio-2744.'
forms:
  resident: Ohio IT 1040 (Individual Income Tax Return). Residency status (resident / part-year resident / nonresident)
    is indicated by checkbox on the IT 1040 itself; there is no separate resident-only return.
  part_year_or_nonresident: 'No separate nonresident/part-year return; nonresidents and part-year residents file
    the same Ohio IT 1040 and check the part-year resident or nonresident box. They compute the Nonresident Credit
    on form IT NRC (Ohio Nonresident Credit Calculation), which must be included with the IT 1040. (Optional residency
    status election: form IT NRS, Ohio Nonresident Statement.)'
credits_verification: State credits were researched from the cited DOR sources and are not tax advice — confirm
  each amount and your eligibility at the cited source before claiming it.
credits:
- name: Ohio Earned Income Credit (EIC)
  type: nonrefundable
  eligibility: Resident/part-year/nonresident taxpayers who qualified for and claimed the federal Earned Income
    Tax Credit for tax year 2023 (federal Form 1040/1040-SR, line 27). Eligibility tracks the federal EIC.
  amount: 30% of your federal EIC (federal 1040/1040-SR, line 27). No state-level dollar cap for 2023.
  income_limit_2023: No separate Ohio income limit; bounded by the federal EIC income/investment-income thresholds
    since the credit is a percentage of the federal credit.
  claimed_on: Ohio Schedule of Credits, line 13 (attached to Ohio IT 1040)
  citation:
    source: Ohio Department of Taxation - 2023 Ohio IT 1040 / SD 100 Instruction Booklet, Ohio Schedule of Credits,
      Line 13 Earned Income Credit (R.C. 5747.71)
    url: https://dam.assets.ohio.gov/image/upload/tax.ohio.gov/forms/ohio_individual/individual/2023/it1040-sd100-instructionbooklet.pdf
- name: Retirement Income Credit
  type: nonrefundable
  eligibility: Taxpayer (and spouse, if filing jointly) who (a) has modified adjusted gross income less exemptions
    under $100,000; (b) received income from a pension, profit-sharing, or retirement plan (e.g., traditional IRA
    or 401(k)) on account of retirement; (c) the income is included in Ohio adjusted gross income; and (d) has not
    previously taken the Ohio lump sum retirement credit. Amounts deducted on the Ohio Schedule of Adjustments (e.g.,
    Social Security, uniformed-services retirement) do not qualify.
  amount: 'Table-based on total eligible retirement income included in Ohio AGI: $501-$1,500 = $25; $1,501-$3,000
    = $50; $3,001-$5,000 = $80; $5,001-$8,000 = $130; $8,001 or more = $200. Maximum credit per return is $200.'
  income_limit_2023: Modified adjusted gross income less exemptions must be less than $100,000.
  claimed_on: Ohio Schedule of Credits, line 2 (attached to Ohio IT 1040)
  citation:
    source: Ohio Department of Taxation - 2023 Ohio IT 1040 / SD 100 Instruction Booklet, Ohio Schedule of Credits,
      Line 2 Retirement Income Credit and Table 2 (R.C. 5747.055(B))
    url: https://dam.assets.ohio.gov/image/upload/tax.ohio.gov/forms/ohio_individual/individual/2023/it1040-sd100-instructionbooklet.pdf
- name: Senior Citizen Credit
  type: nonrefundable
  eligibility: Taxpayer who (a) has modified adjusted gross income less exemptions under $100,000; (b) was 65 or
    older at the end of the tax year; and (c) has not previously taken the Ohio lump sum distribution credit.
  amount: $50 per return.
  income_limit_2023: Modified adjusted gross income less exemptions must be less than $100,000.
  claimed_on: Ohio Schedule of Credits, line 4 (attached to Ohio IT 1040)
  citation:
    source: Ohio Department of Taxation - 2023 Ohio IT 1040 / SD 100 Instruction Booklet, Ohio Schedule of Credits,
      Line 4 Senior Citizen Credit (R.C. 5747.055(F))
    url: https://dam.assets.ohio.gov/image/upload/tax.ohio.gov/forms/ohio_individual/individual/2023/it1040-sd100-instructionbooklet.pdf
- name: Child and Dependent Care Credit
  type: nonrefundable
  eligibility: Taxpayer whose modified adjusted gross income is less than $40,000 AND who claimed the federal 'credit
    for child and dependent care expenses' on federal Form 2441.
  amount: 'If Ohio MAGI is less than $20,000: the full amount from federal Form 2441, line 9c. If MAGI is $20,000
    or more but less than $40,000: 25% of the amount on federal Form 2441, line 11.'
  income_limit_2023: Modified adjusted gross income must be less than $40,000 (no credit at $40,000 or more).
  claimed_on: Ohio Schedule of Credits, line 6 (attached to Ohio IT 1040)
  citation:
    source: Ohio Department of Taxation - 2023 Ohio IT 1040 / SD 100 Instruction Booklet, Ohio Schedule of Credits,
      Line 6 Child Care and Dependent Care Credit and worksheet (R.C. 5747.054)
    url: https://dam.assets.ohio.gov/image/upload/tax.ohio.gov/forms/ohio_individual/individual/2023/it1040-sd100-instructionbooklet.pdf
- name: Joint Filing Credit
  type: nonrefundable
  eligibility: Married taxpayers filing a joint Ohio return where EACH spouse has at least $500 of 'qualifying income'
    (income included in Ohio AGI other than interest, dividends/distributions, capital gains, and rents/royalties;
    amounts deducted on the Ohio Schedule of Adjustments such as business income, Social Security, and certain military
    pay do not count).
  amount: 'A percentage of tax liability before this credit (Schedule of Credits line 11), based on MAGI less exemptions:
    0-$25,000 = 20%; $25,001-$50,000 = 15%; $50,001-$75,000 = 10%; $75,001 or more = 5%. Maximum credit per return
    is $650.'
  income_limit_2023: No income ceiling to qualify; the credit percentage decreases as MAGI less exemptions rises
    (5% above $75,000), and the credit is capped at $650.
  claimed_on: Ohio Schedule of Credits, line 12 (attached to Ohio IT 1040)
  citation:
    source: Ohio Department of Taxation - 2023 Ohio IT 1040 / SD 100 Instruction Booklet, Ohio Schedule of Credits,
      Line 12 Joint Filing Credit and percentage table (R.C. 5747.05(E))
    url: https://dam.assets.ohio.gov/image/upload/tax.ohio.gov/forms/ohio_individual/individual/2023/it1040-sd100-instructionbooklet.pdf
- name: Exemption Credit
  type: nonrefundable
  eligibility: Taxpayer whose modified adjusted gross income less exemptions is less than $30,000; a credit is allowed
    for each personal/dependent exemption claimed on the return. This functions as Ohio's low-income credit tied
    to the number of exemptions.
  amount: $20 for each exemption claimed on the return.
  income_limit_2023: Modified adjusted gross income less exemptions must be less than $30,000.
  claimed_on: Ohio Schedule of Credits, line 9 (attached to Ohio IT 1040)
  citation:
    source: Ohio Department of Taxation - 2023 Ohio IT 1040 / SD 100 Instruction Booklet, Ohio Schedule of Credits,
      Line 9 Exemption Credit (R.C. 5747.022)
    url: https://dam.assets.ohio.gov/image/upload/tax.ohio.gov/forms/ohio_individual/individual/2023/it1040-sd100-instructionbooklet.pdf
filing_requirement:
  note: 'Per the 2023 IT 1040 instruction booklet: "Every Ohio resident and every part-year resident is subject
    to the Ohio income tax. Every nonresident having Ohio-sourced income must also file." Exception: a full-year
    nonresident living in Indiana, Kentucky, Michigan, Pennsylvania, or West Virginia does not have to file if their
    only Ohio-sourced income is wages (reciprocity states). You do not have to file if Ohio AGI (line 3) is <= $0,
    or your exemption amount (line 4) >= Ohio AGI, or specified credits (senior citizen, lump sum distribution,
    joint filing) equal/exceed your tax liability and you owe no school district income tax. The Department recommends
    filing if federal AGI > $28,450. See R.C. 5747.08.'
