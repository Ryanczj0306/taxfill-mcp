# AZ state knowledge — tax year 2023. Fetched + cited from the AZ DOR (.gov) and
# assembled by scripts/assemble_state_knowledge.py. Loaded as a StateKnowledge.
# conforms_to_federal_treaties: whether federally treaty-exempt income flows through
# (most states start from federal AGI) or is added back (CA/CT/MD/MS-style). Figures the
# fetch could not independently confirm are in `unverified` — confirm at the cited source.
jurisdiction: states/az
tax_year: 2023
income_tax: true
conforms_to_federal_treaties: true
treaty_note: 'Arizona''s resident return (Form 140) starts from federal adjusted gross income: line 12 of the 2023
  Form 140 is "Federal adjusted gross income," and the AZ DOR instructions state "Arizona gross income is your federal
  adjusted gross income." Because federally treaty-exempt income is already excluded from federal AGI, it flows
  through to the AZ return excluded. AZ then applies only specific statutory additions (Form 140 lines 14-18, including
  the "Other Additions to Arizona Gross Income" schedule on page 5, which lists items such as the ordinary-income
  portion of lump-sum distributions excluded federally, items previously deducted for Arizona purposes, and claim-of-right
  adjustments). No line on Form 140 or its additions schedule adds back federal tax-treaty-exempt income (unlike
  California''s Schedule CA). Therefore treaty-exempt income is NOT re-taxed by Arizona -> conforms. (Caveat: the
  full page-5 additions schedule was read via .gov search snippets, not the full PDF page, because the form PDFs
  returned HTTP 403 — see unverified.)'
citation:
  source: AZ DOR - 2023 Form 140 Resident Personal Income Tax Return (line 12 = Federal adjusted gross income; additions
    lines 14-18; mailing addresses; make check payable to Arizona Department of Revenue; AZTaxes.gov)
  url: https://azdor.gov/sites/default/files/2023-12/FORMS_INDIVIDUAL_2023_140_f.pdf
starts_from: federal AGI (Form 140 line 12 = "Federal adjusted gross income")
residency:
  summary: An individual is an Arizona resident if their domicile is in Arizona; domicile is the place of one's
    permanent home, where one intends to return when temporarily living or working elsewhere — leaving Arizona for
    a temporary period does not end Arizona residency (AZ DOR Form 140 instructions). Full-year residents file Form
    140 (or 140A/140EZ if eligible). A part-year resident (Arizona resident for only part of the year) files Form
    140PY. A nonresident with Arizona-source income files Form 140NR. (Arizona also has a statutory presence/9-month-presumption
    concept under A.R.S. 43-104, but the domicile rule is the core test cited in the DOR instructions; the 9-month
    statutory presumption was not separately confirmed on a .gov page in this session — see unverified.)
forms:
  resident: Arizona Form 140 - Resident Personal Income Tax Return (full-year residents; short forms Form 140A and
    Form 140EZ are also available for eligible residents)
  part_year_or_nonresident: 'Nonresident: Arizona Form 140NR - Nonresident Personal Income Tax Return. Part-year
    resident: Arizona Form 140PY - Part-Year Resident Personal Income Tax Return.'
credits_verification: State credits were researched from the cited DOR sources and are not tax advice — confirm
  each amount and your eligibility at the cited source before claiming it.
credits:
- name: Dependent Tax Credit
  type: nonrefundable
  eligibility: Available to taxpayers who claim qualifying dependents (a dependent for federal income tax purposes)
    on the Arizona return. Credit amount is higher for dependents under age 17. Cannot also claim the same individual
    as a qualifying parent/grandparent exemption (line 41) or Other Exemption (line 40).
  amount: $100 for each qualifying dependent under age 17 at year-end; $25 for each qualifying dependent age 17
    or older at year-end. Reduced (phased out) for AGI above the limits.
  income_limit_2023: Begins to phase out when federal AGI (Form 140, line 12) exceeds $200,000 (single, head of
    household, or married filing separate) or $400,000 (married filing joint).
  claimed_on: Arizona Form 140, page 2, line 49 (also Form 140A). Worksheet/Tables in the Form 140 instructions.
  citation:
    source: Arizona Department of Revenue, 2023 Form 140 Resident Personal Income Tax Return Instructions (Line
      49 - Dependent Tax Credit)
    url: https://azdor.gov/sites/default/files/2023-12/FORMS_INDIVIDUAL_2023_140i.pdf
- name: Family Income Tax Credit
  type: nonrefundable
  eligibility: Arizona residents whose total income does not exceed the maximum allowed for their filing status
    and number of dependents. The credit only reduces tax and cannot be refunded.
  amount: $40 for each person (taxpayer, spouse, and qualifying dependents), capped at a maximum of $240 for married-filing-joint
    or head-of-household returns (filing status 4 or 5) and $120 for single or married-filing-separate returns (filing
    status 6 or 7). Computed on Worksheet II in the Form 140 instructions.
  income_limit_2023: 'Maximum income depends on filing status and number of dependents. Married filing joint (Table
    I): $20,000 for 0-1 dependents, $23,600 for 2, $27,300 for 3, $31,000 for 4 or more. Head of household (Table
    II): $20,000 (0-1), $20,135 (2), $23,800 (3), $25,200 (4), $26,575 (5+). Single or married filing separate (Table
    III): $10,000 for 0 or more dependents.'
  claimed_on: Arizona Form 140, page 2, line 50 (also Form 140A). Worksheets I and II in the Form 140 instructions.
  citation:
    source: Arizona Department of Revenue, 2023 Form 140 Instructions (Line 50 - Family Income Tax Credit, Tables
      I-III, Worksheets I-II)
    url: https://azdor.gov/sites/default/files/2023-12/FORMS_INDIVIDUAL_2023_140i.pdf
- name: Credit for Increased Excise Taxes
  type: refundable
  eligibility: Taxpayer must have an SSN valid for employment, meet the income threshold for their filing status,
    not be claimed as a dependent by another taxpayer, and not have been sentenced to at least 60 days in a county/state/federal
    prison during 2023. Married joint filers may claim for a spouse with a valid SSN or ITIN.
  amount: '$25 for each person (taxpayer, spouse, and qualifying dependents who are Arizona residents), up to a
    maximum credit of $100 per household. (Worksheet: number of dependents plus 2 if MFJ or plus 1 otherwise, times
    $25, not to exceed $100.)'
  income_limit_2023: Federal AGI (Form 140, line 12) of $25,000 or less for married filing joint or head of household;
    $12,500 or less for single or married filing separate.
  claimed_on: Arizona Form 140, page 2, line 56 (also Form 140A). If also claiming the property tax credit, computed
    on Form 140PTC (line 17) and carried to Form 140 line 56.
  citation:
    source: Arizona Department of Revenue, 2023 Form 140 Instructions (Line 56 - Increased Excise Tax Credit; Credit
      for Increased Excise Taxes Worksheet)
    url: https://azdor.gov/sites/default/files/2023-12/FORMS_INDIVIDUAL_2023_140i.pdf
- name: Property Tax Credit (Form 140PTC)
  type: refundable
  eligibility: Must be an Arizona resident for the entire year and have paid Arizona property tax or rent on a main
    home during 2023. Must be either (a) age 65 or older by Dec 31, 2023, or (b) under 65 but receiving Title 16
    Supplemental Security Income (SSI) payments. Total household income must be under the limits below.
  amount: A set credit amount based on total household income, per the Schedule 1 (live alone) and Schedule 2 (live
    with others) tables on Form 140PTC. Maximum credit is $502 (for the lowest income brackets), decreasing as household
    income rises.
  income_limit_2023: Total household income less than $3,751 if you lived alone, or less than $5,501 if others lived
    with you.
  claimed_on: Arizona Form 140PTC, line 15 (claimed as a refund itself, or carried to Form 140 page 2 line 57 /
    Form 140A line 27 when filing a return). Cannot be claimed on Form 140EZ.
  citation:
    source: Arizona Department of Revenue, 2023 Form 140PTC Property Tax Refund (Credit) Claim and Instructions
      (eligibility tests; Schedules 1 & 2 credit tables)
    url: https://azdor.gov/sites/default/files/2023-12/FORMS_INDIVIDUAL_2023_140PTCi.pdf
filing_requirement:
  note: 'Per the AZ DOR Form 140 instructions, an Arizona return is required for 2023 when gross income exceeds
    the federal standard-deduction-based thresholds: more than $13,850 (single or married filing separately), more
    than $20,800 (head of household), and more than $27,700 (married filing jointly). You may file Form 140 only
    if you (and spouse, if MFJ) are full-year Arizona residents; you must use Form 140 (rather than 140A/140EZ)
    if Arizona taxable income is $50,000 or more, if you itemize, or if you make adjustments to income or claim
    certain credits.'
