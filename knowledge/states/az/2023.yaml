unverified:
- Full text of the page-5 'Other Additions to Arizona Gross Income' schedule on the 2023 Form 140 was read via azdor.gov
  search snippets, not the full PDF page (the form/booklet PDFs returned HTTP 403 to the fetcher). The conclusion
  that there is NO treaty-exempt-income add-back line is based on those snippets plus the federal-AGI starting point;
  recommend confirming the complete additions schedule directly at the DOR.
- Mailing addresses (PO Box 52016 with payment; PO Box 52138 refund/no-payment) and the 'make check payable to Arizona
  Department of Revenue' instruction came from azdor.gov search snippets of the Form 140 instructions and the Mailing
  Addresses page; the Mailing Addresses page itself returned HTTP 403 to the fetcher, so the exact ZIP+4 suffixes
  were not visually confirmed on the rendered page.
- The Arizona statutory-resident / 9-month-presence presumption (A.R.S. 43-104) was not separately confirmed on
  a .gov page in this session; only the domicile-based resident definition from the Form 140 instructions was confirmed.
- Filing thresholds ($13,850 / $20,800 / $27,700) came from azdor.gov search snippets of the Form 140 booklet, not
  a directly rendered .gov page.
