# ND state knowledge — tax year 2023. Fetched + cited from the ND DOR (.gov) and
# assembled by scripts/assemble_state_knowledge.py. Loaded as a StateKnowledge.
# conforms_to_federal_treaties: whether federally treaty-exempt income flows through
# (most states start from federal AGI) or is added back (CA/CT/MD/MS-style). Figures the
# fetch could not independently confirm are in `unverified` — confirm at the cited source.
jurisdiction: states/nd
tax_year: 2023
income_tax: true
conforms_to_federal_treaties: false
treaty_note: 'ND does NOT conform — it re-taxes federally treaty-exempt income. Although the ND-1 resident return
  starts from federal taxable income (Form 1040/1040-SR line 15, ND-1 line 1b), the 2023 ND-1 Individual Income
  Tax Booklet (p.5) states: "Except where an income tax treaty between the United States and a foreign country specifically
  exempts income from taxation by a U.S. state, income tax treaties between the U.S. and foreign countries do not
  apply for North Dakota income tax purposes. Therefore, you may have to pay North Dakota income tax on gross income
  from North Dakota sources even though the income is exempt from U.S. income tax because of a treaty." The mechanism
  is in the Guideline: Income Taxation of Nonresident Aliens — the taxpayer must complete a Pro Forma U.S. Form
  1040NR but "you must disregard any instruction to the U.S. income tax return that refers to the treaty," then
  carry that pro-forma 1040NR line 15 (with treaty income NOT excluded) to ND-1 line 1b. So treaty-exempt income
  that drops out of the actual federal return is effectively added back (rebuilt) before flowing into ND income.
  This is the same non-conforming posture as CA/CT/MD/MS. The treaty pass-through applies ONLY where a treaty article
  specifically extends the exemption to the 50 U.S. states.'
citation:
  source: ND 2023 Individual Income Tax Booklet (Forms ND-EZ/ND-1 instructions) — Who must file (pp.4-5), Statutory
    7-month rule, treaty statement (p.5), When and where to file / mailing PO Box 5621 (p.7), assembly & check payee
  url: https://www.tax.nd.gov/sites/www/files/documents/forms/individual/2023-iit/2023-individual-income-tax-booklet.pdf
starts_from: federal taxable income (Form 1040/1040-SR line 15 -> ND-1 line 1b; line 1a also captures federal AGI
  from line 11). Per the Nonresident Aliens guideline, a nonresident alien builds a Pro Forma 1040NR disregarding
  treaty provisions and enters its line 15 on ND-1 line 1b.
residency:
  summary: 'Full-year resident: a legal resident of ND (domicile = permanent home you always intend to return to)
    for the entire tax year, OR someone meeting the statutory 7-month rule. Statutory 7-month rule: even if not
    a ND resident, you must file as a full-year resident if you maintain a permanent place of abode in ND (a dwelling
    with cooking and bathroom facilities suitable for year-round living, maintained on a permanent/indefinite basis)
    and spend in the aggregate more than 210 days of the tax year in ND; the rule does not apply to part-year residents,
    full-year nonresidents serving in the U.S. armed forces, or full-year Montana/Minnesota residents covered by
    reciprocity. Part-year resident: a ND resident for only part of 2023 — files if required to file federally and
    derived gross income from any source while a ND resident or from a ND source while a nonresident. Full-year
    nonresident: not a ND resident for any part of the year and does not meet the 7-month rule — files if required
    to file federally and derived gross income from ND sources. Resident is taxed on all income; nonresidents/part-year
    residents apportion via Schedule ND-1NR. Reciprocity exempts MN and MT full-year residents from ND filing on
    certain ND wage/personal-service income. A resident may claim a credit for tax paid to another state.'
forms:
  resident: Form ND-1 (Individual Income Tax Return). A simplified Form ND-EZ is available for qualifying full-year
    residents who answer "No" to all the "Which form to use" questions (e.g., no additions/most subtractions, no
    nonresident/part-year status, no other-state credit).
  part_year_or_nonresident: Schedule ND-1NR (Tax Calculation for Nonresidents and Part-Year Residents), filed with
    Form ND-1. (Nonresidents and part-year residents file Form ND-1 plus Schedule ND-1NR; they cannot use Form ND-EZ.)
credits_verification: State credits were researched from the cited DOR sources and are not tax advice — confirm
  each amount and your eligibility at the cited source before claiming it.
credits:
- name: Marriage Penalty Credit
  type: nonrefundable
  eligibility: Married couples filing a JOINT North Dakota return where both spouses have qualified income (wages,
    self-employment, taxable retirement/Social Security). Qualifies only if joint ND taxable income (Form ND-1 line
    18) exceeds $74,862 AND the lower-earning spouse's qualified income exceeds $43,980. Designed to offset the
    higher tax that two-earner couples pay versus filing as singles.
  amount: Calculated via the Marriage Penalty Credit Worksheet; equals the smaller of the computed marriage penalty
    (joint tax minus the sum of each spouse's tax computed separately at single rates) or the maximum credit of
    $287.
  income_limit_2023: Joint ND taxable income must be more than $74,862 and the lower-earning spouse's qualified
    income must be more than $43,980 to qualify (these are thresholds to be eligible, not upper income caps).
  claimed_on: Form ND-1, line 22 (Marriage Penalty Credit Worksheet in the 2023 ND-1 booklet, p.14-15)
  citation:
    source: ND Office of State Tax Commissioner — 2023 Individual Income Tax Booklet (Marriage Penalty Credit Worksheet)
      and Marriage Penalty Tax Credit web page
    url: https://www.tax.nd.gov/sites/www/files/documents/forms/individual/2023-iit/2023-individual-income-tax-booklet.pdf
- name: Family Member Care Tax Credit
  type: nonrefundable
  eligibility: A taxpayer who paid qualified care expenses for a qualifying family member who is (a) related to
    the taxpayer by blood or marriage, (b) at least 65 years old OR disabled per the Social Security Administration,
    and (c) has federal taxable income of $20,000 or less if unmarried, or combined federal taxable income of $35,000
    or less if married. Care must be provided by an unrelated person/organization and not reimbursed by insurance
    or a government assistance program. (This is ND's analogue to a dependent-care credit, but it covers elderly/disabled
    family members, not children.)
  amount: Credit = eligible qualified care expenses multiplied by a decimal (0.20 to 0.30, decreasing as the caregiver's
    federal taxable income rises), capped at $2,000 per qualifying family member ($1,000 if Married Filing Separately),
    and limited to $4,000 total across all family members ($2,000 if MFS). The credit phases out using a federal-taxable-income
    limit subtraction (see line 9-11).
  income_limit_2023: Caregiver federal taxable income phaseout begins at $50,000 (Single/HoH/QW), $70,000 (Married
    Filing Jointly), or $35,000 (Married Filing Separately); credit reduced dollar-for-dollar by income above these
    limits. Separately, the cared-for family member's federal taxable income must be <= $20,000 (unmarried) or <=
    $35,000 (married couple).
  claimed_on: Schedule ND-1FC, line 11, carried to Schedule ND-1TC, line 1 (then to Form ND-1, line 23)
  citation:
    source: ND Office of State Tax Commissioner — 2023 Schedule ND-1FC (Family Member Care Tax Credit) and 2023
      Schedule ND-1TC
    url: https://www.tax.nd.gov/sites/www/files/documents/forms/individual/2023-iit/schedule-nd-1fc-2023.pdf
- name: Renter's Refund (Renter's Property Tax Refund / circuit-breaker)
  type: refundable
  eligibility: A North Dakota renter who is age 65 or older OR has a permanent and total disability, whose income
    (including spouse and dependents) does not exceed $70,000. Rent must be for the renter's place of residence
    or a mobile home lot (heat, water, lights, telephone, and furniture costs do not count as rent). For a married
    couple living together, only one spouse may apply. There is no asset limitation for renters.
  amount: 'Refund equals (20% of annual rent) minus (4% of annual income), up to a maximum refund of $600. (Official
    example: $9,600 annual rent and $35,000 income gives $1,920 - $1,400 = $520 refund.)'
  income_limit_2023: $70,000 (total income including spouse and dependents)
  claimed_on: Application for Property Tax Credit / Renter's Refund filed directly with the ND Office of State Tax
    Commissioner (not on Form ND-1); applications accepted from the Tuesday after MLK Jr. Day through May 31, postmarked
    by May 31.
  citation:
    source: ND Office of State Tax Commissioner — Renter's Refund web page and Homestead Property Tax Credit and
      Renter's Refund web page
    url: https://www.tax.nd.gov/property-tax-credits/renters-refund
- name: Homestead Property Tax Credit
  type: nonrefundable
  eligibility: A North Dakota homeowner who is age 65 or older OR has a permanent and total disability (no age requirement
    for disability), who lives in and owns the property, and whose income (including spouse and dependents) does
    not exceed $70,000. For a married couple living together, only one spouse may apply. There is no asset limitation
    for homeowners. Disability applicants must include a physician's certificate.
  amount: 'Reduction in the property''s taxable value based on income: income $0-$40,000 = 100% reduction up to
    a maximum $9,000 of taxable value (max true & full value $200,000); income $40,001-$70,000 = 50% reduction up
    to a maximum $4,500 of taxable value (max true & full value $100,000). The dollar property-tax savings depends
    on the local mill rate.'
  income_limit_2023: $70,000 (total income including spouse and dependents)
  claimed_on: Application filed with the local county assessor or county director of tax equalization before March
    31 (a property-tax program, not claimed on Form ND-1).
  citation:
    source: ND Office of State Tax Commissioner — Homestead Property Tax Credit web page and Homestead Property
      Tax Credit and Renter's Refund web page
    url: https://www.tax.nd.gov/homestead-property-tax-credit
filing_requirement:
  note: 'You must file a 2023 ND individual income tax return if you are required to file a 2023 federal return
    AND you are: (a) a full-year ND resident (taxed on all income, even if earned outside ND or overseas); (b) a
    part-year resident with ND-source income or income earned while a resident; or (c) a full-year nonresident (including
    a nonresident alien) with gross income from ND sources. MN/MT full-year residents are exempt under reciprocity
    for certain ND wage/personal-service income. (2023 ND-1 Booklet, "Who must file a return," pp. 4-5.)'
