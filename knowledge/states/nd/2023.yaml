  booklet's single 'Mail your return to' / assembly instructions; ND does not appear to publish separate refund
  vs payment PO boxes. Confirm at tax.nd.gov before relying on a split address.
- Online payment portal canonical URL given as https://tap.tax.nd.gov/ (ND TAP). The booklet/individual-income-tax
  page also direct users to tax.nd.gov 'Make A Payment'; the booklet cited a non-logged-in pay link http://tap.tax.nd.gov/?link=NonLogPay.
  Confirm the current ND TAP payment URL at the DOR.
