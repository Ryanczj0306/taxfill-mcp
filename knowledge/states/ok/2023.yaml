# OK state knowledge — tax year 2023. Fetched + cited from the OK DOR (.gov) and
# assembled by scripts/assemble_state_knowledge.py. Loaded as a StateKnowledge.
# conforms_to_federal_treaties: whether federally treaty-exempt income flows through
# (most states start from federal AGI) or is added back (CA/CT/MD/MS-style). Figures the
# fetch could not independently confirm are in `unverified` — confirm at the cited source.
jurisdiction: states/ok
tax_year: 2023
income_tax: true
conforms_to_federal_treaties: true
treaty_note: 'Oklahoma''s resident return (Form 511) starts at line 1 from "Federal adjusted gross income (from
  Federal 1040 or 1040-SR)" and then applies Schedule 511-A (Oklahoma subtractions) and Schedule 511-B (Oklahoma
  additions) to arrive at Oklahoma AGI. The complete Schedule 511-B additions list for 2023 is closed and enumerated:
  (1) state and municipal bond interest, (2) out-of-state losses, (3) lump-sum distributions not in federal AGI,
  (4) federal net operating loss, (5) recapture of depletion / excess federal depletion, (6) recapture of 529 contributions,
  (7) Oklahoma loss distributed by an electing PTE, (8) miscellaneous other additions. There is NO add-back of federally
  treaty-exempt income anywhere in the resident or nonresident packets (a full-text search of both 2023 packets
  for "treaty"/"treaties" returns zero hits). Because OK begins from federal AGI and does not add treaty income
  back (unlike CA Schedule CA), federally treaty-exempt income already excluded from federal AGI flows through and
  is NOT re-taxed by Oklahoma. The 511-NR likewise begins from the federal amounts: "The Federal Adjusted Gross
  Income (AGI) will be adjusted using the Oklahoma additions and subtractions." Therefore conforms = true.'
