    of Revenue, P.O. Box 8711, Wilmington, DE 19899-8711.'
  with_payment: 'Enclosing payment / balance due (PIT-RES Line 45 / PIT-NON Line 59): State of Delaware, Division
    of Revenue, P.O. Box 508, Wilmington, DE 19899-508.'
