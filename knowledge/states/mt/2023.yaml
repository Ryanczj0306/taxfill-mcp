# MT state knowledge — tax year 2023. Fetched + cited from the MT DOR (.gov) and
# assembled by scripts/assemble_state_knowledge.py. Loaded as a StateKnowledge.
# conforms_to_federal_treaties: whether federally treaty-exempt income flows through
# (most states start from federal AGI) or is added back (CA/CT/MD/MS-style). Figures the
# fetch could not independently confirm are in `unverified` — confirm at the cited source.
jurisdiction: states/mt
tax_year: 2023
income_tax: true
conforms_to_federal_treaties: true
treaty_note: 'MT conforms. For tax year 2023, the Montana Form 2 instructions state plainly: "Your income on your
  Montana tax return begins with your Federal Adjusted Gross Income" (2023 Form 2 Instructions, "Federal Adjusted
  Gross Income" section, p.9). Federally treaty-exempt income (excluded from federal AGI under an applicable U.S.
  tax treaty) is therefore already absent from the MT starting figure. The Montana Additions Schedule defines additions
  as "all items of income that are not included in Federal Adjusted Gross Income and that must be added" (p.10/p.17),
  and its enumerated lines are: Line 1 Recovery of Federal Income Tax Deducted; Line 2 Other Recoveries; Line 5
  Smaller Federal Estate/Trust Distributions; Line 6 Medical Savings Account nonqualified withdrawals; Line 7 First-Time
  Home-Buyer Account nonqualified withdrawals; Line 9 Federal Net Operating Loss Deduction; Line 10 Expenses used
  to claim a MT credit; Line 11 Farm/Ranch Risk Management distributions; Line 12 pass-through entity (K-1) additions;
  Line 13 Title Plant Depreciation/Amortization; Line 14 State Income Tax Deduction; Line 15 Other Additions. NONE
  is an add-back of treaty-exempt income. Line 15 ("Other Additions") examples are limited to passive/rental and
  capital loss carryover differences and uncredited S-corp federal income tax — not treaty income. Unlike California
  (Schedule CA), Montana has no treaty-income addback for 2023, so treaty-exempt income is not re-taxed.'
citation:
  source: 2023 Montana Form 2 Individual Income Tax Instructions (MT DOR) — starting point ("begins with your Federal
    Adjusted Gross Income"), Montana Additions Schedule line-by-line, residency definitions, filing thresholds chart,
    due date (April 15, 2024), mailing addresses (PO Box 6577 refund / PO Box 6308 with payment), payment (check
    payable to Montana Department of Revenue; TransAction Portal https://tap.dor.mt.gov)
  url: https://revenue.mt.gov/files/forms/Montana-Individual-Income-Tax-Return-Form-2-Instructions/2023_Montana_Individual_Income_Tax_Return_Form_2_Instructions.pdf
starts_from: 'federal AGI (Form 2, line 11 = Federal Adjusted Gross Income from federal Form 1040). NOTE: this is
  the rule for tax year 2023 and earlier; beginning tax year 2024 Montana switched its starting point to federal
  TAXABLE income.'
residency:
  summary: 'Montana recognizes three statuses. RESIDENT: "You are a Montana resident if you are domiciled or maintain
    a permanent place of abode in Montana," and Montana taxes all of a resident''s income even if earned out-of-state.
    Domicile/permanent-abode is determined by factors such as voting/registering to vote in MT, holding a MT driver''s
    license or ID, MT resident hunting/fishing license, claiming MT residency for college admission/financial aid
    or for prior-year tax purposes, concealed-weapon permit, and where a motor vehicle is registered. PART-YEAR
    RESIDENT: someone who was a MT resident at the start of the year and established residency in another state
    during the year, OR a nonresident at the start of the year who established MT residency during the year; MT
    taxes income received while living in MT plus MT-source income earned while not living in MT. NONRESIDENT: neither
    a resident nor a part-year resident; MT taxes only income from Montana sources. (Snowbirds who remain MT-domiciled,
    seasonal workers who do not establish MT residency, and MT residents at out-of-state college are not part-year
    residents.) MT also has a North Dakota wage-withholding reciprocity agreement and Servicemembers Civil Relief
    Act / Military Spouse Residency Relief Act provisions.'
forms:
  resident: Montana Form 2 — Individual Income Tax Return (full-year residents file Form 2).
  part_year_or_nonresident: There is no separate nonresident/part-year individual form for 2023. Nonresidents and
    part-year residents also file Montana Form 2, and additionally complete the Nonresident/Part-Year Resident Ratio
    Schedule (Form 2, page 8) to apportion the tax. (The DER-1 referenced in the instructions is for single-member
    LLCs owned by nonresidents, not the individual return.)
credits_verification: State credits were researched from the cited DOR sources and are not tax advice — confirm
  each amount and your eligibility at the cited source before claiming it.
credits:
- name: Montana Earned Income Tax Credit (EITC)
  type: refundable
  eligibility: Full-year Montana residents who claimed the federal Earned Income Tax Credit on their federal return.
    Nonresidents and taxpayers Married Filing Separately on separate forms do NOT qualify (enter 0). Enrolled tribal
    members living on their reservation, members of section 501(d) agricultural organizations, part-year residents,
    and servicemembers use the Montana EITC Reduction Worksheet to determine the Montana-earned-income portion.
  amount: '3% of the federal EITC for tax year 2023 (line 23b = line 23a federal EITC x 0.03). Example from instructions:
    $2,000 federal EITC yields a $60 Montana EITC. NOTE: rate rises to 10% beginning TY2024, not 2023.'
  income_limit_2023: No separate Montana income limit; governed by federal EITC eligibility (the federal AGI/earned-income
    limits that determine federal EITC qualification).
  claimed_on: Form 2, page 1, line 23a (federal EITC amount) and line 23b (Montana EITC)
  citation:
    source: 2023 Montana Form 2 Individual Income Tax Return Instructions, page 11, 'Line 23 - Earned Income Tax
      Credit'
    url: https://revenue.mt.gov/files/forms/Montana-Individual-Income-Tax-Return-Form-2-Instructions/2023_Montana_Individual_Income_Tax_Return_Form_2_Instructions.pdf
- name: Elderly Homeowner/Renter Credit
  type: refundable
  eligibility: Montana residents age 62 or older as of December 31, 2023, who lived in Montana at least 9 months
    during the tax year, occupied a Montana residence as a renter, owner, or lessee for at least 6 months during
    the year, and whose total gross household income (all household members) is under the limit. Available even
    to those with no other filing requirement. Only one claim per household. For married claimants, only one spouse
    must meet the age-62 test.
  amount: Refundable credit of up to $1,150. The exact amount is determined by a formula based on gross/net household
    income, rent, and property tax (Elderly Homeowner/Renter Credit Schedule, Form 2 page 10).
  income_limit_2023: Gross household income of all household members must be less than $45,000 for the tax year
    (if $45,000 or more, no credit).
  claimed_on: Elderly Homeowner/Renter Credit Schedule (Form 2, page 10), with the credit carried to the Other Payments
    and Refundable Credits Schedule, line 7
  citation:
    source: 2023 Montana Form 2 Instructions, pages 43-46 (Elderly Homeowner/Renter Credit Schedule) and page 45
      line 7; also DOR Elderly Homeowner/Renter Credit web page
    url: https://revenue.mt.gov/property/property-tax-help/montana-elderly-homeowner-renter-credit
- name: Resident Capital Gains Credit
  type: nonrefundable
  eligibility: Full-year Montana residents with net capital gains. Net capital gains must first be reduced by any
    Montana capital-loss carryover reported on the Montana Subtractions Schedule (lines 19 or 27). Nonresidents
    and part-year residents instead use line 2 (Nonresident/Part-Year Resident Capital Gains Credit), 2% of Montana-source
    net capital gains.
  amount: '2% of net capital gains reported on Form 2, line 7. NOTE: this credit is repealed beginning TY2024 (replaced
    by a reduced long-term capital gains tax rate), but is valid for 2023.'
  income_limit_2023: No income limit; credit is a flat percentage of net capital gains.
  claimed_on: Nonrefundable Credits Schedule, line 1 (Form 2, page 9)
  citation:
    source: 2023 Montana Form 2 Instructions, page 39, 'Line 1 - Resident Capital Gains Credit'
    url: https://revenue.mt.gov/files/forms/Montana-Individual-Income-Tax-Return-Form-2-Instructions/2023_Montana_Individual_Income_Tax_Return_Form_2_Instructions.pdf
- name: Credit for Income Tax Paid to Another State or Country
  type: nonrefundable
  eligibility: Full-year or part-year Montana residents who paid income tax to another state or country on an item
    of income that is also included in their Montana Adjusted Gross Income while a Montana resident. Penalties and
    interest paid to the other state/country are excluded; a separate schedule must be completed for each state/country.
  income_limit_2023: No income limit; the credit is generally limited to the lesser of the tax paid to the other
    state/country or the Montana tax attributable to that income (computed on the page 9 schedule).
  claimed_on: Nonrefundable Credits Schedule, line 3 (Form 2, page 9), using the Credit for Income Tax Paid to Another
    State or Country Schedule on page 9
  citation:
    source: 2023 Montana Form 2 Instructions, page 39, 'Line 3 - Credit for Income Tax Paid to Another State or
      Country'
    url: https://revenue.mt.gov/files/forms/Montana-Individual-Income-Tax-Return-Form-2-Instructions/2023_Montana_Individual_Income_Tax_Return_Form_2_Instructions.pdf
filing_requirement:
  note: 'Per the 2023 Form 2 instructions ("Filing Requirements"): you must file a Montana return if, during the
    year, you were a resident or part-year resident of Montana, OR a nonresident who received Montana source income;
    AND your federal gross income (excluding unemployment compensation) is at least the threshold for your filing
    status. 2023 thresholds (under 65 / 65 or older): Single or Married Filing Separately = $5,540 / $8,500; Head
    of Household = $11,080 / $14,040; Married Filing Jointly = $11,080 (both under 65), $14,040 (one spouse 65+),
    $17,000 (both 65+). Add $2,960 to the applicable minimum if you (or spouse) are blind. You must also file if
    you had MT additions/subtractions, incurred/reported losses (to track sourcing), or to claim a refund of withholding
    or refundable credits (e.g., Earned Income Tax Credit, Elderly Homeowner/Renter Credit).'
