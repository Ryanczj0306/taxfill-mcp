unverified:
- No explicit statement found in the 2023 Form 2 instructions that uses the word 'treaty' or directly addresses
  U.S. tax-treaty-exempt income; conformity is inferred (high confidence) from the federal-AGI starting point plus
  the absence of any treaty add-back among the enumerated Montana Additions Schedule lines (1-15). Recommend confirming
  treaty treatment with the MT DOR for any case with treaty-specific facts.
