    Adjusted Gross Income"), Montana Additions Schedule line-by-line, residency definitions, filing thresholds chart,
    due date (April 15, 2024), mailing addresses (PO Box 6577 refund / PO Box 6308 with payment), payment (check
    payable to Montana Department of Revenue; TransAction Portal https://tap.dor.mt.gov)
