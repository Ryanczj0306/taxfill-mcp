starts_from: 'federal AGI (Form 2, line 11 = Federal Adjusted Gross Income from federal Form 1040). NOTE: this is
  the rule for tax year 2023 and earlier; beginning tax year 2024 Montana switched its starting point to federal
  TAXABLE income.'
residency:
  summary: 'Montana recognizes three statuses. RESIDENT: "You are a Montana resident if you are domiciled or maintain
    a permanent place of abode in Montana," and Montana taxes all of a resident''s income even if earned out-of-state.
    Domicile/permanent-abode is determined by factors such as voting/registering to vote in MT, holding a MT driver''s
    license or ID, MT resident hunting/fishing license, claiming MT residency for college admission/financial aid
    or for prior-year tax purposes, concealed-weapon permit, and where a motor vehicle is registered. PART-YEAR
    RESIDENT: someone who was a MT resident at the start of the year and established residency in another state
    during the year, OR a nonresident at the start of the year who established MT residency during the year; MT
    taxes income received while living in MT plus MT-source income earned while not living in MT. NONRESIDENT: neither
    a resident nor a part-year resident; MT taxes only income from Montana sources. (Snowbirds who remain MT-domiciled,
    seasonal workers who do not establish MT residency, and MT residents at out-of-state college are not part-year
    residents.) MT also has a North Dakota wage-withholding reciprocity agreement and Servicemembers Civil Relief
    Act / Military Spouse Residency Relief Act provisions.'
forms:
  resident: Montana Form 2 — Individual Income Tax Return (full-year residents file Form 2).
  part_year_or_nonresident: There is no separate nonresident/part-year individual form for 2023. Nonresidents and
    part-year residents also file Montana Form 2, and additionally complete the Nonresident/Part-Year Resident Ratio
    Schedule (Form 2, page 8) to apportion the tax. (The DER-1 referenced in the instructions is for single-member
    LLCs owned by nonresidents, not the individual return.)
filing_requirement:
  note: 'Per the 2023 Form 2 instructions ("Filing Requirements"): you must file a Montana return if, during the
    year, you were a resident or part-year resident of Montana, OR a nonresident who received Montana source income;
    AND your federal gross income (excluding unemployment compensation) is at least the threshold for your filing
    status. 2023 thresholds (under 65 / 65 or older): Single or Married Filing Separately = $5,540 / $8,500; Head
    of Household = $11,080 / $14,040; Married Filing Jointly = $11,080 (both under 65), $14,040 (one spouse 65+),
    $17,000 (both 65+). Add $2,960 to the applicable minimum if you (or spouse) are blind. You must also file if
    you had MT additions/subtractions, incurred/reported losses (to track sourcing), or to claim a refund of withholding
    or refundable credits (e.g., Earned Income Tax Credit, Elderly Homeowner/Renter Credit).'
