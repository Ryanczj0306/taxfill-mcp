# MT state knowledge — tax year 2023. Fetched + cited from the MT DOR (.gov) and
# assembled by scripts/assemble_state_knowledge.py. Loaded as a StateKnowledge.
# conforms_to_federal_treaties: whether federally treaty-exempt income flows through
# (most states start from federal AGI) or is added back (CA/CT/MD/MS-style). Figures the
# fetch could not independently confirm are in `unverified` — confirm at the cited source.
jurisdiction: states/mt
tax_year: 2023
income_tax: true
conforms_to_federal_treaties: true
treaty_note: 'MT conforms. For tax year 2023, the Montana Form 2 instructions state plainly: "Your income on your
  Montana tax return begins with your Federal Adjusted Gross Income" (2023 Form 2 Instructions, "Federal Adjusted
  Gross Income" section, p.9). Federally treaty-exempt income (excluded from federal AGI under an applicable U.S.
  tax treaty) is therefore already absent from the MT starting figure. The Montana Additions Schedule defines additions
  as "all items of income that are not included in Federal Adjusted Gross Income and that must be added" (p.10/p.17),
  and its enumerated lines are: Line 1 Recovery of Federal Income Tax Deducted; Line 2 Other Recoveries; Line 5
  Smaller Federal Estate/Trust Distributions; Line 6 Medical Savings Account nonqualified withdrawals; Line 7 First-Time
  Home-Buyer Account nonqualified withdrawals; Line 9 Federal Net Operating Loss Deduction; Line 10 Expenses used
  to claim a MT credit; Line 11 Farm/Ranch Risk Management distributions; Line 12 pass-through entity (K-1) additions;
  Line 13 Title Plant Depreciation/Amortization; Line 14 State Income Tax Deduction; Line 15 Other Additions. NONE
  is an add-back of treaty-exempt income. Line 15 ("Other Additions") examples are limited to passive/rental and
  capital loss carryover differences and uncredited S-corp federal income tax — not treaty income. Unlike California
  (Schedule CA), Montana has no treaty-income addback for 2023, so treaty-exempt income is not re-taxed.'
