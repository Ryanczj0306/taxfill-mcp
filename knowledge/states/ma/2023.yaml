starts_from: 'federal wages (W-2 state wages, Box 16) — NOT federal AGI. MA Form 1 builds Massachusetts gross income
  from its own income categories (5.0% income incl. wages from W-2; interest/dividends on Schedule B; capital gains
  on Schedule D); it does not begin from a single federal AGI line. The Form 1 instructions: ''Report in line 3
  total state wages and allocated tips from Form(s) W-2. Generally, your total wages and allocated tips will be
  the same amount reported on your U.S. Form 1040, line 1z,'' with explicit add-back adjustments (e.g., IRC sec.911
  foreign earned income exclusion must be added back; MA state/local pension contributions excluded for federal
  are included).'
residency:
  summary: 'MA recognizes four statuses (MGL ch 62). FULL-YEAR RESIDENT: your residence (domicile) is in Massachusetts
    for the entire year, OR you maintain a permanent place of abode in MA and spend more than 183 days in the aggregate
    in the state during the year (the statutory-resident test) — file Form 1. ''Residence'' and ''domicile'' denote
    the place where you have your permanent home and to which, whenever absent, you intend to return. NONRESIDENT:
    not a MA resident but received Massachusetts-source income (e.g., from a MA job) — file Form 1-NR/PY. PART-YEAR
    RESIDENT: you moved into or out of MA during the year; income/deductions/exemptions are apportioned based on
    days resident or MA-source income — file Form 1-NR/PY. NONRESIDENT AND PART-YEAR RESIDENT: meet both criteria;
    file Form 1-NR/PY and complete Schedule R/NR (Resident/Nonresident Worksheet).'
forms:
  resident: Form 1 — Massachusetts Resident Income Tax Return (2023)
  part_year_or_nonresident: Form 1-NR/PY — Massachusetts Nonresident or Part-Year Resident Income Tax Return (2023).
    Taxpayers who are both nonresident and part-year resident also complete Schedule R/NR (Resident/Nonresident
    Worksheet).
filing_requirement:
  note: 'RESIDENT: Must file Form 1 if a MA resident and gross income (from all sources, inside or outside MA) was
    more than $8,000; if $8,000 or less, no return required. NONRESIDENT: Must file Form 1-NR/PY if Massachusetts-source
    income exceeded the lesser of (a) $8,000, OR (b) the prorated personal exemption (personal exemption amount
    multiplied by the ratio of MA income to total income). PART-YEAR RESIDENT: Must file Form 1-NR/PY if gross income
    during the year was more than $8,000 (from sources inside or outside MA). Source: 2023 Form 1 Instructions (''Filing
    Your Massachusetts Return'') and 2023 Form 1-NR/PY Instructions (who must file).'
