# MA state knowledge — tax year 2023. Fetched + cited from the MA DOR (.gov) and
# assembled by scripts/assemble_state_knowledge.py. Loaded as a StateKnowledge.
# conforms_to_federal_treaties: whether federally treaty-exempt income flows through
# (most states start from federal AGI) or is added back (CA/CT/MD/MS-style). Figures the
# fetch could not independently confirm are in `unverified` — confirm at the cited source.
jurisdiction: states/ma
tax_year: 2023
income_tax: true
conforms_to_federal_treaties: true
treaty_note: 'Net result: treaty-exempt income is NOT re-taxed by MA, so conforms = true — but the mechanism is
  an EXPLICIT DEDUCTION, not passive federal-AGI conformity. Important nuance: MA''s Form 1 does NOT start from
  federal AGI. It builds Massachusetts gross income from its own categories. Line 3 (Wages) is taken from W-2 state
  wages (Box 16), and the instructions state ''Massachusetts gross income also includes the following, which are
  not subject to U.S. income tax'' (i.e., MA can pull in items federal excludes). So treaty-exempt income that an
  employer reports in state wages would otherwise land in MA income. MA neutralizes this with a dedicated Schedule
  Y, Line 4 deduction: ''Amounts Excludible Under MGL Ch 41, § 111F or U.S. Tax Treaty Included in Form 1, Line
  3'' — ''If you were a qualifying student or a taxpayer with income exempt under a United States tax treaty, enter
  any excludible amount of income received that was exempt under such tax treaty in line 4 of Schedule Y that was
  included in Form 1, line 3, and fill in the appropriate oval.'' Because Schedule Y reduces income, the treaty-exempt
  amount is deducted back out and is not taxed. (Form 1-NR/PY has the identical Schedule Y, Line 4 deduction referencing
  Form 1-NR/PY, line 5.) PRACTICAL NOTE: unlike a pure federal-AGI conformity state where treaty income flows out
  automatically, in MA the taxpayer must affirmatively claim the Schedule Y, Line 4 deduction (and fill the treaty
  oval) — if treaty wages appear in W-2 Box 16/Form 1 line 3 and the deduction is not claimed, the income would
  be taxed. Source: 2023 Form 1 Instructions, ''Line 4. Amounts Excludible Under MGL Ch 41, § 111F or U.S. Tax Treaty
  Included in Form 1, Line 3'' (p.21) and ''Line 3. Wages, Salaries, Tips'' (p.7); 2023 Form 1-NR/PY Instructions
  Schedule Y Line 4 (p.27).'
