unverified:
- Exact ZIP+4 routing nuances were taken from the 2023 IN-111 Instructions; confirm current-year addresses at the
  DOR before mailing as PO Box assignments can change between filing years.
- myVTax portal base URL (myvtax.vermont.gov) is cited from the IN-111 instructions ('myVTax.vermont.gov'); the
  exact deep-link for an individual income tax payment was not separately captured — confirm the payment path at
  the DOR.
- Whether a specific tax treaty article is recognized for a given taxpayer should be confirmed at the DOR; the general
  conformity conclusion is based on the federal-AGI starting point plus the explicit U.S.-law-exempt-income subtraction,
  with no observed treaty add-back.
