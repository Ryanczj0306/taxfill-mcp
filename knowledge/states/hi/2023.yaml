residency:
  summary: 'Per Hawaii''s N-11 instructions: a RESIDENT is (1) every individual domiciled in Hawaii, and (2) every
    other individual (whether or not domiciled in Hawaii) who resides in Hawaii for other than a temporary or transitory
    purpose; a resident is taxed on income from all sources. An individual domiciled outside Hawaii is PRESUMED
    to be a resident if present in Hawaii more than 200 days during the taxable year, a presumption rebuttable by
    evidence of a permanent abode outside Hawaii and presence for a temporary/transitory purpose. "Domicile" is
    the place of an individual''s true, fixed, permanent home to which they intend to return; changing domicile
    requires abandoning the old domicile, intent to establish a new one, and actual physical presence in the new
    domicile. A NONRESIDENT is an individual in Hawaii for a temporary or transient purpose whose permanent domicile
    is not Hawaii (taxed only on Hawaii-source income). A PART-YEAR RESIDENT was a Hawaii resident for part of the
    year and a nonresident for the other part (e.g., moved into or out of Hawaii during the year); taxed on all
    income during the residency period and on Hawaii-source income only during the nonresidency period.'
forms:
  resident: Form N-11, Individual Income Tax Return (Resident) (Rev. 2023)
  part_year_or_nonresident: Form N-15, Individual Income Tax Return — Nonresident and Part-Year Resident (Rev. 2023)
filing_requirement:
  note: 'A full-year resident must file Form N-11 if gross income subject to Hawaii income tax exceeds the filing
    threshold. Per the 2023 N-11 instructions, for individuals UNDER age 65 the gross-income thresholds are: Single
    and Married filing separately $3,344; Head of household $4,356; Qualifying surviving spouse $5,544; Married
    filing jointly $6,688. Higher thresholds apply for individuals age 65 or older (e.g., Single/MFS $4,488; Head
    of household $5,500; Qualifying surviving spouse $6,688; MFJ one spouse 65+ $7,832; MFJ both 65+ $8,976) and
    for persons certified as blind, deaf, or totally disabled (Form N-172). A return must also be filed regardless
    of income level if certain recapture or special forms (e.g., N-2, N-103, N-152, N-312, N-814) apply.'
