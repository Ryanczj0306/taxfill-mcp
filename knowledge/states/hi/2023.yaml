# HI state knowledge — tax year 2023. Fetched + cited from the HI DOR (.gov) and
# assembled by scripts/assemble_state_knowledge.py. Loaded as a StateKnowledge.
# conforms_to_federal_treaties: whether federally treaty-exempt income flows through
# (most states start from federal AGI) or is added back (CA/CT/MD/MS-style). Figures the
# fetch could not independently confirm are in `unverified` — confirm at the cited source.
jurisdiction: states/hi
tax_year: 2023
income_tax: true
conforms_to_federal_treaties: true
treaty_note: 'Hawaii''s resident return (Form N-11) line 7 starts from "Federal adjusted gross income (AGI)" reported
  from federal Form 1040/1040-SR. Treaty-exempt income excluded at the federal level is therefore already excluded
  from the Hawaii starting amount. Hawaii''s additions to federal AGI are an explicit, enumerated list on Form N-11
  line 10 ("Other Hawaii Additions to Federal AGI"): differences in the taxable portion of the Hawaii tax refund,
  Individual Housing Account distributions, Peace Corps compensation, depreciation/gain differences, compensation
  from temporary employment outside the United States, student-loan-interest differences, employer-provided adoption-benefit
  differences, qualified tuition program distributions for K-12, distributions from certain foreign corporations,
  and "other adjustments." None of these is an add-back of federal tax-treaty-exempt income (unlike California''s
  Schedule CA). The N-11 instructions'' "Special Instructions for Nonresident Aliens" further state that a person
  who is a nonresident alien for federal purposes but a Hawaii resident applies the federal nonresident-alien rules
  when filing the Hawaii resident return and still begins from federal AGI, with no instruction to add back treaty
  income. Conclusion: treaty-exempt income is NOT re-taxed -> conforms = true.'
