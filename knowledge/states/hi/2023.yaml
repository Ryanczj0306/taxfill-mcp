# HI state knowledge — tax year 2023. Fetched + cited from the HI DOR (.gov) and
# assembled by scripts/assemble_state_knowledge.py. Loaded as a StateKnowledge.
# conforms_to_federal_treaties: whether federally treaty-exempt income flows through
# (most states start from federal AGI) or is added back (CA/CT/MD/MS-style). Figures the
# fetch could not independently confirm are in `unverified` — confirm at the cited source.
jurisdiction: states/hi
tax_year: 2023
income_tax: true
conforms_to_federal_treaties: true
treaty_note: 'Hawaii''s resident return (Form N-11) line 7 starts from "Federal adjusted gross income (AGI)" reported
  from federal Form 1040/1040-SR. Treaty-exempt income excluded at the federal level is therefore already excluded
  from the Hawaii starting amount. Hawaii''s additions to federal AGI are an explicit, enumerated list on Form N-11
  line 10 ("Other Hawaii Additions to Federal AGI"): differences in the taxable portion of the Hawaii tax refund,
  Individual Housing Account distributions, Peace Corps compensation, depreciation/gain differences, compensation
  from temporary employment outside the United States, student-loan-interest differences, employer-provided adoption-benefit
  differences, qualified tuition program distributions for K-12, distributions from certain foreign corporations,
  and "other adjustments." None of these is an add-back of federal tax-treaty-exempt income (unlike California''s
  Schedule CA). The N-11 instructions'' "Special Instructions for Nonresident Aliens" further state that a person
  who is a nonresident alien for federal purposes but a Hawaii resident applies the federal nonresident-alien rules
  when filing the Hawaii resident return and still begins from federal AGI, with no instruction to add back treaty
  income. Conclusion: treaty-exempt income is NOT re-taxed -> conforms = true.'
citation:
  source: Hawaii Form N-11 (Rev. 2023) Individual Income Tax Return (Resident) — line 7 'Federal adjusted gross
    income (AGI)' and line 10 'Other Hawaii Additions to federal AGI'
  url: https://files.hawaii.gov/tax/forms/2023/n11_i.pdf
starts_from: 'federal AGI (Form N-11, line 7: "Federal adjusted gross income (AGI)")'
residency:
  summary: 'Per Hawaii''s N-11 instructions: a RESIDENT is (1) every individual domiciled in Hawaii, and (2) every
    other individual (whether or not domiciled in Hawaii) who resides in Hawaii for other than a temporary or transitory
    purpose; a resident is taxed on income from all sources. An individual domiciled outside Hawaii is PRESUMED
    to be a resident if present in Hawaii more than 200 days during the taxable year, a presumption rebuttable by
    evidence of a permanent abode outside Hawaii and presence for a temporary/transitory purpose. "Domicile" is
    the place of an individual''s true, fixed, permanent home to which they intend to return; changing domicile
    requires abandoning the old domicile, intent to establish a new one, and actual physical presence in the new
    domicile. A NONRESIDENT is an individual in Hawaii for a temporary or transient purpose whose permanent domicile
    is not Hawaii (taxed only on Hawaii-source income). A PART-YEAR RESIDENT was a Hawaii resident for part of the
    year and a nonresident for the other part (e.g., moved into or out of Hawaii during the year); taxed on all
    income during the residency period and on Hawaii-source income only during the nonresidency period.'
forms:
  resident: Form N-11, Individual Income Tax Return (Resident) (Rev. 2023)
  part_year_or_nonresident: Form N-15, Individual Income Tax Return — Nonresident and Part-Year Resident (Rev. 2023)
credits_verification: 'State credits were researched from the cited DOR sources and are not tax advice — confirm
  each amount and your eligibility at the cited source before claiming it. Not independently confirmed (verify the
  figure): Credit for Low-Income Household Renters; Credit for Child and Dependent Care Expenses.'
credits:
- name: Refundable Food/Excise Tax Credit
  type: refundable
  eligibility: Each individual income tax filer (including those with no taxable income) who is a Hawaii resident
    physically present in Hawaii more than nine months during 2023, who is not (and is not eligible to be) claimed
    as a dependent by another taxpayer for federal or Hawaii purposes, and who is not incarcerated for the entire
    year. Credit is computed per qualified exemption (taxpayer, spouse, dependents, plus certain minor children
    receiving public support).
  amount: 'Per qualified exemption, based on federal AGI (line 6): Under $15,000 = $220; $15,000 to under $20,000
    = $200; $20,000 to under $25,000 = $170; $25,000 to under $30,000 = $140; $30,000 to under $40,000 = $110. For
    Married Filing Jointly/Separately, Head of Household, or Qualifying Surviving Spouse only: $40,000 to under
    $50,000 = $90; $50,000 to under $60,000 = $70. Multiply the per-exemption amount by the number of qualified
    exemptions.'
  income_limit_2023: Federal AGI must be less than $60,000 (less than $40,000 if filing status is Single). Married
    filing separately must combine both spouses' federal AGI; if $60,000 or more, no credit.
  claimed_on: Form N-311; result entered on Form N-11, line 28 (or Form N-15, line 45)
  citation:
    source: Hawaii Department of Taxation, Form N-311 (Rev. 2023), Refundable Food/Excise Tax Credit
    url: https://files.hawaii.gov/tax/forms/2023/n311_i.pdf
- name: Refundable Earned Income Tax Credit (Hawaii EITC)
  type: refundable
  eligibility: A qualifying individual taxpayer who (a) files a federal return and claims the federal earned income
    credit under IRC section 32 for the tax year, (b) uses the same filing status on the Hawaii return as on the
    federal return, and (c) claims the same dependents on the Hawaii return as on the federal return. Part-year
    residents and nonresidents prorate by the ratio of Hawaii AGI to federal AGI.
  amount: Equal to 40% of the federal earned income tax credit allowed and properly claimed on the federal return
    (increased from 20% to 40% by Act 163, SLH 2023, effective for taxable years beginning after Dec 31, 2022).
    Part-year/nonresidents multiply by the Hawaii-to-federal AGI ratio.
  income_limit_2023: No separate Hawaii income limit; eligibility follows the federal EITC income/eligibility limits
    under IRC section 32.
  claimed_on: Form N-356; new credit amount carried to Schedule CR (refundable credits section)
  citation:
    source: Hawaii Department of Taxation, Form N-356 (Rev. 2023), Earned Income Tax Credit
    url: https://files.hawaii.gov/tax/forms/2023/n356_i.pdf
- name: Credit for Low-Income Household Renters
  type: refundable
  eligibility: Hawaii resident present in Hawaii more than nine months during 2023 who occupies and pays rent for
    real property in Hawaii used as a residence, whose rental unit was fully subject to real property tax (units
    wholly or partially exempt do not qualify), and who is not (and is not eligible to be) claimed as a dependent
    by another taxpayer. Net rent paid (after exclusions such as utilities, parking, ground rent, and rental subsidies/public
    assistance) must exceed $1,000.
  amount: $50 multiplied by the number of qualified exemptions (taxpayer, spouse, and qualifying dependents present
    in Hawaii more than nine months). Add 1 additional exemption if the taxpayer is a qualified exemption age 65
    or over, and 1 more for a qualifying spouse age 65 or over (Schedule X lines 9-10), so each senior adds another
    $50.
  income_limit_2023: Adjusted gross income (Form N-11, line 20 / N-15, line 35 Column A) must be less than $30,000.
  claimed_on: Schedule X (Form N-11/N-15), Part I; result entered on Form N-11, line 29 (or Form N-15, line 46)
  citation:
    source: Hawaii Department of Taxation, Schedule X (Form N-11/N-15) (Rev. 2023), Part I; and 2023 Form N-11 Instructions,
      Line 29
    url: https://files.hawaii.gov/tax/forms/2023/schx_i.pdf
  unverified: true
- name: Credit for Child and Dependent Care Expenses
  type: nonrefundable
  eligibility: Taxpayers who paid qualified expenses for the care of a qualifying person (e.g., dependent child
    or disabled dependent/spouse) to enable them (and a spouse, if married) to work or look for work, including
    payments to the State of Hawaii A+ Program. Generally married persons must file jointly; married-filing-separately
    taxpayers may claim only if they meet the separate-filer requirements in the instructions. Provider information
    must be reported on Schedule X, Part II.
  amount: 'Applicable percentage (decimal) multiplied by qualified care expenses (capped at $10,000 for one qualifying
    person or $20,000 for two or more). Decimal by AGI: under $25,001 = .25; $25,001-30,000 = .24; $30,001-35,000
    = .23; $35,001-40,000 = .22; $40,001-45,000 = .21; $45,001-50,000 = .20; $50,001 and over = .15. Maximum credit
    therefore $2,500 for one qualifying person and $5,000 for two or more (25% of the expense caps).'
  income_limit_2023: No eligibility cutoff, but the credit percentage decreases with AGI (from 25% down to a floor
    of 15% once AGI exceeds $50,000); credit is limited to the lesser of qualified expenses or earned income.
  claimed_on: Schedule X (Form N-11/N-15), Part II; result entered on Form N-11, line 30 (or Form N-15, line 47)
  citation:
    source: Hawaii Department of Taxation, Schedule X (Form N-11/N-15) (Rev. 2023), Part II; and 2023 Form N-11
      Instructions, Line 30
    url: https://files.hawaii.gov/tax/forms/2023/schx_i.pdf
  unverified: true
filing_requirement:
  note: 'A full-year resident must file Form N-11 if gross income subject to Hawaii income tax exceeds the filing
    threshold. Per the 2023 N-11 instructions, for individuals UNDER age 65 the gross-income thresholds are: Single
    and Married filing separately $3,344; Head of household $4,356; Qualifying surviving spouse $5,544; Married
    filing jointly $6,688. Higher thresholds apply for individuals age 65 or older (e.g., Single/MFS $4,488; Head
    of household $5,500; Qualifying surviving spouse $6,688; MFJ one spouse 65+ $7,832; MFJ both 65+ $8,976) and
    for persons certified as blind, deaf, or totally disabled (Form N-172). A return must also be filed regardless
    of income level if certain recapture or special forms (e.g., N-2, N-103, N-152, N-312, N-814) apply.'
