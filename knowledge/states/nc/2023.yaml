# NC state knowledge — tax year 2023. Fetched + cited from the NC DOR (.gov) and
# assembled by scripts/assemble_state_knowledge.py. Loaded as a StateKnowledge.
# conforms_to_federal_treaties: whether federally treaty-exempt income flows through
# (most states start from federal AGI) or is added back (CA/CT/MD/MS-style). Figures the
# fetch could not independently confirm are in `unverified` — confirm at the cited source.
jurisdiction: states/nc
tax_year: 2023
income_tax: true
conforms_to_federal_treaties: true
treaty_note: 'NC conforms. The 2023 D-401 instructions state on Line 6: "The starting point for determining North
  Carolina taxable income is federal adjusted gross income." Because federally treaty-exempt income is already excluded
  from federal AGI, it flows through to NC untaxed UNLESS NC adds it back. The complete list of Form D-400 Schedule
  S, Part A "Additions to Federal Adjusted Gross Income" (Lines 1-16, D-401 pp. 17-18) contains NO add-back of treaty-exempt
  income (additions are limited to items like non-NC state/local bond interest, bonus depreciation, IRC 179 expense,
  Opportunity Fund deferred gains, S-corp built-in gains, federal NOL, 529 withdrawals, employer education-loan
  payments, expenses allocable to exempt income, etc.). Since treaty-exempt income is not re-taxed, conforms_to_federal_treaties
  = true. Note one nuance to flag for filers: Schedule S Part A Line 12 requires adding back EXPENSES allocable
  to income exempt from NC tax, but it does not add back the exempt income itself.'
citation:
  source: 2023 D-401 North Carolina Individual Income Tax Instructions (Form D-401) — General Information (Who Must
    File, residency, p.5-6), When Must I File (due date, p.7), Where Do I File / How Can I Pay (mailing addresses,
    payee, p.8), Line 6 federal AGI starting point (p.13), Line 7 Additions / Schedule S Part A list (p.13, 17-18),
    Filing Requirements Chart (p.6)
  url: https://www.ncdor.gov/2023-d-401-individual-income-tax-instructions/open
starts_from: federal adjusted gross income (Form D-400, Line 6 — "The starting point for determining North Carolina
  taxable income is federal adjusted gross income"); the NC starting basis is the Internal Revenue Code as of January
  1, 2023
residency:
  summary: Residency is based on domicile. A North Carolina RESIDENT is an individual domiciled in NC at any time
    during 2023, or who resided in NC during 2023 for other than a temporary or transitory purpose; an individual
    present in NC for more than 183 days during the taxable year is presumed (rebuttably) to be a resident, though
    absence for more than 183 days raises no presumption of non-residence. A PART-YEAR RESIDENT is one who moved
    into and became a resident of NC during 2023, or who moved out of NC and became a resident of another state
    during 2023 (a resident who moves away remains an NC resident until a definite new domicile is established elsewhere
    and the NC domicile is abandoned). A NONRESIDENT is one who was not a resident at any time during 2023 but received
    income from NC sources (e.g., NC real/tangible property, an NC business/trade/profession/occupation, or NC gambling).
    A nonresident alien may be treated as resident, part-year, or nonresident for NC purposes.
forms:
  resident: Form D-400 (North Carolina Individual Income Tax Return) — used by all individuals including residents
  part_year_or_nonresident: Form D-400 with Form D-400 Schedule PN (2023 Part-Year Resident and Nonresident Schedule)
    to compute the NC taxable percentage; if needed, Form D-400 Schedule PN-1 (Other Additions and Other Deductions).
    All filers, including part-year residents and nonresidents, file the same Form D-400.
credits_verification: 'State credits were researched from the cited DOR sources and are not tax advice — confirm
  each amount and your eligibility at the cited source before claiming it. Not independently confirmed (verify the
  figure): Tax Credit for Rehabilitating Historic Structures (Articles 3D / 3H / 3L).'
credits:
- name: Credit for Income Tax Paid to Another State or Country
  type: nonrefundable
  eligibility: N.C. residents (and part-year residents for the resident period) only. Available when income earned
    while a legal resident of North Carolina is taxed by both North Carolina and another U.S. state or a foreign
    country because it was earned in or derived from sources in that other state/country. No credit for tax paid
    to a city/county/other political subdivision or to the federal government. Nonresidents are NOT entitled to
    this credit. A copy of the return filed with the other state/country and proof of payment must be attached.
  amount: Credit = the LESSER of (a) Line 5 [N.C. income tax x (income taxed by other state / total N.C.-source-adjusted
    income), i.e. D-400 Line 15 x decimal from dividing Line 2 by Line 1] or (b) Line 6 [net income tax actually
    paid to the other state/country on that income]. No fixed dollar amount; it is capped at the proportion of N.C.
    tax attributable to the double-taxed income. For multiple states/countries, a separate Out-of-State Tax Credit
    Worksheet is used per jurisdiction.
  income_limit_2023: 'No income limit. The credit is limited mechanically: total credits taken (D-400TC Line 20)
    cannot exceed the N.C. income tax on D-400 Line 15.'
  claimed_on: Form D-400TC, Part 1, Lines 1-7a (result flows through Part 3 Line 16/18/20); then reported on Form
    D-400, Line 16 ("Tax Credits (From Form D-400TC, Part 3, Line 20)").
  citation:
    source: NCDOR 2023 D-401 Individual Income Tax Instructions (Instructions for Form D-400TC, Part 1) and 2023
      Form D-400TC
    url: https://www.ncdor.gov/2023-d-401-individual-income-tax-instructions/open
- name: Tax Credit for Rehabilitating Historic Structures (Articles 3D / 3H / 3L)
  type: nonrefundable
  eligibility: Narrow / not broadly applicable to ordinary residents. Available to taxpayers who incur qualified
    rehabilitation expenditures/expenses on a certified historic structure or historic mill facility placed in service
    under the requirements of Article 3D (expired for expenditures incurred by Jan 1, 2023; property must have been
    placed in service by Jan 1, 2023), Article 3H (historic mill facility; requires eligibility certification from
    the State Historic Preservation Officer), or Article 3L (current Historic Rehabilitation Tax Credits Investment
    Program; requires Form NC-Rehab). Distinguishes income-producing vs. non-income-producing structures.
  income_limit_2023: No income limit, but total credits on D-400TC Line 20 cannot exceed the N.C. income tax on
    D-400 Line 15. Specific credit percentages/caps vary by Article (3D/3H/3L) and are set in the respective General
    Statutes / Form NC-Rehab, which were not extracted as exact figures here.
  claimed_on: Form D-400TC, Part 2, Lines 8-13 (Article 3L requires Form NC-Rehab attached to front of D-400); flows
    to D-400 Line 16.
  citation:
    source: NCDOR 2023 Form D-400TC and 2023 D-401 Instructions (Part 2, Credits for Rehabilitating Historic Structures)
    url: https://www.ncdor.gov/2023-d-400tc-individual-income-tax-credits
  unverified: true
filing_requirement:
  note: 'A 2023 NC return is required if federal gross income for 2023 exceeds the filing threshold for your status
    (2023 Filing Requirements Chart): Single $12,750; Married Filing Jointly $25,500; Married Filing Separately
    $12,750 (if spouse does not claim itemized deductions) or $0 (if spouse claims itemized deductions); Head of
    Household $19,125; Qualifying Widow(er)/Surviving Spouse $25,500; Nonresident Alien $0 (regardless of filing
    status). NC minimum gross income filing requirements differ from the IRC because NC''s standard deduction differs
    from the federal. A part-year resident or nonresident with NC-source income must file if total gross income
    from all sources exceeds the threshold for the filing status.'
