unverified:
- Exact mytaxes.wvtax.gov URL path/label for paying personal income tax may change; instructions say visit mytaxes.wvtax.gov
  and click 'Pay Personal Income Tax.' Confirm current portal at the DOR.
- Whether a credit/debit-card payment option (and any third-party processor or convenience fee) exists in addition
  to ACH debit via MyTaxes was not separately confirmed for 2023; confirm at the DOR.
- Treaty conformity is inferred from the absence of any treaty add-back in the 2023 Schedule M increasing-modifications
  list plus the FAGI starting point; WV statute/regs were not independently reviewed for a treaty-specific add-back.
  Confirm at the DOR if a taxpayer relies on a US tax-treaty exclusion.
