unverified:
- Exact direct deep-link URL of the Nebraska e-pay web application itself (the .gov electronic-payment-options page
  links to it, but the standalone e-pay app URL was not quoted verbatim on a .gov page during this research). Confirm
  the precise login URL at the DOR e-pay page.
- Whether PO Box 98934 ('returns not requesting a refund') is the literal address Nebraska intends for paper returns
  mailed WITH a check (Nebraska frames the split as refund vs. no-refund rather than refund vs. with-payment); confirm
  at the DOR before relying on it for a with-payment paper return.
