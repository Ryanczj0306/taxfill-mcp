unverified:
- No WI DOR page was found that explicitly mentions U.S. tax-treaty-exempt income or whether such income is added
  back. Conformity (true) is inferred from the federal-AGI starting point (Form 1 Line 1) plus the absence of any
  treaty add-back across the Schedule AD additions list. Confirm at the DOR (e.g., Publication 122 for nonresidents,
  or contact DORIncome@wisconsin.gov / (608) 266-2486) for treaty-specific situations, particularly for nonresident
  aliens filing Form 1NPR.
- 'The with-payment check mailing address differs by filing method: paper Form 1 with payment goes to PO Box 268
  Madison WI 53790-0001 (per Form 1 instructions), while an e-filed return paid by check + Form PV goes to PO Box
  3028 Milwaukee WI 53201-3028 (per WI DOR payment FAQ). Confirm the correct box for the taxpayer''s filing method.'
