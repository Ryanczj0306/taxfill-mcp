# CT state knowledge — tax year 2023. Fetched + cited from the CT DOR (.gov) and
# assembled by scripts/assemble_state_knowledge.py. Loaded as a StateKnowledge.
# conforms_to_federal_treaties: whether federally treaty-exempt income flows through
# (most states start from federal AGI) or is added back (CA/CT/MD/MS-style). Figures the
# fetch could not independently confirm are in `unverified` — confirm at the cited source.
jurisdiction: states/ct
tax_year: 2023
income_tax: true
conforms_to_federal_treaties: false
treaty_note: 'CT''s resident return (Form CT-1040) starts from federal AGI (Line 1 = "Federal adjusted gross income
  from federal Form 1040, Line 11"), so treaty-exempt income is initially excluded. HOWEVER, CT has an EXPLICIT
  ADD-BACK: the 2023 CT-1040 instructions (Schedule 1 additions, Line 37 "Other") and the 2023 CT-1040NR/PY instructions
  (Schedule 1 additions, Line 39 "Other") both direct: "1. Add back any treaty income reported on federal Form 1040NR
  if a nonresident alien. Enter the words ''treaty income'' in the space provided." Because CT requires nonresident
  aliens to add federally treaty-exempt income back into Connecticut adjusted gross income, CT does NOT conform
  to federal treaty exemptions for affected filers (analogous to California''s Schedule CA add-back). Note: this
  add-back is scoped to nonresident aliens filing federal Form 1040NR; a filer with no treaty income / not a nonresident
  alien is unaffected, but the statutory rule re-taxes treaty income, so conforms_to_federal_treaties = false.'
citation:
  source: '2023 Form CT-1040 Connecticut Resident Income Tax Return (Line 1 = federal AGI; Schedule 1 Line 31-38
    additions; ''Due date: April 15, 2024''; mailing addresses PO Box 2976/2977; check payable to Commissioner of
    Revenue Services)'
  url: https://portal.ct.gov/-/media/drs/forms/2023/income/ct-1040_1223.pdf
starts_from: federal AGI (Form CT-1040, Line 1 = "Federal adjusted gross income from federal Form 1040, Line 11,
  or federal Form 1040-SR, Line 11"); then Line 2 additions from Schedule 1, Line 38 and Line 4 subtractions from
  Schedule 1, Line 50 produce Connecticut adjusted gross income on Line 5.
residency:
  summary: Connecticut taxes by domicile and statutory residence. You are a RESIDENT if Connecticut was your domicile
    (permanent home you intend to return to) for the entire taxable year, OR (statutory resident) if you maintained
    a permanent place of abode in Connecticut during the entire taxable year AND spent more than 183 days of the
    taxable year in Connecticut. A PART-YEAR RESIDENT changed legal residence by moving into or out of Connecticut
    during the year. A NONRESIDENT is neither a resident nor a part-year resident; a nonresident is taxed only on
    Connecticut-source income and prorates the tax. (The DRS Tax-Information page now displays 2025-year wording,
    but the statutory domicile/permanent-place-of-abode + 183-day framework is unchanged from 2023.)
forms:
  resident: Form CT-1040, Connecticut Resident Income Tax Return
  part_year_or_nonresident: Form CT-1040NR/PY, Connecticut Nonresident and Part-Year Resident Income Tax Return
    (use Schedule CT-SI to report Connecticut-source income)
filing_requirement:
  note: 'Connecticut uses a "Gross Income Test." A resident generally must file Form CT-1040 if Connecticut gross
    income exceeds the threshold for their filing status: $12,000 (married filing separately), $15,000 (single),
    $19,000 (head of household), or $24,000 (married filing jointly or qualifying surviving spouse). You must also
    file if you had Connecticut income tax withheld, made estimated payments, meet the Gross Income Test, had a
    federal alternative minimum tax liability, or are claiming a Connecticut refund. Nonresidents/part-year residents
    file CT-1040NR/PY if they meet the Gross Income Test or had federal AMT liability (and, for nonresidents, had
    Connecticut-source income).'
