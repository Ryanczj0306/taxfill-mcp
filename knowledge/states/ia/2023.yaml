starts_from: 'federal taxable income (federal Form 1040, line 15; IA 1040 line 2). Note: IA 1040 line 1 separately
  reports "federal total income" from federal 1040 line 9, but Iowa taxable income (line 4) is built from federal
  taxable income (line 2) plus Schedule 1 modifications. This is a 2023 restructure away from the pre-2023 net-income
  starting point.'
residency:
  summary: Per Iowa Admin. Code 701—300.17(422), an individual is a "resident" if they either (1) maintain a permanent
    place of abode in Iowa, or (2) are domiciled in Iowa, and a resident is taxed on all income regardless of source
    (except income specifically exempted by federal or Iowa law). "Domicile" is where one intends to permanently
    or indefinitely reside and to return when absent; every person has exactly one domicile, and an established
    Iowa domicile is retained until the person abandons it, removes to another state, and forms a bona fide intent
    to remain there (Julson v. Julson). There is a rebuttable presumption of a "permanent place of abode" if the
    person maintains an abode in Iowa and spends more than 183 days of the tax year in Iowa, though 183 days alone
    neither establishes nor abandons domicile. A part-year resident is an Iowa resident for only part of the year;
    a nonresident is domiciled outside Iowa with Iowa-source income. Nonresidents and part-year residents use the
    IA 126 to compute the credit limiting Iowa tax to the Iowa-source portion of income.
forms:
  resident: IA 1040 (Iowa Individual Income Tax Return), form number 41-001
  part_year_or_nonresident: IA 126 (Iowa Nonresident and Part-Year Resident Credit Schedule), form number 41-126,
    filed together with the IA 1040. (Iowa does not use a separate nonresident return; nonresidents/part-year residents
    file the IA 1040 and attach the IA 126.)
filing_requirement:
  note: A resident or part-year resident must file if Iowa taxable income (IA 1040 line 4, with specified add-backs
    incl. standard/itemized deduction, QBI deduction, personal exemption, lump-sum distribution, and Iowa NOL carryforward)
    is more than $9,000 for single/married-filing-separately ($24,000 if 65 or older on 12/31/23), or more than
    $13,500 for all other filing statuses ($32,000 if you or spouse is 65 or older). A dependent must file if Iowa
    taxable income is $5,000 or more. A nonresident or part-year resident must file if Iowa-source net income (IA
    126) was $1,000 or more, unless below the thresholds above. Anyone with Iowa tax withheld who wants a refund
    must also file. (2023 IA 1040 Expanded Instructions, "Who Must File?")
