  but the complete Schedule OR-ASC / OR-ASC-NP addition code list and Publication OR-17 were not exhaustively reviewed
  for any niche addition code that could restore a specific treaty-exempt item; confirm at the Oregon DOR if a particular
  treaty article is at issue.
