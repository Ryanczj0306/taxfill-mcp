residency:
  summary: 'Full-year resident: Oregon is your permanent home and the center of your financial, social, and family
    life (the place you intend to return); you remain a full-year resident through temporary absences. You may ALSO
    be treated as a full-year resident if you maintained an Oregon residence and spent more than 200 days in Oregon
    during the tax year (statutory 200-day rule), or are a non-U.S. citizen without permanent resident status. Nonresident:
    your permanent home was outside Oregon all year (Oregon taxes only Oregon-source income). Part-year resident:
    you moved into or out of Oregon during the year (but not merely a temporary absence); taxed on all income while
    an Oregon resident plus Oregon-source income while a nonresident. Special cases: "Special-case Oregon residents"
    who maintained a permanent home outside Oregon for the entire year, kept no Oregon home, and did not spend more
    than 200 days in Oregon are treated as nonresidents (file OR-40-N); "Oregon residents living abroad" who are
    qualified individuals for the federal foreign earned income / housing exclusion are also treated as nonresidents
    (ORS 316.027 referenced for military). An RV does not count as a permanent home outside Oregon.'
forms:
  resident: Form OR-40, Oregon Individual Income Tax Return for Full-year Residents (150-101-040)
  part_year_or_nonresident: 'Nonresident: Form OR-40-N (150-101-048). Part-year resident: Form OR-40-P (150-101-055).
    Both share the same instruction booklet (150-101-048-1).'
filing_requirement:
  note: '2023 OR-40 instructions: "You need to file if your gross income is more than the amount shown below for
    your filing status" (Table 1 full-year resident thresholds, e.g. Single with 0 box checked $7,305; MFJ 0 boxes
    $14,605; a dependent $1,250 or earned income plus $400 up to the standard deduction). You must also file if
    you are required to file a federal return, if you had $1 or more of Oregon income tax withheld and want a refund,
    or if you qualify for a refundable credit. Part-year residents and nonresidents must file if gross income from
    Oregon taxable sources (while a nonresident) plus all-source income while a resident exceeds the threshold for
    their filing status. Full threshold charts are in the OR-40 / OR-40-N/P instructions and Publication OR-17.'
mailing_addresses:
