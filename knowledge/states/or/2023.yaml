# OR state knowledge — tax year 2023. Fetched + cited from the OR DOR (.gov) and
# assembled by scripts/assemble_state_knowledge.py. Loaded as a StateKnowledge.
# conforms_to_federal_treaties: whether federally treaty-exempt income flows through
# (most states start from federal AGI) or is added back (CA/CT/MD/MS-style). Figures the
# fetch could not independently confirm are in `unverified` — confirm at the cited source.
jurisdiction: states/or
tax_year: 2023
income_tax: true
conforms_to_federal_treaties: true
treaty_note: 'Oregon''s resident return (Form OR-40) starts from federal adjusted gross income: Line 7 instruction
  reads "Federal adjusted gross income (AGI). Enter your federal AGI from Form 1040, 1040-SR or 1040-NR, line 11;
  or Form 1040-X, line 1C." Oregon taxable income is then built by applying additions (Schedule OR-ASC) and subtractions
  to that federal AGI. The 2023 OR-40 instruction booklet contains no general addition/add-back of federally treaty-exempt
  income (unlike California''s Schedule CA, or CT/MD/MS). Because federally treaty-exempt income is already excluded
  from federal AGI on the 1040 and there is no Oregon add-back code restoring it, the treaty exclusion flows through
  and is NOT re-taxed by Oregon. Therefore Oregon conforms to federal treaty treatment for the common case (conforms_to_federal_treaties
  = true). Caveat: confirm against the full Schedule OR-ASC / OR-ASC-NP addition code list and Publication OR-17
  for any niche addition that could touch a specific treaty article.'
