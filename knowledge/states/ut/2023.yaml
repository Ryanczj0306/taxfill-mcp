# UT state knowledge — tax year 2023. Fetched + cited from the UT DOR (.gov) and
# assembled by scripts/assemble_state_knowledge.py. Loaded as a StateKnowledge.
# conforms_to_federal_treaties: whether federally treaty-exempt income flows through
# (most states start from federal AGI) or is added back (CA/CT/MD/MS-style). Figures the
# fetch could not independently confirm are in `unverified` — confirm at the cited source.
jurisdiction: states/ut
tax_year: 2023
income_tax: true
conforms_to_federal_treaties: true
treaty_note: 'Utah''s resident return (TC-40) starts from federal adjusted gross income (FAGI). TC-40 Line 4 instructs:
  "Enter your federal adjusted gross income (FAGI) from line 11 ... of your federal return." Federally treaty-exempt
  income is already excluded from FAGI and flows through. The full list of TC-40A Part 1 "Additions to Income (added
  to federal income)" — codes 51 (lump sum distribution), 53 (MSA addback), 54 (my529 addback), 56 (child''s income
  excluded from parent''s return), 57 (municipal bond interest), 60 (untaxed income of a resident trust), 61 (untaxed
  income of a nonresident trust), 67 (tax paid on behalf of a pass-through entity), 68 (PPP grant/loan addback),
  69 (equitable adjustments) — contains NO add-back of income exempt under a federal tax treaty. The instructions''
  "Income from Other Countries" section reinforces this: Utah residents pay Utah tax on foreign-earned income only
  "if the income is included in federal adjusted gross income on the federal return." Therefore treaty-exempt income
  is NOT re-taxed by Utah -> conforms = true.'
