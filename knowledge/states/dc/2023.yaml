unverified:
- Whether DC's 'Other' addition (Schedule I, Calculation A, Line 7 — 'items not subject to federal tax but subject
  to DC tax') could in some interpretation capture a specific federal treaty exclusion. The booklet does NOT list
  treaty income as an example and DC Code sec.47-1803.02 is referenced only for subtractions; no treaty addback
  is enumerated, so conformity is assessed as true, but the open-ended 'Other' line was not exhaustively cross-checked
  against DC Code sec.47-1803.02(a) additions — confirm at DOR for an unusual treaty position.
- Exact ZIP+4 / current-year validity of the PO Box 96145 (refund/no-payment) and PO Box 96169 (with payment) addresses
  for a return filed late in 2026 — addresses are from the 2023 booklet; confirm at OTR before mailing.
- Whether DC accepted any extended/non-April-15 due date for TY2023 (e.g., disaster relief). Booklet states April
  15, 2024; no special extension was found, but confirm at DOR.
