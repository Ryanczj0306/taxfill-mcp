unverified:
- No explicit Kansas statutory '183-day' statutory-resident bright-line was found in the booklet; Kansas residency
  is stated in domicile/intent-to-return terms only (the precise day-count statutory test, if any, was not confirmed
  on a .gov page).
- Kansas publishes a single PO Box (PO BOX 750260, TOPEKA KS 66699-0260) for both refund and with-payment returns;
  a separate distinct ZIP/box for balance-due returns was not found, so the with-payment vs refund mailing distinction
  could not be confirmed as different addresses — confirm at the DOR if a distinct balance-due box is expected.
