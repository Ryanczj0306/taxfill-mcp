starts_from: federal AGI (K-40 Line 1 = "Federal adjusted gross income (as reported on your federal income tax return)")
residency:
  summary: Kansas taxes by domicile/residence. Per the 2023 booklet, "A Kansas resident for income tax purposes
    is anyone who lives in Kansas, regardless of where they are employed. An individual who is away from Kansas
    for a period of time and has intentions of returning to Kansas is a resident" — a domicile/intent-to-return
    concept; a full-year resident is taxed on all income. A PART-YEAR RESIDENT is "a Kansas resident for less than
    12 months during the tax year," must enter the Kansas residency dates on the K-40, and completes Schedule S
    Part B to allocate income. A NONRESIDENT is someone not a resident of Kansas who received income from Kansas
    sources; they must file regardless of the amount of Kansas-source income and complete Schedule S Part B. Military
    pay is taxable only to the service member's state of legal residency; nonresident service members stationed
    in Kansas are taxed only on Kansas-source income.
forms:
  resident: Form K-40 (Kansas Individual Income Tax) — residency status is indicated by checkbox; full-year residents
    complete K-40 (with Schedule S Part A only if they have modifications)
  part_year_or_nonresident: Same Form K-40, with Schedule S (Supplemental Schedule) Part B "Income Allocation for
    Nonresidents and Part-Year Residents" required to compute the nonresident percentage (K-40 line 9 / Schedule
    S line B23). Kansas does not have a separate standalone nonresident form.
filing_requirement:
  note: 'A full-year Kansas resident must file a 2023 K-40 if (1) they are required to file a federal return, OR
    (2) their Kansas adjusted gross income exceeds the total of their Kansas standard deduction and exemption allowance.
    Minimum gross-income filing thresholds (2023): Single under 65 = $5,750 (65+/blind = $6,600); Married Filing
    Joint both under 65 = $12,500; Head of Household under 65 = $10,500; Married Filing Separate under 65 = $6,250.
    Nonresidents must file if they received ANY income from Kansas sources, regardless of amount. (Source: ip23.pdf,
    "Who Must File a Return.")'
