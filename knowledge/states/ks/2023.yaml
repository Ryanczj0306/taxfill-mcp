# KS state knowledge — tax year 2023. Fetched + cited from the KS DOR (.gov) and
# assembled by scripts/assemble_state_knowledge.py. Loaded as a StateKnowledge.
# conforms_to_federal_treaties: whether federally treaty-exempt income flows through
# (most states start from federal AGI) or is added back (CA/CT/MD/MS-style). Figures the
# fetch could not independently confirm are in `unverified` — confirm at the cited source.
jurisdiction: states/ks
tax_year: 2023
income_tax: true
conforms_to_federal_treaties: true
treaty_note: 'Kansas Form K-40 starts from federal adjusted gross income (K-40 Line 1: "Federal adjusted gross income
  (as reported on your federal income tax return)"), and Kansas modifications are made only on Schedule S Part A.
  The Schedule S Part A "Additions to Federal Adjusted Gross Income" are an enumerated, closed list (lines A1-A7):
  A1 state/municipal bond interest, A2 KPERS contributions, A3 Kansas expensing recapture, A4 low-income student
  scholarship contributions, A5 IRC 163(j) business interest expense carryforward, A6 unqualified First-Time Home
  Buyer savings account withdrawals, and A7 "other additions" (whose instructions list only federal income tax refunds
  and partnership/S-corp/fiduciary adjustments). There is NO add-back for federally tax-treaty-exempt income anywhere
  in Part A. Because income exempt under a U.S. tax treaty is already excluded from federal AGI and Kansas has no
  add-back, it flows through and is not re-taxed by Kansas -> conforms. (Source: 2023 Individual Income Tax Booklet,
  ip23.pdf, K-40 Line 1 and Schedule S Part A / line-by-line instructions.)'
