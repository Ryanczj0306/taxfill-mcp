unverified:
- 'Exact NJ treatment of a SPECIFIC federal tax-treaty article (e.g., student/researcher/teacher exemptions): the
  conforms_to_federal_treaties=false conclusion is inferred from NJ''s wholly independent Gross Income Tax base
  (box-16 state wages, no federal-AGI starting point, no statutory treaty recognition) rather than from explicit
  treaty language in the NJ-1040 instructions, which do not mention tax treaties. Confirm the specific treaty scenario
  directly with the NJ Division of Taxation.'
- The general online tax/payment portal URL (nj.gov/treasury/taxation -> nj.gov/taxation) was cited from the instructions
  text; the exact direct e-check / 'Make a Payment' deep link (e.g., the NJ Online Filing / individual tax portal
  at www1.state.nj.us) was not separately verified for the 2023 cycle. Confirm the current direct payment URL at
