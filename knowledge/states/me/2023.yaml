# assembled by scripts/assemble_state_knowledge.py. Loaded as a StateKnowledge.
# conforms_to_federal_treaties: whether federally treaty-exempt income flows through
# (most states start from federal AGI) or is added back (CA/CT/MD/MS-style). Figures the
# fetch could not independently confirm are in `unverified` — confirm at the cited source.
jurisdiction: states/me
tax_year: 2023
income_tax: true
conforms_to_federal_treaties: true
treaty_note: 'Maine''s resident return (Form 1040ME) starts from federal adjusted gross income: Line 14 instructs
  "Enter the federal adjusted gross income shown on your federal Form 1040, line 11 or Form 1040-SR, line 11." Maine''s
  only income additions are on Schedule 1A (per 36 M.R.S. § 5122(1)), and the full Schedule 1A list contains NO
  add-back of federally treaty-exempt income — the additions are limited to specific items (non-Maine municipal/state
  bond interest, NOL recovery adjustment, MainePERS contributions, bonus depreciation add-back, fiduciary adjustments,
  nonresident installment-sale gain election, and pass-through financial-institution adjustments). Because treaty-exempt
  income is already excluded from federal AGI and there is no Maine add-back, it flows through and is not re-taxed.
  Maine therefore conforms to federal treaty exclusions (unlike California, which adds treaty income back on Schedule
  CA). Basis: 2023 Form 1040ME instructions, Line 14 and Schedule 1A (23_1040me_book_gen_instr.pdf).'
