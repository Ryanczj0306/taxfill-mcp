  line 11)
residency:
  summary: Maine taxes individuals based on domicile and a statutory-resident test. A full-year resident is domiciled
    in Maine for the entire year (or is a statutory resident); a statutory/"183-day" resident is an individual who
    maintains a permanent place of abode in Maine and spends 183 or more days of the tax year in Maine, regardless
    of domicile. Domicile is "the place where a person has his true, fixed, and permanent home and principal establishment,
    and to which he has, whenever absent, the intention of returning." A part-year resident establishes or abandons
    Maine domicile during the year and is taxed on all income while a Maine resident plus Maine-source income while
    a nonresident/safe harbor resident. A nonresident is domiciled outside Maine (and is not a statutory resident)
    and is taxed only on Maine-source income. A "safe harbor resident" is a person who, although domiciled in Maine,
    is treated as a nonresident for the year because they meet Maine's safe-harbor day-count/abode conditions (e.g.,
    the general or foreign safe harbor). Nonresidents/part-year/safe-harbor residents claim a nonresident credit
    using Schedule NR (or NRH).
forms:
  resident: Form 1040ME (Maine Individual Income Tax Return) — resident return
  part_year_or_nonresident: Form 1040ME with Schedule NR (Form 1040ME), "Schedule for Calculating the Nonresident
    Credit"; married taxpayers electing to file as single may use Schedule NRH (Form 1040ME) instead. Used by nonresidents,
    part-year residents, and safe harbor residents. (Full-year residents may not file Schedule NR.)
filing_requirement:
  note: 'Per the 2023 Form 1040ME instructions ("Who must file?"): A Maine income tax return must be filed if you
    are a Maine resident who is required to file a federal income tax return, OR if you are not required to file
    a federal return but have income subject to Maine income tax resulting in a Maine income tax liability. Even
    if required to file federally, a resident does not have to file a Maine return if they have no income addition
    modifications (Schedule 1A, line 12) AND their income subject to Maine tax is less than the sum of their Maine
    standard deduction plus personal exemption. A return must still be filed to claim a refund. Generally, nonresidents/safe
    harbor residents with Maine-source income resulting in a Maine tax liability must file (see Schedule NR instructions
    for minimum taxability thresholds; 36 M.R.S. § 5142(8-B) and Rule 806). Nonresident employee de minimis: a nonresident
    working in Maine as an employee is not required to pay Maine tax or file on personal-services income unless
    they work in Maine more than 12 days AND derive more than $3,000 of income from all Maine sources.'
