# AL state knowledge — tax year 2023. Fetched + cited from the AL DOR (.gov) and
# assembled by scripts/assemble_state_knowledge.py. Loaded as a StateKnowledge.
# conforms_to_federal_treaties: whether federally treaty-exempt income flows through
# (most states start from federal AGI) or is added back (CA/CT/MD/MS-style). Figures the
# fetch could not independently confirm are in `unverified` — confirm at the cited source.
jurisdiction: states/al
tax_year: 2023
income_tax: true
conforms_to_federal_treaties: false
treaty_note: 'Alabama does NOT start the return from federal adjusted gross income. Both the resident Form 40 and
  the nonresident Form 40NR build Alabama income from their own line items computed under Alabama law (Form 40NR
  Line 5 ''Wages, Salaries, Tips, Etc.'' from Schedule W-2; Line 6/8 ''Other Income''; separate interest/dividend
  lines), not by importing a federal AGI figure. Because the federal-AGI-conformity flow-through does not exist
  here, a treaty exclusion that is already netted out of federal AGI does NOT automatically carry to the Alabama
  return. The 23f40nrbk.pdf booklet (page 12, Line 8) is explicit on the only foreign-income mechanism it recognizes:
  ''All foreign income must be reported on your return, in order to receive any foreign income exclusion,'' and
  that exclusion is the IRC sec. 911 foreign EARNED income exclusion, claimed as a separate negative-line credit
  with federal Form 2555 attached. There is NO Alabama line, schedule, or instruction that recognizes or excludes
  income exempt under a U.S. income-TAX TREATY. Given (a) the separate Alabama income build-up rather than a federal-AGI
  start, and (b) the affirmative ''report all foreign income'' rule with only a sec. 911-style exclusion path, conformity
  to federal treaty exemptions is NOT established on any .gov page. Per conservative handling this is set false
  and flagged. See unverified/notes.'
citation:
  source: 2023 Form 40NR Booklet (Nonresidents) — domicile/residency definitions, Section 1; filing thresholds (p.4);
    When To File / automatic extension (p.5); Income & line-by-line incl. Line 8 Foreign Income Exclusion / 'all
    foreign income must be reported' (pp.7-12); Where To File and check payee (pp.10-11)
  url: https://www.revenue.alabama.gov/wp-content/uploads/2024/04/23f40nrbk.pdf
starts_from: 'Alabama gross income computed under Alabama law (separate line items: Form 40NR Line 5 wages/salaries/tips
  from Schedule W-2, Line 6/8 other income, separate interest/dividend lines) — it does NOT start from federal adjusted
  gross income or federal taxable income.'
residency:
  summary: Residency is domicile-based. A resident is anyone domiciled in (a resident of) Alabama — domicile being
    where one lives, has a permanent home, and intends to return when absent — and residents are taxed on their
    entire income whether earned within or without Alabama. A part-year resident establishes or abandons Alabama
    domicile during the year and reports income earned (with prorated deductions) only during the period of Alabama
    residency. A nonresident has no Alabama domicile/permanent home but is taxed on income from Alabama sources
    or services performed in Alabama; a foreign citizen who comes to Alabama to work, buys a home, and intends to
    return to the country of origin is treated as having established Alabama domicile and is taxed on income from
    all sources. Once established, domicile continues until a new one is established coupled with abandonment of
    the old.
forms:
  resident: Form 40 — Alabama Individual Income Tax Return (Residents & Part-Year Residents). (Form 40A is an optional
    short form for full-year residents who do not itemize and have only wage/salary plus interest/dividend income;
    part-year residents use Form 40.)
  part_year_or_nonresident: Form 40NR — Alabama Individual Income Tax Return (Nonresidents Only). Part-year residents
    file the resident Form 40 (reporting only the resident-period income); a person who is part-year resident AND
    has nonresident-period Alabama-source income files BOTH Form 40 and Form 40NR.
credits_verification: State credits were researched from the cited DOR sources and are not tax advice — confirm
  each amount and your eligibility at the cited source before claiming it.
credits:
- name: Credit for Taxes Paid to Another State
  type: nonrefundable
  eligibility: Legal residents of Alabama filing Form 40 who have income from sources outside Alabama that is taxed
    by BOTH Alabama and another U.S. state or territory in the same tax year. (Part-year residents only if the AL
    and other-state returns cover the same period. No credit for income from a state with no income tax, or where
    the out-of-state income is fully offset by a corresponding deduction. A separate procedure/Schedule OC Section
    B applies to foreign-country tax.)
  amount: Credit equals the tax paid to the other state, but limited to the LESSER of (a) the tax actually due to
    the other state/territory, or (b) the Alabama tax that would be due on that same income computed at Alabama
    rates. (In the booklet's worked example the credit came to $2,463.)
  income_limit_2023: None (no income cap; the credit is capped by the amount of out-of-state income double-taxed
    and the AL tax rate on it).
  claimed_on: Form 40, page 1, line 17 / line 18 (net tax), computed on Schedule CR and reported through Schedule
    OC, Part A. Must attach a copy of the other state's return.
  citation:
    source: Alabama Department of Revenue, 2023 Form 40 Booklet (instructions), 'Credit for Taxes Paid to Another
      State' and 'Credit for Taxes Paid To Other States' / Schedule CR sections.
    url: https://www.revenue.alabama.gov/wp-content/uploads/2024/01/23f40bk.pdf
- name: Alabama Adoption Tax Credit
  type: refundable
  eligibility: 'Taxpayers who reside in Alabama and complete an adoption. Two cases: (1) a private adoption in which
    the adopted child is a resident of Alabama, or a qualified foster child in the permanent legal custody of the
    Alabama Department of Human Resources; (2) an out-of-state adoption or where the adopted child is not otherwise
    an Alabama resident. Schedule AAC must be completed.'
  amount: $2,000 per child for a private adoption where the adopted child is an Alabama resident or a qualified
    foster child in DHR custody; $1,000 per child for an out-of-state adoption / when the adopted child is not an
    Alabama resident. (Act 2022-299, effective Jan 1, 2023, raised the resident amount to $2,000.)
  income_limit_2023: None stated.
  claimed_on: Computed on Schedule AAC, carried to Schedule OC, Part M; the refundable amount flows from Schedule
    OC, Section F, line F2/F4 to Form 40 (or 40NR), page 1, line 25 (Refundable Credit).
  citation:
    source: Alabama Department of Revenue, 2023 Schedule OC Instructions, Part M - Alabama Adoption Tax Credit and
      Section F; corroborated by 2023 Form 40 Booklet 'What's New' (Act 2022-299).
    url: https://www.revenue.alabama.gov/wp-content/uploads/2024/01/23schocinstr.pdf
- name: Rural Physician Credit
  type: nonrefundable
  eligibility: Licensed physicians who practice and reside in a small or rural Alabama community of fewer than 25,000
    residents, with admission privileges to a 'small or rural hospital' that has an emergency room (acute care hospital
    with fewer than 105 beds, located more than 20 miles from another acute care facility, or receiving Medicare
    rural reimbursement). Does not apply to physicians who met the requirements on/before May 5, 1993, nor to a
    physician who previously practiced in such a community unless they return after practicing in a large/urban
    community for at least three years.
  amount: $5,000 per year for a qualifying physician ($10,000 if married filing jointly and both spouses qualify).
    May be claimed for no more than five consecutive tax years.
  income_limit_2023: None.
  claimed_on: Schedule OC, Part D (lines D1-D3), carried to Schedule OC Section C; reduces net tax on Form 40, page
    1, line 18 (via Schedule OC, line E5).
  citation:
    source: Alabama Department of Revenue, 2023 Schedule OC Instructions, Part D - Rural Physician Credit; figures
      corroborated on the 2023 Schedule OC form, Part D, line D2.
    url: https://www.revenue.alabama.gov/wp-content/uploads/2024/01/23schocinstr.pdf
filing_requirement:
  note: 'Domicile-based. Full-year residents (2023) must file if gross income is at least: Single $4,500; Head of
    Family $8,200; Married Filing Joint $11,500; Married Filing Separate $5,750. Part-year residents use the same
    thresholds measured against gross income earned while an Alabama resident. Nonresidents must file Form 40NR
    if Alabama-source income exceeds the allowable prorated personal exemption. Even if below the threshold, file
    to claim a refund of any Alabama tax withheld. (Thresholds from the 2023 Form 40NR booklet, page 4 ''You Must
    File A Return If'' chart, which states the same amounts for full-year and part-year residents.)'
