unverified:
- 'TREATY CONFORMITY: No .gov page confirms whether income exempt under a U.S. income-tax TREATY is excluded for
  Alabama purposes. Alabama does not start from federal AGI, and the only foreign-income mechanism the Form 40NR
  booklet describes is the IRC sec. 911 foreign EARNED income exclusion (claimed via a negative-line credit with
  federal Form 2555), with an explicit instruction that ''all foreign income must be reported.'' Whether treaty-exempt
  wages must be included in Alabama wages, or whether a treaty exclusion is honored, COULD NOT be confirmed and
  should be confirmed with the Alabama DOR before relying on conformity. conforms_to_federal_treaties was set false
  on the conservative basis that no pass-through/exclusion for treaty income is established.'
- The April 15, 2024 due date for the 2023 return is inferred from the .gov rule 'due the same date as the federal
  return / April 15th unless a weekend or holiday' (April 15, 2024 was a Monday and the federal deadline). No .gov
  page was found stating the literal string '2024-04-15' for the 2023 tax year.
- The Form 40NR booklet text could only be read reliably for pp.1-12; the page-4 filing-threshold chart shows the
  listed dollar amounts for full-year and part-year residents, but the standalone resident Form 40 instruction booklet's
  identical thresholds were not separately fetched (same amounts are standard and reflected on the 40NR chart).
- 'The 23f40nrbk.pdf booklet (Where To File, p.11) lists a third address for ''not receiving a refund or making
  a payment'': P.O. Box 327469, Montgomery, AL 36132-7469. The official Forms Mailing Addresses page consolidates
  refund/no-payment to P.O. Box 154 (36135-0001); the no-payment-no-refund Box 327469 variant from the booklet was
  not reconciled with the mailing-addresses page and should be confirmed.'
- Form 40A short-form eligibility details summarized from the 40NR booklet's 'Which Form To File' cross-reference,
  not from a separately fetched 2023 Form 40A booklet.
