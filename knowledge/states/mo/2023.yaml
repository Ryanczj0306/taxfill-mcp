# MO state knowledge — tax year 2023. Fetched + cited from the MO DOR (.gov) and
# assembled by scripts/assemble_state_knowledge.py. Loaded as a StateKnowledge.
# conforms_to_federal_treaties: whether federally treaty-exempt income flows through
# (most states start from federal AGI) or is added back (CA/CT/MD/MS-style). Figures the
# fetch could not independently confirm are in `unverified` — confirm at the cited source.
jurisdiction: states/mo
tax_year: 2023
income_tax: true
conforms_to_federal_treaties: true
treaty_note: 'Missouri''s resident return starts from federal adjusted gross income and has no treaty-exempt income
  add-back, so federally treaty-exempt income (already excluded from federal AGI) flows through untaxed -> conforms.
  Form MO-1040 Line 1 is captioned "FEDERAL ADJUSTED GROSS INCOME," and the 2023 MO-1040 instructions state "You
  must begin your Missouri return with your total federal adjusted gross income." The only additions to federal
  AGI are on Form MO-A, Part 1, Lines 1-6 (interest on non-Missouri state/local obligations; partnership/fiduciary/S-corp
  adjustments and NOL carryback/carryforward; out-of-state/nonresident property-tax modification; nonqualified ABLE-program
  distributions) — none of which add back federally treaty-exempt income or foreign-earned income. Corroborating:
  the "Nonresident Alien Special Filing Instructions" direct the filer to "Enter your federal adjusted gross income
  from U.S. Nonresident Alien Income Tax Return (Federal Form 1040NR), Line 11, on Form MO-1040, Line 1," meaning
  treaty-exempt income already excluded from 1040NR AGI carries to MO Line 1 unchanged with no reattachment. Unlike
  California (which adds treaty income back on Schedule CA), Missouri has no analogous addback. Cite: 2023 MO-1040
  Instructions, Line 1 and Form MO-A Part 1.'
