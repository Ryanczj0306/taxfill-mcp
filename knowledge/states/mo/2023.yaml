residency:
  summary: 'A Missouri resident is an individual who either (1) maintained a domicile in Missouri, or (2) did not
    maintain a Missouri domicile but had permanent living quarters in Missouri and spent more than 183 days of the
    taxable year in Missouri (statutory-resident rule). Exception: an individual domiciled in Missouri who did not
    maintain permanent living quarters in Missouri, did maintain permanent living quarters elsewhere, and spent
    30 days or fewer of the taxable year in Missouri is NOT a resident. "Domicile" is the place an individual intends
    as their permanent home and to which they intend to return when absent; once established it continues until
    the individual moves elsewhere with the true intention of making a new permanent home, and an individual can
    have only one domicile at a time. A nonresident is an individual who does not meet the definition of resident;
    if required to file, nonresidents with income from another state use Form MO-NRI to determine the Missouri income
    percentage. A part-year resident (one who establishes or changes Missouri domicile during the year) is taxed
    on all income earned while living in Missouri and may either elect to be taxed as a full-year resident using
    Form MO-CR (credit for taxes paid to other states) or use Form MO-NRI (Missouri income percentage), whichever
    is more beneficial.'
forms:
  resident: Form MO-1040 (Individual Income Tax Long Form). The same MO-1040 is used by all filers; residents claiming
    credit for taxes paid to another state attach Form MO-CR.
  part_year_or_nonresident: Form MO-NRI (Missouri Income Percentage), filed with Form MO-1040, for nonresidents
    and part-year residents. Part-year residents may alternatively use Form MO-CR (resident credit) with MO-1040,
    whichever is more beneficial.
filing_requirement:
  note: 'Per the 2023 MO-1040 instructions: you do not have to file a Missouri return if you are not required to
    file a federal return. If required to file a federal return, you may still not have to file a Missouri return
    if you (a) are a resident with less than $1,200 of Missouri adjusted gross income; (b) are a nonresident with
    less than $600 of Missouri income; or (c) have Missouri adjusted gross income less than the amount of your standard
    deduction for your filing status. (If not required to file but Missouri tax was withheld, file to claim a refund.)'
mailing_addresses:
  refund_or_no_payment: 'Missouri Department of Revenue, P.O. Box 500, Jefferson City, MO 65105-0500 (for a refund
    or no amount due). Note: returns printed from the Department''s fill-in/auto-calculating forms carry a 2-D barcode
    and use a different address: refund returns to P.O. Box 3222, Jefferson City, MO 65105-3222 (refund returns
    claiming a property tax credit: P.O. Box 3385, Jefferson City, MO 65105-3385).'
  with_payment: 'Missouri Department of Revenue, P.O. Box 329, Jefferson City, MO 65105-0329 (balance due, with
