unverified:
- The online payment landing page (dor.mo.gov/taxation/individual/pay-online.html) routes 'Pay Taxes Online' to
  a third-party processor URL (https://magic.collectorsolutions.com/magic-ui/Login/MODOR, NCR Payments / formerly
  JetPay). Whether Missouri also accepts individual income tax payments through its mytax.mo.gov portal was not
  separately confirmed on a .gov page in this session; confirm the current portal at the DOR.
- Exact dollar amounts of the Missouri standard deduction by filing status (referenced in filing-requirement option
  (c)) were not transcribed here; the threshold mirrors the federal standard deduction per the instructions — confirm
  the specific figure at the DOR if a precise number is needed.
- MO-NRI form was identified by title/URL but its line-level mechanics were not fully read; the residency/usage
