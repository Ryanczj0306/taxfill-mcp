# ID state knowledge — tax year 2023. Fetched + cited from the ID DOR (.gov) and
# assembled by scripts/assemble_state_knowledge.py. Loaded as a StateKnowledge.
# conforms_to_federal_treaties: whether federally treaty-exempt income flows through
# (most states start from federal AGI) or is added back (CA/CT/MD/MS-style). Figures the
# fetch could not independently confirm are in `unverified` — confirm at the cited source.
jurisdiction: states/id
tax_year: 2023
income_tax: true
conforms_to_federal_treaties: true
treaty_note: 'Idaho''s resident return (Form 40) starts on line 7 from federal adjusted gross income (federal Form
  1040/1040-SR, line 11), and the only statutory additions are on Form 39R, Part A: (1) federal NOL deduction, (2)
  capital loss carryover incurred outside the state before becoming an Idaho resident, (3) non-Idaho state/local
  bond interest and dividends, (4) Idaho college savings account withdrawal, (5) bonus depreciation, (6) other additions.
  There is NO add-back of federally treaty-exempt income (unlike CA''s Schedule CA). Because treaty-exempt income
  is already excluded from federal AGI and is not added back, it flows through untaxed. Idaho also affirmatively
  confirms this in its Noncitizens guidance: ''Idaho honors all tax treaties recognized by the United States'' and
  ''Gross income amounts exempt by treaty are not included in the gross income filing requirement for Idaho.'' Therefore
  Idaho conforms to federal treaty exemptions.'
citation:
  source: Idaho Form 40, Individual Income Tax Return and Instructions 2023 (EFO00089 / instructions EIN00046) —
    line 7 starts from federal AGI (federal 1040/1040-SR line 11); additions from Form 39R Part A; mailing addresses
    on form face; check payable to Idaho State Tax Commission; E-Pay at tax.idaho.gov/epay
  url: https://tax.idaho.gov/wp-content/uploads/forms/EFO00089/EFO00089_08-23-2023.pdf
starts_from: federal AGI (Form 40, line 7 = federal Form 1040/1040-SR, line 11)
residency:
  summary: Idaho residency is domicile-based with a statutory-resident overlay. You are a RESIDENT if Idaho is your
    permanent home / the center of your financial, social and family life and the place you intend to return to;
    you are ALSO a (statutory) resident if you maintain a home in Idaho the entire year AND spend more than 270
    days in Idaho during the tax year. You are a PART-YEAR resident if you moved into or out of Idaho during the
    year. You are a NONRESIDENT if your permanent home is outside Idaho all year (a detailed safe-harbor also treats
    certain people as nonresidents if they lived outside Idaho at least 445 days in a 15-month period and spent
    fewer than 60 days in Idaho, with other conditions). Military and Military Spouses Residency Relief Act rules
    can override these.
forms:
  resident: Form 40 (Individual Income Tax Return); residents claiming additions, subtractions, or certain credits
    also file Form 39R (Resident Supplemental Schedule)
  part_year_or_nonresident: Form 43 (Part-year Resident and Nonresident Income Tax Return); part-year/nonresident
    filers claiming additions, subtractions, or certain credits also file Form 39NR (Part-year Resident and Nonresident
    Supplemental Schedule)
filing_requirement:
  note: '2023 thresholds (Idaho Individual Income Tax General Information, ''Who Must File''): every Idaho resident
    who must file a federal return must file; every part-year resident with more than $2,500 total gross income
    (all sources while resident + Idaho sources while nonresident) must file; every nonresident with more than $2,500
    gross income from Idaho sources must file. Resident gross-income thresholds for 2023 include: Single under 65
    = $13,850 (65+ = $15,700); Head of household under 65 = $20,800 (65+ = $22,650); MFJ under 65 (both) = $27,700;
    Qualifying surviving spouse under 65 = $27,700; Married filing separately (any age) = $5. Treaty-exempt amounts
    are excluded from the gross-income filing test.'
mailing_addresses:
