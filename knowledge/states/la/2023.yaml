unverified:
- The 'refund/no-payment' address is the same P.O. Box 3440 used for 'all other individual income tax returns' (the
  form/instructions label it Address 2 for all non-payment returns rather than a dedicated 'refund' box); confirm
  at the DOR if a return is specifically a refund return.
- The exact official title/designation of IT-540B as 'Nonresident and Part-Year Resident' was taken from the DOR
  forms-listing page and general-resources page; the IT-540B form/instruction PDF text itself was not parsed line-by-line
  in this session, so the precise part-year residency mechanics on IT-540B (vs the resident-election option) should
  be confirmed against the IT-540B instructions PDF.
- Specific standalone dollar filing thresholds were not located on a .gov page; LA ties the filing requirement to
  the federal filing obligation rather than a fixed LA-only gross-income threshold, so confirm any specific threshold
  at the DOR.
