# MI state knowledge — tax year 2023. Fetched + cited from the MI DOR (.gov) and
# assembled by scripts/assemble_state_knowledge.py. Loaded as a StateKnowledge.
# conforms_to_federal_treaties: whether federally treaty-exempt income flows through
# (most states start from federal AGI) or is added back (CA/CT/MD/MS-style). Figures the
# fetch could not independently confirm are in `unverified` — confirm at the cited source.
jurisdiction: states/mi
tax_year: 2023
income_tax: true
conforms_to_federal_treaties: true
treaty_note: 'MI starts from federal AGI and has no treaty add-back, so federally treaty-exempt income (already
  excluded from federal AGI) flows through untaxed -> conforms. Confirmed two ways from michigan.gov sources: (1)
  The 2023 MI-1040 begins at line 10 "Adjusted Gross Income from your U.S. Form 1040," and Michigan modifications
  are only the enumerated additions on Schedule 1 (line 11) and subtractions (line 13). (2) The 2023 Schedule 1
  "Additions to Income" lines 1-8 contain NO addition for income exempt under a federal tax treaty (the additions
  are: non-Michigan municipal interest/dividends, self-employment/income taxes deducted federally, MI-1040D/4797
  capital gain adjustments, out-of-state business/property losses, oil/gas extraction expenses, federal NOL deduction,
  and MESP/MET nonqualified withdrawals). The words "treaty"/"treaties" appear zero times in the entire 2023 MI-1040
  instruction booklet, so there is no Michigan add-back analogous to California''s Schedule CA treaty addback.'
citation:
  source: 2023 Michigan Individual Income Tax Return MI-1040 (form PDF) - line 10 'Adjusted Gross Income from your
    U.S. Form 1040', line 11 'Additions from Schedule 1', and the printed mailing addresses (Lansing, MI 48956 refund;
    Lansing, MI 48929 with payment)
  url: https://www.michigan.gov/taxes/-/media/Project/Websites/taxes/Forms/IIT/TY2023/MI-1040.pdf
starts_from: 'federal AGI (MI-1040 line 10: "Adjusted Gross Income from your U.S. Form 1040")'
residency:
  summary: 'Michigan uses a domicile-based residency definition. Resident: Michigan is your permanent home (the
    place you intend to return to whenever you go away); a temporary absence (e.g., wintering in a southern state)
    does not change residency. Part-year resident: you move your permanent home into or out of Michigan during the
    year, and you pay Michigan tax on income earned, received, or accrued while living in Michigan (use Schedule
    NR to allocate). Nonresident: you pay Michigan tax only on Michigan-source income (Michigan wages/compensation
    unless from a reciprocal state, Michigan rents/royalties, gains on Michigan real/tangible property, income from
    a Michigan business/partnership/S corp, Michigan lottery/casino winnings) and file Schedule NR with an MI-1040.
    Out-of-state students living in Michigan only to attend school are nonresidents. Reciprocal states (IL, IN,
    KY, MN, OH, WI): wages are taxed only by the state of residence. Note: the 2023 instruction booklet states the
    domicile-based rules above but does not state a numeric statutory-resident day-count test, so any day-count
    "statutory resident" concept is not asserted here.'
forms:
  resident: MI-1040 (Michigan Individual Income Tax Return)
  part_year_or_nonresident: Schedule NR (Nonresident and Part-Year Resident Schedule), filed together with Form
    MI-1040
credits_verification: 'State credits were researched from the cited DOR sources and are not tax advice — confirm
  each amount and your eligibility at the cited source before claiming it. Not independently confirmed (verify the
  figure): Home Heating Credit (low-income heating-cost credit).'
credits:
- name: Michigan Earned Income Tax Credit for Working Families (EITC)
  type: refundable
  eligibility: You must qualify for and claim the federal EITC. If you do not qualify for the federal EITC, you
    do not qualify for the Michigan EITC. Aimed at low-to-moderate-income working individuals and families; eligible
    amount depends on income, filing status, number of qualifying children, and/or disability. Beginning with tax
    year 2023 the rate is 30% of the federal credit (the Lowering MI Costs plan / Public Act 4 of 2023 raised it
    from 6% to 30%).
  amount: 30% of the taxpayer's federal EITC (Michigan amount = federal EITC on MI-1040 line 27a multiplied by 0.30,
    entered on line 27b)
  income_limit_2023: No separate Michigan income cap; the limit is whatever the federal EITC allows for the year
    (based on federal AGI/earned income, filing status, and number of qualifying children).
  claimed_on: MI-1040, line 27 (line 27a = federal EITC amount; line 27b = line 27a x 30%)
  citation:
    source: 2023 MICHIGAN MI-1040 Individual Income Tax Forms and Instructions (BOOK_MI-1040), Line 27 instructions
      and refundable-credits schedule
    url: https://www.michigan.gov/taxes/-/media/Project/Websites/taxes/Forms/IIT/TY2023/BOOK_MI-1040.pdf
- name: Homestead Property Tax Credit (general claimants)
  type: refundable
  eligibility: 'Available to Michigan resident homeowners and renters whose homestead is in Michigan and who were
    a Michigan resident for at least 6 months of the year. You must own and occupy the homestead, or rent/lease
    it under a contract. Cannot claim if total household resources exceed $67,300, or if the homestead''s taxable
    value exceeds $154,000 (excluding vacant farmland classified as agricultural). Renters: in most cases 23% of
    rent paid is treated as property tax eligible for the credit. Separate, more generous computations apply to
    seniors (age 65+), the blind/disabled, paraplegic/hemiplegic/quadriplegic/deaf claimants, and veterans/surviving
    spouses.'
  amount: Credit = property taxes (or 23% of rent for renters) that exceed 3.2% of total household resources for
    general claimants, then multiplied by the applicable percentage (60% for most general claimants per MI-1040CR
    computation). Maximum credit is $1,700. The computed credit is reduced 10% for every $1,000 (or part of $1,000)
    that total household resources exceed $58,300 (full phase-out above $67,300 per MI-1040CR Table B).
  income_limit_2023: Total household resources of $67,300 or less; credit phases out for total household resources
    above $58,300 and reaches $0 above $67,300. Homestead taxable value must not exceed $154,000.
  claimed_on: MI-1040, line 25, by attaching Form MI-1040CR (or MI-1040CR-2 for certain veterans/blind claimants)
  citation:
    source: 2023 MI-1040CR Homestead Property Tax Credit Claim Instructions (Who May Claim; Line 34; Tables 2, A
      and B; maximum credit limit)
    url: https://www.michigan.gov/taxes/-/media/Project/Websites/taxes/Forms/IIT/TY2023/MI-1040CR-Instructions.pdf?rev=e7eefec8ce2b40bda05c01a336a1aa63&hash=4CABE8587D55A1E2BD7F0433BFE0AF09
- name: Home Heating Credit (low-income heating-cost credit)
  type: refundable
  eligibility: 'Helps qualified low-income Michigan homeowners and renters pay part of their home heating costs.
    Eligibility and credit are determined by the number of exemptions and a corresponding income ceiling using a
    standard-allowance method (MI-1040CR-7 Table A) or an alternate computation (Table B). Claimed on a separate
    form, not on the MI-1040 itself. NOTE: the specific 2023 standard-allowance dollar amounts and income ceilings
    could not be independently confirmed from a tax-year-2023 official source in this research, so the dollar figures
    are left blank and flagged unverified.'
  claimed_on: Form MI-1040CR-7 (Home Heating Credit Claim), filed separately (not attached to the MI-1040)
  citation:
    source: 2023 MICHIGAN MI-1040 Individual Income Tax Forms and Instructions (BOOK_MI-1040), references to MI-1040CR-7
      Home Heating Credit
    url: https://www.michigan.gov/taxes/-/media/Project/Websites/taxes/Forms/IIT/TY2023/BOOK_MI-1040.pdf
  unverified: true
filing_requirement:
  note: File a 2023 MI-1040 if you owe tax, are due a refund, or your AGI exceeds your exemption allowance (the
    personal/stillbirth exemption allowance for 2023 is $5,400 per exemption; the 2023 income tax rate is 4.05%).
    Treasury also advises filing a Michigan return if you file a federal return, even if no Michigan tax is owed.
    If your income subject to tax (line 14) is less than your personal exemption allowance (line 15) but Michigan
    tax was withheld, you must file to claim a refund. Dependents claimed on another's return need not file if AGI
    is $1,500 or less (single/MFS) or $3,000 or less (joint), unless claiming a refund of withholding.
