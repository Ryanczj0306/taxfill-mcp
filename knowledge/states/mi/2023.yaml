unverified:
- The Schedule NR PDF itself returned HTTP 403 and could not be opened directly; the form name 'Nonresident and
  Part-Year Resident Schedule (Schedule NR)' is confirmed only from the MI-1040 instruction booklet text and the
  forms-index search result, not from the standalone Schedule NR PDF.
- The 2023 Schedule 1 standalone PDF returned HTTP 403; the 'no treaty add-back' finding is based on the Schedule
  1 line-by-line instructions within the 2023 instruction booklet (additions lines 1-8) plus a full-text search
  of the booklet (zero occurrences of 'treaty'/'treaties'), rather than the standalone Schedule 1 form image.
- Michigan's residency definition is domicile-based per the 2023 booklet; the booklet does not state a numeric day-count
  'statutory resident' test, so no specific day threshold was confirmed.
- Exact online-payment processing fees / accepted methods (eCheck vs card) were not individually verified beyond
  the official 'Make a Payment' page existence.
