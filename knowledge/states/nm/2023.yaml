# NM state knowledge — tax year 2023. Fetched + cited from the NM DOR (.gov) and
# assembled by scripts/assemble_state_knowledge.py. Loaded as a StateKnowledge.
# conforms_to_federal_treaties: whether federally treaty-exempt income flows through
# (most states start from federal AGI) or is added back (CA/CT/MD/MS-style). Figures the
# fetch could not independently confirm are in `unverified` — confirm at the cited source.
jurisdiction: states/nm
tax_year: 2023
income_tax: true
conforms_to_federal_treaties: true
treaty_note: 'NM''s resident return (PIT-1) starts from federal adjusted gross income: "LINE 9. Federal Adjusted
  Gross Income — Enter the federal adjusted gross income as reported on your federal Form 1040 or 1040SR, line 11"
  (2023 PIT-1 instructions, p. PIT-1-23). Income exempt from federal tax under a US tax treaty is already excluded
  from federal AGI and therefore flows through to NM. NM''s additions to federal AGI are enumerated exclusively
  on Schedule PIT-ADJ lines 1-5: (1) interest/dividends from federal tax-exempt bonds, (2) federal net operating
  loss carryover, (3) refunded NM Section 529 contributions, (4) charitable land-donation deduction tied to the
  NM land conservation credit, and (5) tax paid by a pass-through entity. None of these is an add-back of federally
  tax-treaty-exempt income, foreign treaty income, or any income exempt under a US tax treaty (the word "treaty"
  does not appear in the PIT-1, PIT-B, or PIT-ADJ instructions). Because there is no treaty add-back, federally
  treaty-exempt income is NOT re-taxed by New Mexico -> conforms.'
citation:
  source: New Mexico Taxation and Revenue Department — Personal Income Tax Forms / Individuals (official site)
  url: https://www.tax.newmexico.gov/individuals/personal-income-tax-information-overview/
starts_from: federal AGI (PIT-1 line 9 = federal Form 1040/1040SR line 11)
residency:
  summary: 'Residency for income tax turns on (1) where you were domiciled during the tax year and (2) whether you
    were physically present in NM for 185 days or more. RESIDENT: domiciled in NM for the entire year, OR physically
    present in NM for a total of 185 days or more during the tax year regardless of domicile (a day counts only
    if present for 24 hours; the 185 days need not be consecutive; includes students/temporary workers who plan
    to return out of state). DOMICILE: the place you intend as your permanent home; you can have only one domicile;
    a NM domicile is not changed until you show you abandoned it and established a new one elsewhere; change of
    domicile must be clear and convincing. FIRST-YEAR RESIDENT: moved to NM during 2023 intending to make it your
    permanent residence AND still in NM on Dec 31, 2023 (need not meet 185 days); a former NM resident who was a
    nonresident for at least one full tax year may also file as first-year resident. PART-YEAR RESIDENT: was a NM
    resident for part of the year, was NOT present 185+ days, and on Dec 31 was no longer domiciled in NM (moved
    to and intends to maintain domicile in another state). NON-RESIDENT: not domiciled in NM for any part of the
    year and not physically present at least 185 days. Special rules apply to military servicemembers and qualifying
    spouses, and to enrolled members of NM federally recognized Indian nations/tribes/pueblos.'
forms:
  resident: Form PIT-1 (New Mexico Personal Income Tax Return)
  part_year_or_nonresident: Form PIT-1 filed with Schedule PIT-B (Schedule of New Mexico Allocation and Apportionment
    of Income); nonresidents and part-year residents use PIT-B to allocate/apportion NM-source income. Mark residency
    status R (resident), N (non-resident), or P/F (part-year/first-year) on PIT-1; PIT-B is required when there
    is income from sources both inside and outside New Mexico.
filing_requirement:
  note: 'Per the 2023 PIT-1 instructions ("Who Must File"): New Mexico law requires every person who meets BOTH
    of the following to file a PIT-1: (1) is a New Mexico resident OR has income from New Mexico sources, AND (2)
    is required to file a federal income tax return. A taxpayer who did not need to file a federal return may still
    need to file a NM return in certain situations (e.g., to claim a refund or rebate).'
