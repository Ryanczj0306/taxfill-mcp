  host (klvg4oyd4j.execute-api.us-west-2.amazonaws.com), which is the AWS-backed document store linked from tax.newmexico.gov
  rather than a tax.newmexico.gov URL itself; content matches the Department's official 2023 PIT booklet but the
  host domain is an AWS execute-api endpoint. Confirm at tax.newmexico.gov Forms & Publications if a tax.newmexico.gov-hosted
  copy is required.
- Exact dollar filing-requirement thresholds (income amounts below which a return need not be filed) were not extracted
  line-by-line from the federal-filing-requirement charts; the requirement is stated as keyed to the federal filing
  requirement plus NM residency/NM-source income. Confirm specific dollar thresholds against the federal Form 1040
