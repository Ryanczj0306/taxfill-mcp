# RI state knowledge — tax year 2023. Fetched + cited from the RI DOR (.gov) and
# assembled by scripts/assemble_state_knowledge.py. Loaded as a StateKnowledge.
# conforms_to_federal_treaties: whether federally treaty-exempt income flows through
# (most states start from federal AGI) or is added back (CA/CT/MD/MS-style). Figures the
# fetch could not independently confirm are in `unverified` — confirm at the cited source.
jurisdiction: states/ri
tax_year: 2023
income_tax: true
conforms_to_federal_treaties: true
treaty_note: 'The RI-1040 resident return starts from federal adjusted gross income (RI-1040 Line 1: "Enter your
  federal adjusted gross income from Federal Form 1040 or Federal Form 1040-SR, line 11"), and the General Instructions
  state "the Rhode Island income tax is based on your federal adjusted gross income." RI taxable income is built
  only via the RI Schedule M modifications. I reviewed every "Modification Increasing Federal Adjusted Gross Income"
  on Schedule M (Lines 2a-2k, instructions pages I-8 to I-10): the add-backs are out-of-state municipal bond interest
  (2a), RI fiduciary adjustment (2b), recapture of Family Education Account modifications (2c), bonus depreciation
  (2d), recapture of Section 529 modifications (2e), recapture of previously-claimed tax-credit income (2f), pass-through
  entity tax (2h), unemployment compensation not in federal AGI (2i), taxable PPP loan amount (2j), and a reserved
  line (2k). NONE of these add back income that is exempt from federal tax under a U.S. income tax treaty. Because
  treaty-exempt income is already excluded from federal AGI and RI has no add-back of it, it flows through and is
  not re-taxed by Rhode Island. Therefore RI conforms (treaty-exempt income is not re-taxed).'
