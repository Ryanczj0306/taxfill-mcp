# RI state knowledge — tax year 2023. Fetched + cited from the RI DOR (.gov) and
# assembled by scripts/assemble_state_knowledge.py. Loaded as a StateKnowledge.
# conforms_to_federal_treaties: whether federally treaty-exempt income flows through
# (most states start from federal AGI) or is added back (CA/CT/MD/MS-style). Figures the
# fetch could not independently confirm are in `unverified` — confirm at the cited source.
jurisdiction: states/ri
tax_year: 2023
income_tax: true
conforms_to_federal_treaties: true
treaty_note: 'The RI-1040 resident return starts from federal adjusted gross income (RI-1040 Line 1: "Enter your
  federal adjusted gross income from Federal Form 1040 or Federal Form 1040-SR, line 11"), and the General Instructions
  state "the Rhode Island income tax is based on your federal adjusted gross income." RI taxable income is built
  only via the RI Schedule M modifications. I reviewed every "Modification Increasing Federal Adjusted Gross Income"
  on Schedule M (Lines 2a-2k, instructions pages I-8 to I-10): the add-backs are out-of-state municipal bond interest
  (2a), RI fiduciary adjustment (2b), recapture of Family Education Account modifications (2c), bonus depreciation
  (2d), recapture of Section 529 modifications (2e), recapture of previously-claimed tax-credit income (2f), pass-through
  entity tax (2h), unemployment compensation not in federal AGI (2i), taxable PPP loan amount (2j), and a reserved
  line (2k). NONE of these add back income that is exempt from federal tax under a U.S. income tax treaty. Because
  treaty-exempt income is already excluded from federal AGI and RI has no add-back of it, it flows through and is
  not re-taxed by Rhode Island. Therefore RI conforms (treaty-exempt income is not re-taxed).'
citation:
  source: '2023 Instructions for Filing RI-1040 (Resident) — RI Division of Taxation: starting point (Line 1 = federal
    AGI), Who Must File / Resident & domicile definitions (p. I-1), Where and When to File / due date 4/15/2024
    + mailing addresses 5806 refund and 5807 with-payment (p. I-2), RI Schedule M modifications increasing/decreasing
    federal AGI with no treaty add-back (pp. I-8 to I-10), RI Tax Computation Worksheet (p. I-11)'
  url: https://tax.ri.gov/sites/g/files/xkgbur541/files/2023-12/2023%201040R%20Instructions.pdf
starts_from: federal AGI (Federal Form 1040/1040-SR, line 11) — RI-1040 Line 1; RI taxable income then computed
  via RI Schedule M modifications, RI standard deduction, and RI exemptions
residency:
  summary: 'Resident = an individual domiciled in Rhode Island, OR an individual who maintains a permanent place
    of abode in Rhode Island and spends more than 183 days of the year in Rhode Island (statutory resident). Domicile
    is "the place an individual regards as his or her permanent home - the place to which he or she intends to return
    after a period of absence"; a domicile once established continues until a new fixed and permanent home is acquired
    (changing domicile requires intent to abandon the old, intent to acquire a new one, and actual physical presence
    in the new domicile). Nonresident = any person not within the definition of a resident, who must file if they
    have income derived from or connected with Rhode Island sources and are required to file a federal return. Part-year
    resident = an individual who was a RI resident for a period of less than 12 months; files if required to file
    a federal return. Nonresidents and part-year residents both use Form RI-1040NR (nonresidents complete Schedule
    II; part-year residents complete Schedule III). Note: military pay of armed-forces members is taxed only by
    their state of legal residence (Soldiers and Sailors Civil Relief Act); certain servicemember-spouse income
    may be exempt under the Military Spouses Residency Relief Act.'
forms:
  resident: Form RI-1040 (Rhode Island Resident Individual Income Tax Return)
  part_year_or_nonresident: Form RI-1040NR (Rhode Island Nonresident Individual Income Tax Return) — nonresidents
    complete RI Schedule II; part-year residents complete RI Schedule III
credits_verification: State credits were researched from the cited DOR sources and are not tax advice — confirm
  each amount and your eligibility at the cited source before claiming it.
credits:
- name: Rhode Island Earned Income Credit (RI EITC)
  type: refundable
  eligibility: Resident (and part-year/eligible nonresident) taxpayers who qualify for and claim the FEDERAL Earned
    Income Tax Credit. RI does not impose its own separate eligibility test - if you receive the federal EITC, you
    receive the RI EITC. You must claim the federal EITC (federal Form 1040/1040-SR, line 27) to claim the RI credit.
  amount: '15% of the federal earned income credit. Computed on RI Schedule EIC: Line 38 = federal EITC; Line 39
    = 15% (Rhode Island percentage, preprinted on the form); Line 40 = Line 38 x Line 39.'
  income_limit_2023: No separate Rhode Island income limit; eligibility and income limits track the federal EITC
    (the federal EITC AGI/investment-income limits for the 2023 tax year apply).
  claimed_on: RI Schedule EIC, line 40; carried to Form RI-1040, line 14d (within the Total Payments and Credits
    section, line 14g).
  citation:
    source: '2023 Instructions for Filing RI-1040 (RI Division of Taxation) - RI Schedule EIC instructions: ''Line
      39 - The Rhode Island percentage is 15%.'' and ''Line 40 - Rhode Island Earned Income Credit: Multiply line
      38 by line 39. Enter here and on page 1, line 14d.'''
    url: https://tax.ri.gov/sites/g/files/xkgbur541/files/2023-12/2023%201040R%20Instructions.pdf
- name: Property Tax Relief Credit (Form RI-1040H, the RI property-tax "circuit breaker")
  type: refundable
  eligibility: 'Must answer YES to ALL eligibility questions on Form RI-1040H Part 1: (A) domiciled in Rhode Island
    for all of 2023; (B) lived in a household or rented a dwelling that was subject to property tax in 2023; (C)
    current on property taxes or rent due on the homestead for 2023 and all prior years; (D) you OR your spouse
    were 65 years of age or older AND/OR disabled as of December 31, 2023; and (E) 2023 total household income was
    $37,870 or less. Both homeowners (Part 3, attach 2023 property tax bill) and renters (Part 4, attach 2023 lease
    or 3 rent receipts; rent paid is multiplied by 20% as deemed property tax) may claim it.'
  amount: 'Maximum credit is $650.00. Homeowners: tentative credit = property taxes paid for 2023 minus (household
    income x table percentage), then the lesser of that amount or $650 (Form RI-1040H lines 2-6). Renters: 20% of
    rent paid is treated as property tax, minus (household income x table percentage), then the lesser of that amount
    or $650 (lines 7-12). The income-based percentage from the page-3 computation table ranges from 3% up to 6%
    (e.g., 6% for the $16,231-$37,870 income band).'
  income_limit_2023: Total household income of $37,870 or less for 2023 (Form RI-1040H, Part 1, question E).
  claimed_on: Form RI-1040H, line 13 (Property Tax Relief); carried to Form RI-1040, line 14c. RI-1040H must be
    filed by April 15, 2024; an extension to file RI-1040 does NOT extend the time to file RI-1040H.
  citation:
    source: 2023 Form RI-1040 (Rhode Island Property Tax Relief Claim), RI Division of Taxation - Part 1 eligibility
      (income '$37,870 or less', age/disabled 'as of December 31, 2023'), line 6/line 12 ('Line 5/Line 11 or $650.00,
      whichever is LESS'), line 13 ('Enter here and on Form RI-1040, line 14c'); income computation table on page
      3.
    url: https://tax.ri.gov/sites/g/files/xkgbur541/files/2023-12/2023%201040H_w.pdf
- name: Credit for Child and Dependent Care Expenses (Rhode Island portion of the allowable federal credit)
  type: nonrefundable
  eligibility: Taxpayers who claimed the federal Credit for Child and Dependent Care Expenses (federal Form 1040/1040-SR,
    Schedule 3, line 2). Rhode Island allows a credit equal to a percentage of that federal care credit, limited
    to the amount of Rhode Island income tax (so any excess is not refunded - it is nonrefundable).
  amount: '25% of the federal Credit for Child and Dependent Care Expenses, capped at the Rhode Island income tax.
    Computed on RI Schedule I: Line 20 = federal care credit (federal Schedule 3, line 2); Line 21 = Line 20 x 25%;
    Line 22 (Maximum Credit) = lesser of RI income tax (line 19) or Line 21.'
  income_limit_2023: No separate Rhode Island income limit stated; the federal child and dependent care credit rules
    (federal AGI-based percentage and expense caps) govern the base amount.
  claimed_on: RI Schedule I, line 22; carried to Form RI-1040, line 9a (Rhode Island Percentage of Allowable Federal
    Credit), in the credits-against-tax section (lines 9a-9d, subtracted from tax at line 10a; if zero or less,
    enter zero - confirming it is nonrefundable).
  citation:
    source: '2023 Instructions for Filing RI-1040 (RI Division of Taxation), RI Schedule I - Allowable Federal Credit:
      ''Line 20 - Credit for Child and Dependent Care Expenses: Enter the amount from Federal Form 1040 or Federal
      Form 1040-SR, Schedule 3, line 2.''; ''Line 21 - Multiply the amount on line 20 by 25%''; ''Line 22 - Maximum
      Credit: Enter the amount from line 19 or 21, whichever is less. Enter here and on form RI-1040, page 1, line
      9a.'''
    url: https://tax.ri.gov/sites/g/files/xkgbur541/files/2023-12/2023%201040R%20Instructions.pdf
- name: Credit for Income Taxes Paid to Another State
  type: nonrefundable
  eligibility: Rhode Island residents who also paid income tax to another state on income that is also taxed by
    Rhode Island. Authorized under R.I. Gen. Laws section 44-30-18. If income tax was paid to more than one other
    state, Form RI-1040MU must be used.
  amount: 'The smallest of: (line 23) the Rhode Island income tax less allowable federal credit, (line 27) the tentative
    credit (RI tax x the proportion of income from the other state), or (line 28) the income tax actually due and
    paid to the other state. Computed on RI Schedule II, line 29.'
  income_limit_2023: None.
  claimed_on: RI Schedule II, line 29; carried to Form RI-1040, line 9b (credits-against-tax section, lines 9a-9d,
    subtracted from tax at line 10a - nonrefundable).
  citation:
    source: '2023 Instructions for Filing RI-1040 (RI Division of Taxation), RI Schedule II - Credit for Income
      Taxes Paid to Another State (R.I. Gen. Laws section 44-30-18): ''Line 29 - Maximum Credit for Tax Paid to
      Another State: Enter the amount from line 23, line 27 or line 28, whichever is the smallest. Enter here and
      on page 1, line 9b.'''
    url: https://tax.ri.gov/sites/g/files/xkgbur541/files/2023-12/2023%201040R%20Instructions.pdf
filing_requirement:
  note: 'Every resident individual of Rhode Island who is required to file a federal income tax return must file
    a RI individual income tax return (RI-1040). A resident not required to file a federal return may still need
    to file a RI return if their RI income for the year exceeds the sum of their RI personal exemptions and applicable
    standard deduction. Every nonresident individual required to file a federal return who has income derived from
    or connected with Rhode Island sources must file (RI-1040NR). A part-year resident (RI resident for less than
    12 months) must file if they are required to file a federal return. (Source: RI Division of Taxation, Individual
    Tax Filing Requirements; 2023 RI-1040 instructions, "Who Must File a Return," p. I-1.)'
