starts_from: federal AGI (Federal Form 1040/1040-SR, line 11) — RI-1040 Line 1; RI taxable income then computed
  via RI Schedule M modifications, RI standard deduction, and RI exemptions
residency:
  summary: 'Resident = an individual domiciled in Rhode Island, OR an individual who maintains a permanent place
    of abode in Rhode Island and spends more than 183 days of the year in Rhode Island (statutory resident). Domicile
    is "the place an individual regards as his or her permanent home - the place to which he or she intends to return
    after a period of absence"; a domicile once established continues until a new fixed and permanent home is acquired
    (changing domicile requires intent to abandon the old, intent to acquire a new one, and actual physical presence
    in the new domicile). Nonresident = any person not within the definition of a resident, who must file if they
    have income derived from or connected with Rhode Island sources and are required to file a federal return. Part-year
    resident = an individual who was a RI resident for a period of less than 12 months; files if required to file
    a federal return. Nonresidents and part-year residents both use Form RI-1040NR (nonresidents complete Schedule
    II; part-year residents complete Schedule III). Note: military pay of armed-forces members is taxed only by
    their state of legal residence (Soldiers and Sailors Civil Relief Act); certain servicemember-spouse income
    may be exempt under the Military Spouses Residency Relief Act.'
forms:
  resident: Form RI-1040 (Rhode Island Resident Individual Income Tax Return)
  part_year_or_nonresident: Form RI-1040NR (Rhode Island Nonresident Individual Income Tax Return) — nonresidents
    complete RI Schedule II; part-year residents complete RI Schedule III
filing_requirement:
  note: 'Every resident individual of Rhode Island who is required to file a federal income tax return must file
    a RI individual income tax return (RI-1040). A resident not required to file a federal return may still need
    to file a RI return if their RI income for the year exceeds the sum of their RI personal exemptions and applicable
    standard deduction. Every nonresident individual required to file a federal return who has income derived from
    or connected with Rhode Island sources must file (RI-1040NR). A part-year resident (RI resident for less than
    12 months) must file if they are required to file a federal return. (Source: RI Division of Taxation, Individual
    Tax Filing Requirements; 2023 RI-1040 instructions, "Who Must File a Return," p. I-1.)'
