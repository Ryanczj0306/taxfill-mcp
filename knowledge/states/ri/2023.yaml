unverified:
- The nonresident/part-year due date and mailing addresses were not separately read from the 2023 RI-1040NR instruction
  booklet; they are assumed identical to the resident return (4/15/2024; refund to 02908-5806, with-payment to 02908-5807).
  Confirm at the DOR via the RI-1040NR booklet.
- Treaty conformity is inferred from the absence of any treaty add-back on RI Schedule M (which I reviewed line-by-line)
  rather than from an explicit RI statement that treaty-exempt income is excluded. RI has no Schedule-CA-style treaty
  add-back, so treaty-exempt income flows through federal AGI untaxed; if a specific treaty article is at issue,
  confirm at the DOR.
