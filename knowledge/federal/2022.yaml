# Federal knowledge pack — tax year 2022 (docs/DEV_PLAN.md sections 3, 7, 10).
#
# Tax math lives here as DATA with citations, never hardcoded in engine code
# (the no-LLM-arithmetic rule, dev plan section 10). Every number in this file
# was transcribed from the official IRS document named in its block's
# citation (irs.gov only; see knowledge/sources.yaml). Mirrors the schema of
# knowledge/federal/2023.yaml exactly. Do NOT edit a number without
# re-verifying it against that source.
#
# The ARPA (2021) CTC/EITC expansions EXPIRED; 2022 reverts to the TCJA base
# ($2,000 CTC, $500 ODC, regular EITC).

jurisdiction: federal
tax_year: 2022

tax:
  # Section 1(j)(2) rate schedules for 2022, exactly as published in
  # Rev. Proc. 2021-45, Section 3.01 (Tables 1-4):
  #   Table 1: Married Individuals Filing Joint Returns and Surviving Spouses
  #   Table 2: Heads of Households
  #   Table 3: Unmarried Individuals (other than Surviving Spouses and HoH)
  #   Table 4: Married Individuals Filing Separate Returns
  rate_schedules:
    citation:
      source: "Rev. Proc. 2021-45, Section 3.01 (2022 tax rate tables), Tables 1-4"
      url: "https://www.irs.gov/pub/irs-drop/rp-21-45.pdf"
    schedules:
      single:
        - { over: 0, but_not_over: 10275, rate: 0.10 }
        - { over: 10275, but_not_over: 41775, rate: 0.12 }
        - { over: 41775, but_not_over: 89075, rate: 0.22 }
        - { over: 89075, but_not_over: 170050, rate: 0.24 }
        - { over: 170050, but_not_over: 215950, rate: 0.32 }
        - { over: 215950, but_not_over: 539900, rate: 0.35 }
        - { over: 539900, but_not_over: null, rate: 0.37 }
      married_filing_jointly:
        - { over: 0, but_not_over: 20550, rate: 0.10 }
        - { over: 20550, but_not_over: 83550, rate: 0.12 }
        - { over: 83550, but_not_over: 178150, rate: 0.22 }
        - { over: 178150, but_not_over: 340100, rate: 0.24 }
        - { over: 340100, but_not_over: 431900, rate: 0.32 }
        - { over: 431900, but_not_over: 647850, rate: 0.35 }
        - { over: 647850, but_not_over: null, rate: 0.37 }
      married_filing_separately:
        - { over: 0, but_not_over: 10275, rate: 0.10 }
        - { over: 10275, but_not_over: 41775, rate: 0.12 }
        - { over: 41775, but_not_over: 89075, rate: 0.22 }
        - { over: 89075, but_not_over: 170050, rate: 0.24 }
        - { over: 170050, but_not_over: 215950, rate: 0.32 }
        - { over: 215950, but_not_over: 323925, rate: 0.35 }
        - { over: 323925, but_not_over: null, rate: 0.37 }
      head_of_household:
        - { over: 0, but_not_over: 14650, rate: 0.10 }
        - { over: 14650, but_not_over: 55900, rate: 0.12 }
        - { over: 55900, but_not_over: 89050, rate: 0.22 }
        - { over: 89050, but_not_over: 170050, rate: 0.24 }
        - { over: 170050, but_not_over: 215950, rate: 0.32 }
        - { over: 215950, but_not_over: 539900, rate: 0.35 }
        - { over: 539900, but_not_over: null, rate: 0.37 }

  # The published 2022 Tax Table — mandatory for the ORDINARY line 16
  # computation when taxable income is below $100,000. Scope caution (same as
  # 2023.yaml): qualified dividends / capital gains (Qualified Dividends and
  # Capital Gain Tax Worksheet / Schedule D Tax Worksheet), Form 8615, or the
  # Foreign Earned Income Tax Worksheet compute the tax from their own
  # worksheet even below $100,000 — those are OUT OF SCOPE for
  # calc.tax_from_taxable_income; never apply the table to preferential-rate
  # income. Row structure is stable across years.
  tax_table:
    citation:
      source: >-
        2022 Tax Table, "1040 and 1040-SR TAX AND EARNED INCOME CREDIT
        TABLES" (Cat. No. 24327A), from the 2022 Instructions for Form 1040
      url: "https://www.irs.gov/pub/irs-prior/i1040tt--2022.pdf"
    applies_below: 100000
    rounding: half_up
    row_bands:
      - { at_least: 0, below: 5, row_width: 5 }
      - { at_least: 5, below: 25, row_width: 10 }
      - { at_least: 25, below: 3000, row_width: 25 }
      - { at_least: 3000, below: 100000, row_width: 50 }

  tax_computation_worksheet:
    citation:
      source: >-
        2022 Tax Computation Worksheet—Line 16 (Single, Married filing jointly
        / Qualifying surviving spouse, Married filing separately, Head of
        household), from the 2022 Instructions for Form 1040
      url: "https://www.irs.gov/pub/irs-prior/i1040tt--2022.pdf"
    applies_at_or_above: 100000

  # Rev. Proc. 2021-45, Section 3.15: base amounts under section 63(c)(2);
  # the additional standard deduction for the aged or the blind is $1,400,
  # increased to $1,750 if the individual is also unmarried and not a
  # surviving spouse. One additional amount per condition per person.
  standard_deduction:
    citation:
      source: "Rev. Proc. 2021-45, Section 3.15 (Standard Deduction)"
      url: "https://www.irs.gov/pub/irs-drop/rp-21-45.pdf"
    amounts:
      single: 12950
      married_filing_jointly: 25900
      married_filing_separately: 12950
      head_of_household: 19400
    additional_aged_or_blind:
      married: 1400
      unmarried: 1750

  # Schedule SE (Form 1040) 2022, Part I. Line 7 social security wage base
  # for 2022 is $147,000.
  se_tax:
    citation:
      source: "Schedule SE (Form 1040) 2022, Part I, lines 4a-13"
      url: "https://www.irs.gov/pub/irs-prior/f1040sse--2022.pdf"
    net_earnings_factor: 0.9235
    ss_rate: 0.124
    medicare_rate: 0.029
    ss_wage_base: 147000
    minimum_net_earnings: 400

  # High-income surtaxes (Schedule 2 lines 11/12). Both are STATUTORY amounts,
  # unchanged since 2013 and not inflation-indexed, so the same values apply to
  # every supported year. Qualifying surviving spouse is explicit in both maps
  # because the two forms bucket it differently (8959: $200,000 with single/HoH;
  # 8960: $250,000 with MFJ).
  additional_medicare_tax:
    citation:
      source: "IRS Topic No. 560, Additional Medicare Tax (Form 8959): 0.9% of Medicare wages and self-employment income above the filing-status threshold; thresholds statutory under IRC section 3101(b)(2), not indexed"
      url: "https://www.irs.gov/taxtopics/tc560"
    rate: 0.009
    thresholds:
      married_filing_jointly: 250000
      married_filing_separately: 125000
      single: 200000
      head_of_household: 200000
      qualifying_surviving_spouse: 200000
  niit:
    citation:
      source: "IRS Topic No. 559, Net Investment Income Tax (Form 8960): 3.8% of the lesser of net investment income or MAGI above the filing-status threshold; thresholds statutory under IRC section 1411, not indexed"
      url: "https://www.irs.gov/taxtopics/tc559"
    rate: 0.038
    thresholds:
      married_filing_jointly: 250000
      married_filing_separately: 125000
      single: 200000
      head_of_household: 200000
      qualifying_surviving_spouse: 250000

# Pub 501 (2022) Table 1 (Filing Requirements Chart for Most Taxpayers): the
# gross-income level at or above which a return is required, by status and age.
# Non-elderly amounts equal that status's standard deduction; each 65+ person
# adds the additional standard deduction ($1,750 unmarried / $1,400 married).
# MFS is the exception: $5 regardless of age.
filing_thresholds:
  citation:
    source: "IRS Publication 501 (2022), Table 1 (Filing Requirements Chart for Most Taxpayers), page 2"
    url: "https://www.irs.gov/pub/irs-prior/p501--2022.pdf"
  amounts:
    single: { under_65: 12950, age_65_or_older: 14700 }
    married_filing_jointly: { both_under_65: 25900, one_spouse_65_or_older: 27300, both_spouses_65_or_older: 28700 }
    married_filing_separately: { any_age: 5 }
    head_of_household: { under_65: 19400, age_65_or_older: 21150 }
    qualifying_surviving_spouse: { under_65: 25900, age_65_or_older: 27300 }

# Common credits with their 2022 parameters and eligibility predicates.
credits:
  citation:
    source: "2022 Instructions for Schedule 8812 (CTC/ACTC/ODC); Rev. Proc. 2021-45 Section 3.06 (EITC)"
    url: "https://www.irs.gov/pub/irs-prior/i1040s8--2022.pdf"
  child_tax_credit:
    citation:
      source: "Schedule 8812 (Form 1040) 2022 and its Instructions ('What's New', maximum ACTC $1,500)"
      url: "https://www.irs.gov/pub/irs-prior/f1040s8--2022.pdf"
    per_qualifying_child: 2000
    additional_ctc_refundable_cap_per_child: 1500   # ACTC cap per child for 2022 (Schedule 8812 line 16b)
    credit_for_other_dependents: 500
    qualifying_child_age_test: "under age 17 at the end of 2022"
    magi_phaseout_threshold:
      married_filing_jointly: 400000
      single: 200000
      married_filing_separately: 200000
      head_of_household: 200000
      qualifying_surviving_spouse: 200000
    phaseout_step: "reduced $50 for each $1,000 (or fraction) of MAGI above the threshold"
  earned_income_tax_credit:
    citation:
      source: "Rev. Proc. 2021-45, Section 3.06 (2022 Earned Income Credit)"
      url: "https://www.irs.gov/pub/irs-drop/rp-21-45.pdf"
    investment_income_limit: 10300
    # keyed by number of qualifying children: 0, 1, 2, 3+ (3+ shares the 2-child earned-income amount)
    by_qualifying_children:
      "0": { earned_income_amount: 7320, max_credit: 560, phaseout_begins_other: 9160, phaseout_begins_mfj: 15290, phaseout_complete_other: 16480, phaseout_complete_mfj: 22610 }
      "1": { earned_income_amount: 10980, max_credit: 3733, phaseout_begins_other: 20130, phaseout_begins_mfj: 26260, phaseout_complete_other: 43492, phaseout_complete_mfj: 49622 }
      "2": { earned_income_amount: 15410, max_credit: 6164, phaseout_begins_other: 20130, phaseout_begins_mfj: 26260, phaseout_complete_other: 49399, phaseout_complete_mfj: 55529 }
      "3+": { earned_income_amount: 15410, max_credit: 6935, phaseout_begins_other: 20130, phaseout_begins_mfj: 26260, phaseout_complete_other: 53057, phaseout_complete_mfj: 59187 }

effective_law_changes: []

