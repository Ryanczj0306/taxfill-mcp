    source: 2020 Instructions for Form 1040-NR, "When and Where Should You File?" (due by April 15, 2021),
      page 13; IRS Notice 2021-21 (COVID-19 postponement to May 17, 2021; covers Forms 1040, 1040-SR,
      1040-NR, 1040-SS, 1040-PR); IRC 6511(a)
    url: https://www.irs.gov/pub/irs-drop/n-21-21.pdf
  filing_due_date: '2021-05-17'
  refund_statute_of_limitations:
    authority: IRC 6511(a)
    years_from_filing: 3
    years_from_payment: 2
    note: A claim for credit or refund must be filed within the LATER of 3 years from the time the return
      was filed or 2 years from the time the tax was paid; a return filed before its due date is treated
      as filed on the due date. (For TY2020 the COVID postponement of the due date to May 17, 2021 correspondingly
      affects the lookback/limitation period.)
  postponement_note: The TY2020 statutory filing and payment due date of April 15, 2021 was automatically
    postponed to May 17, 2021 for individuals (Forms 1040, 1040-SR, 1040-NR, 1040-SS, 1040-PR) by Notice
    2021-21; the April 15 - May 17, 2021 period is disregarded for interest, penalties, and additions
    to tax, which begin accruing May 18, 2021. No form or request was required.
  nonwage_1040nr_due_date: '2021-06-15'
