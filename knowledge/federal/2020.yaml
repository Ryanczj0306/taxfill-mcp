# Federal knowledge pack — tax year 2020 (docs/DEV_PLAN.md sections 3, 7, 10).
#
# Tax math lives here as DATA with citations, never hardcoded in engine code
# (the no-LLM-arithmetic rule, dev plan section 10). Every number in this file
# was transcribed from the official IRS document named in its block's
# citation (irs.gov only; see knowledge/sources.yaml). Mirrors the schema of
# knowledge/federal/2023.yaml exactly. Do NOT edit a number without
# re-verifying it against that source.

jurisdiction: federal
tax_year: 2020

tax:
  # Section 1(j)(2) rate schedules for 2020, exactly as published in
  # Rev. Proc. 2019-44, Section 3.01 (Tables 1-4):
  #   Table 1: Married Individuals Filing Joint Returns and Surviving Spouses
  #   Table 2: Heads of Households
  #   Table 3: Unmarried Individuals (other than Surviving Spouses and HoH)
  #   Table 4: Married Individuals Filing Separate Returns
  rate_schedules:
    citation:
      source: "Rev. Proc. 2019-44, Section 3.01 (2020 tax rate tables), Tables 1-4"
      url: "https://www.irs.gov/pub/irs-drop/rp-19-44.pdf"
    schedules:
      single:
        - { over: 0, but_not_over: 9875, rate: 0.10 }
        - { over: 9875, but_not_over: 40125, rate: 0.12 }
        - { over: 40125, but_not_over: 85525, rate: 0.22 }
        - { over: 85525, but_not_over: 163300, rate: 0.24 }
        - { over: 163300, but_not_over: 207350, rate: 0.32 }
        - { over: 207350, but_not_over: 518400, rate: 0.35 }
        - { over: 518400, but_not_over: null, rate: 0.37 }
      married_filing_jointly:
        - { over: 0, but_not_over: 19750, rate: 0.10 }
        - { over: 19750, but_not_over: 80250, rate: 0.12 }
        - { over: 80250, but_not_over: 171050, rate: 0.22 }
        - { over: 171050, but_not_over: 326600, rate: 0.24 }
        - { over: 326600, but_not_over: 414700, rate: 0.32 }
        - { over: 414700, but_not_over: 622050, rate: 0.35 }
        - { over: 622050, but_not_over: null, rate: 0.37 }
      married_filing_separately:
        - { over: 0, but_not_over: 9875, rate: 0.10 }
        - { over: 9875, but_not_over: 40125, rate: 0.12 }
        - { over: 40125, but_not_over: 85525, rate: 0.22 }
        - { over: 85525, but_not_over: 163300, rate: 0.24 }
        - { over: 163300, but_not_over: 207350, rate: 0.32 }
        - { over: 207350, but_not_over: 311025, rate: 0.35 }
        - { over: 311025, but_not_over: null, rate: 0.37 }
      head_of_household:
        - { over: 0, but_not_over: 14100, rate: 0.10 }
        - { over: 14100, but_not_over: 53700, rate: 0.12 }
        - { over: 53700, but_not_over: 85500, rate: 0.22 }
        - { over: 85500, but_not_over: 163300, rate: 0.24 }
        - { over: 163300, but_not_over: 207350, rate: 0.32 }
        - { over: 207350, but_not_over: 518400, rate: 0.35 }
        - { over: 518400, but_not_over: null, rate: 0.37 }

  # The published 2020 Tax Table — mandatory for the ORDINARY line 16
  # computation when taxable income is below $100,000. Scope caution (same as
  # 2023.yaml): qualified dividends / capital gains (Qualified Dividends and
  # Capital Gain Tax Worksheet / Schedule D Tax Worksheet), Form 8615, or the
  # Foreign Earned Income Tax Worksheet compute the tax from their own
  # worksheet even below $100,000 — those are OUT OF SCOPE for
  # calc.tax_from_taxable_income; never apply the table to preferential-rate
  # income. Row structure is stable across years.
  tax_table:
    citation:
      source: >-
        2020 Tax Table, "1040 and 1040-SR TAX AND EARNED INCOME CREDIT
        TABLES" (Cat. No. 24327A), from the 2020 Instructions for Form 1040
      url: "https://www.irs.gov/pub/irs-prior/i1040tt--2020.pdf"
    applies_below: 100000
    rounding: half_up
    row_bands:
      - { at_least: 0, below: 5, row_width: 5 }
      - { at_least: 5, below: 25, row_width: 10 }
      - { at_least: 25, below: 3000, row_width: 25 }
      - { at_least: 3000, below: 100000, row_width: 50 }

  tax_computation_worksheet:
    citation:
      source: >-
        2020 Tax Computation Worksheet—Line 16 (Single, Married filing jointly
        / Qualifying widow(er), Married filing separately, Head of household),
        from the 2020 Instructions for Form 1040
      url: "https://www.irs.gov/pub/irs-prior/i1040tt--2020.pdf"
    applies_at_or_above: 100000

  # Rev. Proc. 2019-44, Section 3.16: base amounts under section 63(c)(2);
  # the additional standard deduction for the aged or the blind is $1,300,
  # increased to $1,650 if the individual is also unmarried and not a
  # surviving spouse. One additional amount per condition per person.
  standard_deduction:
    citation:
      source: "Rev. Proc. 2019-44, Section 3.16 (Standard Deduction)"
      url: "https://www.irs.gov/pub/irs-drop/rp-19-44.pdf"
    amounts:
      single: 12400
      married_filing_jointly: 24800
      married_filing_separately: 12400
      head_of_household: 18650
    additional_aged_or_blind:
      married: 1300
      unmarried: 1650

  # Schedule SE (Form 1040) 2020, Part I. Line 7 social security wage base
  # for 2020 is $137,700.
  se_tax:
    citation:
      source: "Schedule SE (Form 1040) 2020, Part I, lines 4a-13"
      url: "https://www.irs.gov/pub/irs-prior/f1040sse--2020.pdf"
    net_earnings_factor: 0.9235
    ss_rate: 0.124
    medicare_rate: 0.029
    ss_wage_base: 137700
    minimum_net_earnings: 400

# Pub 501 (2020) Table 1 (Filing Requirements Chart for Most Taxpayers): the
# gross-income level at or above which a return is required, by status and age.
# Non-elderly amounts equal that status's standard deduction; each 65+ person
# adds the additional standard deduction ($1,650 unmarried / $1,300 married).
# MFS is the exception: $5 regardless of age.
filing_thresholds:
  citation:
    source: "IRS Publication 501 (2020), Table 1 (Filing Requirements Chart for Most Taxpayers), page 2"
    url: "https://www.irs.gov/pub/irs-prior/p501--2020.pdf"
  amounts:
    single: { under_65: 12400, age_65_or_older: 14050 }
    married_filing_jointly: { both_under_65: 24800, one_spouse_65_or_older: 26100, both_spouses_65_or_older: 27400 }
    married_filing_separately: { any_age: 5 }
    head_of_household: { under_65: 18650, age_65_or_older: 20300 }
    qualifying_surviving_spouse: { under_65: 24800, age_65_or_older: 26100 }

# Common credits with their 2020 parameters and eligibility predicates.
credits:
  citation:
    source: "Schedule 8812 (Form 1040) 2020 / Pub 972 (2020) (CTC/ACTC/ODC); Rev. Proc. 2019-44 Section 3.07 (EITC)"
    url: "https://www.irs.gov/pub/irs-prior/p972--2020.pdf"
  child_tax_credit:
    citation:
      source: "Pub 972 (2020) Child Tax Credit and Credit for Other Dependents Worksheet, and Schedule 8812 (Form 1040) 2020, line 4"
      url: "https://www.irs.gov/pub/irs-prior/f1040s8--2020.pdf"
    per_qualifying_child: 2000
    additional_ctc_refundable_cap_per_child: 1400   # ACTC cap per child for 2020 (Schedule 8812 line 4)
    credit_for_other_dependents: 500
    qualifying_child_age_test: "under age 17 at the end of 2020"
    magi_phaseout_threshold:
      married_filing_jointly: 400000
      single: 200000
      married_filing_separately: 200000
      head_of_household: 200000
      qualifying_surviving_spouse: 200000
    phaseout_step: "reduced $50 for each $1,000 (or fraction) of MAGI above the threshold"
  earned_income_tax_credit:
    citation:
      source: "Rev. Proc. 2019-44, Section 3.07 (2020 Earned Income Credit)"
      url: "https://www.irs.gov/pub/irs-drop/rp-19-44.pdf"
    investment_income_limit: 3650
    # keyed by number of qualifying children: 0, 1, 2, 3+ (3+ shares the 2-child earned-income amount)
    by_qualifying_children:
      "0": { earned_income_amount: 7030, max_credit: 538, phaseout_begins_other: 8790, phaseout_begins_mfj: 14680, phaseout_complete_other: 15820, phaseout_complete_mfj: 21710 }
      "1": { earned_income_amount: 10540, max_credit: 3584, phaseout_begins_other: 19330, phaseout_begins_mfj: 25220, phaseout_complete_other: 41756, phaseout_complete_mfj: 47646 }
      "2": { earned_income_amount: 14800, max_credit: 5920, phaseout_begins_other: 19330, phaseout_begins_mfj: 25220, phaseout_complete_other: 47440, phaseout_complete_mfj: 53330 }
      "3+": { earned_income_amount: 14800, max_credit: 6660, phaseout_begins_other: 19330, phaseout_begins_mfj: 25220, phaseout_complete_other: 50954, phaseout_complete_mfj: 56844 }

effective_law_changes: []

