payment_options:
  citation:
    source: 2020 Instructions for Form 1040 (and 1040-SR), "Amount You Owe" / "How To Pay" (Pay Online,
      Pay by Phone, Pay by Cash, Pay by Check or Money Order), pages 61-62
    url: https://www.irs.gov/pub/irs-prior/i1040gi--2020.pdf
  check:
    payee: United States Treasury
    memo: Make your check or money order payable to "United States Treasury" for the full amount due;
      don't send cash; don't attach the payment to your return. Write "2020 Form 1040" (or "2020 Form
      1040-SR") and your name, address, daytime phone number, and social security number (SSN) on the
      payment (on a joint return, the SSN shown first); enter the amount on the right side of the check
      as $ XXX.XX with no dashes or lines; attach Form 1040-V; mail the return, payment, and Form 1040-V
      to the address that applies to you.
