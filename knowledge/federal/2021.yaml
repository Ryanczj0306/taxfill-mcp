# Federal knowledge pack — tax year 2021 (docs/DEV_PLAN.md sections 3, 7, 10).
#
# Tax math lives here as DATA with citations, never hardcoded in engine code
# (the no-LLM-arithmetic rule, dev plan section 10). Every number in this file
# was transcribed from the official IRS document named in its block's
# citation (irs.gov only; see knowledge/sources.yaml). Mirrors the schema of
# knowledge/federal/2023.yaml exactly. Do NOT edit a number without
# re-verifying it against that source.
#
# IMPORTANT: 2021 was atypical. The American Rescue Plan Act of 2021 (ARPA,
# Pub. L. 117-2) temporarily expanded BOTH the Child Tax Credit and the
# childless Earned Income Credit for tax year 2021 only. Those expansions
# OVERRIDE the inflation figures published in Rev. Proc. 2020-45, and are
# encoded below from the 2021 Schedule 8812 instructions and Pub 596 (2021).
# See the effective_law_changes block at the bottom.

jurisdiction: federal
tax_year: 2021

tax:
