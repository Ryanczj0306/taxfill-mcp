  # High-income surtaxes (Schedule 2 lines 11/12). Both are STATUTORY amounts,
  # unchanged since 2013 and not inflation-indexed, so the same values apply to
  # every supported year. Qualifying surviving spouse is explicit in both maps
  # because the two forms bucket it differently (8959: $200,000 with single/HoH;
  # 8960: $250,000 with MFJ).
  additional_medicare_tax:
    citation:
      source: "IRS Topic No. 560, Additional Medicare Tax (Form 8959): 0.9% of Medicare wages and self-employment income above the filing-status threshold; thresholds statutory under IRC section 3101(b)(2), not indexed"
      url: "https://www.irs.gov/taxtopics/tc560"
    rate: 0.009
    thresholds:
      married_filing_jointly: 250000
      married_filing_separately: 125000
      single: 200000
      head_of_household: 200000
      qualifying_surviving_spouse: 200000
  niit:
    citation:
      source: "IRS Topic No. 559, Net Investment Income Tax (Form 8960): 3.8% of the lesser of net investment income or MAGI above the filing-status threshold; thresholds statutory under IRC section 1411, not indexed"
      url: "https://www.irs.gov/taxtopics/tc559"
    rate: 0.038
    thresholds:
      married_filing_jointly: 250000
      married_filing_separately: 125000
      single: 200000
      head_of_household: 200000
      qualifying_surviving_spouse: 250000

  # Maximum capital gains rate breakpoints under IRC section 1(h), indexed
  # separately under section 1(j)(5): TAXABLE-INCOME ceilings for the 0% and
  # 15% rates on adjusted net capital gain / qualified dividends (20% above
  # the 15% ceiling), with ordinary income stacked first — the Qualified
  # Dividends and Capital Gain Tax Worksheet line 6 / line 13 amounts. NOT
  # equal to the ordinary bracket boundaries; never derive them from the rate
  # schedules. MFS is exactly half of MFJ; a qualifying surviving spouse uses
  # the MFJ amounts (the Rev. Proc. groups surviving spouses with joint returns).
  capital_gains_brackets:
    citation:
      source: "Rev. Proc. 2020-45, Section 3.03 (Maximum Capital Gains Rate)"
      url: "https://www.irs.gov/pub/irs-drop/rp-20-45.pdf"
    max_zero_rate_amount:
      single: 40400
      married_filing_jointly: 80800
      married_filing_separately: 40400
      head_of_household: 54100
      qualifying_surviving_spouse: 80800
    max_15_percent_rate_amount:
      single: 445850
      married_filing_jointly: 501600
      married_filing_separately: 250800
      head_of_household: 473750
      qualifying_surviving_spouse: 501600

  # Social Security Benefits Worksheet parameters (Form 1040 line 6b; line 5b
  # in 2019). Statutory under IRC section 86(c) and never indexed — identical
  # in every year 2019-2024. MFS splits by BEHAVIOR, not just status: lived
  # apart from the spouse ALL year -> the single thresholds (write "D" next to
  # the benefits line on paper returns); lived with the spouse at ANY time ->
  # both tiers are $0 (mfs_living_with_spouse_base) and taxable benefits =
  # min(0.85 x provisional income, 0.85 x benefits). The published worksheet
  # prints the second tier as the line-10 gap ($9,000, or $12,000 for MFJ);
  # the explicit IRC 86(c)(2) adjusted base amounts stored here are
  # arithmetically identical.
  taxable_social_security:
    citation:
      source: "2021 Instructions for Form 1040, Social Security Benefits Worksheet (lines 6a/6b); IRC section 86(c)"
      url: "https://www.irs.gov/pub/irs-prior/i1040gi--2021.pdf"
    base_amount:
      single: 25000
      married_filing_jointly: 32000
      head_of_household: 25000
      qualifying_surviving_spouse: 25000
      married_filing_separately_lived_apart_all_year: 25000
    adjusted_base_amount:
      single: 34000
      married_filing_jointly: 44000
      head_of_household: 34000
      qualifying_surviving_spouse: 34000
      married_filing_separately_lived_apart_all_year: 34000
    mfs_living_with_spouse_base: 0
    inclusion_rate_tier1: 0.50
    inclusion_rate_tier2: 0.85
    max_taxable_share_of_benefits: 0.85

  # Excess social security / tier 1 RRTA withholding credit parameters
  # (Schedule 3 line 11).
  # The cap is PER PERSON: each spouse's box-4 withholding is compared to the
  # max separately, never combined. The credit exists only when MULTIPLE
  # employers together over-withheld; a single employer's excess must be
  # adjusted by that employer (Form 843 if it refuses) and is never claimable
  # on the return. max_withholding = rate x wage base, exact to the cent.
  employee_social_security:
    citation:
      source: "2021 Instructions for Form 1040, Schedule 3 line 11 (Excess Social Security and Tier 1 RRTA Tax Withheld); Pub 15 (2021), social security rate and wage base limit"
      url: "https://www.irs.gov/pub/irs-prior/i1040gi--2021.pdf"
    rate: 0.062
    ss_wage_base: 142800
    max_withholding: 8853.60

  # Section 221 student-loan-interest deduction (Schedule 1). The $2,500 cap
  # is statutory (IRC 221(b)(1)), not indexed. married_filing_separately is
  # deliberately ABSENT: MFS may not take the deduction at all (IRC 221(e)(2))
  # — a missing status means not-allowed. Reduction = tentative deduction
  # (min(cap, interest paid)) x (MAGI - start) / (end - start); the span is
  # $15,000 ($30,000 MFJ) in every supported year.
  student_loan_interest:
    citation:
      source: "Rev. Proc. 2020-45, Section 3.30 (Interest on Education Loans)"
      url: "https://www.irs.gov/pub/irs-drop/rp-20-45.pdf"
    max_deduction: 2500
    phaseout:
      single: { start: 70000, end: 85000 }
      head_of_household: { start: 70000, end: 85000 }
      qualifying_surviving_spouse: { start: 70000, end: 85000 }
      married_filing_jointly: { start: 140000, end: 170000 }

  # Form 8863 education credits. AOTC: 100% of the first $2,000 of qualified
  # expenses PER STUDENT plus 25% of the next $2,000 (max $2,500 per student),
  # 40% refundable unless the Form 8863 line 7 under-age-24 exception applies;
  # its phaseout is statutory (IRC 25A(i)(4)) and identical in all years.
  # LLC: 20% of up to $10,000 of expenses PER RETURN, nonrefundable. MFS may
  # claim NEITHER credit (rule — hence no MFS keys). "other" = single /
  # head_of_household / qualifying_surviving_spouse.
  # 2021 is the FIRST year the LLC phaseout equals the AOTC's (CAA 2021 set a
  # fixed section 25A(d) phaseout; before this the LLC ranges were lower).
  education_credits:
    citation:
      source: "2021 Instructions for Form 8863 (Education Credits), including 'What's New' (LLC phaseout raised to the AOTC ranges)"
      url: "https://www.irs.gov/pub/irs-prior/i8863--2021.pdf"
    aotc:
      per_student_cap: 2500
      first_dollar_cap: 2000
      second_rate: 0.25
      refundable_fraction: 0.40
      phaseout:
        married_filing_jointly: { start: 160000, end: 180000 }
        other: { start: 80000, end: 90000 }
    llc:
      per_return_expense_cap: 10000
      rate: 0.20
      phaseout:
        married_filing_jointly: { start: 160000, end: 180000 }
        other: { start: 80000, end: 90000 }

  # Form 2441 child & dependent care credit (IRC 21) — 2021 ARPA special rules
  # under IRC 21(g), transcribed from i2441--2021 (Phaseout Schedule, p. 6) and
  # f2441--2021, re-verified against IRC 21(g). Caps $8,000/$16,000 (previously
  # $3,000/$6,000; form lines 3 and 27). Percentage: 50% for AGI up to $125,000,
  # minus 1 pt per $2,000 OR FRACTION THEREOF over $125,000 down to a 20%
  # plateau (reached for AGI over $183,000, held through $400,000), then a
  # SECOND slide of 1 pt per $2,000 or fraction over $400,000 to ZERO for AGI
  # over $438,000 (the table's ".01" bracket is $436,000-$438,000; "438,000 —
  # No limit = .00"; form: if line 7 is over $438,000, enter zero on line 9a —
  # a line 9b credit for 2020 expenses paid in 2021 may still be available).
  # The statute (IRC 21(g)(4): 20% reduced, not below zero, by 1 point per
  # $2,000 or fraction over $400,000) and the printed table agree EXACTLY at
  # the zero point: AGI of exactly $438,000 is 19 full increments (.01), any
  # amount above it is 20 (.00) — the zero point follows from the
  # or-fraction-thereof rule, never a separate stored figure. REFUNDABLE
  # (IRC 21(g)(1)) only when the abode test below is met (Form 2441 line B);
  # otherwise nonrefundable and limited by tax (form line 11).
  dependent_care:
    citation:
      source: "2021 Instructions for Form 2441 (ARPA caps, 50% rate, Phaseout Schedule p. 6, line B refundability); 2021 Form 2441; IRC 21(g)"
      url: "https://www.irs.gov/pub/irs-prior/i2441--2021.pdf"
    expense_cap:
      one_qualifying_person: 8000
      two_or_more_qualifying_persons: 16000
    phase_downs:
      # First slide: .49 for AGI over 125,000 but not over 127,000 ... .21 at
      # 181,000-183,000, then the .20 plateau (183,000-400,000).
      - { starts_above_agi: 125000, from_rate: 0.50, to_rate: 0.20 }
      # Second slide: .19 at 400,000-402,000 ... .01 at 436,000-438,000, then
      # "438,000 — No limit = .00" (follows from the or-fraction rule).
      - { starts_above_agi: 400000, from_rate: 0.20, to_rate: 0.00 }
    refundable_if_us_abode: true
    refundable_condition: >-
      Refundable ONLY if the taxpayer (or the spouse, if filing jointly) had a
      principal place of abode in the United States — the 50 states or DC —
      for MORE than half of 2021 (Form 2441 line B; IRC 21(g)(1)). US military
      personnel stationed outside the US on extended active duty are treated
      as meeting it. If the test is not met, the credit is NONREFUNDABLE and
      limited by tax (form line 11).
    earned_income_limitation: >-
      Form 2441 line 6: the credit base is the SMALLEST of the capped qualified
      expenses (line 3), your earned income (line 4), and — married filing
      jointly — your spouse's earned income (line 5; all others enter the
      line 4 amount).
    deemed_income_per_month:
      one_qualifying_person: 250
      two_or_more_qualifying_persons: 500
    student_spouse_rule: >-
      A spouse (or the taxpayer) who was a full-time student — enrolled
      full-time during some part of each of 5 calendar months of 2021 — or was
      physically or mentally incapable of self-care is DEEMED to have earned
      income of $250 per month ($500 with two or more qualifying persons) for
      each such month or part month (IRC 21(d)(2)); only one spouse may use the
      deemed amount for any given month, and a spouse who also worked that
      month uses the HIGHER of actual or deemed earned income.
    married_filing_separately_note: >-
      Generally, married persons must file a joint return to claim the credit.
      A married-filing-separately filer is treated as unmarried (and may claim
      the credit, checking the Form 2441 married-filing-separately checkbox)
      ONLY if ALL of: they lived apart from the spouse during the last 6 months
      of 2021; their home was the qualifying person's main home for more than
      half the year; and they paid more than half the cost of keeping up that
      home for the year.
    dependent_care_benefits:
      exclusion_max: 10500       # ARPA increase ("previously $5,000"); form line 21
      exclusion_max_mfs: 5250    # ("previously $2,500")
      note: >-
        Unused 2020 FSA carryovers permitted into 2021 are ADDED to the 2021
        line 21 maximum (i2441--2021, line 13).

# Pub 501 (2021) Table 1 (Filing Requirements Chart for Most Taxpayers): the
# gross-income level at or above which a return is required, by status and age.
# Non-elderly amounts equal that status's standard deduction; each 65+ person
# adds the additional standard deduction ($1,700 unmarried / $1,350 married).
# MFS is the exception: $5 regardless of age.
filing_thresholds:
  citation:
    source: "IRS Publication 501 (2021), Table 1 (Filing Requirements Chart for Most Taxpayers), page 2"
    url: "https://www.irs.gov/pub/irs-prior/p501--2021.pdf"
  amounts:
    single: { under_65: 12550, age_65_or_older: 14250 }
    married_filing_jointly: { both_under_65: 25100, one_spouse_65_or_older: 26450, both_spouses_65_or_older: 27800 }
    married_filing_separately: { any_age: 5 }
    head_of_household: { under_65: 18800, age_65_or_older: 20500 }
    qualifying_surviving_spouse: { under_65: 25100, age_65_or_older: 26450 }

# Common credits with their 2021 parameters. BOTH the CTC and the childless
# EITC were TEMPORARILY EXPANDED by the American Rescue Plan Act of 2021 for
# tax year 2021 only — see effective_law_changes at the bottom. The numbers
# below are the ARPA 2021 figures actually used on the 2021 return, NOT the
# Rev. Proc. 2020-45 inflation baseline.
credits:
  citation:
    source: "2021 Instructions for Schedule 8812 (expanded CTC/ACTC/ODC); Pub 596 (2021) and ARPA (Pub. L. 117-2) for the expanded EITC"
    url: "https://www.irs.gov/pub/irs-prior/i1040s8--2021.pdf"
  child_tax_credit:
    citation:
      source: "Schedule 8812 (Form 1040) 2021 and its Instructions ('Enhanced child tax credit', Line 5 Worksheet); ARPA section 9611 (IRC 24(i))"
      url: "https://www.irs.gov/pub/irs-prior/i1040s8--2021.pdf"
    # ARPA: the credit is $3,600 per qualifying child under age 6 at the end
    # of 2021, and $3,000 per other qualifying child under age 18 at the end
    # of 2021. (Pre-ARPA base remained $2,000 per child.)
    arpa_expanded: true                     # ARPA (Pub. L. 117-2) section 9611 — tax year 2021 only
    per_qualifying_child: 3000              # qualifying child age 6-17 (under 18, not under 6)
    per_qualifying_child_under_6: 3600      # qualifying child who has not attained age 6 by end of 2021
    pre_arpa_base_per_child: 2000           # the non-enhanced base (used in the two-tier phase-out)
    additional_ctc_refundable_cap_per_child: 3600   # 2021: the CTC was FULLY REFUNDABLE (no separate ACTC $-cap) for taxpayers meeting the residency test
    fully_refundable: true                  # for taxpayers with a principal place of abode in the US (50 states + DC) for more than half of 2021
    credit_for_other_dependents: 500        # ODC was NOT enhanced for 2021
    qualifying_child_age_test: "under age 18 at the end of 2021 (under age 6 for the higher $3,600 amount)"
    child_under_age: 18                     # 2021 only; every other year is under 17
    # Two-tier phase-out (2021 Schedule 8812 Line 5 Worksheet + Line 9):
    #   First phase-out reduces only the ARPA INCREASE above the $2,000 base,
    #   at $50 per $1,000 (5%) of MAGI over the thresholds below.
    increased_amount_phaseout_threshold:
      single: 75000
      married_filing_separately: 75000
      head_of_household: 112500
      married_filing_jointly: 150000
      qualifying_surviving_spouse: 150000
    # Line 5 Worksheet line 6 caps the first phase-out at 5% x (second-tier
    # threshold - first-tier threshold). QSS's cap is only $2,500 because the
    # SECOND tier groups it with "all other statuses" at $200,000 — an engine
    # without these caps overstates the reduction for QSS between $150k-$200k.
    increased_amount_phaseout_cap:
      married_filing_jointly: 12500
      qualifying_surviving_spouse: 2500
      head_of_household: 4375
      single: 6250
      married_filing_separately: 6250
    #   Second phase-out reduces the remaining $2,000 base at the regular
    #   thresholds, at $50 per $1,000 (5%) of MAGI over the threshold.
    #   (Filers who check NEITHER residency box A/B fall back to the pre-ARPA
    #   Part I-C ACTC: $1,400/child cap per Rev. Proc. 2020-45 Section 3.05,
    #   15% of earned income over $2,500.)
    base_credit_phaseout_threshold:
      married_filing_jointly: 400000
      single: 200000
      married_filing_separately: 200000
      head_of_household: 200000
      qualifying_surviving_spouse: 200000
    phaseout_step: "each phase-out reduces the affected amount $50 for each $1,000 (or fraction) of MAGI above its threshold (5%)"
  earned_income_tax_credit:
    # ARPA (section 9621) raised the childless (0-child) EITC for 2021 only:
    # bigger credit ($1,502 max; 15.3% rates per IRC 32(n)), wider phase-out,
    # lower minimum age (19, no upper age cap; special ages for students /
    # former foster / homeless youth), and raised the investment income limit
    # to $10,000 (ARPA section 9624 — permanent, indexed after 2021). The
    # as-amended 2021 table is Rev. Proc. 2021-23 Section 4, which modifies
    # AND SUPERSEDES Rev. Proc. 2020-45 Section 3.07 — never use 2020-45's
    # childless column ($543 max). The 1/2/3+ columns are identical in both.
    citation:
      source: "Rev. Proc. 2021-23, Section 4 (2021 Earned Income Credit as amended by ARPA sections 9621/9624; modifies and supersedes Rev. Proc. 2020-45 Section 3.07)"
      url: "https://www.irs.gov/pub/irs-drop/rp-21-23.pdf"
    investment_income_limit: 10000          # ARPA raised this from the Rev. Proc. $3,650 to $10,000 for 2021
    # keyed by number of qualifying children: 0, 1, 2, 3+ (3+ shares the 2-child earned-income amount)
    by_qualifying_children:
      "0": { earned_income_amount: 9820, max_credit: 1502, phaseout_begins_other: 11610, phaseout_begins_mfj: 17560, phaseout_complete_other: 21430, phaseout_complete_mfj: 27380 }
      "1": { earned_income_amount: 10640, max_credit: 3618, phaseout_begins_other: 19520, phaseout_begins_mfj: 25470, phaseout_complete_other: 42158, phaseout_complete_mfj: 48108 }
      "2": { earned_income_amount: 14950, max_credit: 5980, phaseout_begins_other: 19520, phaseout_begins_mfj: 25470, phaseout_complete_other: 47915, phaseout_complete_mfj: 53865 }
      "3+": { earned_income_amount: 14950, max_credit: 6728, phaseout_begins_other: 19520, phaseout_begins_mfj: 25470, phaseout_complete_other: 51464, phaseout_complete_mfj: 57414 }

# ARPA temporarily expanded the 2021 CTC and childless EITC; both expansions
# are final and citeable for 2021 (figures encoded in credits above), so the
# status is final_form_published. Recorded here per dev plan section 7(2).
effective_law_changes:
  - description: >-
      American Rescue Plan Act of 2021 (ARPA): for tax year 2021 only, the
      Child Tax Credit was increased to $3,000/$3,600 per child, made fully
      refundable for US-resident taxpayers, and given a two-tier phase-out;
      the childless Earned Income Credit was increased (max ~$1,502, wider
      phase-out, lower minimum age) and the EITC investment-income limit was
      raised to $10,000.
    citation:
      source: "Pub. L. 117-2 (American Rescue Plan Act of 2021), sections 9611 (CTC) and 9621 (EITC)"
