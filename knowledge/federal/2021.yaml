      source: "Rev. Proc. 2020-45, Section 3.01 (2021 tax rate tables), Tables 1-4"
      url: "https://www.irs.gov/pub/irs-drop/rp-20-45.pdf"
    schedules:
      single:
        - { over: 0, but_not_over: 9950, rate: 0.10 }
        - { over: 9950, but_not_over: 40525, rate: 0.12 }
        - { over: 40525, but_not_over: 86375, rate: 0.22 }
        - { over: 86375, but_not_over: 164925, rate: 0.24 }
        - { over: 164925, but_not_over: 209425, rate: 0.32 }
        - { over: 209425, but_not_over: 523600, rate: 0.35 }
        - { over: 523600, but_not_over: null, rate: 0.37 }
      married_filing_jointly:
        - { over: 0, but_not_over: 19900, rate: 0.10 }
        - { over: 19900, but_not_over: 81050, rate: 0.12 }
        - { over: 81050, but_not_over: 172750, rate: 0.22 }
        - { over: 172750, but_not_over: 329850, rate: 0.24 }
        - { over: 329850, but_not_over: 418850, rate: 0.32 }
        - { over: 418850, but_not_over: 628300, rate: 0.35 }
        - { over: 628300, but_not_over: null, rate: 0.37 }
      married_filing_separately:
        - { over: 0, but_not_over: 9950, rate: 0.10 }
        - { over: 9950, but_not_over: 40525, rate: 0.12 }
        - { over: 40525, but_not_over: 86375, rate: 0.22 }
        - { over: 86375, but_not_over: 164925, rate: 0.24 }
        - { over: 164925, but_not_over: 209425, rate: 0.32 }
        - { over: 209425, but_not_over: 314150, rate: 0.35 }
        - { over: 314150, but_not_over: null, rate: 0.37 }
      head_of_household:
        - { over: 0, but_not_over: 14200, rate: 0.10 }
        - { over: 14200, but_not_over: 54200, rate: 0.12 }
        - { over: 54200, but_not_over: 86350, rate: 0.22 }
        - { over: 86350, but_not_over: 164900, rate: 0.24 }
        - { over: 164900, but_not_over: 209400, rate: 0.32 }
        - { over: 209400, but_not_over: 523600, rate: 0.35 }
        - { over: 523600, but_not_over: null, rate: 0.37 }

  # The published 2021 Tax Table — mandatory for the ORDINARY line 16
  # computation when taxable income is below $100,000. Scope caution (same as
  # 2023.yaml): qualified dividends / capital gains (Qualified Dividends and
  # Capital Gain Tax Worksheet / Schedule D Tax Worksheet), Form 8615, or the
  # Foreign Earned Income Tax Worksheet compute the tax from their own
  # worksheet even below $100,000 — those are OUT OF SCOPE for
  # calc.tax_from_taxable_income; never apply the table to preferential-rate
  # income. Row structure is stable across years.
  tax_table:
    citation:
      source: >-
        2021 Tax Table, "1040 and 1040-SR TAX AND EARNED INCOME CREDIT
        TABLES" (Cat. No. 24327A), from the 2021 Instructions for Form 1040
      url: "https://www.irs.gov/pub/irs-prior/i1040tt--2021.pdf"
    applies_below: 100000
    rounding: half_up
    row_bands:
      - { at_least: 0, below: 5, row_width: 5 }
      - { at_least: 5, below: 25, row_width: 10 }
      - { at_least: 25, below: 3000, row_width: 25 }
      - { at_least: 3000, below: 100000, row_width: 50 }

  tax_computation_worksheet:
    citation:
      source: >-
        2021 Tax Computation Worksheet—Line 16 (Single, Married filing jointly
        / Qualifying widow(er), Married filing separately, Head of household),
        from the 2021 Instructions for Form 1040
      url: "https://www.irs.gov/pub/irs-prior/i1040tt--2021.pdf"
    applies_at_or_above: 100000

