# Due dates for tax year 2023 and the refund statute of limitations (IRC 6511).
deadlines:
  citation:
    source: "2023 Instructions for Form 1040-NR (Due Date / Where To File); IRC 6511(a)"
    url: "https://www.irs.gov/pub/irs-prior/i1040nr--2023.pdf"
  filing_due_date: "2024-04-15"
  nonwage_1040nr_due_date: "2024-06-17"   # 1040-NR with no US-withholding wages (15th day, 6th month; Jun 15 2024 = Sat)
  abroad_automatic_extension_date: "2024-06-17"   # automatic 2-month extension; IRC 7503 weekend shift (Jun 15 2024 = Sat); IRS IR-2024-148; interest still accrues from Apr 15
  refund_statute_of_limitations:
    authority: "IRC 6511(a)"
    years_from_filing: 3
    years_from_payment: 2
    note: "Claim a refund within the later of 3 years from filing or 2 years from payment; a return filed early is treated as filed on the due date."

# Common credits with their 2023 parameters and eligibility predicates.
credits:
  citation:
    source: "2023 Instructions for Schedule 8812 (CTC/ACTC/ODC); Rev. Proc. 2022-38 Section 3.06 (EITC)"
    url: "https://www.irs.gov/pub/irs-prior/i1040s8--2023.pdf"
  child_tax_credit:
    citation:
      source: "Schedule 8812 (Form 1040) 2023 and its Instructions ('What's New', 'Limits on the CTC and ODC')"
      url: "https://www.irs.gov/pub/irs-prior/f1040s8--2023.pdf"
    per_qualifying_child: 2000
    additional_ctc_refundable_cap_per_child: 1600   # the refundable ACTC cap for 2023
    credit_for_other_dependents: 500
    qualifying_child_age_test: "under age 17 at the end of 2023"
    magi_phaseout_threshold:
      married_filing_jointly: 400000
      single: 200000
      married_filing_separately: 200000
      head_of_household: 200000
      qualifying_surviving_spouse: 200000
    phaseout_step: "reduced $50 for each $1,000 (or fraction) of MAGI above the threshold"
  earned_income_tax_credit:
    citation:
      source: "Rev. Proc. 2022-38, Section 3.06 (2023 Earned Income Credit)"
      url: "https://www.irs.gov/pub/irs-drop/rp-22-38.pdf"
    investment_income_limit: 11000
    # keyed by number of qualifying children: 0, 1, 2, 3+ (3+ shares the 2-child earned-income amount)
    by_qualifying_children:
      "0": { earned_income_amount: 7840, max_credit: 600, phaseout_begins_other: 9800, phaseout_begins_mfj: 16370, phaseout_complete_other: 17640, phaseout_complete_mfj: 24210 }
      "1": { earned_income_amount: 11750, max_credit: 3995, phaseout_begins_other: 21560, phaseout_begins_mfj: 28120, phaseout_complete_other: 46560, phaseout_complete_mfj: 53120 }
      "2": { earned_income_amount: 16510, max_credit: 6604, phaseout_begins_other: 21560, phaseout_begins_mfj: 28120, phaseout_complete_other: 52918, phaseout_complete_mfj: 59478 }
      "3+": { earned_income_amount: 16510, max_credit: 7430, phaseout_begins_other: 21560, phaseout_begins_mfj: 28120, phaseout_complete_other: 56838, phaseout_complete_mfj: 63398 }

