# Federal knowledge pack — tax year 2024 (docs/DEV_PLAN.md sections 3, 7, 10).
#
# Tax math lives here as DATA with citations, never hardcoded in engine code
# (the no-LLM-arithmetic rule, dev plan section 10). Every number in this file
# was transcribed from the official IRS document named in its block's
# citation (irs.gov only; see knowledge/sources.yaml). Mirrors the schema of
# knowledge/federal/2023.yaml exactly. Do NOT edit a number without
# re-verifying it against that source.

jurisdiction: federal
tax_year: 2024

tax:
  # Section 1(j)(2) rate schedules for 2024, exactly as published in
  # Rev. Proc. 2023-34, Section 3.01 (Tables 1-4):
  #   Table 1: Married Individuals Filing Joint Returns and Surviving Spouses
  #   Table 2: Heads of Households
  #   Table 3: Unmarried Individuals (other than Surviving Spouses and HoH)
  #   Table 4: Married Individuals Filing Separate Returns
  rate_schedules:
    citation:
      source: "Rev. Proc. 2023-34, Section 3.01 (2024 tax rate tables), Tables 1-4"
      url: "https://www.irs.gov/pub/irs-drop/rp-23-34.pdf"
    schedules:
      single:
        - { over: 0, but_not_over: 11600, rate: 0.10 }
        - { over: 11600, but_not_over: 47150, rate: 0.12 }
        - { over: 47150, but_not_over: 100525, rate: 0.22 }
        - { over: 100525, but_not_over: 191950, rate: 0.24 }
        - { over: 191950, but_not_over: 243725, rate: 0.32 }
        - { over: 243725, but_not_over: 609350, rate: 0.35 }
        - { over: 609350, but_not_over: null, rate: 0.37 }
      married_filing_jointly:
        - { over: 0, but_not_over: 23200, rate: 0.10 }
        - { over: 23200, but_not_over: 94300, rate: 0.12 }
        - { over: 94300, but_not_over: 201050, rate: 0.22 }
        - { over: 201050, but_not_over: 383900, rate: 0.24 }
        - { over: 383900, but_not_over: 487450, rate: 0.32 }
        - { over: 487450, but_not_over: 731200, rate: 0.35 }
        - { over: 731200, but_not_over: null, rate: 0.37 }
      married_filing_separately:
        - { over: 0, but_not_over: 11600, rate: 0.10 }
        - { over: 11600, but_not_over: 47150, rate: 0.12 }
        - { over: 47150, but_not_over: 100525, rate: 0.22 }
        - { over: 100525, but_not_over: 191950, rate: 0.24 }
        - { over: 191950, but_not_over: 243725, rate: 0.32 }
        - { over: 243725, but_not_over: 365600, rate: 0.35 }
        - { over: 365600, but_not_over: null, rate: 0.37 }
      head_of_household:
        - { over: 0, but_not_over: 16550, rate: 0.10 }
        - { over: 16550, but_not_over: 63100, rate: 0.12 }
        - { over: 63100, but_not_over: 100500, rate: 0.22 }
        - { over: 100500, but_not_over: 191950, rate: 0.24 }
        - { over: 191950, but_not_over: 243700, rate: 0.32 }
        - { over: 243700, but_not_over: 609350, rate: 0.35 }
        - { over: 609350, but_not_over: null, rate: 0.37 }

  # The published 2024 Tax Table — mandatory for the ORDINARY line 16
  # computation when taxable income is below $100,000. Scope caution (same as
  # 2023.yaml): qualified dividends / capital gains (Qualified Dividends and
  # Capital Gain Tax Worksheet / Schedule D Tax Worksheet), Form 8615, or the
  # Foreign Earned Income Tax Worksheet compute the tax from their own
  # worksheet even below $100,000 — those are OUT OF SCOPE for
  # calc.tax_from_taxable_income; never apply the table to preferential-rate
  # income. Row structure is stable across years.
  tax_table:
    citation:
      source: >-
        2024 Tax Table, "1040 and 1040-SR TAX AND EARNED INCOME CREDIT
        TABLES" (Cat. No. 24327A), from the 2024 Instructions for Form 1040
      url: "https://www.irs.gov/pub/irs-prior/i1040tt--2024.pdf"
    applies_below: 100000
    rounding: half_up
    row_bands:
      - { at_least: 0, below: 5, row_width: 5 }
      - { at_least: 5, below: 25, row_width: 10 }
      - { at_least: 25, below: 3000, row_width: 25 }
      - { at_least: 3000, below: 100000, row_width: 50 }

  tax_computation_worksheet:
    citation:
      source: >-
        2024 Tax Computation Worksheet—Line 16 (Single, Married filing jointly
        / Qualifying surviving spouse, Married filing separately, Head of
        household), from the 2024 Instructions for Form 1040
      url: "https://www.irs.gov/pub/irs-prior/i1040tt--2024.pdf"
    applies_at_or_above: 100000

  # Rev. Proc. 2023-34, Section 3.15: base amounts under section 63(c)(2);
  # the additional standard deduction for the aged or the blind is $1,550,
  # increased to $1,950 if the individual is also unmarried and not a
  # surviving spouse. One additional amount per condition per person.
  standard_deduction:
    citation:
      source: "Rev. Proc. 2023-34, Section 3.15 (Standard Deduction)"
      url: "https://www.irs.gov/pub/irs-drop/rp-23-34.pdf"
    amounts:
      single: 14600
      married_filing_jointly: 29200
      married_filing_separately: 14600
      head_of_household: 21900
    additional_aged_or_blind:
      married: 1550
      unmarried: 1950

  # Schedule SE (Form 1040) 2024, Part I. Line 7 social security wage base
  # for 2024 is $168,600.
  se_tax:
    citation:
      source: "Schedule SE (Form 1040) 2024, Part I, lines 4a-13"
      url: "https://www.irs.gov/pub/irs-prior/f1040sse--2024.pdf"
    net_earnings_factor: 0.9235
    ss_rate: 0.124
    medicare_rate: 0.029
    ss_wage_base: 168600
    minimum_net_earnings: 400

  # High-income surtaxes (Schedule 2 lines 11/12). Both are STATUTORY amounts,
  # unchanged since 2013 and not inflation-indexed, so the same values apply to
  # every supported year. Qualifying surviving spouse is explicit in both maps
  # because the two forms bucket it differently (8959: $200,000 with single/HoH;
  # 8960: $250,000 with MFJ).
  additional_medicare_tax:
    citation:
      source: "IRS Topic No. 560, Additional Medicare Tax (Form 8959): 0.9% of Medicare wages and self-employment income above the filing-status threshold; thresholds statutory under IRC section 3101(b)(2), not indexed"
      url: "https://www.irs.gov/taxtopics/tc560"
    rate: 0.009
    thresholds:
      married_filing_jointly: 250000
      married_filing_separately: 125000
      single: 200000
      head_of_household: 200000
      qualifying_surviving_spouse: 200000
  niit:
    citation:
      source: "IRS Topic No. 559, Net Investment Income Tax (Form 8960): 3.8% of the lesser of net investment income or MAGI above the filing-status threshold; thresholds statutory under IRC section 1411, not indexed"
      url: "https://www.irs.gov/taxtopics/tc559"
    rate: 0.038
    thresholds:
      married_filing_jointly: 250000
      married_filing_separately: 125000
      single: 200000
      head_of_household: 200000
      qualifying_surviving_spouse: 250000

  # Maximum capital gains rate breakpoints under IRC section 1(h), indexed
  # separately under section 1(j)(5): TAXABLE-INCOME ceilings for the 0% and
  # 15% rates on adjusted net capital gain / qualified dividends (20% above
  # the 15% ceiling), with ordinary income stacked first — the Qualified
  # Dividends and Capital Gain Tax Worksheet line 6 / line 13 amounts. NOT
  # equal to the ordinary bracket boundaries; never derive them from the rate
  # schedules. MFS is exactly half of MFJ; a qualifying surviving spouse uses
  # the MFJ amounts (the Rev. Proc. groups surviving spouses with joint returns).
  capital_gains_brackets:
    citation:
      source: "Rev. Proc. 2023-34, Section 3.03 (Maximum Capital Gains Rate)"
      url: "https://www.irs.gov/pub/irs-drop/rp-23-34.pdf"
    max_zero_rate_amount:
      single: 47025
      married_filing_jointly: 94050
      married_filing_separately: 47025
      head_of_household: 63000
      qualifying_surviving_spouse: 94050
    max_15_percent_rate_amount:
      single: 518900
      married_filing_jointly: 583750
      married_filing_separately: 291850
      head_of_household: 551350
      qualifying_surviving_spouse: 583750

  # Social Security Benefits Worksheet parameters (Form 1040 line 6b; line 5b
  # in 2019). Statutory under IRC section 86(c) and never indexed — identical
  # in every year 2019-2024. MFS splits by BEHAVIOR, not just status: lived
  # apart from the spouse ALL year -> the single thresholds (write "D" next to
  # the benefits line on paper returns); lived with the spouse at ANY time ->
  # both tiers are $0 (mfs_living_with_spouse_base) and taxable benefits =
  # min(0.85 x provisional income, 0.85 x benefits). The published worksheet
  # prints the second tier as the line-10 gap ($9,000, or $12,000 for MFJ);
  # the explicit IRC 86(c)(2) adjusted base amounts stored here are
  # arithmetically identical.
  taxable_social_security:
    citation:
      source: "2024 Instructions for Form 1040, Social Security Benefits Worksheet (lines 6a/6b); IRC section 86(c)"
      url: "https://www.irs.gov/pub/irs-prior/i1040gi--2024.pdf"
    base_amount:
      single: 25000
      married_filing_jointly: 32000
      head_of_household: 25000
      qualifying_surviving_spouse: 25000
      married_filing_separately_lived_apart_all_year: 25000
    adjusted_base_amount:
      single: 34000
      married_filing_jointly: 44000
      head_of_household: 34000
      qualifying_surviving_spouse: 34000
      married_filing_separately_lived_apart_all_year: 34000
    mfs_living_with_spouse_base: 0
    inclusion_rate_tier1: 0.50
    inclusion_rate_tier2: 0.85
    max_taxable_share_of_benefits: 0.85

  # Excess social security / tier 1 RRTA withholding credit parameters
  # (Schedule 3 line 11).
  # The cap is PER PERSON: each spouse's box-4 withholding is compared to the
  # max separately, never combined. The credit exists only when MULTIPLE
  # employers together over-withheld; a single employer's excess must be
  # adjusted by that employer (Form 843 if it refuses) and is never claimable
  # on the return. max_withholding = rate x wage base, exact to the cent.
  employee_social_security:
    citation:
      source: "2024 Instructions for Form 1040, Schedule 3 line 11 (Excess Social Security and Tier 1 RRTA Tax Withheld); Pub 15 (2024), social security rate and wage base limit"
      url: "https://www.irs.gov/pub/irs-prior/i1040gi--2024.pdf"
    rate: 0.062
    ss_wage_base: 168600
    max_withholding: 10453.20

  # Section 221 student-loan-interest deduction (Schedule 1). The $2,500 cap
  # is statutory (IRC 221(b)(1)), not indexed. married_filing_separately is
  # deliberately ABSENT: MFS may not take the deduction at all (IRC 221(e)(2))
  # — a missing status means not-allowed. Reduction = tentative deduction
  # (min(cap, interest paid)) x (MAGI - start) / (end - start); the span is
  # $15,000 ($30,000 MFJ) in every supported year.
  student_loan_interest:
    citation:
      source: "Rev. Proc. 2023-34, Section 3.30 (Interest on Education Loans)"
      url: "https://www.irs.gov/pub/irs-drop/rp-23-34.pdf"
    max_deduction: 2500
    phaseout:
      single: { start: 80000, end: 95000 }
      head_of_household: { start: 80000, end: 95000 }
      qualifying_surviving_spouse: { start: 80000, end: 95000 }
      married_filing_jointly: { start: 165000, end: 195000 }

  # Form 8863 education credits. AOTC: 100% of the first $2,000 of qualified
  # expenses PER STUDENT plus 25% of the next $2,000 (max $2,500 per student),
  # 40% refundable unless the Form 8863 line 7 under-age-24 exception applies;
  # its phaseout is statutory (IRC 25A(i)(4)) and identical in all years.
  # LLC: 20% of up to $10,000 of expenses PER RETURN, nonrefundable. MFS may
  # claim NEITHER credit (rule — hence no MFS keys). "other" = single /
  # head_of_household / qualifying_surviving_spouse.
  education_credits:
    citation:
      source: "2024 Instructions for Form 8863 (Education Credits)"
      url: "https://www.irs.gov/pub/irs-prior/i8863--2024.pdf"
    aotc:
      per_student_cap: 2500
      first_dollar_cap: 2000
      second_rate: 0.25
      refundable_fraction: 0.40
      phaseout:
        married_filing_jointly: { start: 160000, end: 180000 }
        other: { start: 80000, end: 90000 }
    llc:
      per_return_expense_cap: 10000
      rate: 0.20
      phaseout:
        married_filing_jointly: { start: 160000, end: 180000 }
        other: { start: 80000, end: 90000 }

  # Premium Tax Credit (Form 8962) — the ARPA 0%-8.5% applicable percentage
  # table, extended to taxable years 2023-2025 by IRA section 12001(a) and
  # expiring after TY2025 (never extrapolate forward). CITATION WARNING: the
  # pre-IRA indexed table printed in Rev. Proc. 2022-34 Section 2.01
  # (1.92%-9.12%) is INOPERATIVE for 2023 — never transcribe it; the extension
  # is confirmed in Rev. Proc. 2023-29, footnote 1
  # (https://www.irs.gov/pub/irs-drop/rp-23-29.pdf).
  # Mechanics (Worksheet 2 + Table 2): line 5 = household income / FPL x 100,
  # TRUNCATED to an integer (3.997 -> 399, never rounded; enter literally 401
  # when over 400%); the applicable figure equals linear interpolation within
  # the band rounded HALF-UP to 4 decimals (349 -> 0.0723, 399 -> 0.0848);
  # 0.0850 flat from 400% up — no eligibility cliff, but the repayment
  # LIMITATION vanishes at 400% (full excess APTC is repaid). Initial/final
  # are stored as DECIMAL fractions (the Rev. Proc. prints percent form).
  ptc:
    citation:
      source: "2024 Instructions for Form 8962 (Table 2, Worksheet 2, Tables 1-1 to 1-3, Table 5); Rev. Proc. 2023-29, Section 2.01 (2024 Applicable Percentage Table)"
      url: "https://www.irs.gov/pub/irs-prior/i8962--2024.pdf"
    applicable_percentage_table:
      - { fpl_pct_at_least: 0, fpl_pct_less_than: 150, initial: 0.00, final: 0.00 }
      - { fpl_pct_at_least: 150, fpl_pct_less_than: 200, initial: 0.00, final: 0.02 }
      - { fpl_pct_at_least: 200, fpl_pct_less_than: 250, initial: 0.02, final: 0.04 }
      - { fpl_pct_at_least: 250, fpl_pct_less_than: 300, initial: 0.04, final: 0.06 }
      - { fpl_pct_at_least: 300, fpl_pct_less_than: 400, initial: 0.06, final: 0.085 }
      - { fpl_pct_at_least: 400, fpl_pct_less_than: null, initial: 0.085, final: 0.085 }
    federal_poverty_line:
      guidelines_year: 2023   # Form 8962 line 4: for 2024, the 2023 federal poverty lines are used
      contiguous_48_and_dc:
        household_size: { 1: 14580, 2: 19720, 3: 24860, 4: 30000, 5: 35140, 6: 40280, 7: 45420, 8: 50560 }
        per_additional_person: 5140
      alaska:
        household_size: { 1: 18210, 2: 24640, 3: 31070, 4: 37500, 5: 43930, 6: 50360, 7: 56790, 8: 63220 }
        per_additional_person: 6430
      hawaii:
        household_size: { 1: 16770, 2: 22680, 3: 28590, 4: 34500, 5: 40410, 6: 46320, 7: 52230, 8: 58140 }
        per_additional_person: 5910
    # Table 5 repayment limitation, keyed by line 5 (integer FPL%): "Single"
    # vs every other filing status (MFJ, MFS, HoH and QSS all use the higher
    # column). Last row = 400% or more: NO limitation, line 28 left blank.
    repayment_limitation:
      - { fpl_band_lt: 200, single: 375, other: 750 }
      - { fpl_band_lt: 300, single: 950, other: 1900 }
      - { fpl_band_lt: 400, single: 1575, other: 3150 }
      - { fpl_band_lt: null, single: null, other: null }
    no_400_pct_cliff: true

# Pub 501 (2024) Table 1 (Filing Requirements Chart for Most Taxpayers): the
# gross-income level at or above which a return is required, by status and age.
# Non-elderly amounts equal that status's standard deduction; each 65+ person
# adds the additional standard deduction ($1,950 unmarried / $1,550 married).
# MFS is the exception: $5 regardless of age.
filing_thresholds:
  citation:
    source: "IRS Publication 501 (2024), Table 1 (Filing Requirements Chart for Most Taxpayers), page 2"
    url: "https://www.irs.gov/pub/irs-prior/p501--2024.pdf"
  amounts:
    single: { under_65: 14600, age_65_or_older: 16550 }
    married_filing_jointly: { both_under_65: 29200, one_spouse_65_or_older: 30750, both_spouses_65_or_older: 32300 }
    married_filing_separately: { any_age: 5 }
    head_of_household: { under_65: 21900, age_65_or_older: 23850 }
    qualifying_surviving_spouse: { under_65: 29200, age_65_or_older: 30750 }

# Common credits with their 2024 parameters and eligibility predicates.
credits:
  citation:
    source: "2024 Instructions for Schedule 8812 (CTC/ACTC/ODC); Rev. Proc. 2023-34 Section 3.06 (EITC)"
    url: "https://www.irs.gov/pub/irs-prior/i1040s8--2024.pdf"
  child_tax_credit:
    citation:
      source: "Schedule 8812 (Form 1040) 2024 and its Instructions ('What's New', maximum ACTC $1,700); Rev. Proc. 2023-34 Section 3.05"
      url: "https://www.irs.gov/pub/irs-prior/f1040s8--2024.pdf"
    per_qualifying_child: 2000
    additional_ctc_refundable_cap_per_child: 1700   # ACTC cap per child for 2024 (Schedule 8812 line 18b; Rev. Proc. 2023-34 Section 3.05)
    credit_for_other_dependents: 500
    qualifying_child_age_test: "under age 17 at the end of 2024"
    magi_phaseout_threshold:
      married_filing_jointly: 400000
      single: 200000
      married_filing_separately: 200000
      head_of_household: 200000
      qualifying_surviving_spouse: 200000
    phaseout_step: "reduced $50 for each $1,000 (or fraction) of MAGI above the threshold"
  earned_income_tax_credit:
    citation:
      source: "Rev. Proc. 2023-34, Section 3.06 (2024 Earned Income Credit)"
      url: "https://www.irs.gov/pub/irs-drop/rp-23-34.pdf"
    investment_income_limit: 11600
    # keyed by number of qualifying children: 0, 1, 2, 3+ (3+ shares the 2-child earned-income amount)
    by_qualifying_children:
      "0": { earned_income_amount: 8260, max_credit: 632, phaseout_begins_other: 10330, phaseout_begins_mfj: 17250, phaseout_complete_other: 18591, phaseout_complete_mfj: 25511 }
      "1": { earned_income_amount: 12390, max_credit: 4213, phaseout_begins_other: 22720, phaseout_begins_mfj: 29640, phaseout_complete_other: 49084, phaseout_complete_mfj: 56004 }
      "2": { earned_income_amount: 17400, max_credit: 6960, phaseout_begins_other: 22720, phaseout_begins_mfj: 29640, phaseout_complete_other: 55768, phaseout_complete_mfj: 62688 }
      "3+": { earned_income_amount: 17400, max_credit: 7830, phaseout_begins_other: 22720, phaseout_begins_mfj: 29640, phaseout_complete_other: 59899, phaseout_complete_mfj: 66819 }

