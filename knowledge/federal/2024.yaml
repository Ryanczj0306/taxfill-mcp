deadlines:
  # Primary citation = the plain-1040 authority; 1040-NR items cite the 1040-NR
  # booklet via citation_1040nr (file_and_pay/filing_summary pick by form family).
  citation:
    source: 2024 Instructions for Form 1040 ("Amount You Owe"/installment text, April 15, 2025); IRC 6511(a)
    url: https://www.irs.gov/pub/irs-prior/i1040gi--2024.pdf
  citation_1040nr:
    source: 2024 Instructions for Form 1040-NR ("Due date of return"/"When To File"); IRC 6511(a)
    url: https://www.irs.gov/pub/irs-prior/i1040nr--2024.pdf
  filing_due_date: '2025-04-15'
  refund_statute_of_limitations:
    authority: IRC 6511(a)
    years_from_filing: 3
    years_from_payment: 2
    note: Claim a refund within the later of 3 years from the time the return was filed or 2 years from
      the time the tax was paid; a return filed before the due date is treated as filed on the due date
      (IRC 6511(b)(2)/6513(a)).
  postponement_note: No postponement applies to tax year 2024. April 15, 2025 is a Tuesday and not a weekend
    or DC/federal holiday, so the statutory due date stands. (The COVID-era postponements affected only
    TY2019 returns, moved 2020-04-15 -> 2020-07-15, and TY2020 returns, moved 2021-04-15 -> 2021-05-17;
    neither applies here.)
  nonwage_1040nr_due_date: '2025-06-16'
