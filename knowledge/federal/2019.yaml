deadlines:
  # Primary citation = the plain-1040 authority; 1040-NR items cite the 1040-NR
  # booklet via citation_1040nr (file_and_pay/filing_summary pick by form family).
  citation:
    source: 2019 Instructions for Form 1040 (and 1040-SR), "Amount You Owe" (original due date April 15,
      2020), page 58; IRS "Tax Day now July 15" (IR-2020-58) and Notice 2020-18 (COVID-19 postponement
      to July 15, 2020); IRC 6511(a)
    url: https://www.irs.gov/newsroom/tax-day-now-july-15-treasury-irs-extend-filing-deadline-and-federal-tax-payments-regardless-of-amount-owed
  citation_1040nr:
    source: 2019 Instructions for Form 1040-NR, "When and Where Should You File?" (original due date April
      15, 2020); IRS "Tax Day now July 15" (IR-2020-58) and Notice 2020-18 (COVID-19 postponement to July
      15, 2020); IRC 6511(a)
    url: https://www.irs.gov/pub/irs-prior/i1040nr--2019.pdf
  filing_due_date: '2020-07-15'
  refund_statute_of_limitations:
    authority: IRC 6511(a)
    years_from_filing: 3
    years_from_payment: 2
    note: Claim a refund within the later of 3 years from the date the return was filed or 2 years from
      the date the tax was paid; a return filed before the due date is treated as filed on the due date.
      For 2019 (and 2020) returns, because the filing deadline was postponed to July 15, 2020, Notice
      2023-21 disregards the period from April 15, 2020 through July 15, 2020 in determining the IRC 6511(b)(2)(A)
      lookback period, so withholding/estimated payments treated as paid on April 15, 2020 remain within
      the lookback for timely claims filed by the postponed three-year date.
  postponement_note: The 2019 Form 1040 instructions state the original due date of April 15, 2020. Under
    Notice 2020-18 (announced via IR-2020-58, March 21, 2020), the Treasury and IRS automatically postponed
    the federal income tax filing AND payment deadline for 2019 returns from April 15, 2020 to July 15,
    2020 due to the COVID-19 emergency; no Form 4868/7004 was required and the relief applied to all taxpayers
    regardless of amount owed.
