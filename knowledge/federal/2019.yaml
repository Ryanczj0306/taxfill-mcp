# Federal knowledge pack — tax year 2019 (docs/DEV_PLAN.md sections 3, 7, 10).
#
# Tax math lives here as DATA with citations, never hardcoded in engine code
# (the no-LLM-arithmetic rule, dev plan section 10). Every number in this file
# was transcribed from the official IRS document named in its block's
# citation (irs.gov only; see knowledge/sources.yaml). Mirrors the schema of
# knowledge/federal/2023.yaml exactly. Do NOT edit a number without
# re-verifying it against that source.

jurisdiction: federal
tax_year: 2019

tax:
  # Section 1(j)(2) rate schedules for 2019, exactly as published in
  # Rev. Proc. 2018-57, Section 3.01 (Tables 1-4):
  #   Table 1: Married Individuals Filing Joint Returns and Surviving Spouses
  #   Table 2: Heads of Households
  #   Table 3: Unmarried Individuals (other than Surviving Spouses and HoH)
  #   Table 4: Married Individuals Filing Separate Returns
  rate_schedules:
    citation:
      source: "Rev. Proc. 2018-57, Section 3.01 (2019 tax rate tables), Tables 1-4"
      url: "https://www.irs.gov/pub/irs-drop/rp-18-57.pdf"
    schedules:
      single:
        - { over: 0, but_not_over: 9700, rate: 0.10 }
        - { over: 9700, but_not_over: 39475, rate: 0.12 }
        - { over: 39475, but_not_over: 84200, rate: 0.22 }
        - { over: 84200, but_not_over: 160725, rate: 0.24 }
        - { over: 160725, but_not_over: 204100, rate: 0.32 }
        - { over: 204100, but_not_over: 510300, rate: 0.35 }
        - { over: 510300, but_not_over: null, rate: 0.37 }
      married_filing_jointly:
        - { over: 0, but_not_over: 19400, rate: 0.10 }
        - { over: 19400, but_not_over: 78950, rate: 0.12 }
        - { over: 78950, but_not_over: 168400, rate: 0.22 }
        - { over: 168400, but_not_over: 321450, rate: 0.24 }
        - { over: 321450, but_not_over: 408200, rate: 0.32 }
        - { over: 408200, but_not_over: 612350, rate: 0.35 }
        - { over: 612350, but_not_over: null, rate: 0.37 }
      married_filing_separately:
        - { over: 0, but_not_over: 9700, rate: 0.10 }
        - { over: 9700, but_not_over: 39475, rate: 0.12 }
        - { over: 39475, but_not_over: 84200, rate: 0.22 }
        - { over: 84200, but_not_over: 160725, rate: 0.24 }
        - { over: 160725, but_not_over: 204100, rate: 0.32 }
        - { over: 204100, but_not_over: 306175, rate: 0.35 }
        - { over: 306175, but_not_over: null, rate: 0.37 }
      head_of_household:
        - { over: 0, but_not_over: 13850, rate: 0.10 }
        - { over: 13850, but_not_over: 52850, rate: 0.12 }
        - { over: 52850, but_not_over: 84200, rate: 0.22 }
        - { over: 84200, but_not_over: 160700, rate: 0.24 }
        - { over: 160700, but_not_over: 204100, rate: 0.32 }
        - { over: 204100, but_not_over: 510300, rate: 0.35 }
        - { over: 510300, but_not_over: null, rate: 0.37 }

  # The published 2019 Tax Table — mandatory for the ORDINARY line 12a/16
  # computation when taxable income is below $100,000. Scope caution (same as
  # 2023.yaml): returns with qualified dividends or capital gains (Qualified
  # Dividends and Capital Gain Tax Worksheet / Schedule D Tax Worksheet),
  # Form 8615, or the Foreign Earned Income Tax Worksheet compute the tax from
  # their own worksheet even below $100,000 — those are OUT OF SCOPE for
  # calc.tax_from_taxable_income; never apply the table to preferential-rate
  # income. Row structure is stable across years: [0,5) tax 0; [5,15),[15,25)
  # $10-wide; [25,3000) $25-wide; [3000,100000) $50-wide; row tax = rate
  # schedule at the row midpoint rounded half_up.
  tax_table:
    citation:
      source: >-
        2019 Tax Table, "1040 and 1040-SR TAX AND EARNED INCOME CREDIT
        TABLES" (Cat. No. 24327A), from the 2019 Instructions for Form 1040
      url: "https://www.irs.gov/pub/irs-prior/i1040tt--2019.pdf"
    applies_below: 100000
    rounding: half_up
    row_bands:
      - { at_least: 0, below: 5, row_width: 5 }
      - { at_least: 5, below: 25, row_width: 10 }
      - { at_least: 25, below: 3000, row_width: 25 }
      - { at_least: 3000, below: 100000, row_width: 50 }

  tax_computation_worksheet:
    citation:
      source: >-
        2019 Tax Computation Worksheet—Line 12a (Single, Married filing
        jointly / Qualifying widow(er), Married filing separately, Head of
        household), from the 2019 Instructions for Form 1040
      url: "https://www.irs.gov/pub/irs-prior/i1040tt--2019.pdf"
    applies_at_or_above: 100000

  # Rev. Proc. 2018-57, Section 3.16: base amounts under section 63(c)(2);
  # the additional standard deduction for the aged or the blind is $1,300,
  # increased to $1,650 if the individual is also unmarried and not a
  # surviving spouse. One additional amount per condition per person.
  standard_deduction:
    citation:
      source: "Rev. Proc. 2018-57, Section 3.16 (Standard Deduction)"
      url: "https://www.irs.gov/pub/irs-drop/rp-18-57.pdf"
    amounts:
      single: 12200
      married_filing_jointly: 24400
      married_filing_separately: 12200
      head_of_household: 18350
    additional_aged_or_blind:
      married: 1300
      unmarried: 1650

  # Schedule SE (Form 1040) 2019, Part I. Line 7 social security wage base
  # for 2019 is $132,900.
  se_tax:
    citation:
      source: "Schedule SE (Form 1040) 2019, Part I, lines 4a-13"
      url: "https://www.irs.gov/pub/irs-prior/f1040sse--2019.pdf"
    net_earnings_factor: 0.9235
    ss_rate: 0.124
    medicare_rate: 0.029
    ss_wage_base: 132900
    minimum_net_earnings: 400

  # High-income surtaxes (Schedule 2 lines 11/12). Both are STATUTORY amounts,
  # unchanged since 2013 and not inflation-indexed, so the same values apply to
  # every supported year. Qualifying surviving spouse is explicit in both maps
  # because the two forms bucket it differently (8959: $200,000 with single/HoH;
  # 8960: $250,000 with MFJ).
  additional_medicare_tax:
    citation:
      source: "IRS Topic No. 560, Additional Medicare Tax (Form 8959): 0.9% of Medicare wages and self-employment income above the filing-status threshold; thresholds statutory under IRC section 3101(b)(2), not indexed"
      url: "https://www.irs.gov/taxtopics/tc560"
    rate: 0.009
    thresholds:
      married_filing_jointly: 250000
      married_filing_separately: 125000
      single: 200000
      head_of_household: 200000
      qualifying_surviving_spouse: 200000
  niit:
    citation:
      source: "IRS Topic No. 559, Net Investment Income Tax (Form 8960): 3.8% of the lesser of net investment income or MAGI above the filing-status threshold; thresholds statutory under IRC section 1411, not indexed"
      url: "https://www.irs.gov/taxtopics/tc559"
    rate: 0.038
    thresholds:
      married_filing_jointly: 250000
      married_filing_separately: 125000
      single: 200000
      head_of_household: 200000
      qualifying_surviving_spouse: 250000

  # Maximum capital gains rate breakpoints under IRC section 1(h), indexed
  # separately under section 1(j)(5): TAXABLE-INCOME ceilings for the 0% and
  # 15% rates on adjusted net capital gain / qualified dividends (20% above
  # the 15% ceiling), with ordinary income stacked first — the Qualified
  # Dividends and Capital Gain Tax Worksheet line 6 / line 13 amounts. NOT
  # equal to the ordinary bracket boundaries; never derive them from the rate
  # schedules. MFS is exactly half of MFJ; a qualifying surviving spouse uses
  # the MFJ amounts (the Rev. Proc. groups surviving spouses with joint returns).
  # Rev. Proc. 2018-57 prints the MFS amounts only as one-half of the joint
  # amounts; both were confirmed verbatim in the 2019 Schedule D Tax Worksheet,
  # lines 15 and 26 (https://www.irs.gov/pub/irs-prior/i1040sd--2019.pdf).
  capital_gains_brackets:
    citation:
      source: "Rev. Proc. 2018-57, Section 3.03 (Maximum Capital Gains Rate)"
      url: "https://www.irs.gov/pub/irs-drop/rp-18-57.pdf"
    max_zero_rate_amount:
      single: 39375
      married_filing_jointly: 78750
      married_filing_separately: 39375
      head_of_household: 52750
      qualifying_surviving_spouse: 78750
    max_15_percent_rate_amount:
      single: 434550
      married_filing_jointly: 488850
      married_filing_separately: 244425
      head_of_household: 461700
      qualifying_surviving_spouse: 488850

  # Social Security Benefits Worksheet parameters (Form 1040 line 6b; line 5b
  # in 2019). Statutory under IRC section 86(c) and never indexed — identical
  # in every year 2019-2024. MFS splits by BEHAVIOR, not just status: lived
  # apart from the spouse ALL year -> the single thresholds (write "D" next to
  # the benefits line on paper returns); lived with the spouse at ANY time ->
  # both tiers are $0 (mfs_living_with_spouse_base) and taxable benefits =
  # min(0.85 x provisional income, 0.85 x benefits). The published worksheet
  # prints the second tier as the line-10 gap ($9,000, or $12,000 for MFJ);
  # the explicit IRC 86(c)(2) adjusted base amounts stored here are
  # arithmetically identical.
  taxable_social_security:
    citation:
      source: "2019 Instructions for Form 1040, Social Security Benefits Worksheet (lines 5a/5b, page 28); IRC section 86(c)"
      url: "https://www.irs.gov/pub/irs-prior/i1040gi--2019.pdf"
    base_amount:
      single: 25000
      married_filing_jointly: 32000
      head_of_household: 25000
      qualifying_surviving_spouse: 25000
      married_filing_separately_lived_apart_all_year: 25000
    adjusted_base_amount:
      single: 34000
      married_filing_jointly: 44000
      head_of_household: 34000
      qualifying_surviving_spouse: 34000
      married_filing_separately_lived_apart_all_year: 34000
    mfs_living_with_spouse_base: 0
    inclusion_rate_tier1: 0.50
    inclusion_rate_tier2: 0.85
    max_taxable_share_of_benefits: 0.85

  # Excess social security / tier 1 RRTA withholding credit parameters
  # (Schedule 3 line 11).
  # The cap is PER PERSON: each spouse's box-4 withholding is compared to the
  # max separately, never combined. The credit exists only when MULTIPLE
  # employers together over-withheld; a single employer's excess must be
  # adjusted by that employer (Form 843 if it refuses) and is never claimable
  # on the return. max_withholding = rate x wage base, exact to the cent.
  employee_social_security:
    citation:
      source: "2019 Instructions for Form 1040, Schedule 3 line 11 (Excess Social Security and Tier 1 RRTA Tax Withheld); Pub 15 (2019), social security rate and wage base limit"
      url: "https://www.irs.gov/pub/irs-prior/i1040gi--2019.pdf"
    rate: 0.062
    ss_wage_base: 132900
    max_withholding: 8239.80

  # Section 221 student-loan-interest deduction (Schedule 1). The $2,500 cap
  # is statutory (IRC 221(b)(1)), not indexed. married_filing_separately is
  # deliberately ABSENT: MFS may not take the deduction at all (IRC 221(e)(2))
  # — a missing status means not-allowed. Reduction = tentative deduction
  # (min(cap, interest paid)) x (MAGI - start) / (end - start); the span is
  # $15,000 ($30,000 MFJ) in every supported year.
  student_loan_interest:
    citation:
      source: "Rev. Proc. 2018-57, Section 3.30 (Interest on Education Loans)"
      url: "https://www.irs.gov/pub/irs-drop/rp-18-57.pdf"
    max_deduction: 2500
    phaseout:
      single: { start: 70000, end: 85000 }
      head_of_household: { start: 70000, end: 85000 }
      qualifying_surviving_spouse: { start: 70000, end: 85000 }
      married_filing_jointly: { start: 140000, end: 170000 }

  # Form 8863 education credits. AOTC: 100% of the first $2,000 of qualified
  # expenses PER STUDENT plus 25% of the next $2,000 (max $2,500 per student),
  # 40% refundable unless the Form 8863 line 7 under-age-24 exception applies;
  # its phaseout is statutory (IRC 25A(i)(4)) and identical in all years.
  # LLC: 20% of up to $10,000 of expenses PER RETURN, nonrefundable. MFS may
  # claim NEITHER credit (rule — hence no MFS keys). "other" = single /
  # head_of_household / qualifying_surviving_spouse.
  # In 2019 the LLC phaseout was still indexed separately, BELOW the AOTC's
  # ranges (it was aligned to the AOTC only from 2021, by the CAA 2021).
  education_credits:
    citation:
      source: "2019 Instructions for Form 8863 (Education Credits); LLC phaseout also in Rev. Proc. 2018-57, Section 3.06"
      url: "https://www.irs.gov/pub/irs-prior/i8863--2019.pdf"
    aotc:
      per_student_cap: 2500
      first_dollar_cap: 2000
      second_rate: 0.25
      refundable_fraction: 0.40
      phaseout:
        married_filing_jointly: { start: 160000, end: 180000 }
        other: { start: 80000, end: 90000 }
    llc:
      per_return_expense_cap: 10000
      rate: 0.20
      phaseout:
        married_filing_jointly: { start: 116000, end: 136000 }
        other: { start: 58000, end: 68000 }

  # Form 2441 child & dependent care credit (IRC 21) — Phase G item G2. Every
  # figure transcribed from the year-pinned IRS PDFs named in the citation and
  # re-verified against IRC 21 (govinfo.gov, 2023 ed.). Caps are STATUTORY
  # (IRC 21(c)(1)/(2)), not inflation-indexed. Percentage slide (form line 8
  # table): 35% for AGI up to $15,000, minus 1 point per $2,000 OR FRACTION
  # THEREOF of AGI over $15,000, floor 20% for AGI over $43,000 (the table's
  # "43,000 — No limit = .20" row). Bracket semantics: 'Over X — but not over
  # Y', so AGI exactly at a boundary keeps the HIGHER rate (exactly $15,000 =
  # .35; exactly $43,000 = .21) — the engine rounds the excess UP to the next
  # $2,000. The caps are reduced by employer dependent care benefits actually
  # deducted or excluded (Form 2441 line 27 minus line 28 -> line 29), NOT by
  # the exclusion ceiling itself. Nonrefundable — limited by tax via the
  # line 10 Credit Limit Worksheet.
  dependent_care:
    citation:
      source: "2019 Instructions for Form 2441; percentage schedule from the 2019 Form 2441 line 8 table (f2441--2019 — the 2019 instructions do not restate it in prose); IRC 21(a)(2), (c), (d), (e)"
      url: "https://www.irs.gov/pub/irs-prior/i2441--2019.pdf"
    expense_cap:
      one_qualifying_person: 3000
      two_or_more_qualifying_persons: 6000
    phase_downs:
      # 1 point per $2,000 (or fraction) of AGI over $15,000; .21 at
      # 41,000-43,000, then "43,000 — No limit = .20".
      - { starts_above_agi: 15000, from_rate: 0.35, to_rate: 0.20 }
    refundable_if_us_abode: false
    earned_income_limitation: >-
      Form 2441 line 6: the credit base is the SMALLEST of the capped qualified
      expenses (line 3), your earned income (line 4), and — married filing
      jointly — your spouse's earned income (line 5; all others enter the
      line 4 amount).
    deemed_income_per_month:
      one_qualifying_person: 250
      two_or_more_qualifying_persons: 500
    student_spouse_rule: >-
      A spouse (or the taxpayer) who was a full-time student — enrolled
      full-time during some part of each of 5 calendar months of 2019 — or was
      physically or mentally incapable of self-care is DEEMED to have earned
      income of $250 per month ($500 with two or more qualifying persons) for
      each such month or part month (IRC 21(d)(2)); only one spouse may use the
      deemed amount for any given month, and a spouse who also worked that
      month uses the HIGHER of actual or deemed earned income.
    married_filing_separately_note: >-
      Generally, married persons must file a joint return to claim the credit.
      A married-filing-separately filer is treated as unmarried (and may claim
      the credit, checking the Form 2441 married-filing-separately checkbox)
      ONLY if ALL of: they lived apart from the spouse during the last 6 months
      of 2019; their home was the qualifying person's main home for more than
      half the year; and they paid more than half the cost of keeping up that
      home for the year.
    dependent_care_benefits:
      exclusion_max: 5000        # Form 2441 line 21
      exclusion_max_mfs: 2500

# Pub 501 (2019) Table 1 (Filing Requirements Chart for Most Taxpayers): the
# gross-income level at or above which a return is required, by status and age.
# Non-elderly amounts equal that status's standard deduction; each 65+ person
# adds the additional standard deduction ($1,650 unmarried / $1,300 married).
# MFS is the exception: $5 regardless of age.
filing_thresholds:
  citation:
    source: "IRS Publication 501 (2019), Table 1 (Filing Requirements Chart for Most Taxpayers), page 2"
    url: "https://www.irs.gov/pub/irs-prior/p501--2019.pdf"
  amounts:
    single: { under_65: 12200, age_65_or_older: 13850 }
    married_filing_jointly: { both_under_65: 24400, one_spouse_65_or_older: 25700, both_spouses_65_or_older: 27000 }
    married_filing_separately: { any_age: 5 }
    head_of_household: { under_65: 18350, age_65_or_older: 20000 }
    qualifying_surviving_spouse: { under_65: 24400, age_65_or_older: 25700 }

