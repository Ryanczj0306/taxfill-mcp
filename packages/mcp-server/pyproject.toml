[project]
name = "taxfill-mcp"
version = "0.1.0.dev0"
description = "MCP server exposing the TaxFill core engine. Stub package — the server itself is delivered in milestone M4. v0.1 in development — not yet published to PyPI."
requires-python = ">=3.11"
license = "MIT"
dependencies = [
    "taxfill-core",
]

[tool.uv.sources]
taxfill-core = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/taxfill_mcp"]
