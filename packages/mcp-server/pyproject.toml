[project]
name = "taxfill-mcp"
version = "0.1.0.dev0"
description = "MCP server exposing the TaxFill core engine over stdio (official mcp python-sdk). v0.1 in development — not yet published to PyPI."
requires-python = ">=3.11"
license = "MIT"
readme = "README.md"
dependencies = [
    "mcp>=1.2",
    # Pin to the matching core release so `uvx taxfill-mcp` never resolves a
    # mismatched taxfill-core from PyPI. Keep in sync with the version bump
    # (see docs/PUBLISHING.md).
    "taxfill-core==0.1.0.dev0",
]

[project.scripts]
taxfill-mcp = "taxfill_mcp.server:main"
taxfill = "taxfill_mcp.cli:main"

[tool.uv.sources]
taxfill-core = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/taxfill_mcp"]
