# Form 1040-ES (2023) -- Estimated Tax for Individuals.
#
# Provenance: blank downloaded from the official source_url below; pages 9 and 11
# were rendered and READ to confirm the printed title ("2023 Estimated Tax",
# "Form 1040-ES") and the four payment vouchers before pinning pdf_sha256
# (freshness protocol, dev plan section 7).
#
# WHAT THIS PACK FILLS: the four detachable **payment vouchers** -- the only part
# of Form 1040-ES that is actually filed (mailed with each quarterly check). Each
# voucher carries the same 14 fields (amount + your name/SSN + spouse name/SSN +
# address split). The 12-page PDF also contains the **2023 Estimated Tax Worksheet**
# (page 8) and the **Record of Estimated Tax Payments** (page 9, marked "Keep for
# Your Records") -- those are the taxpayer's PRIVATE computation/ledger, never
# mailed, so their ~70 widgets are intentionally NOT mapped (the engine's calc /
# estimate_refund own that math). The vouchers carry no signature block.
#
# Field map: introspected from this exact revision (root topmostSubform[0]).
# Vouchers 1-3 are on page 11 (printed top-to-bottom as 3, 2, 1); voucher 4 is
# on page 9 below the record table. State boxes are MaxLen-2, ZIP MaxLen-10,
# SSN boxes MaxLen-11 (fit a dashed 000-00-0000).
