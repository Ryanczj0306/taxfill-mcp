  - { line: "email", field: "Page2[0].f2_38[0]", type: text }
# Only arithmetic printed on the form face (tax-table lookups live in calc/
# knowledge packs, never here).
relations:
  - "1z == sum(1a..1h)"                          # "Add lines 1a through 1h"
  - "9 == 1z + 2b + 3b + 4b + 5b + 6b + 7 + 8"   # "Add lines 1z, 2b, 3b, 4b, 5b, 6b, 7, and 8"
  - "11 == 9 - 10"                               # "Subtract line 10 from line 9"
  - "14 == 12 + 13"                              # "Add lines 12 and 13"
  - "15 == max(0, 11 - 14)"                      # "Subtract line 14 from line 11. If zero or less, enter -0-"
  - "18 == 16 + 17"                              # "Add lines 16 and 17"
  - "21 == 19 + 20"                              # "Add lines 19 and 20"
  - "22 == max(0, 18 - 21)"                      # "Subtract line 21 from line 18. If zero or less, enter -0-"
  - "24 == 22 + 23"                              # "Add lines 22 and 23. This is your total tax"
  - "25d == sum(25a..25c)"                       # "Add lines 25a through 25c"
  - "32 == 27 + 28 + 29 + 31"                    # "Add lines 27, 28, 29, and 31"
  - "33 == 25d + 26 + 32"                        # "Add lines 25d, 26, and 32. These are your total payments"
  - "34 == max(0, 33 - 24)"                      # "If line 33 is more than line 24, subtract line 24 from line 33"
  - "37 == max(0, 24 - 33)"                      # "Subtract line 33 from line 24. This is the amount you owe"
cross_form:
  - "8 == sched_1.10"    # "Additional income from Schedule 1, line 10"
  - "10 == sched_1.26"   # "Adjustments to income from Schedule 1, line 26"
  - "17 == sched_2.3"    # "Amount from Schedule 2, line 3"
  - "20 == sched_3.8"    # "Amount from Schedule 3, line 8"
  - "23 == sched_2.21"   # "Other taxes ... from Schedule 2, line 21"
  - "31 == sched_3.15"   # "Amount from Schedule 3, line 15"
# The 1040 splits name (first/last) and address (street/city/...) into
# separate boxes, so only the SSN is a single-line identity anchor here;
# schedules cross-check their "name(s) shown on return" against intake.
identity_fields: [identifying_number]
signature: { page: 2 }
# State-dependent where-to-file — knowledge packs own it in M3 (per
# formpacks/CONVENTIONS.md the f1040 pack ships mailing: null).
mailing: null
