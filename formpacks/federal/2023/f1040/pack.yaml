  - { line: "13", field: "Page1[0].f1_57[0]", type: money }
  - { line: "14", field: "Page1[0].f1_58[0]", type: money }
  - { line: "15", field: "Page1[0].f1_59[0]", type: money }
  # --- tax and credits (page 2) ---
  # Line 16 "Check if any from Form(s)": three independent boxes + form no.
  - { line: "16.form_8814", field: "Page2[0].c2_1[0]", type: checkbox, on_state: "/1" }
  - { line: "16.form_4972", field: "Page2[0].c2_2[0]", type: checkbox, on_state: "/1" }
  - { line: "16.form_other", field: "Page2[0].c2_3[0]", type: checkbox, on_state: "/1" }
  - { line: "16.form_other_number", field: "Page2[0].f2_01[0]", type: text, maxlen: 8 }
  - { line: "16", field: "Page2[0].f2_02[0]", type: money }
  - { line: "17", field: "Page2[0].f2_03[0]", type: money }
  - { line: "18", field: "Page2[0].f2_04[0]", type: money }
  - { line: "19", field: "Page2[0].f2_05[0]", type: money }
