  - { line: "4b", field: "Page1[0].Line4a-11_ReadOrder[0].f1_46[0]", type: money }
  - { line: "5a", field: "Page1[0].Line4a-11_ReadOrder[0].f1_47[0]", type: money }
  - { line: "5b", field: "Page1[0].Line4a-11_ReadOrder[0].f1_48[0]", type: money }
  - { line: "6a", field: "Page1[0].Line4a-11_ReadOrder[0].f1_49[0]", type: money }
  - { line: "6b", field: "Page1[0].Line4a-11_ReadOrder[0].f1_50[0]", type: money }
  - { line: "6c", field: "Page1[0].Line4a-11_ReadOrder[0].c1_21[0]", type: checkbox, on_state: "/1" }
  - { line: "7.not_required", field: "Page1[0].Line4a-11_ReadOrder[0].c1_22[0]", type: checkbox, on_state: "/1" }
  - { line: "7", field: "Page1[0].Line4a-11_ReadOrder[0].f1_51[0]", type: money }
  - { line: "8", field: "Page1[0].Line4a-11_ReadOrder[0].f1_52[0]", type: money }
  - { line: "9", field: "Page1[0].Line4a-11_ReadOrder[0].f1_53[0]", type: money }
  - { line: "10", field: "Page1[0].Line4a-11_ReadOrder[0].f1_54[0]", type: money }
