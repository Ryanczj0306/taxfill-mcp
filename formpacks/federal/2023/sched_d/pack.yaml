# Schedule D (Form 1040), 2023 — Capital Gains and Losses.
#
# Authored via the taxfill pipeline: `taxfill introspect` (sentinel sweep) →
# vision-map workflow (every fillable widget filled with its own field name and
# read against the printed line label/column on the real form) → this map.
#
# Part I (Short-Term) and Part II (Long-Term) are each a 4-column table:
#   (d) Proceeds (sales price)  | (e) Cost (or other basis)
#   (g) Adjustments (from Form 8949 Part I/II, line 2, column (g))
#   (h) Gain or (loss) = (d) − (e) + (g)
# Column keys use the dotted convention (e.g. "1a.d","1a.e","1a.g","1a.h") on the
# multi-box lines (1a,1b,2,3 and 8a,8b,9,10). Single-box money lines (4–7,11–16,
# 18,19,21) use the bare line number. Yes/No checkbox pairs use ".yes"/".no".
#
# ALL 55 fillable widgets are mapped — Schedule D has NO pre-printed statutory
# constants, so nothing is intentionally left unmapped.
#
# Relations: only line 16 ("Combine lines 7 and 15") is declared — it is an
# unconditional equality whose operands (7, 15, 16) are all mapped. The per-row
# column equality (h) = (d) − (e) + (g) is NOT declared: the verify relation
# grammar resolves a line id as a single token and cannot reference dotted
# column keys, so those checks are left to the recompute engine + human review.
# The conditional/worksheet-driven subtotals (lines 7, 15, 18–21) are likewise
# left to recompute + review.
form: "Schedule D (Form 1040)"
jurisdiction: federal
tax_year: 2023
source_url: https://www.irs.gov/pub/irs-prior/f1040sd--2023.pdf
pdf_sha256: 3421941cbc675e004d38ff3045e865f82bb97a5db080c9630a34057f4165ec07
acroform_root: topmostSubform[0]
