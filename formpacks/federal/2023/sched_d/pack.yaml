    type: money
  - line: 10.d                       # Line 10 — totals for Form 8949 Box F checked; (d) Proceeds
    field: Page1[0].Table_PartII[0].Row10[0].f1_35[0]
    type: money
  - line: 10.e                       # 10 (e) Cost or other basis
    field: Page1[0].Table_PartII[0].Row10[0].f1_36[0]
    type: money
  - line: 10.g                       # 10 (g) Adjustments
