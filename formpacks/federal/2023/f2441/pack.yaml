# Form 2441 (2023) — Child and Dependent Care Expenses.
#
# Provenance: blank downloaded from the official source_url below; BOTH pages
# were rendered and READ to confirm the printed title ("Child and Dependent
# Care Expenses"), the printed year "2023" (page 1 header, "Form 2441 (2023)"
# footer on both pages), Attachment Sequence No. 21, and Cat. No. 11862M
# before pinning pdf_sha256 (freshness protocol, dev plan section 7).
#
# Field map: introspected from this exact revision (root topmostSubform[0]).
# ALL 75 widgets are mapped below (60 text/money + 15 checkboxes); checkbox
# on-states were dumped from the blank PDF's appearance states, never guessed:
#   c1_1[0]=/1 (box A), c1_2[0]=/1 (box B), PartI c1_3[0]=/1 (>3 providers),
#   c1_4/c1_5/c1_6 [0]=/1 Yes, [1]=/2 No (Part I column (d), rows 1-3),
#   c1_7[0]=/1 (>3 qualifying persons), c1_8/c1_9/c1_10 [0]=/1 (line 2
#   column (c), rows 1-3), c2_1[0]=/1 (line 22 No), c2_1[1]=/2 (line 22 Yes).
# The Yes/No positions of c1_4..c1_6 and c2_1 were confirmed by filling one
# member and READING the rendered page (never assumed from widget order).
#
# Attachment to Form 1040/1040-SR/1040-NR (Attachment Sequence No. 21): no
# signature block and no separate mailing address of its own.
#
# Line 8 is NOT a money line: the form prints "X ." before a 2-character box
# that carries only the DIGITS AFTER THE DECIMAL POINT of the lookup decimal
# (e.g. "27" for 0.27, from the printed line-7 bracket table). It is typed
# text so relation math never consumes it, and the whole-dollar money
# renderer can never silently round a "0.27" down to "0".
#
# Line 14 is printed inside parentheses "( ... )" — the box takes the POSITIVE
# forfeited/carried-over amount; the parentheses mean it is SUBTRACTED in the
# line 15 combine (encoded as 15 == 12 + 13 - 14).
#
# Relations deliberately NOT encoded (lookup / conditional / grammar limits):
#   - line 3: "Add the amounts in column (d) of line 2" is capped ("Don't
#     enter more than $3,000 ... or $6,000") and branches ("If you completed
#     Part III, enter the amount from line 31") — conditional, and the row
#     amounts are dotted line ids the relation grammar cannot reference.
#   - line 5: "If married filing jointly, enter your spouse's earned income
#     ...; all others, enter the amount from line 4" — filing-status branch;
#     "5 == 4" would false-FAIL every MFJ filer.
#   - line 8: the decimal amount is a LOOKUP from the printed line-7 bracket
#     table (and the box carries fraction digits, not dollars) — no relation.
#   - line 9a: "Multiply line 6 by the decimal amount on line 8" — line 8 is
#     the 2-digit fraction box above, which relation math cannot consume.
#   - lines 9b, 10, 13: instruction-worksheet amounts (Worksheet A, Credit
#     Limit Worksheet) or carryover amounts — instructions math, never
#     on-face.
#   - line 19: MFJ / MFS / all-others branch (same shape as line 5); omitted.
#   - line 21: "$5,000 ($2,500 if married filing separately ...)" — a
#     filing-status lookup, further capped by the dependent care plan.
#   - line 25: "If you checked 'No' on line 22, enter the smaller of line 20
#     or line 21. Otherwise, subtract line 24 from the smaller of line 20 or
#     line 21" — branches on the line 22 answer; either encoding false-FAILs
#     the other population.
#   - line 28: "Add lines 24 and 25" sits in the "To claim the ... credit,
#     complete lines 27 through 31" block — a Part III filer who does NOT
#     claim the credit legitimately leaves 27-31 blank while 24/25 are
#     nonzero, so "28 == 24 + 25" would false-FAIL them; omitted.
#   - line 30: re-derives line 2 column (d) excluding line 28 benefits —
#     conditional and built from dotted row ids; omitted.
#   - "3 == 31" (printed on line 31: "enter this amount on line 3") holds
#     only for Part III filers — every Part-I/II-only filer has 31 blank
#     while 3 is nonzero; omitted.
form: "2441"
jurisdiction: federal
tax_year: 2023
source_url: https://www.irs.gov/pub/irs-prior/f2441--2023.pdf
pdf_sha256: "b21920201d629a185ef445aea7606b1d2ab476d6326043c7329cfde7e9262340"
acroform_root: "topmostSubform[0]"

fields:
  # ---- header ----------------------------------------------------------------
  - { line: "name", field: "Page1[0].f1_1[0]", type: text }   # "Name(s) shown on return"
  # "Your social security number" — plain text box (/MaxLen 11, not a comb);
  # digits-only keeps cross-form identity values consistent with f1040/f1040nr.
  - { line: "identifying_number", field: "Page1[0].f1_2[0]", type: text, maxlen: 11, format: ssn_digits_only }
  # A: "married filing separately unless you meet the requirements ... If you
  # meet these requirements, check this box" — single optional box.
  - { line: "mfs_exception", field: "Page1[0].c1_1[0]", type: checkbox, on_state: "/1" }
  # B: "If you or your spouse was a student or was disabled during 2023 and
  # you're entering deemed income of $250 or $500 a month ... check this box".
  - { line: "student_or_disabled", field: "Page1[0].c1_2[0]", type: checkbox, on_state: "/1" }

  # ---- Part I: Persons or Organizations Who Provided the Care -----------------
  # "If you have more than three care providers, see the instructions and check
  # this box" — single optional box.
  - { line: "care_providers.more_than_three", field: "Page1[0].PartI[0].c1_3[0]", type: checkbox, on_state: "/1" }
  # Line 1 table, one row per provider: (a) name, (b) address on two writing
  # rows (street / city, state, ZIP), (c) SSN or EIN (digits only — either TIN
  # kind is all digits), (d) household-employee Yes/No, (e) amount paid.
  - { line: "care_provider_1.name", field: "Page1[0].PartITable[0].BodyRow1[0].f1_3[0]", type: text }
  - { line: "care_provider_1.address.street", field: "Page1[0].PartITable[0].BodyRow1[0].ColB[0].f1_4[0]", type: text }
  - { line: "care_provider_1.address.city_state_zip", field: "Page1[0].PartITable[0].BodyRow1[0].ColB[0].f1_5[0]", type: text }
  - { line: "care_provider_1.tin", field: "Page1[0].PartITable[0].BodyRow1[0].f1_6[0]", type: text, maxlen: 11, format: ssn_digits_only }
  - { line: "care_provider_1.household_employee.yes", field: "Page1[0].PartITable[0].BodyRow1[0].ColD[0].c1_4[0]", type: checkbox, on_state: "/1", group: care_provider_1_household_employee }
  - { line: "care_provider_1.household_employee.no", field: "Page1[0].PartITable[0].BodyRow1[0].ColD[0].c1_4[1]", type: checkbox, on_state: "/2", group: care_provider_1_household_employee }
  - { line: "care_provider_1.amount_paid", field: "Page1[0].PartITable[0].BodyRow1[0].f1_7[0]", type: money }
  - { line: "care_provider_2.name", field: "Page1[0].PartITable[0].BodyRow2[0].f1_8[0]", type: text }
  - { line: "care_provider_2.address.street", field: "Page1[0].PartITable[0].BodyRow2[0].ColB[0].f1_9[0]", type: text }
  - { line: "care_provider_2.address.city_state_zip", field: "Page1[0].PartITable[0].BodyRow2[0].ColB[0].f1_10[0]", type: text }
  - { line: "care_provider_2.tin", field: "Page1[0].PartITable[0].BodyRow2[0].f1_11[0]", type: text, maxlen: 11, format: ssn_digits_only }
  - { line: "care_provider_2.household_employee.yes", field: "Page1[0].PartITable[0].BodyRow2[0].ColD[0].c1_5[0]", type: checkbox, on_state: "/1", group: care_provider_2_household_employee }
  - { line: "care_provider_2.household_employee.no", field: "Page1[0].PartITable[0].BodyRow2[0].ColD[0].c1_5[1]", type: checkbox, on_state: "/2", group: care_provider_2_household_employee }
  - { line: "care_provider_2.amount_paid", field: "Page1[0].PartITable[0].BodyRow2[0].f1_12[0]", type: money }
  - { line: "care_provider_3.name", field: "Page1[0].PartITable[0].BodyRow3[0].f1_13[0]", type: text }
  - { line: "care_provider_3.address.street", field: "Page1[0].PartITable[0].BodyRow3[0].ColB[0].f1_14[0]", type: text }
  - { line: "care_provider_3.address.city_state_zip", field: "Page1[0].PartITable[0].BodyRow3[0].ColB[0].f1_15[0]", type: text }
  - { line: "care_provider_3.tin", field: "Page1[0].PartITable[0].BodyRow3[0].f1_16[0]", type: text, maxlen: 11, format: ssn_digits_only }
  - { line: "care_provider_3.household_employee.yes", field: "Page1[0].PartITable[0].BodyRow3[0].ColD[0].c1_6[0]", type: checkbox, on_state: "/1", group: care_provider_3_household_employee }
  - { line: "care_provider_3.household_employee.no", field: "Page1[0].PartITable[0].BodyRow3[0].ColD[0].c1_6[1]", type: checkbox, on_state: "/2", group: care_provider_3_household_employee }
  - { line: "care_provider_3.amount_paid", field: "Page1[0].PartITable[0].BodyRow3[0].f1_17[0]", type: money }

  # ---- Part II: Credit for Child and Dependent Care Expenses ------------------
  # Line 2: "If you have more than three qualifying persons, see the
  # instructions and check this box" — single optional box.
  - { line: "qualifying_persons.more_than_three", field: "Page1[0].c1_7[0]", type: checkbox, on_state: "/1" }
  # Line 2 table, one row per qualifying person: (a) name (First / Last boxes),
  # (b) SSN, (c) "Check here if the qualifying person was over age 12 and was
  # disabled" (single optional box per row), (d) qualified expenses.
  - { line: "qualifying_person_1.first_name", field: "Page1[0].Table_Line2[0].Row1[0].f1_18[0]", type: text }
  - { line: "qualifying_person_1.last_name", field: "Page1[0].Table_Line2[0].Row1[0].f1_19[0]", type: text }
  - { line: "qualifying_person_1.ssn", field: "Page1[0].Table_Line2[0].Row1[0].f1_20[0]", type: text, maxlen: 11, format: ssn_digits_only }
  - { line: "qualifying_person_1.disabled", field: "Page1[0].Table_Line2[0].Row1[0].c1_8[0]", type: checkbox, on_state: "/1" }
  - { line: "qualifying_person_1.expenses", field: "Page1[0].Table_Line2[0].Row1[0].f1_21[0]", type: money }
  - { line: "qualifying_person_2.first_name", field: "Page1[0].Table_Line2[0].Row2[0].f1_22[0]", type: text }
  - { line: "qualifying_person_2.last_name", field: "Page1[0].Table_Line2[0].Row2[0].f1_23[0]", type: text }
  - { line: "qualifying_person_2.ssn", field: "Page1[0].Table_Line2[0].Row2[0].f1_24[0]", type: text, maxlen: 11, format: ssn_digits_only }
  - { line: "qualifying_person_2.disabled", field: "Page1[0].Table_Line2[0].Row2[0].c1_9[0]", type: checkbox, on_state: "/1" }
  - { line: "qualifying_person_2.expenses", field: "Page1[0].Table_Line2[0].Row2[0].f1_25[0]", type: money }
  - { line: "qualifying_person_3.first_name", field: "Page1[0].Table_Line2[0].Row3[0].f1_26[0]", type: text }
  - { line: "qualifying_person_3.last_name", field: "Page1[0].Table_Line2[0].Row3[0].f1_27[0]", type: text }
  - { line: "qualifying_person_3.ssn", field: "Page1[0].Table_Line2[0].Row3[0].f1_28[0]", type: text, maxlen: 11, format: ssn_digits_only }
  - { line: "qualifying_person_3.disabled", field: "Page1[0].Table_Line2[0].Row3[0].c1_10[0]", type: checkbox, on_state: "/1" }
  - { line: "qualifying_person_3.expenses", field: "Page1[0].Table_Line2[0].Row3[0].f1_29[0]", type: money }
  - { line: "3", field: "Page1[0].f1_30[0]", type: money, maxlen: 50 }   # Add line 2 col (d); cap $3,000/$6,000; Part III filers: amount from line 31 (no relation — see header)
  - { line: "4", field: "Page1[0].f1_31[0]", type: money, maxlen: 50 }   # Your earned income (see instructions)
  - { line: "5", field: "Page1[0].f1_32[0]", type: money, maxlen: 50 }   # MFJ: spouse's earned income; all others: amount from line 4 (branch — no relation)
  - { line: "6", field: "Page1[0].f1_33[0]", type: money, maxlen: 50 }   # Smallest of line 3, 4, or 5
  - { line: "7", field: "Page1[0].f1_34[0]", type: money }               # Amount from Form 1040/1040-SR/1040-NR, line 11
  # Line 8: decimal amount for the line-7 bracket — the box after the printed
  # "X ." takes ONLY the two fraction digits (e.g. "27" for 0.27); a LOOKUP,
  # not money, no relation (see header).
  - { line: "8", field: "Page1[0].f1_35[0]", type: text, maxlen: 2 }
  - { line: "9a", field: "Page1[0].f1_36[0]", type: money, maxlen: 50 }  # Multiply line 6 by the line-8 decimal (line 8 is a fraction box — no relation)
  - { line: "9b", field: "Page1[0].f1_37[0]", type: money, maxlen: 50 }  # 2022 expenses paid in 2023: Worksheet A, line 13 (instructions worksheet — no relation)
  - { line: "9c", field: "Page1[0].f1_38[0]", type: money, maxlen: 50 }  # Add lines 9a and 9b
  - { line: "10", field: "Page1[0].f1_39[0]", type: money }              # Tax liability limit (Credit Limit Worksheet — no relation)
  - { line: "11", field: "Page1[0].f1_40[0]", type: money, maxlen: 50 }  # Credit: smaller of line 9c or 10 -> Schedule 3 (Form 1040), line 2

  # ---- Part III: Dependent Care Benefits (page 2) ------------------------------
  - { line: "12", field: "Page2[0].f2_1[0]", type: money, maxlen: 50 }   # Dependent care benefits received in 2023 (W-2 box 10; sole proprietorship/partnership DCAP)
  - { line: "13", field: "Page2[0].f2_2[0]", type: money, maxlen: 50 }   # Carried over from 2022 and used in 2023 during the grace period
  - { line: "14", field: "Page2[0].f2_3[0]", type: money }               # Forfeited or carried over to 2024 — printed in parentheses: SUBTRACTED on line 15
  - { line: "15", field: "Page2[0].f2_4[0]", type: money, maxlen: 50 }   # Combine lines 12 through 14
  - { line: "16", field: "Page2[0].Line16_ReadOrder[0].f2_5[0]", type: money, maxlen: 50 }   # Qualified expenses incurred in 2023
  - { line: "17", field: "Page2[0].f2_6[0]", type: money, maxlen: 50 }   # Smaller of line 15 or 16
  - { line: "18", field: "Page2[0].f2_7[0]", type: money, maxlen: 50 }   # Your earned income (see instructions)
  - { line: "19", field: "Page2[0].f2_8[0]", type: money, maxlen: 50 }   # MFJ: spouse's earned income; MFS: see instructions; all others: line 18 (branch — no relation)
  - { line: "20", field: "Page2[0].f2_9[0]", type: money, maxlen: 50 }   # Smallest of line 17, 18, or 19
  - { line: "21", field: "Page2[0].f2_10[0]", type: money, maxlen: 50 }  # $5,000 ($2,500 MFS ...), capped by the dependent care plan (lookup — no relation)
  # Line 22: "Is any amount on line 12 or 13 from your sole proprietorship or
  # partnership?" — No: enter -0-; Yes: enter the amount here.
  - { line: "22.no", field: "Page2[0].c2_1[0]", type: checkbox, on_state: "/1", group: line22 }
  - { line: "22.yes", field: "Page2[0].c2_1[1]", type: checkbox, on_state: "/2", group: line22 }
  - { line: "22", field: "Page2[0].f2_11[0]", type: money, maxlen: 50 }  # Line 22 amount (-0- when No; the sole proprietorship/partnership amount when Yes)
  - { line: "23", field: "Page2[0].f2_12[0]", type: money, maxlen: 50 }  # Subtract line 22 from line 15
  - { line: "24", field: "Page2[0].f2_13[0]", type: money, maxlen: 50 }  # Deductible benefits: smallest of line 20, 21, or 22 -> the appropriate line(s) of your return
  - { line: "25", field: "Page2[0].f2_14[0]", type: money, maxlen: 50 }  # Excluded benefits (branches on the line 22 answer — no relation, see header)
  - { line: "26", field: "Page2[0].f2_15[0]", type: money }              # Taxable benefits: line 23 - line 25; zero or less -> -0- -> Form 1040/1040-SR/1040-NR line 1e
  # "To claim the child and dependent care credit, complete lines 27 through 31."
  - { line: "27", field: "Page2[0].f2_16[0]", type: money, maxlen: 50 }  # $3,000 ($6,000 if two or more qualifying persons) (lookup — no relation)
  - { line: "28", field: "Page2[0].f2_17[0]", type: money, maxlen: 50 }  # Add lines 24 and 25 (claim-block only — no relation, see header)
  - { line: "29", field: "Page2[0].f2_18[0]", type: money, maxlen: 50 }  # Subtract line 28 from line 27; zero or less -> stop, no credit
  - { line: "30", field: "Page2[0].f2_19[0]", type: money, maxlen: 50 }  # Line 2 col (d) total excluding line 28 benefits (re-derivation — no relation)
  - { line: "31", field: "Page2[0].f2_20[0]", type: money, maxlen: 50 }  # Smaller of line 29 or 30 -> line 3 on page 1 (that copy is conditional — see header)

# Form-face math only — every printed add/subtract/smaller/smallest instruction
# that is unconditional under blank-means-zero (omissions and the reasons for
# them are listed in the header comment).
relations:
  - "6 == min(3, 4, 5)"          # "Enter the smallest of line 3, 4, or 5"
  - "9c == 9a + 9b"              # "Add lines 9a and 9b and enter the result"
  - "11 == min(9c, 10)"          # "Enter the smaller of line 9c or line 10"
  - "15 == 12 + 13 - 14"         # "Combine lines 12 through 14" (line 14 is printed in parentheses: subtracted)
  - "17 == min(15, 16)"          # "Enter the smaller of line 15 or 16"
  - "20 == min(17, 18, 19)"      # "Enter the smallest of line 17, 18, or 19"
  - "23 == 15 - 22"              # "Subtract line 22 from line 15"
  - "24 == min(20, 21, 22)"      # "Deductible benefits. Enter the smallest of line 20, 21, or 22"
  - "26 == max(0, 23 - 25)"      # "Taxable benefits. Subtract line 25 from line 23. If zero or less, enter -0-"
  - "29 == max(0, 27 - 28)"      # "Subtract line 28 from line 27. If zero or less, stop" (stopped filers leave 27-29 blank: 0 == 0)
  - "31 == min(29, 30)"          # "Enter the smaller of line 29 or 30"

# The form attaches to EITHER Form 1040/1040-SR or Form 1040-NR — a filing
# contains one parent, the other parent's rule is visibly SKIPPED (the
# sched_8812 dual-parent pattern).
cross_form:
  - "7 == f1040.11"              # "Enter the amount from Form 1040, 1040-SR, or 1040-NR, line 11"
  - "7 == f1040nr.11"
  - "11 == sched_3.2"            # "Enter ... on Schedule 3 (Form 1040), line 2" (Schedule 3 line 2 is 'Credit for child and dependent care expenses from Form 2441, line 11')
  - "26 == f1040.1e"             # "Also, enter this amount on Form 1040, 1040-SR, or 1040-NR, line 1e" (line 1e is 'Taxable dependent care benefits from Form 2441, line 26')
  - "26 == f1040nr.1e"

identity_fields: [name, identifying_number]

# Attachment-only form (Attachment Sequence No. 21): no signature block of its
# own; mailed inside the parent return's envelope (formpacks/CONVENTIONS.md).
signature: null
mailing: null
