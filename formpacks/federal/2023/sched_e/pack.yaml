# Schedule E (Form 1040), 2023 — Supplemental Income and Loss.
# (Rental real estate, royalties, partnerships, S corporations, estates, trusts, REMICs.)
#
# Authored via the taxfill pipeline: `taxfill introspect` (sentinel sweep) →
# vision-map workflow (every fillable widget located by reading its own field
# name printed at its position on the rendered form) → this map.
#
# Line-id convention (formpacks/CONVENTIONS.md): dot-separated, lowercase. The
# 3 repeated rental columns are suffixed .a/.b/.c; Part II/III row+column grids
# use <line>.<row>.<col> (e.g. 28.a.name, 28.a.g, 33.a.d).
#
# Structure:
#   Part I  (page 1) — Rental real estate & royalties. Header questions A & B
#                      (Yes/No), 3 repeated property columns a/b/c for lines
#                      1a/1b/2 and the income/expense grid (lines 3–22), then
#                      whole-form summary totals 23a–26.
#   Part II (page 2) — Partnerships & S corporations. Line 28 has two sub-tables:
#                      cols (a)–(f) [name/type/foreign/EIN/basis/at-risk] over
#                      rows a–d, and cols (g)–(k) [passive/nonpassive income &
#                      loss] over rows a–d, then totals 29a/29b and 30/31/32.
#   Part III(page 2) — Estates & trusts. Line 33 cols (a)/(b) name+EIN rows a/b,
#                      cols (c)–(f) rows a/b, totals 34a/34b, lines 35/36/37.
#   Part IV (page 2) — REMICs. Line 38 cols (a)–(e) single row, line 39.
#   Part V  (page 2) — Summary lines 40–43.
#
# ALL 185 fillable widgets in the skeleton are mapped. There are NO pre-printed
# constants on this form, so nothing is intentionally left unmapped.
#
# Line-2 / line-28 / line-29 "shaded" cells: the printed form greys out a few
# total/column cells that taxpayers normally leave blank (e.g. 29a cols g/i/j,
# 29b cols h/k), but the AcroForm still defines a fillable widget for each, so
# every one is mapped by its grid position (line + row + column suffix).
#
# Relations: the verify-module relation evaluator only tokenizes plain digit
# line ids (e.g. 30, 31), not dotted column ids, so only the two whole-line
# combine equalities whose operands are all plain mapped lines are declared
# (32 = 30+31; 37 = 35+36). The many per-column totals (line 20, 29a/29b, 34a/34b)
# and conditional passive-activity limitation lines are left to the recompute
# engine + human review.
