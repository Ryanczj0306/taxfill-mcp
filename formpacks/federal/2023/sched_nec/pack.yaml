  - { line: "16.row5.g", field: "Page1[0].Table_Line16[0].BodyRow5[0].f1_134[0]", type: money }

  # ---- line 17: Add columns (f) and (g) of line 16 -----------------------------
  # 17f sits inside printed parentheses (a positive LOSS total).
  - { line: "17f", field: "Page1[0].f1_135[0]", type: money }
  - { line: "17g", field: "Page1[0].f1_136[0]", type: money }
  # ---- line 18: Capital gain ----------------------------------------------------
  # "Combine columns (f) and (g) of line 17. Enter the net gain here and on
  # line 9 above. If a loss, enter -0-."
  - { line: "18", field: "Page1[0].f1_137[0]", type: money }

# Form-face math only, dot-free operands only (see header comment for the
# printed math that is intentionally NOT declared and why).
relations:
  - "14a == 13a * 0.10"              # "Multiply line 13 by rate of tax at top of each column" — (a) 10%
  - "14b == 13b * 0.15"              # — (b) 15%
  - "14c == 13c * 0.30"              # — (c) 30%
  - "15 == 14a + 14b + 14c + 14d + 14e"   # "Add columns (a) through (d) of line 14" ((d) spans two sub-columns)
  - "18 == max(0, 17g - 17f)"        # "Combine columns (f) and (g) of line 17 ... If a loss, enter -0-" (17f is a positive loss)

# Printed on line 15: "Enter the total here and on Form 1040-NR, line 23a".
# Schedule NEC attaches ONLY to Form 1040-NR, so the child names its parent
# (same pattern as sched_d's "16 == f1040.7"). Skipped (visibly) if a filing
# somehow lacks the f1040nr item.
cross_form:
  - "15 == f1040nr.23a"

identity_fields: [name, identifying_number]

# Attachment-only schedule (Attachment Sequence No. 7B): no signature block
# of its own; mailed inside the parent 1040-NR's envelope (formpacks/CONVENTIONS.md).
signature: null
mailing: null
