# Schedule NEC (Form 1040-NR), 2023 — Tax on Income Not Effectively Connected
# With a U.S. Trade or Business.
#
# Provenance: blank downloaded from the official source_url below; page 1 was
# rendered and READ to confirm the printed title ("Tax on Income Not
# Effectively Connected With a U.S. Trade or Business"), header "SCHEDULE NEC
# (Form 1040-NR)", revision year "2023" (footer "Schedule NEC (Form 1040-NR)
# 2023", Attachment Sequence No. 7B) before pinning pdf_sha256 (freshness
# protocol, dev plan section 7). One page.
#
# Field map: introspected from this exact revision (root form1040-NR[0]) and
# vision-mapped against the sentinel sweep — every widget read in place.
#
# The form is a GRID: income rows x rate columns. Printed columns are
# (a) 10%, (b) 15%, (c) 30%, (d) Other (specify) — and column (d) is TWO
# side-by-side sub-columns, each with its own "%" rate box in the header.
# Column keys used here: a, b, c, d (first "Other" sub-column), e (second
# "Other" sub-column; no printed letter of its own). The two header rate
# boxes are d.rate / e.rate.
#
# Line-id shapes (formpacks/CONVENTIONS.md grammar):
#   - plain-numbered rows take dot-FREE composite ids ("3a" = line 3 column
#     (a), ... "13e", "14c") so the printed column math can be declared in
#     relations (the relation grammar cannot reference dotted ids);
#   - sub-lettered rows keep the dotted convention of sched_d/sched_e
#     ("1a.a" = line 1a column (a), "2c.d", "10c.c") — a second letter cannot
#     be appended to a printed label like "1a";
#   - the line 16 capital-gains table uses "16.row<n>.<col>" with the PRINTED
#     column letters (a) kind of property ... (g) GAIN.
#
# Excluded widgets (5 of 137 fillable): the blank pre-greys cells that may
# never carry income and marks them ReadOnly (/Ff bit 1); the filler never
# writes them:
#   - Line10b f1_72 / f1_73 / f1_76 — line 10c columns (a), (b) and the second
#     "Other" sub-column (Canada-gambling net income goes in column (c));
#   - Line11 f1_78 / f1_81 — line 11 columns (b) and the second "Other"
#     sub-column.
#
# Relations: only unconditional form-face math whose operands are dot-free.
#   Declared: 14a/14b/14c = 13a/13b/13c x printed column rate; 15 = add the
#   line 14 columns; 18 = combine line 17 columns (f)/(g).
#   NOT declared (and why):
#   - "13 == add lines 1a through 12 per column": the line 1-2 operands are
#     dotted ids (1a.a ...) which the relation grammar cannot reference —
#     left to the recompute engine + human review (same call as sched_d);
#   - 14d/14e: the column rate is FILER-SPECIFIED in the d.rate/e.rate header
#     boxes (text, not a printed constant) — never encode a variable rate;
#   - per-row line 16 math "(f)/(g) = subtract (d) from (e) / (e) from (d)":
#     conditional and dotted-id operands;
#   - line 18 -> line 9 carry ("enter the net gain here and on line 9
#     above"): which line 9 COLUMN receives it depends on the treaty rate,
#     so no single-cell equality exists;
#   - line 10c "net income" (winnings less losses): the arithmetic lives in
#     the instructions, and 10c.c is a dotted id anyway.
#   Sign note: line 17 column (f) sits inside PRINTED parentheses — losses
#   are entered as positive numbers — so "Combine columns (f) and (g) ...
#   If a loss, enter -0-" is 18 == max(0, 17g - 17f).
#
# Carry-over: line 15 is printed "Enter the total here and on Form 1040-NR,
# line 23a" — an exact carry to the ONLY parent this schedule ever attaches
# to, so it is encoded in cross_form (same pattern as sched_d's
# "16 == f1040.7").
