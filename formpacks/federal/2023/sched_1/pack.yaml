  - line: "25"
    field: "Page2[0].f2_30[0]"
    type: money
  - line: "26"
    field: "Page2[0].f2_31[0]"
    type: money

# Form-face math only (printed combine/add instructions). sum() ranges
# expand a..z; letters with no mapped line (8v-8y, 24l-24y) count as blank=0.
relations:
  - "9 == sum(8a..8z)"                                        # "Add lines 8a through 8z"
  - "10 == 1 + 2a + 3 + 4 + 5 + 6 + 7 + 9"                    # "Combine lines 1 through 7 and 9"
  - "25 == sum(24a..24z)"                                     # "Add lines 24a through 24z"
  - "26 == 11 + 12 + 13 + 14 + 15 + 16 + 17 + 18 + 19a + 20 + 21 + 22 + 23 + 25" # "Add lines 11 through 23 and 25"

# Line 10 -> f1040/f1040nr line 8 and line 26 -> f1040 line 10 live on the
# parent packs per the form notes and CONVENTIONS.md.
cross_form: []

identity_fields: [name, identifying_number]

# Schedules carry no signature block of their own and are mailed inside the
# parent return's envelope (CONVENTIONS.md).
signature: null
mailing: null
