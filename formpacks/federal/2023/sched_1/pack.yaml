  - line: "23"
    field: "Page2[0].f2_15[0]"
    type: money
  - line: "24a"
    field: "Page2[0].Line24a_ReadOrder[0].f2_16[0]"
    type: money
  - line: "24b"
    field: "Page2[0].f2_17[0]"
