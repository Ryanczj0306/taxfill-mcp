  - line: name
    field: "Page1[0].f1_01[0]"
    type: text
  - line: identifying_number
    field: "Page1[0].f1_02[0]"
    type: text
    maxlen: 11
    format: ssn_digits_only

  # ---- Part I — Additional Income (page 1) ----
