# Schedule 1 (Form 1040) 2023 — Additional Income and Adjustments to Income
#
# Attachment to Form 1040 / 1040-SR / 1040-NR (Sequence No. 01). Two parts:
# Part I Additional Income (page 1, lines 1-10), Part II Adjustments to
# Income (page 2, lines 11-26). Line 10 feeds 1040/1040-NR line 8 and line 26
# feeds 1040 line 10 — those cross_form rules live on the PARENT packs; this
# pack carries only its own form-face sum relations.
#
# Verified against the downloaded blank: page 1 prints "2023" and the title
# "Additional Income and Adjustments to Income" (read from the rendered PNG).
#
# Field map notes (introspected from the blank with pypdf):
# - Every fillable widget is mapped — excluded blocks: NONE (Schedule 1 has
#   no paid-preparer, signature, or other agent-excluded block).
# - The form has zero checkbox/radio fields; all 67 widgets are /Tx text.
# - Lines 8a, 8d, and 8s print parentheses around the entry box: amounts are
#   entered as losses/exclusions (negative in the line-9 combine math).
#   The relations below assume values carry their sign.
# - Line 22 is printed "Reserved for future use" but its widget (f2_14) is
#   fillable; it is mapped for completeness. Agents should leave it blank —
#   the printed line-26 instruction ("add lines 11 through 23") still
#   includes it, blank counting as zero.
# - 8z / 24z each have TWO description widgets ("List type and amount:"
#   trailing the label plus a full-width second row) mapped as
#   <line>.type / <line>.type_2, and one amount widget mapped as <line>.
#   Their /DA is FIXED 8pt Helvetica-Bold (no auto-size), so overlong text
#   clips on pixels; maxlen below budgets 5.0 pt/char over the widget's
#   visible width (rect minus 2pt padding each side), verified by rendering.
# - Header SSN box (f1_02) is a plain text field with MaxLen 11 (not comb);
#   format ssn_digits_only still applies so dashed input never overflows.
#   Line 19b (alimony recipient's SSN) IS a 9-cell comb field.

form: "1040 Schedule 1"
jurisdiction: federal
tax_year: 2023
source_url: https://www.irs.gov/pub/irs-prior/f1040s1--2023.pdf
pdf_sha256: "8b747fa3399ced68be92c199b61b3771134f2dc1b0f5faeef433e0f94278b006"
acroform_root: "form1[0]"

fields:
