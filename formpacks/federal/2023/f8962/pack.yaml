  - { line: "33f", field: "Page2[0].Lines33e-g[0].f2_27[0]", type: text }
  - { line: "33g", field: "Page2[0].Lines33e-g[0].f2_28[0]", type: text }
  # Line 34: "Have you completed all policy amount allocations?" — answered
  # only by Part IV filers, so the group is not required.
  - line: "34.yes"
    field: "Page2[0].c2_1[0]"
    type: checkbox
    on_state: "/1"
    group: line34
  - line: "34.no"
    field: "Page2[0].c2_1[1]"
    type: checkbox
    on_state: "/2"
    group: line34

  # ---- Part V — Alternative Calculation for Year of Marriage (page 2) ---------
  # Line 35 (your SSN) / line 36 (spouse's SSN). Columns: (a) alternative
  # family size (a count), (b) alternative monthly contribution amount
  # (dollars), (c) alternative start month, (d) alternative stop month.
  - { line: "35a", field: "Page2[0].f2_29[0]", type: text }
