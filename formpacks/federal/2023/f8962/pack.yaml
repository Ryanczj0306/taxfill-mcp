  - { line: "32c", field: "Page2[0].f2_17[0]", type: text }
  - { line: "32d", field: "Page2[0].f2_18[0]", type: text }
  - { line: "32e", field: "Page2[0].Lines32e-g[0].f2_19[0]", type: text }
  - { line: "32f", field: "Page2[0].Lines32e-g[0].f2_20[0]", type: text }
  - { line: "32g", field: "Page2[0].Lines32e-g[0].f2_21[0]", type: text }
  - { line: "33a", field: "Page2[0].f2_22[0]", type: text }
  - { line: "33b", field: "Page2[0].f2_23[0]", type: text, maxlen: 9, format: ssn_digits_only }
  - { line: "33c", field: "Page2[0].f2_24[0]", type: text }
  - { line: "33d", field: "Page2[0].f2_25[0]", type: text }
