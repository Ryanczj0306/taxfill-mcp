# Form-face math only. See the header comment for the printed rules that are
# deliberately NOT declared (line 29 "smaller of", the column (c) copy rules)
# and for line 7's supplemental-value requirement.
relations:
  - "3 == 2a + 2b"                   # "Household income. Add the amounts on lines 2a and 2b"
  - "8b == 8a / 12"                  # "Divide line 8a by 12. Round to nearest whole dollar amount"
  # Row math printed in the column heads: (d) "subtract (c) from (b); if zero
  # or less, enter -0-" and (e) "smaller of (a) or (d)". An unused row is
  # entirely blank, so its relations reduce to 0 == 0 and stay harmless.
  - "11d == max(0, 11b - 11c)"
  - "11e == min(11a, 11d)"
  - "12d == max(0, 12b - 12c)"
  - "12e == min(12a, 12d)"
  - "13d == max(0, 13b - 13c)"
  - "13e == min(13a, 13d)"
  - "14d == max(0, 14b - 14c)"
  - "14e == min(14a, 14d)"
  - "15d == max(0, 15b - 15c)"
  - "15e == min(15a, 15d)"
  - "16d == max(0, 16b - 16c)"
  - "16e == min(16a, 16d)"
  - "17d == max(0, 17b - 17c)"
  - "17e == min(17a, 17d)"
  - "18d == max(0, 18b - 18c)"
  - "18e == min(18a, 18d)"
  - "19d == max(0, 19b - 19c)"
  - "19e == min(19a, 19d)"
  - "20d == max(0, 20b - 20c)"
  - "20e == min(20a, 20d)"
  - "21d == max(0, 21b - 21c)"
  - "21e == min(21a, 21d)"
  - "22d == max(0, 22b - 22c)"
  - "22e == min(22a, 22d)"
  - "23d == max(0, 23b - 23c)"
  - "23e == min(23a, 23d)"
  # Either-or totals (see header): the annual row and monthly rows are
  # mutually exclusive, so one straight sum is exact for both methods.
  - "24 == 11e + 12e + 13e + 14e + 15e + 16e + 17e + 18e + 19e + 20e + 21e + 22e + 23e"
  - "25 == 11f + 12f + 13f + 14f + 15f + 16f + 17f + 18f + 19f + 20f + 21f + 22f + 23f"
  # "If line 24 is greater than line 25, subtract line 25 from line 24 ... If
  # line 24 equals line 25, enter -0- ... If line 25 is greater than line 24,
  # leave this line blank" — max() covers all three printed cases (blank = 0).
  - "26 == max(0, 24 - 25)"
  # "If line 25 is greater than line 24, subtract line 24 from line 25" —
  # blank (0) when there is no excess, so max() again covers both cases.
  - "27 == max(0, 25 - 24)"

# Printed carry-overs on the form face; SKIPPED when the schedule is
# legitimately absent from the filing (see header comment).
cross_form:
  - "26 == sched_3.9"                # Net PTC -> Schedule 3 (Form 1040), line 9
  - "29 == sched_2.2"                # Excess APTC repayment -> Schedule 2 (Form 1040), line 2

identity_fields: [name, identifying_number]

# Attachment-only form: no signature block of its own; mailed inside the
# parent return's envelope (formpacks/CONVENTIONS.md).
signature: null
mailing: null
