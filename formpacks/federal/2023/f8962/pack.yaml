  - { line: "19b", field: "Page1[0].Part2Table2[0].BodyRow8[0].f1_62[0]", type: money }
  - { line: "19c", field: "Page1[0].Part2Table2[0].BodyRow8[0].f1_63[0]", type: money }
  - { line: "19d", field: "Page1[0].Part2Table2[0].BodyRow8[0].f1_64[0]", type: money }
  - { line: "19e", field: "Page1[0].Part2Table2[0].BodyRow8[0].f1_65[0]", type: money }
  - { line: "19f", field: "Page1[0].Part2Table2[0].BodyRow8[0].f1_66[0]", type: money }
  - { line: "20a", field: "Page1[0].Part2Table2[0].BodyRow9[0].f1_67[0]", type: money }   # September
  - { line: "20b", field: "Page1[0].Part2Table2[0].BodyRow9[0].f1_68[0]", type: money }
  - { line: "20c", field: "Page1[0].Part2Table2[0].BodyRow9[0].f1_69[0]", type: money }
  - { line: "20d", field: "Page1[0].Part2Table2[0].BodyRow9[0].f1_70[0]", type: money }
  - { line: "20e", field: "Page1[0].Part2Table2[0].BodyRow9[0].f1_71[0]", type: money }
  - { line: "20f", field: "Page1[0].Part2Table2[0].BodyRow9[0].f1_72[0]", type: money }
  - { line: "21a", field: "Page1[0].Part2Table2[0].BodyRow10[0].f1_73[0]", type: money }  # October
  - { line: "21b", field: "Page1[0].Part2Table2[0].BodyRow10[0].f1_74[0]", type: money }
  - { line: "21c", field: "Page1[0].Part2Table2[0].BodyRow10[0].f1_75[0]", type: money }
  - { line: "21d", field: "Page1[0].Part2Table2[0].BodyRow10[0].f1_76[0]", type: money }
  - { line: "21e", field: "Page1[0].Part2Table2[0].BodyRow10[0].f1_77[0]", type: money }
  - { line: "21f", field: "Page1[0].Part2Table2[0].BodyRow10[0].f1_78[0]", type: money }
  - { line: "22a", field: "Page1[0].Part2Table2[0].BodyRow11[0].f1_79[0]", type: money }  # November
  - { line: "22b", field: "Page1[0].Part2Table2[0].BodyRow11[0].f1_80[0]", type: money }
  - { line: "22c", field: "Page1[0].Part2Table2[0].BodyRow11[0].f1_81[0]", type: money }
  - { line: "22d", field: "Page1[0].Part2Table2[0].BodyRow11[0].f1_82[0]", type: money }
  - { line: "22e", field: "Page1[0].Part2Table2[0].BodyRow11[0].f1_83[0]", type: money }
  - { line: "22f", field: "Page1[0].Part2Table2[0].BodyRow11[0].f1_84[0]", type: money }
  - { line: "23a", field: "Page1[0].Part2Table2[0].BodyRow12[0].f1_85[0]", type: money }  # December
  - { line: "23b", field: "Page1[0].Part2Table2[0].BodyRow12[0].f1_86[0]", type: money }
  - { line: "23c", field: "Page1[0].Part2Table2[0].BodyRow12[0].f1_87[0]", type: money }
  - { line: "23d", field: "Page1[0].Part2Table2[0].BodyRow12[0].f1_88[0]", type: money }
  - { line: "23e", field: "Page1[0].Part2Table2[0].BodyRow12[0].f1_89[0]", type: money }
  - { line: "23f", field: "Page1[0].Part2Table2[0].BodyRow12[0].f1_90[0]", type: money }

  - line: "24"           # Total PTC: amount from line 11(e) OR add lines 12(e) through 23(e)
    field: "Page1[0].f1_91[0]"
    type: money
  - line: "25"           # APTC: amount from line 11(f) OR add lines 12(f) through 23(f)
    field: "Page1[0].f1_92[0]"
    type: money
  - line: "26"           # Net PTC: line 24 - line 25 (blank when line 25 > line 24) -> Schedule 3 line 9
    field: "Page1[0].f1_93[0]"
    type: money

  # ---- Part III — Repayment of Excess APTC -----------------------------------
  - line: "27"           # Excess APTC: line 25 - line 24 (when line 25 > line 24)
    field: "Page1[0].f1_94[0]"
    type: money
  - line: "28"           # Repayment limitation (instructions Table 5; BLANK when line 5 is 400 or more)
    field: "Page1[0].f1_95[0]"
    type: money
  - line: "29"           # Excess APTC repayment: smaller of line 27 or line 28 (line 27 when 28 is blank) -> Schedule 2 line 2
    field: "Page1[0].f1_96[0]"
    type: money

  # ---- Part IV — Allocation of Policy Amounts (page 2) ------------------------
  # Four identical allocation blocks, lines 30-33. Columns: (a) policy number
  # (Form 1095-A line 2), (b) SSN of other taxpayer, (c) allocation start
  # month, (d) allocation stop month, (e) premium percentage, (f) SLCSP
  # percentage, (g) advance payment of the PTC percentage. The percentages and
  # months are entries, not dollars — no relations.
  - { line: "30a", field: "Page2[0].f2_1[0]", type: text }
  - { line: "30b", field: "Page2[0].f2_2[0]", type: text, maxlen: 9, format: ssn_digits_only }   # PDF MaxLen 11; digits-only keeps SSNs consistent
  - { line: "30c", field: "Page2[0].f2_3[0]", type: text }
  - { line: "30d", field: "Page2[0].f2_4[0]", type: text }
  - { line: "30e", field: "Page2[0].Lines30e-g[0].f2_5[0]", type: text }
  - { line: "30f", field: "Page2[0].Lines30e-g[0].f2_6[0]", type: text }
  - { line: "30g", field: "Page2[0].Lines30e-g[0].f2_7[0]", type: text }
  - { line: "31a", field: "Page2[0].f2_8[0]", type: text }
