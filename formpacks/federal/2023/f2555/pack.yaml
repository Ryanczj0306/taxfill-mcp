# Form 2555, 2023 — Foreign Earned Income.
#
# Computes the foreign earned income exclusion and/or housing exclusion/deduction.
# The foreign earned income exclusion (Part VII, line 42) and the housing
# exclusion (Part VIII, line 45) flow to Schedule 1 (Form 1040) line 8d as a
# NEGATIVE (a subtraction from income); the housing DEDUCTION (Part IX, line 50)
# flows to Schedule 1 line 24j.
#
# Authored via the taxfill pipeline: `taxfill introspect` (sentinel sweep) →
# vision-map workflow (every fillable widget was filled with its own field name
# and read off the real form at its printed line position) → this map.
#
# All 160 fillable AcroForm widgets in the skeleton are mapped. No widget is left
# unmapped: line 37 ("Maximum foreign earned income exclusion. Enter $120,000")
# IS a fillable answer box (f3_13) on this form — not a pre-printed constant — so
# it is mapped as money (the taxpayer enters the statutory amount into the widget).
#
# Multi-box lines:
#   * Lines 35 and 39 each split a decimal ratio across two boxes: the integer
#     part (maxlen 1) and the fractional digits (maxlen 3) — ids 35.whole/35.dec.
#   * Lines 15a, 15e, 20b, 21d, 22f, and 23 each have a free-text "list type and
#     amount"/description that wraps across two text boxes (a label line + a
#     continuation line) plus, where applicable, a separate money box — ids
#     <line>.desc / <line>.desc2 (and the bare <line> for the money box).
#   * Line 14 (Part II) is a travel grid, 8 rows × 4 columns (a)(b)(c)(d), laid
#     out as two side-by-side half-tables (rows 1-4, then rows 5-8). Ids 14.rN.x.
#   * Line 18 (Part III) is a travel grid, 4 rows × 6 columns (a)-(f). Ids 18.rN.x.
#
# Relations: only unconditional, all-operands-mapped equalities printed on the
# form face are declared (line 22g = 22a..22f; line 43 = 36 + 42). Conditional /
# "smaller of" / decimal-driven / worksheet lines (line 24 net, 26, 30, 32-42,
# 45-50) are left to the recompute engine + human review, matching the
# conservative style of the shipped sched_se pack.
#
# cross_form is intentionally OMITTED: the only inter-form links (line 45 -> Sch 1
# line 8d, line 50 -> Sch 1 line 24j) are NOT plain equalities — line 45 is
# carried to Schedule 1 line 8d as a NEGATIVE (sign-inverted), so `45 == sched_1.8d`
# would be false. A wrong relation is worse than a missing one, so neither is
# declared; the recompute engine + human review own the sign-aware carry.
