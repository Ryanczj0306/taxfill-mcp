  - line: authorize_preparer_not_efile   # authorize your paid preparer not to file electronically
    field: Check Box 47
    type: checkbox
    on_state: /Yes
  - line: your_signature_date
    field: Text Box 101
    type: text
  - line: spouse_signature_date     # date box: 48.3pt wide, fixed 10pt CourierNewPSMT /DA (not auto-size);
    # the widget has no PDF /MaxLen, but 10 chars ("MM/DD/YYYY") overflow the 48.3pt rect at fixed 10pt
    # (clipping heuristic), so cap at the box's real capacity (9). Use a 2-digit year (e.g. "1/15/24") to
    # avoid truncation. Twin field your_signature_date (Text Box 101) is 50.4pt and fits 10 chars uncapped.
    field: Text Box 103
    type: text
    maxlen: 9
  - line: preparer_name                  # Printed name of the Preparer / or Firm's name
    field: Text Box 102
    type: text
  - line: preparer_street_address        # Street address of preparer or Firm's address
    field: Text Box 104
    type: text
  - line: preparer_city_state_zip        # City, State, ZIP Code + 4
    field: Text Box 105
    type: text
  - line: preparer_telephone
    field: Text Box 106
    type: text
  - line: preparer_ptin                  # Preparer's PTIN (Required by Law)
    field: Text Box 107
    type: text
relations:
  - "6 == 2 + 3 + 4 + 5"            # line 6 "Total additions. Add lines 2 through 5."
  - "7 == 1 + 6"                    # line 7 "Add lines 1 and 6."
  - "16 == 7 - 15"                  # line 16 "Maryland adjusted gross income. Subtract line 15 from line 7."
  - "18 == 16 - 17"                 # line 18 "Net income. Subtract line 17 from line 16."
  - "20 == 18 - 19"                 # line 20 "Taxable net income. Subtract line 19 from line 18."
  - "32 == 29 + 30 + 31"           # line 32 "Total. Add lines 29 through 31."
  - "34 == 27 + 33"                 # line 34 "Total Maryland and local tax. Add lines 27 and 33."
  - "39 == 34 + 35 + 36 + 37 + 38" # line 39 "Add lines 34 through 38."
  - "44 == 40 + 41 + 42 + 43"      # line 44 "Total payments and credits. Add lines 40 through 43."
  - "50 == 45 + 49"                 # line 50 "TOTAL AMOUNT DUE. Add lines 45 and 49."
cross_form:
  - "1 == f1040.11"                 # line 1 "Adjusted gross income from your federal return" (federal AGI)
