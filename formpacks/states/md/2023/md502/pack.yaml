# Form 502, 2023 — Maryland Resident Income Tax Return.
#
# Authored via the taxfill pipeline: `taxfill introspect` (sentinel sweep —
# every widget rendered with its own field name) -> vision-map workflow (all
# four pages + zoomed crops read, and exact widget /Rect outlines overlaid on
# the sweep PNGs to disambiguate which printed line each money box belongs to)
# -> this map.
#
# Layout. Mostly-flat AcroForm (acroform_root empty). MOST field names are the
# raw, human-readable sentinel ids the form ships with ("Enter your first
# name", "Enter 1", "Text Box 30", "Check Box 15"). A handful of fields are
# HIERARCHICAL (parent /T = a short tag, child /T = the rest) and pypdf
# exposes them by their fully-qualified "<parent>.<child>" name — these are
# kept verbatim as the skeleton lists them ("6. Check here",
# "B. Check this box if you are blind", "B. Enter number exemptions checked B",
# "D. Enter Dollar Amount Total Exemptions (Add A, B and C.) ", the four
# "Enter ... Address Line ..." fields, and the long
# "If you began or ended legal residence in Maryland in 2023 place a P in the
# box.\rMILITARY: If you or " field). The 9 FT=None parent containers
# ("6", "B", "D", "Enter Current Mailing Address Line 1 (Street No", ...) have
# no appearance of their own and are NOT mapped — only their full-name child
# widgets are.
#
# Coverage. The blank PDF carries 176 fillable widget annotations spanning 170
# DISTINCT AcroForm field objects (pypdf get_fields returns 179 entries: 170
# real fields + 9 FT=None container parents). Two text fields each repeat on
# every page — the taxpayer's "Enter your last name" and "Enter social
# security number" appear once on each of pages 1-4 (one field object, four
# widget appearances that auto-fill together). They are mapped ONCE here
# (header, page 1); the page-2/3/4 repeats are the SAME field and the filler
# rejects two text lines on one field, so they are intentionally NOT
# re-mapped. All 170 distinct fillable fields are mapped. Nothing else is
# omitted — there are no read-only tooltips (Ff bit 1) and no push-buttons
# (Ff bit 17) on this form.
#
# Line 25 ("Business tax credits — You must file this form electronically to
# claim business tax credits on Form 500CR.") has NO money widget on the paper
# form (it is e-file only), which is why the page-3 box numbering jumps from
# Text Box 38 (line 24) straight to Text Box 40 (line 26).
#
# Radio / checkbox groups. Filing status (lines 1-6) is six SEPARATE single
# /Btn fields ("Check Box - 1".."Check Box - 5" and "6. Check here"); type-of-
# account (51a Checking/Savings) is two separate /Btn fields. Each carries the
# exact on_state read from the blank's /AP /N dict — note several use odd
# states (filing-status 3 and 6 use "/No"; everything else "/Yes"). They are
# left as independent single checkboxes (no shared `group`) because each is its
# own /Btn field, matching how the skeleton introspected them.
#
# Money vs text. Every dollar box prints a ".00" cents marker and is mapped
# `money`. On pages 3-4 the dollars and cents are SEPARATE widgets: the dollar
# box (e.g. "Text Box 66") is `money` and its 2-digit cents companion (e.g.
# "Text Box 67") is mapped as a `text maxlen 2` line keyed "<line>_cents".
# Genuine text widgets stay text: names, addresses, city/state/ZIP, foreign
# fields, the political-subdivision code/name, SSN boxes (maxlen 11), residence
# dates, "other state of residence" (2), the P/M legal-residence flag (1), the
# email box, the additions/subtractions 2-letter code boxes (Text Field 5-12),
# the exemption count boxes, the local-tax-rate box, bank routing/account,
# telephone, PTIN, preparer name/address, and the 3-digit code-number boxes.
#
# Relations. Only unconditional sums/subtractions whose every operand is a
# mapped money line are declared (6=2..5, 7=1+6, 16=7-15, 18=16-17, 20=18-19,
# 32=29+30+31, 34=27+33, 39=34..38, 44=40..43, 50=45+49). Lines whose printed
# instruction is conditional/floored ("If less than 0, enter 0" — 27, 33;
# greater-than branches — 45, 46, 48), or whose sum includes the unmapped
# e-file-only line 25 (line 26) or the a/b-split exemption/pension sub-lines
# (15, exemption D), are OMITTED per the conservative house style.
#
# Cross_form. Line 1's printed label is "Adjusted gross income from your
# federal return", i.e. federal AGI, so the single cross_form equality
# 1 == f1040.11 (Form 1040, 2023, line 11 = AGI) is declared.
