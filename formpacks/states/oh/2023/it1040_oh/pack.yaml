  # =============================== Ohio Universal Payment Coupon (page 13)
  # Only the amount-of-payment box is free-entry; all other coupon widgets are
  # read-only auto-populated mirrors and are omitted (see header note).
  - line: upc_payment           # Amount of Payment
    field: UPC_Payment
    type: text
    maxlen: 9
relations:
  # Only sums whose operands are ALL `money` lines are declared. The Schedule of
  # Adjustments total-additions (line 11) and the Schedule of Credits nonrefundable /
  # refundable totals (lines 38, 44) qualify. The "add lines 2 through 9" (schedC_10)
  # and "add lines 12 through 43" (schedA_44) sums are OMITTED because some operands
  # (statutory-capped credit/educator boxes schedC_2/4/8/9, schedA_36) are typed
  # `text` (their PDF /MaxLen is too small to hold a money amount), so they are not
  # money operands.
  - "13 == 10 + 11 + 12"                                                               # IT 1040: "Total Ohio tax liability ... (add lines 10, 11 and 12)"
  - "schedA_11 == schedA_1 + schedA_2 + schedA_3 + schedA_4 + schedA_5 + schedA_6 + schedA_7 + schedA_8 + schedA_9 + schedA_10"  # "Total additions (add lines 1 through 10 ONLY)"
  - "schedC_38 == schedC_10 + schedC_34 + schedC_36 + schedC_37"                        # "Total nonrefundable credits (add lines 10, 34, 36 and 37)"
  - "schedC_44 == schedC_39 + schedC_40 + schedC_41 + schedC_42 + schedC_43"            # "Total refundable credits (add lines 39 through 43)"
cross_form:
  - "1 == f1040.11"            # IT 1040 line 1 "Federal adjusted gross income (federal 1040 or 1040-SR, line 11)" = Form 1040 (2023) line 11 (AGI)
identity_fields:
  - tp_ssn
  - tp_first_name
  - tp_last_name
