# Form IN-111, 2023 -- Vermont Income Tax Return (resident return). The single
# IN-111 serves resident / part-year / nonresident via the "Vermont Residency
# Status as of 12/31/2023" checkbox block.
#
# Provenance / freshness. Blank downloaded from the official source_url below.
# STEP 0 year gate: the MAIN-page sweep PNG (PDF page 1) was READ and prints the
# big "2023 Form IN-111" upper-left under "Vermont Department of Taxes", title
# "Vermont Income Tax Return", footer "Form IN-111 / Page 1 of 2 / Rev. 10/23",
# and scan barcode "*23111100*". Page 2 footer prints "Page 2 of 2 / Rev. 10/23"
# (barcode *23111200*). printed_year_verified = 2023. pdf_sha256 pinned to the
# exact cached file (golden test verifies it).
#
# Layout / what is FILED. This 2-page PDF is entirely the FILED return (no
# instruction/worksheet pages in this file). BOTH PAGES ARE MAPPED:
#   page 1 -- header (Taxpayer + Spouse/CU-Partner last/first/MI/SSN with a
#             "Check if Deceased" box each; Mailing Address + 911/Physical Street
#             Address; City/State/ZIP-or-foreign-postal + Foreign Country; Vermont
#             School District Code; Healthcare Coverage Code; a "Check all that
#             apply" row = AMENDED / CANNABIS(With Recomputed Federal Return) /
#             RECOMPUTED / EXTENDED); Filing Status & Standard Deduction (ONE /Btn
#             radio, 5 on_states); Vermont Residency Status (ONE /Btn radio, 3
#             on_states); lines 1-16 (1 fed AGI, 2 net modifications, 3 sum, 4 std
#             deduction, 5a-5d exemption counts, 5e exemption $, 6 sum, 7 taxable
#             income, 8 VT income tax, 9 net adjustment, 10 tax w/ adjustment,
#             11 charitable contribution / 12 x5% / 13 charitable deduction, 14 VT
#             income tax, 15 income adjustment %, 16 adjusted VT income tax); a
#             bottom "Amount Due (from Line 31)" echo box that is the SAME
#             AcroForm field as page-2 line 31 (mapped once as line 31).
#   page 2 -- top "Amount from Line 16" echo box = SAME AcroForm field as page-1
#             line 16 (mapped once as line 16); a page-2 header echo of Taxpayer's
#             Last Name + SSN (SAME AcroForm fields "TPLastName"/"TPSSN" as page 1
#             -- ONE control each, mapped once on page 1); lines 17-31 (17 other
#             state credit + 18 VT tax credits = 19 total credits, 20 tax after
#             credits, 21 use tax + "certify no use tax due" box, 22 total taxes,
#             23a-23d voluntary contributions = 23e total, 24 total taxes+contrib,
#             25a-25e payments = 25f total, 26 overpayment, 27a/27b refund credited,
#             28 refund amount, 29 tax due, 30 interest/penalty, 31 amount due);
#             "For Amended Returns Only" 4-box strip (STATIC print -- NO widgets);
#             signature block (taxpayer/spouse sign date + DOB + daytime phone,
#             preparer date/phone/firm-address/SSN-or-PTIN/FEIN, "may discuss with
#             preparer" box).
#
# AcroForm. FLAT form: acroform_root = '' . Every widget's /T is the raw flat id
# the form ships with (e.g. "Line7", "TPSSN", "Filing Status"). The sweep PNGs
# print each widget's OWN /T value inside its box, so mapping was done by PHYSICAL
# position against the render.
#
# SHARED /T across pages/kids (mapped ONCE per logical control per CONVENTIONS):
#   * "Filing Status" -- ONE /Btn with 5 physical kids. Mapped by physical L->R
#     position: /Single (Single $7,000), /Joint (Married/CU Filing Jointly
#     $14,050), /Separate (Married/CU Filing Separately $7,000), /HH (Head of
#     Household $10,550), /Widow (Qualifying Widow(er) $14,050). Each option is its
#     own line sharing field + group filing_status.
#   * "Residency" -- ONE /Btn with 3 kids: /Resident, /Part-Year Resident,
#     /NonResident. Shared group residency_status.
#   * "TPLastName" and "TPSSN" -- each appears on page 1 (header) AND page 2
#     (header echo). ONE AcroForm field each -> mapped ONCE (page 1) as identity.
#   * "Line16" -- page-1 line-16 result box AND page-2 "Amount from Line 16" echo
#     are the SAME field -> mapped ONCE as line 16.
#   * "Line31" -- page-2 line-31 result box AND page-1 "Amount Due (from Line 31)"
#     echo are the SAME field -> mapped ONCE as line 31.
#
# EXCLUDED widgets: the three page-2 pushbuttons "Clear"/"PrintingInstrButton"/
# "Print" (JavaScript CLEAR ALL / printing-instructions / SAVE-and-PRINT buttons,
# no real value/appearance states -- their reported "on_states" are stream dict
# keys, not fillable states) and four decorative "Slash" text widgets that draw
# the MM/DD/YYYY separators in the signature date boxes. All other 109-minus-these
# widgets are mapped.
#
# Money vs text. Every numbered dollar line prints a ".00" whole-dollar suffix and
# is `money`: 1,2,3,4,5e,6,7,8,9,10,11,12,13,14,16,17,18,19,20,21,22,23a,23b,23c,
# 23d,23e,24,25a,25b,25c,25d,25e,25f,26,27a,27b,28,29,30,31. Line 15 is a PERCENT
# ("Income Adjustment ... or 100.0000%", printed "%" suffix) -> text. Exemption
# COUNTS 5a/5b/5c/5d stay text. SSNs are single comb boxes (comb, ssn_digits_only).
# Names, MI, address parts, School/Healthcare codes, phones, date M/D/Y segments,
# preparer FEIN/PTIN stay text.
#
# Relations (on-face arithmetic, every operand mapped, unconditional only):
#   3   "Federal AGI with Modifications (ADD Lines 1 and 2)"     -> 3 == 1 + 2
#   5d  "Total Exemptions (ADD Lines 5a through 5c)"  -- OMITTED (5a-5c are text
#       counts, not money operands)
#   6   "ADD Lines 4 and 5e"                                     -> 6 == 4 + 5e
#   19  "Total Vermont Credits (Add Lines 17 and 18)"           -> 19 == 17 + 18
#   22  "Total Vermont Taxes (ADD Lines 20 and 21)"             -> 22 == 20 + 21
#   23e "Total Contributions (23a+23b+23c+23d)"                 -> 23e == 23a+23b+23c+23d
#   24  "Total of Vermont Taxes and Voluntary Contributions (ADD 22 and 23e)" -> 24 == 22 + 23e
#   25f "Total Payments and Credits (ADD Lines 25a through 25e)"-> 25f == 25a+25b+25c+25d+25e
#   31  "AMOUNT DUE (ADD Lines 29 and 30)"                      -> 31 == 29 + 30
# OMITTED (conditional / floor-at-zero / branch / table lookup): 7 (subtract 6
# from 3, floor 0), 8 (tax table), 10 (add 8+9 floor 0), 12 (multiply 11 x5%),
# 13 (lesser of 12 or $1,000), 14 (10 minus 13 floor 0), 16 (multiply 14 x 15%),
# 20 (16 minus 19 floor 0), 26 (overpayment if 24<25f), 28 (26 minus 27a,27b),
# 29 (25f minus 24 if 24>25f).
#
# Cross_form. Line 1 prints "Federal Adjusted Gross Income (federal Form 1040,
# Line 11)" -> federal AGI == f1040.11.
form: "IN-111"
jurisdiction: states/vt
tax_year: 2023
source_url: https://tax.vermont.gov/sites/tax/files/documents/IN-111-2023.pdf
pdf_sha256: "7469b823da304f7ea5f0360caa3c8f743a422033a3cccc1f0c6f516041c79cf3"
acroform_root: ''
fields:
  # ============================================ page 1 -- header
  - line: name.last                      # "Taxpayer's Last Name"
    field: TPLastName
    type: text
    maxlen: 17
  - line: name.first                     # "First Name"
    field: TPFirstName
    type: text
    maxlen: 17
  - line: name.middle_initial            # "MI"
    field: TPInit
    type: text
    maxlen: 1
  - line: identifying_number             # "Social Security Number" (taxpayer, comb)
    field: TPSSN
    type: text
    maxlen: 11
    comb: true
    format: ssn_digits_only
  - line: deceased.taxpayer              # "Check if Deceased" (taxpayer)
    field: TPDiedThisYear
    type: checkbox
    on_state: /Yes
  - line: spouse.name.last               # "Spouse's/CU Partner's Last Name"
    field: SpLastName
    type: text
    maxlen: 17
  - line: spouse.name.first              # "First Name" (spouse)
    field: SpFirstName
    type: text
    maxlen: 17
  - line: spouse.name.middle_initial     # "MI" (spouse)
    field: SpInit
    type: text
    maxlen: 1
  - line: spouse.identifying_number      # "Social Security Number" (spouse, comb)
    field: SpSSN
    type: text
    maxlen: 11
    comb: true
    format: ssn_digits_only
  - line: spouse.deceased                # "Check if Deceased" (spouse)
    field: SPDiedThisYear
    type: checkbox
    on_state: /Yes
  - line: mailing_address.street         # "Mailing Address (Number and Street/Road or PO Box)"
    field: MailingAddress
    type: text
    maxlen: 36
  - line: physical_address.street        # "911/Physical Street Address on 12/31/2023"
    field: PhysicalStreetAddress
    type: text
    maxlen: 36
  - line: mailing_address.city           # "City"
    field: City
    type: text
    maxlen: 21
  - line: mailing_address.state          # "State"
    field: State
    type: text
    maxlen: 2
  - line: mailing_address.zip            # "ZIP Code or Foreign Postal Code"
    field: ZIP
    type: text
    maxlen: 10
  - line: foreign_country                # "Foreign Country"
    field: Country
    type: text
    maxlen: 32
  - line: school_district_code           # "Vermont School District Code"
    field: SchoolCode
    type: text
    maxlen: 3
  - line: healthcare_coverage_code       # "Enter Healthcare Coverage Code"
    field: HCC-Code
    type: text
    maxlen: 1

  # ---- "Check all that apply" row
  - line: amended.yes                    # "AMENDED Return"
    field: Amended
    type: checkbox
    on_state: /Yes
  - line: cannabis.yes                   # "CANNABIS With Recomputed Federal Return"
    field: Cannabis
    type: checkbox
    on_state: /Yes
  - line: recomputed.yes                 # "RECOMPUTED Return"
    field: Recomputed
    type: checkbox
    on_state: /Yes
  - line: extended.yes                   # "EXTENDED Return"
    field: Extended
    type: checkbox
    on_state: /Yes

  # ---- Filing Status & Standard Deduction (ONE /Btn "Filing Status", physical L->R)
  - line: filing_status.single                       # Single ($7,000)
    field: Filing Status
    type: checkbox
    on_state: /Single
    group: filing_status
  - line: filing_status.married_filing_jointly       # Married/CU Filing Jointly ($14,050)
    field: Filing Status
    type: checkbox
    on_state: /Joint
    group: filing_status
  - line: filing_status.married_filing_separately    # Married/CU Filing Separately ($7,000)
    field: Filing Status
    type: checkbox
    on_state: /Separate
    group: filing_status
  - line: filing_status.head_of_household            # Head of Household ($10,550)
    field: Filing Status
    type: checkbox
    on_state: /HH
    group: filing_status
  - line: filing_status.qualifying_widow             # Qualifying Widow(er) ($14,050)
    field: Filing Status
    type: checkbox
    on_state: /Widow
    group: filing_status

  # ---- Vermont Residency Status (ONE /Btn "Residency")
  - line: residency_status.resident                  # RESIDENT
    field: Residency
    type: checkbox
    on_state: /Resident
    group: residency_status
  - line: residency_status.part_year_resident        # PART-YEAR RESIDENT
    field: Residency
    type: checkbox
    on_state: /Part-Year Resident
    group: residency_status
  - line: residency_status.nonresident               # NONRESIDENT
    field: Residency
    type: checkbox
    on_state: /NonResident
    group: residency_status

  # ---- lines 1-16 (page 1)
  - line: "1"                            # Federal Adjusted Gross Income (federal Form 1040, Line 11)
    field: Line1
    type: money
  - line: "2"                            # Net Modifications to Federal AGI (Schedule IN-112, Part I, Line 18)
    field: Line2
    type: money
  - line: "3"                            # Federal AGI with Modifications (ADD Lines 1 and 2)
    field: Line3
    type: money
  - line: "4"                            # 2023 Vermont Standard Deduction from filing status section above
    field: Line4
    type: money
  - line: 5a                             # Enter "1" for yourself if no one can claim you (count)
    field: Line5a
    type: text
    maxlen: 1
  - line: 5b                             # Enter "1" for jointly filed spouse/CU partner (count)
    field: Line5b
    type: text
    maxlen: 1
  - line: 5c                             # Enter number of OTHER dependents claimed on federal Form 1040 (count)
    field: Line5c
    type: text
    maxlen: 2
  - line: 5d                             # Total Exemptions (ADD Lines 5a through 5c) (count)
    field: Line5d
    type: text
    maxlen: 2
  - line: 5e                             # MULTIPLY Line 5d by $4,850 (2023 Personal Exemption)
    field: Line5e
    type: money
  - line: "6"                            # ADD Lines 4 and 5e
    field: Line6
    type: money
  - line: "7"                            # Vermont Taxable Income (SUBTRACT Line 6 from Line 3, floor 0)
    field: Line7
    type: money
  - line: "8"                            # Vermont Income Tax from tax table or tax rate schedule
    field: Line8
    type: money
  - line: "9"                            # Net Adjustment to Vermont Tax (Schedule IN-119, Part I, Line 15)
    field: Line9
    type: money
  - line: "10"                           # Vermont Income Tax with Adjustment (ADD Lines 8 and 9, floor 0)
    field: Line10
    type: money
  - line: "11"                           # Tax-Deductible Charitable Contribution
    field: Line11
    type: money
  - line: "12"                           # Multiply Line 11 by 5% (0.05)
    field: Line12
    type: money
  - line: "13"                           # Charitable Contribution Deduction (lesser of Line 12 or $1,000)
    field: Line13
    type: money
  - line: "14"                           # Vermont Income Tax (Line 10 MINUS Line 13, floor 0)
    field: Line14
    type: money
  - line: "15"                           # Income Adjustment (Schedule IN-113, Line 35, or 100.0000%) -- PERCENT
    field: Line15
    type: text
    maxlen: 9
  - line: "16"                           # Adjusted Vermont Income Tax (MULTIPLY Line 14 by Line 15)
    field: Line16                        # SAME field as page-2 "Amount from Line 16" echo (mapped once)
    type: money

  # ============================================ page 2 -- lines 17-31
  - line: "17"                           # Other State Credit (Schedule IN-117, Line 21)
    field: Line17
    type: money
  - line: "18"                           # Vermont Tax Credits (Schedule IN-119, Part II)
    field: Line18
    type: money
  - line: "19"                           # Total Vermont Credits (Add Lines 17 and 18)
    field: Line19
    type: money
  - line: "20"                           # Vermont Income Tax after credits (SUBTRACT Line 19 from Line 16, floor 0)
    field: Line20
    type: money
  - line: 21.no_use_tax                  # "Check to certify no Use Tax is due"
    field: Line21-NoUseTax
    type: checkbox
    on_state: /Yes
  - line: "21"                           # Use Tax for taxable items on which no sales tax was charged
    field: Line21
    type: money
  - line: "22"                           # Total Vermont Taxes (ADD Lines 20 and 21)
    field: Line22
    type: money
  - line: 23a                            # Nongame Wildlife Fund
    field: Line23a
    type: money
  - line: 23b                            # Vermont Children's Trust Foundation
    field: Line23b
    type: money
  - line: 23c                            # Vermont Veterans Fund
    field: Line23c
    type: money
  - line: 23d                            # Green Up Vermont
    field: Line23d
    type: money
  - line: 23e                            # Total Contributions (23a+23b+23c+23d)
    field: Line23e
    type: money
  - line: "24"                           # Total of Vermont Taxes and Voluntary Contributions (ADD Lines 22 and 23e)
    field: Line24
    type: money
  - line: 25a                            # 2023 Vermont Tax Withheld from W-2, 1099
    field: Line25a
    type: money
  - line: 25b                            # 2023 Estimated Tax payments / carried forward / extension
    field: Line25b
    type: money
  - line: 25c                            # Refundable Credits (Schedule IN-112, Part II)
    field: Line25c
    type: money
  - line: 25d                            # 2023 Vermont Real Estate Withholding from Form RW-171
    field: Line25d
    type: money
  - line: 25e                            # 2023 Nonresident Estimated Tax payments (Schedule K-1VT, Line 5)
    field: Line25e
    type: money
  - line: 25f                            # Total Payments and Credits (ADD Lines 25a through 25e)
    field: Line25f
    type: money
  - line: "26"                           # Overpayment (if Line 24 < Line 25f, SUBTRACT Line 24 from Line 25f)
    field: Line26
    type: money
  - line: 27a                            # Refund to be credited to 2024 Estimated Tax Payment
    field: Line27a
    type: money
  - line: 27b                            # Refund to be credited to 2024 Property Tax Bill
    field: Line27b
    type: money
  - line: "28"                           # REFUND AMOUNT (SUBTRACT Lines 27a and 27b from Line 26)
    field: Line28
    type: money
  - line: "29"                           # If Line 24 more than Line 25f, subtract Line 25f from Line 24
    field: Line29
    type: money
  - line: "30"                           # Interest and Penalty on Underpayment of Estimated Tax
    field: Line30
    type: money
  - line: "31"                           # AMOUNT DUE (ADD Lines 29 and 30)
    field: Line31                        # SAME field as page-1 "Amount Due (from Line 31)" echo (mapped once)
    type: money

  # ---- signature block (page 2)
  - line: signature.taxpayer_date.month  # taxpayer "Date (MM/DD/YYYY)" MM
    field: Sig-TP-Date-MM
    type: text
    maxlen: 2
  - line: signature.taxpayer_date.day    # DD
    field: Sig-TP-Date-DD
    type: text
    maxlen: 2
  - line: signature.taxpayer_date.year   # YYYY
    field: Sig-TP-Date-YYYY
    type: text
    maxlen: 4
  - line: signature.taxpayer_dob.month   # taxpayer "Date of Birth (MM/DD/YYYY)" MM
    field: Sig-TP-DOB-MM
    type: text
    maxlen: 2
  - line: signature.taxpayer_dob.day     # DD
    field: Sig-TP-DOB-DD
    type: text
    maxlen: 2
  - line: signature.taxpayer_dob.year    # YYYY
    field: Sig-TP-DOB-YYYY
    type: text
    maxlen: 4
  - line: signature.taxpayer_phone       # taxpayer "Daytime Telephone Number"
    field: Sig-TP-Phone
    type: text
  - line: signature.spouse_date.month    # spouse "Date (MM/DD/YYYY)" MM
    field: Sig-SP-Date-MM
    type: text
    maxlen: 2
  - line: signature.spouse_date.day      # DD
    field: Sig-SP-Date-DD
    type: text
    maxlen: 2
  - line: signature.spouse_date.year     # YYYY
    field: Sig-SP-Date-YYYY
    type: text
    maxlen: 4
  - line: signature.spouse_dob.month     # spouse "Date of Birth (MM/DD/YYYY)" MM
    field: Sig-SP-DOB-MM
    type: text
    maxlen: 2
  - line: signature.spouse_dob.day       # DD
    field: Sig-SP-DOB-DD
    type: text
    maxlen: 2
  - line: signature.spouse_dob.year      # YYYY
    field: Sig-SP-DOB-YYYY
    type: text
    maxlen: 4
  - line: signature.spouse_phone         # spouse "Daytime Telephone Number"
    field: Sig-SP-Phone
    type: text
  - line: preparer.date.month            # preparer "Date (MM/DD/YYYY)" MM
    field: Sig-Prep-Date-MM
    type: text
    maxlen: 2
  - line: preparer.date.day              # DD
    field: Sig-Prep-Date-DD
    type: text
    maxlen: 2
  - line: preparer.date.year             # YYYY
    field: Sig-Prep-Date-YYYY
    type: text
    maxlen: 4
  - line: preparer.phone                 # "Preparer's Telephone Number"
    field: Sig-PrepPhone
    type: text
  - line: preparer.address               # "Firm's Name (or yours if self-employed) and address"
    field: Sig-PrepAddress1
    type: text
  - line: preparer.ptin                  # "Preparer's SSN or PTIN"
    field: Sig-PrepSSNorPTIN
    type: text
    maxlen: 11
  - line: preparer.ein                   # "FEIN"
    field: Sig-PrepEIN
    type: text
    maxlen: 10
  - line: preparer.may_discuss           # "Check if the Department of Taxes may discuss this return with the preparer"
    field: Authorizing to discuss
    type: checkbox
    on_state: /Yes

relations:
  - "3 == 1 + 2"                         # 3 "Federal AGI with Modifications (ADD Lines 1 and 2)"
  - "6 == 4 + 5e"                        # 6 "ADD Lines 4 and 5e"
  - "19 == 17 + 18"                      # 19 "Total Vermont Credits (Add Lines 17 and 18)"
  - "22 == 20 + 21"                      # 22 "Total Vermont Taxes (ADD Lines 20 and 21)"
  - "23e == 23a + 23b + 23c + 23d"       # 23e "Total Contributions"
  - "24 == 22 + 23e"                     # 24 "Total of Vermont Taxes and Voluntary Contributions (ADD 22 and 23e)"
  - "25f == 25a + 25b + 25c + 25d + 25e" # 25f "Total Payments and Credits (ADD Lines 25a through 25e)"
  - "31 == 29 + 30"                      # 31 "AMOUNT DUE (ADD Lines 29 and 30)"
cross_form:
  # Line 1 "Federal Adjusted Gross Income (federal Form 1040, Line 11)"
  - "1 == f1040.11"
identity_fields:
  - name.first
  - name.last
  - identifying_number
  - mailing_address.street
  - mailing_address.city
  - mailing_address.state
  - mailing_address.zip
signature: {page: 2}
mailing: null
