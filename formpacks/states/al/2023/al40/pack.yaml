# Form 40, 2023 - Alabama Individual Income Tax Return (full booklet).
#
# Authored via the taxfill pipeline: `taxfill introspect` produced the sentinel
# sweep (every AcroForm widget rendered with its own field name) and the
# skeleton field list; this map was built by reading the sweep pages, dumping
# every widget's /FT, /Ff and /AP /N appearance states from the official blank,
# and placing each fillable widget on its printed line.
#
# Layout. Alabama's Form 40 is a dynamic-XFA PDF whose static AcroForm carries
# the whole booklet: the two-page Form 40 return plus every supporting schedule
# (A/B/DC itemized + interest/dividends + donation check-offs, DS & HOF
# dependents / head-of-family, ATP additional taxes & penalties, HBC first/second
# chance home-buyer savings, CR credit-for-taxes-paid worksheet, OC other
# available credits incl. Sections A-F and the AATC/AAC/KRCCI sub-schedules,
# NOL-85 / NOL-85A net-operating-loss application x4 copies, Schedule W-2,
# Schedule RS retirement, Schedule CP composite payments, Schedule D & E, Form
# 4952A investment-interest, and the Federal Income Tax Deduction worksheet).
# Flat AcroForm: acroform_root is empty and the field names are the raw,
# human-readable ids the form ships with (e.g. "WAGESINC", "SCHOCPG5SECC3C1").
#
# Coverage. The blank PDF has 2453 distinct fillable AcroForm fields. 179 of
# them are JavaScript PUSHBUTTONS (Ff bit-17 set: every "GoTo*"/"Reset*"/
# "btn*"/"BTN BC*"/"printlid.*"/"UF_*"/"VERCTRL" navigation, reset, print and
# units-of-five UI control) - those carry no taxpayer data and are intentionally
# OMITTED (each such name appears only as an appearance-stream /BBox, never a
# real /AP /N on-state). The remaining 2274 data widgets (2084 text, 190
# checkboxes) are ALL mapped. No readonly/computed text widget is omitted: AL
# marks many running totals ReadOnly, but they remain mapped so a filer can
# carry the computed value.
#
# Checkboxes. Every real checkbox/radio in this form uses exactly one of two
# export values, read verbatim from the blank's /AP /N dictionary: /X (184 of
# them) or /Yes (6, on the NOL-85A part-II / part-I-A "checkbox" cells). The
# skeleton's defaulted "/1" and "/BBox" on-states belonged only to the omitted
# pushbuttons and the UF_* helper toggles; no data checkbox uses them.
#
# Money vs text. The skeleton tagged every dollar box `text maxlen:9`. The 35
# numbered dollar lines of the Form 40 return body (page 1 income/tax lines 5-35
# and the two party-fund $ boxes) are re-typed `money` so the verifier can
# enforce the page-1 arithmetic. All schedule/worksheet amount boxes are left
# `text` exactly as introspected: many of them are percentage / ratio / "divide
# ... not over 100%" cells (e.g. NOL-85A Part III line 19) or comb cells whose
# value must never be whole-dollar rounded, so the conservative choice is to
# keep them text rather than risk corrupting a fraction.
#
# Relations. Only unconditional page-1 equalities whose every operand is a
# mapped money line are declared: line 8 = 5+6+7 (total income), line 15 =
# 11+12+13+14 (total deductions). Branchy / table-driven lines (16 taxable
# income, 17 tax-from-table, 18 net tax, 22 total liability with its $1 voluntary
# party-fund add-ons, the owe/refund split) are OMITTED per the conservative
# house style. cross_form is empty: Alabama computes its own state AGI and the
# federal figures on page 2 are reconciliation boxes, not unconditional copies of
# a single federal line.
