  # Only single-box on-face additions whose operands are all undotted lines.
  - "33 == 30 + 31 + 32"                 # 33 "TOTAL TAX (Add lines 30 through 32)"
  - "44 == 39 + 40 + 41 + 42 + 43"       # 44 "TOTAL PAYMENTS (Add lines 39 through 43)"
  - "46 == 44 - 45"                      # 46 "Adjusted total payments (Subtract line 45 from line 44)"
  - "52c == 51 + 52b"                    # 52C "Add lines 51 and 52B"
