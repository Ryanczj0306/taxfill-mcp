# Form AR1000F, 2023 -- Arkansas Individual Income Tax Return, FULL YEAR RESIDENT.
#
# Provenance: blank downloaded from the official source_url below; page 1 was
# rendered and READ to confirm the printed title ("2023 AR1000F / ARKANSAS
# INDIVIDUAL INCOME TAX RETURN / Full Year Resident"), the page footers
# "AR1000F, Page 1 (R 7/3/2023)", "AR1000F Page 2 (R 6/13/2023)" and
# "AR1000F Page 3 (R 7/5/2023)", and the barcodes ITAR231/ITAR232/ITAR233
# before pinning pdf_sha256 (freshness protocol).
#
# Layout. FLAT AcroForm: acroform_root is empty. The blank ships GENERIC widget
# names ("F_NR-1-4", "F_NR0-2-1", "F_NR-3-1", "Signature1" ...) that carry no
# semantic line label, so every line below was placed by READING the
# sentinel-sweep render of its page (each widget shows its own field name), not
# inferred from the name. No /Parent name chain.
# AR1000F is a 3-page return and ALL THREE PAGES ARE THE FILED RETURN (no
# instructions / tax tables / worksheets interleaved):
#   page 1 -- header (fiscal-year dates, amended flag, primary/spouse name+MI+
#             SSN+deceased flags, mailing address, foreign-address flag, emails,
#             1099-G/booklet/extension request boxes, DL#/state-ID rows),
#             FILING STATUS 1-6 (one /Btn, states /1../6), line 7A personal-
#             credit checkboxes + count + amount, dependents table, 7B/7C;
#   page 2 -- Primary-SSN repeat, INCOME lines 8-25 and TAX COMPUTATION lines
#             26-38, in TWO COLUMNS: (A) Primary/Joint Income, (B) Spouse's
#             Income (Status 4 Only);
#   page 3 -- Primary-SSN repeat, PAYMENTS 39-46, REFUND/TAX-DUE 47-52C, DIRECT
#             DEPOSIT (two routing/account comb rows + checking/savings + amts),
#             Sign Here block (primary/spouse), preparer "may discuss" Yes/No,
#             Paid Preparer block.
#
# Columns (status-based income split). On page 2, column (A) is "Primary/Joint
# Income" and column (B) is "Spouse's Income -- Status 4 Only" (filing status 4
# = married filing separately on the same return). Paired widgets are mapped as
# <line>.a (column A primary/joint) and <line>.b (column B spouse). Lines that
# the form prints with ONLY a column-A or a single right-hand box (29 col A/B
# both present; 30-33, 37, 38 single right box; 34-36 single col-A box) are
# mapped accordingly -- bare <line> where the form has one box, .a/.b where it
# prints both. Lines 9 (military pay), 17 (military retirement) and 18A/18B
# (gross/taxable entry boxes) have inline Primary/Spouse entry boxes mapped as
# .primary / .spouse sub-lines, plus the resulting column figure on .a/.b.
#
# Coverage. The blank exposes 228 fillable AcroForm widget ENTRIES (introspect
# skeleton); the filing-status /Btn (F_NR-1-33) contributes 6 entries on one
# field, the two checking/savings /Btn (F_NR-3-19, F_NR-3-47) 2 each, and the
# may-discuss /Btn (F_NR-3-80) 2, while F_NR-1-8 repeats as the SSN header on
# all 3 pages (one field, 3 widget entries). Mapped here: 211 lines.
# Intentionally OMITTED (2 distinct fields): "Print Button" and "Clear Button"
# -- JS PUSHBUTTONS at the top of page 1 (their on_states are appearance-dict
# keys /BBox /Filter /Type ..., not fillable export values), not data fields.
#
# Money vs text. Every numbered dollar line prints a ".00" cents suffix and is
# mapped `money`. Identity / name / address / email / date / signature /
# preparer strings stay `text`. The line-7A and 7B "X $29 =" count boxes
# (F_NR-1-48 maxlen 2, F_NR-1-65 maxlen 2) hold a COUNT (no schema int type) ->
# `text`. The DL "Your state"/"Spouse state" 2-char boxes, the ",20__" 2-digit
# fiscal-year box, the early-childhood certification number, and the 52A UEP
# exception-code box are `text`. Routing/account direct-deposit cells are
# one-char-per-cell text widgets (maxlen 1).
#
# SSN. The SSN boxes (F_NR-1-8 primary, F_NR-1-13 spouse) are plain /Tx text
# widgets (NOT comb -- no Ff comb bit, no MaxLen in the skeleton), so they are
# mapped `text` with format:ssn_digits_only and no comb flag. F_NR-1-8 is the
# primary filer's number -> identity id `identifying_number`.
#
# Checkboxes / radio groups. The single /Btn fields with multiple kid states are
# mapped one line per state on the SHARED field with the exact on_state read
# from the blank: F_NR-1-33 filing status (/1../6), F_NR-3-19 / F_NR-3-47
# checking-or-savings (/Checking /Savings), F_NR-3-80 may-discuss (/YES /No).
# All other checkboxes are independent single-state /Yes flags (amended,
# deceased x2, foreign-address, 1099-G/booklet/extension requests, the 7A
# personal-credit boxes, the line-27 tax-table selectors, the foreign-account
# direct-deposit flag).
#
# Relations. Only unconditional on-face additions whose every operand is mapped
# to a single (undotted) line are declared. Per-column arithmetic on the .a/.b
# income/tax lines cannot be expressed (the relations grammar tokenizes only
# digit+letter line ids, not dotted column lines) and is omitted, as are lines
# whose printed instruction floors at zero or branches on a comparison (38, 47,
# 50, 51).
#
# Cross_form. Line 25 is "ADJUSTED GROSS INCOME"; AR1000F builds AGI from its
# OWN line-by-line income (lines 8-24), it does NOT start from federal 1040
# line 11, so there is no unconditional single-line == f1040.11 link. cross_form
# is therefore [].
