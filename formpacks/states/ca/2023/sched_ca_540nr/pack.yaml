# Schedule CA (540NR), 2023 — California Adjustments — Nonresidents or
# Part-Year Residents.
#
# Authored via the taxfill pipeline: `taxfill introspect` (sentinel sweep —
# every widget rendered with its own field name) → vision-map workflow (all 5
# pages + zoomed crops read to place each field on its printed line/column) →
# this map. Structure mirrors the shipped sched_ca_540 pack where analogous.
#
# Layout. Flat AcroForm (acroform_root empty; field names are raw top-level
# sentinel ids 1000..5030). Side 1 carries the name/SSN header and Part I
# Residency Information (two-letter state codes, mm/dd/yyyy move dates, day
# counts, Y/N, period ranges — for Yourself and Spouse/RDP). Part II Income
# Adjustment Schedule (Sections A/B income, Section C adjustments) is a
# FIVE-column grid (unlike the residents' 540 schedule, which has three):
#   A = Federal Amounts (taxable amounts from your federal tax return)
#   B = Subtractions (difference between CA & federal law)
#   C = Additions (difference between CA & federal law)
#   D = Total Amounts Using CA Law As If You Were a CA Resident
#       (subtract col. B from col. A; add col. C to the result)
#   E = CA Amounts (income earned or received as a CA resident and income
#       earned or received from CA sources as a nonresident)
# Each income/adjustment line therefore has up to five money boxes; many lines
# grey out one or more columns (no widget exists for a greyed cell — those
# column keys are simply absent). Column-bearing keys carry an _A/_B/_C/_D/_E
# suffix. Lines 2a/3a/4a/5a/6a carry a single "primary" federal-amount box to
# the left of the grid (suffix _a). Part III (Adjustments to Federal Itemized
# Deductions) reverts to a THREE-column grid (A/B/C only); its single-box
# computation lines (1-3, 5b-5d, 18-30) have no suffix. Part IV (California
# Taxable Income) is single-box computation lines 1-5.
#
# All 411 fillable widgets are mapped. Every box is taxpayer-entered: there are
# NO pre-printed statutory constants with a widget on this form (the threshold
# amounts on Side 5 line 29/30 and the 2%/7.5% factors are pre-printed text, not
# fillable), so none are omitted. The 22 residency text boxes (1008-1029) and
# the SSN/last-name boxes (3046-3049) on line 19b are genuine text; the six
# Side-1 residency-status boxes (1002-1007) and the Side-4 "did NOT itemize for
# federal" box (4028) are checkboxes (on_state /Yes); five "list type and
# amount / specify" description lines (2094, 4007, 5013, 5020 plus line 6 desc
# 4042) are text. All remaining dollar boxes are mapped as money. The line 19b
# recipient SSN is split into three boxes (3046 area=3 digits, 3047=2, 3048=4);
# the Part IV line 3 deduction percentage is split into an integer box (5027,
# 1 digit) and a four-place decimal box (5028).
#
# Relations: Schedule CA's column math is conditional/cross-column (col D =
# col A less col B plus col C, with multiple greyed operands, and col E depends
# on residency apportionment), and several addends are unmapped greyed cells, so
# per the conservative house style NO relations are declared. cross_form is
# likewise omitted: the Side-5 Part IV line 5 total feeds Form 540NR line 35,
# but that is Form 540NR's input line, not an equality asserted on this schedule.
