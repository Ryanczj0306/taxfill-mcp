# Schedule CA (540), 2023 — California Adjustments — Residents.
#
# Authored via the taxfill pipeline: `taxfill introspect` (sentinel sweep —
# every widget rendered with its own field name) → vision-map workflow (every
# page + zoomed crops read to place each field on its printed line/column) →
# this map.
#
# Layout. The form is a flat AcroForm (acroform_root empty; field names are the
# raw top-level sentinel ids 1000..6036). Part I (Sections A/B income, Section C
# adjustments) is a three-column grid:
#   A = Federal Amounts (taxable amounts from your federal return)
#   B = Subtractions (See instructions)
#   C = Additions (See instructions)
# Each income/adjustment line therefore has up to three money boxes; many lines
# grey out one or two columns (no widget exists for a greyed cell — those line
# keys are simply absent). Column-bearing keys carry an _A / _B / _C suffix.
# Single-column computation lines (Part I "primary amount" boxes like 2a/3a and
# the entire Part II lower block lines 18-30) have no suffix.
#
# All 247 fillable widgets are mapped. There are NO pre-printed statutory
# constants on this form (every box is taxpayer-entered), so none are omitted.
# The 237 dollar boxes the skeleton tagged `text maxlen:12` are mapped as
# `money`; the 9 non-maxlen text widgets are genuine text (name, two SSN/ITIN
# boxes, last name, and five "list type and amount / specify" description
# lines); 1 checkbox (Part II "did NOT itemize for federal but will for CA").
#
# Relations: Schedule CA's column math is conditional/cross-column (e.g. col A
# less col B plus col C, with multiple greyed operands) and several addends are
# unmapped greyed cells, so per the conservative house style NO relations are
# declared. cross_form is likewise omitted: the printed totals feed Form 540
# lines 14/16/18 but those are Form 540's input lines, not equalities asserted
# on this schedule.
