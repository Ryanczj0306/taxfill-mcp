# Hawaii Form N-11 (Rev. 2023) — Individual Income Tax Return, RESIDENT.
#
# PRINT-ONLY (C3): the official N-11 PDF is a flat scannable form — NO AcroForm
# widgets and NO XFA (introspect finds 0 fillable fields), so it cannot be filled
# programmatically. This is therefore a HAND-FILL pack (render_mode: hand_fill): a
# line manifest, not a field map. The engine (taxfill_core.handfill) computes every
# derivable line from confirmed inputs and emits a line->value worksheet; the filer
# PRINTS the blank at source_url and hand-writes the values onto it (black ink,
# one char per box, per the form's own instructions).
#
# Provenance: blank downloaded from source_url; pages 1-2 rendered and READ to
# confirm "Form N-11 (Rev. 2023) ... Calendar Year 2023" and the line labels before
# pinning pdf_sha256. SCOPE: this core manifest covers the header identity, filing
# status, and the income section (lines 7-24, through the taxable-income base). The
# tax/credits/payments/refund lines (25+) and itemized worksheets A-1..A-6 are a
# straightforward extension on the same pattern (read page 3+ and append lines).
form: "N-11"
jurisdiction: states/hi
tax_year: 2023
render_mode: hand_fill
source_url: https://files.hawaii.gov/tax/forms/2023/n11_i.pdf
pdf_sha256: "59342c91c292cef5c642735a2c9e6be88c03d866b9a79fb92de13ccda1f248ec"
signature_note: "Sign and date the printed N-11 in black ink before mailing (both spouses on a joint return)."
lines:
  # ---- header / identity ----------------------------------------------------
  - { line: "name.first", label: "Your first name", type: text }
  - { line: "name.last", label: "Your last name", type: text }
  - { line: "identifying_number", label: "Your Social Security Number", type: text }
  - { line: "spouse.first_name", label: "Spouse's first name", type: text }
  - { line: "spouse.last_name", label: "Spouse's last name", type: text }
  - { line: "spouse.identifying_number", label: "Spouse's Social Security Number", type: text }
  - { line: "mailing_address.street", label: "Present mailing or home address", type: text }
  - { line: "mailing_address.city", label: "City, town or post office", type: text }
  - { line: "mailing_address.state", label: "State", type: text }
  - { line: "mailing_address.zip", label: "Postal/ZIP code", type: text }
  # ---- filing status (fill in only ONE oval) --------------------------------
  - { line: "filing_status.single", label: "1 Single", type: checkbox }
  - { line: "filing_status.mfj", label: "2 Married filing joint return", type: checkbox }
  - { line: "filing_status.mfs", label: "3 Married filing separate return", type: checkbox }
  - { line: "filing_status.hoh", label: "4 Head of household", type: checkbox }
  - { line: "filing_status.qss", label: "5 Qualifying surviving spouse", type: checkbox }
  # ---- income section (page 2, lines 7-24) ----------------------------------
  - { line: "7", label: "Federal adjusted gross income (AGI)", type: money }
  - { line: "8", label: "Difference in state/federal wages due to COLA, ERS, etc.", type: money }
  - { line: "9", label: "Interest on out-of-state bonds (incl. municipal)", type: money }
  - { line: "10", label: "Other Hawaii additions to federal AGI", type: money }
  - { line: "11", label: "Total Hawaii additions to federal AGI (add lines 8-10)", type: money, compute: "8 + 9 + 10" }
  - { line: "12", label: "Add lines 7 and 11", type: money, compute: "7 + 11" }
  - { line: "13", label: "Pensions taxed federally but not by Hawaii", type: money }
  - { line: "14", label: "Social security benefits taxed on federal return", type: money }
  - { line: "15", label: "First $7,683 of military reserve / HI national guard duty pay", type: money }
  - { line: "16", label: "Payments to an individual housing account", type: money }
  - { line: "17", label: "Exceptional trees deduction (attach affidavit)", type: money }
  - { line: "18", label: "Other Hawaii subtractions from federal AGI", type: money }
  - { line: "19", label: "Total Hawaii subtractions from federal AGI (add lines 13-18)", type: money, compute: "13 + 14 + 15 + 16 + 17 + 18" }
  - { line: "20", label: "Hawaii AGI (line 12 minus line 19)", type: money, compute: "12 - 19" }
  - { line: "21a", label: "Itemized: Medical and dental expenses (Worksheet A-1)", type: money }
  - { line: "21b", label: "Itemized: Taxes (Worksheet A-2)", type: money }
  - { line: "21c", label: "Itemized: Interest expense (Worksheet A-3)", type: money }
  - { line: "21d", label: "Itemized: Contributions (Worksheet A-4)", type: money }
  - { line: "21e", label: "Itemized: Casualty and theft losses (Worksheet A-5)", type: money }
  - { line: "21f", label: "Itemized: Miscellaneous deductions (Worksheet A-6)", type: money }
  - { line: "22", label: "Total itemized deductions (add lines 21a-21f)", type: money, compute: "21a + 21b + 21c + 21d + 21e + 21f" }
  - { line: "23", label: "Standard deduction (status 1/3: $2,200; 2/5: $4,400; 4: $3,212)", type: money,
      note: "Enter the standard deduction for your filing status, OR use line 22 if itemizing." }
  - { line: "24", label: "Taxable income base: line 20 minus line 22 or 23, whichever applies (MUST be filled in)", type: money,
      note: "= line 20 - (line 22 if you itemize, else line 23). Left uncomputed because the itemize-vs-standard choice is yours." }
# where-to-file (HI mails N-11 to a single Honolulu address) is deferred to the
# knowledge layer; the worksheet's job is the line values, not the envelope.
mailing: null
