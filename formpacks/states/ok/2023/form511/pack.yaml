relations:
  # Core Form 511 on-face arithmetic (every operand mapped, unconditional).
  - "3 == 1 - 2"                            # 3 "Line 1 minus line 2"
  - "5 == 3 - 4b"                           # 5 "Line 3 minus line 4"
  - "7 == 5 + 6"                            # 7 "line 5 plus line 6"
  - "9 == 7 - 8"                            # 9 "line 7 minus line 8"
  - "12 == 10 + 11"                         # 12 "add lines 10 and 11" (resident, no out-of-state income)
  - "13 == 9 - 12"                          # 13 "line 9 minus line 12"
  - "14 == 14a + 14b"                       # 14 "line 14a plus line 14b"
  - "20 == 18 + 19"                         # 20 "add lines 18 and 19"
  - "32 == 30 - 31"                         # 32 "line 30 minus 31"
  - "36 == 34 + 35"                         # 36 "add lines 34 and 35"
  - "41 == 38 + 39 + 40"                    # 41 "Total tax, penalty and interest (add lines 38-40)"
  - "40 == 40a + 40b"                       # 40 penalty (40a) plus interest (40b)
  # NOTE: schedule totals (511-B/C/D/E/H sums) are NOT declared as relations: the
  # relations evaluator only accepts bare digit+letter line ids (e.g. "3", "14a"),
  # not the dotted namespaced ids used for the attached schedules. Those on-face
  # sums therefore live only as comments next to their fields above.
cross_form:
  # Form 511 Part One line 1 "Federal adjusted gross income (from Federal 1040 or
  # 1040-SR)" == federal AGI from Form 1040 line 11.
  - "1 == f1040.11"
identity_fields:
  - name.first
  - name.last
  - identifying_number
  - mailing_address.street
  - mailing_address.city
  - mailing_address.state
  - mailing_address.zip
signature: {page: 44}
mailing: null
