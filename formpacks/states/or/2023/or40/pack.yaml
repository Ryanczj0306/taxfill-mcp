# Form OR-40, 2023 — Oregon Individual Income Tax Return for Full-year Residents.
#
# Provenance. Blank downloaded from the official source_url below; page 1 was
# rendered and READ to confirm the printed title ("2023 Form OR-40 / Oregon
# Individual Income Tax Return for Full-year Residents") and the form number
# 150-101-040 (Rev. 03-21-24, ver. 01) before pinning pdf_sha256 (freshness
# protocol). pdf_sha256 verified with shasum -a 256.
#
# Layout. FLAT AcroForm (acroform_root empty; field names are the raw sentinel
# ids the form ships with, e.g. "or-40-p1-11", "or-40-p2-5", "or-40-p3-1").
# This is a single 8-page return — every page is the FILED OR-40 itself; there
# are NO worksheet / tax-table / instruction pages embedded in this PDF (those
# live in the separate OR-40 instructions booklet). Page roles:
#   page 1 — header: fiscal-year/amended/election checkboxes, six "filed with"
#            checkboxes (Extension filed, Form OR-24, Form OR-243, Federal Form
#            8379, Federal Form 8886, Disaster relief), taxpayer & spouse
#            name/DOB/SSN, mailing address, phone, Filing Status (1-5);
#   page 2 — header (last name + SSN repeat), Exemptions 6a/6b with their
#            "check boxes that apply" sub-boxes, Dependents 1-3, lines 6c-6e;
#   page 3 — header repeat, lines 7-19 (income, subtractions, deductions),
#            standard-deduction age/blind checkboxes 17a-17d;
#   page 4 — header repeat, lines 20-31 (Oregon tax, alt-method boxes 20a-20c,
#            standard & carryforward credits);
#   page 5 — header repeat, lines 32-44 (payments & refundable credits, tax to
#            pay or refund), line 44a exception number + 44b annualized box;
#   page 6 — header repeat, lines 45-55 (refund/owe, estimated-tax application,
#            charitable & party checkoffs 50a/50b, 529, net refund, direct
#            deposit 54, kicker donation 55a/55b);
#   page 7 — header repeat, Sign Here block (taxpayer/spouse/preparer dates,
#            preparer phone/license/name/address/city/state/zip);
#   page 8 — header repeat, Amended statement free-text box.
#
# Field-name repeats. The header "Last name" (or-40-p1-14) and "SSN"
# (or-40-p1-15) widgets carry the SAME flat field name on EVERY page (pages
# 1-8). One field => the filler writes all eight header copies from a single
# value. They are mapped ONCE here, as the identity name/identifying_number.
#
# Coverage. The blank PDF has 165 AcroForm widget entries; introspect counts
# 123 text + 42 checkbox. The header name/SSN pair (or-40-p1-14, or-40-p1-15)
# appears 8 times each but is one field, so distinct mappable fields = 165 -
# 7*2 (the seven duplicate header copies on pages 2-8) - 1 ("Button - Clear
# form" JS pushbutton) = 150. All 150 are mapped below. The "Button - Clear
# form" widget is intentionally OMITTED: it is a JavaScript pushbutton (its
# only "on_states" are appearance-dict keys /BBox /Filter /Matrix ... not a
# fillable export value) — the blue "Clear form" button, not a data field.
#
# Money vs text. Every numbered dollar line prints a ".00" cents suffix in its
# own two-cell box and is mapped `money`. Genuine text widgets stay text:
# names, mailing address/city/country, the comb date boxes (MM/DD/YYYY), the
# SSN comb cells, state (2 char), ZIP halves, phone, party codes, exemption
# COUNT boxes 6a/6b/6c/6d/6e (counts, not dollars), dependent codes, the
# Form OR-10 exception number 44a, routing/account numbers, preparer fields,
# and the amended-statement box. Comb fields carry maxlen to avoid clipping.
#
# Relations. Only on-face unconditional equalities with every operand mapped
# to a single line are declared (Add lines …). Lines whose printed instruction
# floors at zero ("If line X is more than line Y, enter 0": lines 19, 29) or
# branch on a comparison (41 overpayment vs 42 net tax) are OMITTED.
#
# Cross_form. Line 7's printed label is "Federal adjusted gross income from
# federal Form 1040, 1040-SR, or 1040-NR, line 11", so the single cross_form
# equality 7 == f1040.11 (Form 1040, 2023, line 11 = federal AGI) is declared.
#
# Signature. Sign Here block is on page 7.
