# Form IT-203 (2023) — New York State Nonresident and Part-Year Resident
# Income Tax Return.
#
# Authored via the taxfill pipeline: `taxfill introspect` (sentinel sweep —
# every widget rendered with its own field name) → vision-map workflow (all
# four pages + zoomed crops read to place each field on its printed line/
# column) → this map.
#
# Layout. Flat AcroForm (acroform_root empty); field names are the raw opaque
# sentinel ids/labels from the PDF (e.g. "federal 1 dollars", "Filing Status",
# "1030"-style names do NOT appear here — NY used descriptive widget names).
# The income/adjustment block (page 2 lines 1-31) is a TWO-column grid:
#   _fed = Federal amount (whole dollars)
#   _ny  = New York State amount (whole dollars)
# Each such line therefore has up to two money boxes carrying a _fed / _ny
# suffix. Lines that print only one column (line 12 federal-only; line 32
# "Enter the amount from line 31, Federal amount column") have no suffix or a
# single explicit column key. The page 1 header, dependent grid, and pages 3-4
# (single-column NY computation) carry no fed/ny split.
#
# "Your SSN" appears as ONE physical AcroForm widget that the PDF repeats on
# every page (pages 1-4). The skeleton lists it four times (Your SSN, Your
# SSN#2/#3/#4) all bound to the SAME field "Your SSN"; we keep the single
# canonical mapping `your_ssn` and drop the duplicates (they would collide on
# an identical field path and add nothing). See the omissions list below.
#
# All fillable widgets are mapped EXCEPT the duplicate "Your SSN" repeats
# (#2/#3/#4 — same widget, mapped once as your_ssn) — there are NO greyed/
# reserved cells on this form's fillable set and no pre-printed constants.
#
# cross_form. Printed line 19 is "Federal adjusted gross income"; its Federal-
# amount column is the federal Form 1040 AGI. Per the prompt's instruction to
# cross_form where the printed label says "federal amount", line19_fed ties to
# form_1040 AGI. No on-form unconditional relations whose operands are ALL
# mapped exist in a clean two-column form-1040-sourced layout, so relations is
# empty per conservative house style (the per-column federal/NY arithmetic is
# conditional and pulls from many off-form federal lines).
