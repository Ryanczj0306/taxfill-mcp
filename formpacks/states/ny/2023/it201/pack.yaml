# Form IT-201, 2023 — New York State Resident Income Tax Return.
#
# Authored via the taxfill pipeline: `taxfill introspect` (sentinel sweep —
# every widget rendered with its own field name) -> vision-map workflow (all
# four pages + zoomed crops read to place each field on its printed line /
# column) -> this map.
#
# Layout. Flat AcroForm (acroform_root empty; field names are the raw opaque
# sentinel ids the form ships with, e.g. "TP_first_name", "Line1",
# "Filing_status", "Line83a_account"). A NY resident return has a SINGLE NY
# amount column, so income/credit lines carry no _A/_B/_C suffix — the line
# key is just the printed line number (Line1 widget -> line "1", etc.).
#
# Coverage. All 214 distinct fillable AcroForm widgets are mapped.
#   * The "Your Social Security number" box reappears as a widget at the top
#     of pages 2, 3 and 4 (skeleton TP_SSN, TP_SSN#2, TP_SSN#3, TP_SSN#4) but
#     they are ONE physical AcroForm text field ("TP_SSN"); pypdf propagates a
#     single value to every widget copy, so it is mapped ONCE (line "tp_ssn").
#     The three repeat keys are intentionally NOT separate lines — mapping the
#     same field twice as text would trip the filler's "one field, one value"
#     guard. (Page-1 social-security boxes for TP and spouse are the same
#     TP_SSN / Spouse_SSN fields.)
#   * Radio / yes-no questions (Filing_status, Itemized, Dependent,
#     Foreign_account, yonkers_freeze_credit, D4, E1, 34Deduction,
#     Line78_refund, Line80_box, Line83_box, Line83a_account, 3rd_party_box,
#     Line 9_box, Line 10_box, H_additional_dependents) are each ONE /Btn
#     field; every option is mapped as its own checkbox line on that shared
#     field with its own on_state, and the filler enforces single-selection.
# There are NO pre-printed statutory constants on this form (every box is
# taxpayer-entered), so none are omitted for that reason.
#
# Money vs text. The 117 dollar boxes the skeleton tagged `text maxlen:10`
# (Line1..Line82, the Line47a/54a-e/69a/70a/78a-b sub-lines, etc.) are mapped
# as `money`. Genuine text widgets (names, addresses, SSN/EIN/PTIN boxes,
# dates, county / school-district, occupations, two-character codes, identify
# / describe lines, NYC/Yonkers month-count boxes D1/D3/E2/F1/F2/G1/G2,
# routing / account numbers, designee fields, preparer block) stay text.
# Small count boxes (months, days, dependent count, EIC percentage) are short
# `text` fields with a maxlen (the schema's numeric type is `money`; these are
# integer counts, not dollar amounts, so they stay `text maxlen:n`).
#
# Relations / cross_form. IT-201 line 19 ("Federal adjusted gross income") is
# explicitly the FAGI carried from the federal return, so the single cross_form
# equality 19 == f1040.11 is declared (Form 1040, 2023, line 11 = AGI). Intra-
# form sums (22 = 20+21..., 32 = 25..31, 46 = 44+45, etc.) all have mapped
# operands and are declared below. Conditional/threshold lines (e.g. line 35
# "if line 34 > line 33 leave blank", line 44 "if more than line 39 leave
# blank") are OMITTED per the conservative house style.
