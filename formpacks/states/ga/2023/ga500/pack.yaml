# Form 500, 2023 — Georgia Individual Income Tax Return (with Schedules 1, 2,
# 2B, 3, the IND-CR individual credit forms 201-214, the IND-CR Summary
# Worksheet, Schedule 4 Net Operating Loss Application, and the 525-TV
# Individual/Fiduciary Payment Voucher) — the full 28-page fillable web PDF.
#
# Authored via the taxfill pipeline: `taxfill introspect` (sentinel sweep —
# every widget rendered with its own field name) -> vision-map workflow (all
# 28 pages + zoomed crops read to place each field on its printed line /
# column) -> this map -> golden round-trip + adversarial audit.
#
# Layout. Flat AcroForm (acroform_root empty; field names are the raw opaque
# sentinel ids the form ships with, e.g. "TP_FIRSTNAME", "L8", "S1L7A",
# "CRP12L1A", "S4P3L4B"). The main return (pages 1-5) has THREE amount
# columns only on Schedule 3 (part-year/nonresident: A/B/C) and on the
# Schedule 1 retirement worksheets (TAXPAYER / SPOUSE); everywhere else each
# printed line is a single widget and the line key is the printed line number
# ("L8" widget -> line "8", "S1L1" -> "s1.1", etc.). Repeated header SSN copy,
# navigation/print/reset/calculator widgets, and the duplicate page-10 field
# hierarchy are intentionally NOT mapped (see Coverage).
#
# Coverage. The blank PDF exposes 943 AcroForm field objects (pypdf
# get_fields), 848 of them distinct widget names. Mapped here: every fillable
# DATA widget — taxpayer/spouse identity, the numbered income/tax/credit/
# payment lines and their sub-boxes, the six income-statement (W-2/1099/G2)
# blocks, every Schedule 1/2/2B/3 line, all twelve IND-CR credit forms and the
# IND-CR Summary Worksheet, all four Schedule 4 NOL parts, and the 525-TV
# payment voucher. Each radio/choice question (the six CB_WH_TYPE_* withholding
# types, the six CB_ID_TYPE_* FEIN/SSN selectors, CB_DD_TYPE checking/savings,
# CB_DEDUCTION_TYPE itemized/standard/Georgia, CB_CARRIED_FORWARD yes/no) is
# ONE /Btn field; every option is mapped as its own checkbox line on that
# shared field with the exact on_state read from the widget /AP /N dicts, and
# the filler enforces single-selection within the shared `group`.
#
# Intentionally NOT mapped (none accept taxpayer data):
#   * JavaScript PUSHBUTTONS (Ff bit-17 set): the on-screen calculator keypad
#     ("b.<row>.<page>" x ~220, plus "cdrbd/cdrbu/cdrtod/cdrabout/cdrclose/
#     cdrm/cdry.<page>"), the per-page "printlid.<n>" print lids, "RESET PAGE",
#     "RESET"-style "BTPRINT", "VERCTRL", and the "GoTo Page 1/2/3/3a"
#     navigation links. Their only "on_state" is the appearance-stream
#     dictionary key "/BBox".
#   * "Name Change" — Ff 65536 (bit-17 pushbutton) with NO /AP /N states; it
#     is a UI toggle, not a fillable checkbox (the IT-511 name-change box is
#     informational on this web form).
#   * The "UF_*" user-form controls: "UF_Start"/"UF_Reset" (/BBox
#     pushbuttons), "UF_L1A".."UF_L4B" (Ff 65537 pushbuttons), and the font-6
#     "UF_InfoA"/"UF_InfoB" hidden control text fields.
#   * The /Btn "link" widgets "Tax Table", "IND-CR Forms",
#     "Form 500 Schedule 1", "500 Schedule 3", "Additonal Schedule 2"
#     (their states are appearance-dict keys only — they jump to a page/booklet).
#   * "SCANLINE" (Ff 8388609, ReadOnly) — the machine-generated voucher scan
#     line, computed by the form, never typed.
#   * "SSN_COPY" — the ReadOnly SSN mirror the form's JavaScript propagates
#     into every page header (and the Schedule-4 copy block); it is one
#     auto-filled field, not taxpayer entry, and duplicates "TP_SSN".
#   * The duplicate "P10.Page3.*" field hierarchy (a second naming of the
#     page-10 Schedule-2 widgets, incl. "P10.Page3.P10.Page3.S2L5"): the same
#     logical widgets are mapped once under their bare names (S2L1_CREDITCODE,
#     S2L9, S2L12, ...).
# No pre-printed statutory constants are mapped: the per-rotation $500/$1,000/
# $375/$750 amounts (IND-CR 212), the 30%/10%/33.33% rate lines (IND-CR 202/
# 204/209) and the $150/$500 maximum-credit lines (IND-CR 204/206) print as
# fixed text with NO widget, and the greyed Schedule-4 cells (Part III/IV
# line 3 col a, lines 12-13 col b) carry no field. (The IND-CR Summary line 5
# prints "Reserved" but still ships a widget, SUML5, so it is mapped.)
#
# Money vs text. Every dollar box is mapped `money` (each prints to a wide
# right-justified amount cell), EXCEPT a few small capped-credit cells whose
# AcroForm /MaxLen is only 3-4 characters and so physically cannot hold a
# four-digit dollar amount — Form 500 line 17 (Low Income Credit, /MaxLen 3),
# the four IND-CR 201 boxes (CRP1L1..L4, /MaxLen 3, credit capped at $500), and
# the seven IND-CR 212 per-rotation amounts (CRP12L1A..L1C, /MaxLen 4, capped
# at $8,500). Those are mapped `text` with the widget's own maxlen so the
# clipping scan enforces the form's real cell limit. Genuine text widgets stay
# `text`: names,
# address/city/state/ZIP, SSN/FEIN boxes (maxlen 11 / 10), driver's-license
# id, dates (birth/disability/signature/death), the residency-status letter,
# the filing-status letter, the single-letter credit/deduction codes, the
# 1- and 2-digit count boxes (exemption/dependent counts, the "number from
# Line 6c/7c" boxes, the additional-deduction tally boxes, the IND-CR 212
# rotation-count boxes), the company/relationship/county/practice text, the
# preparer block, the bank routing (9) / account (17) numbers, the voucher
# name/address block, and the phone numbers. The voucher/header dropdowns
# (TAXTYPE, YY tax-year, STATELIST, the *_REL_LST relationship pickers, and
# the S2/S2B credit-code pickers) are AcroForm /Ch choice widgets; the filler
# writes their /V as text, so they are mapped `text`.
#
# Relations. Only unconditional sum/equality lines whose every operand is a
# mapped money line AND whose line keys are dot-free are declared (the relation
# mini-evaluator's LINE token is digits/word ids, not dotted keys): 14c =
# 14a + 14b and 27 = 23 + 24 + 25 + 26. The Schedule-1/2/2B/3 sub-totals are
# equally unconditional but their line keys are dotted (s1.6 = s1.1+...+s1.5,
# s2.9 = s2.2+...+s2.8, etc.), which the evaluator cannot tokenize, so they are
# left undeclared. Threshold/branch lines (15a/15c "less", 21 "cannot exceed
# Line 16", 22 "if zero or less enter zero", 28/29/44/45 owe-vs-refund
# branches, the ratio line 9, the "lesser of" credit caps) are OMITTED per the
# conservative house style.
#
# Cross_form. Line 8's printed label is "Federal adjusted gross income (From
# Federal Form 1040)", so the single cross_form equality 8 == f1040.11 is
# declared (Form 1040, 2023, line 11 = AGI).
