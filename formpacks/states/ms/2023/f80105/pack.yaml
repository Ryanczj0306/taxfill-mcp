relations:
  # On-face arithmetic where every operand is mapped (unconditional). NOTE: the
  # relations evaluator only accepts bare digit+letter line ids, NOT the dotted
  # .a/.b column-split ids; so the per-column subtractions/sums for lines 16, 49,
  # 65, 66 (and the 13/14/15 splits) live only as field comments above, not here.
  # Only single-column (un-split) lines 12, 20, 23, 28, 31, 34, 37 are declared.
  - "12 == 10 + 11"                        # 12 "Total (line 10 plus line 11)"
  - "20 == 17 - 18 - 19"                   # 20 "line 17 minus line 18 and line 19"
  - "23 == 20 + 21 + 22"                   # 23 "line 20 plus line 21 and line 22"
  - "28 == 24 + 25 + 26 - 27"              # 28 "line 24 plus line 25 and line 26 minus line 27"
  - "31 == 29 - 30"                        # 31 "Adjusted overpayment (line 29 minus line 30)"
  - "34 == 31 - 32 - 33"                   # 34 "line 31 minus line 32 and line 33"
  - "37 == 35 + 36"                        # 37 "Total due (line 35 plus line 36)"
cross_form: []
