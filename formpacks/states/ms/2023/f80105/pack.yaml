# Form 80-105, 2023 -- Mississippi Resident Individual Income Tax Return.
#
# Provenance / freshness. Blank PDF downloaded from the official source_url below
# (DOR MS individual forms). STEP 0 YEAR GATE: the sweep PNG of PDF page 1 was
# READ and prints "Form 80-105-23-8-1-000 (Rev. 11/23)" with the title
# "Mississippi / Resident Individual Income Tax Return / 2023" -- so
# printed_year_verified = 2023. Pages 2 and 3 print "...23-8-2-000" / "...23-8-3-000"
# headers, "Page 2" / "Page 3", both dated "2023". pdf_sha256 pinned to the exact
# cached file (golden test verifies it).
#
# Layout / what is FILED vs SKIPPED. The PDF is exactly the 3-page filed return --
# every page carries fillable AcroForm widgets and all 3 are mapped. There are NO
# instruction or worksheet pages in this PDF. Mapped pages (1-indexed):
#   page 1 = Form 80-105 Page 1 -- Amended flag; taxpayer/spouse name blocks; 2
#            SSNs; mailing address (city/state/zip/county code); Filing Status
#            (ONE /Btn "Filing St", on_states /1../5); Exemptions section
#            (dependents grid rows 1-4 name/relation/SSN, line 7 total dependents,
#            age-65 / blind flags for line 8, line 9 total, lines 10-12 exemption
#            dollars); Mississippi Income Tax lines 13-16 with Column A (Taxpayer)
#            / Column B (Spouse) splits (.a/.b), single-column lines 17-23;
#            Payments lines 24-28; Refund/Balance lines 29-37 with Farmers-or-
#            Fishermen flag, Direct-Deposit-Request flag, Installment-Agreement-
#            Request flag.
#   page 2 = Form 80-105 Page 2 -- header SSN echo; INCOME lines 38-49 (.a/.b
#            column splits); ADJUSTMENTS lines 50-65 (.a/.b) with an alimony-paid
#            detail row (name/SSN/state/divorce-date); line 66 Mississippi AGI
#            (.a/.b) which feeds page-1 line 13; amended-return explanation lines.
#   page 3 = Form 80-105 Page 3 -- header SSN echo; DIRECT DEPOSIT block (line 1D
#            overpayment refund, routing/account 1 & 2 with Checking/Savings radios,
#            amounts 2D/3D); SIGNATURE block (discuss-with-preparer Yes/No radio,
#            taxpayer/spouse dates & phone, paid-preparer PTIN/phone/email/address).
#
# Line-id scheme. Numbered return lines keep their bare printed labels (1..66).
# Column A (Taxpayer) / Column B (Spouse) money splits suffix .a/.b per CONVENTIONS
# (e.g. 13.a/13.b ... 66.a/66.b). Single-column lines (17-37) carry the bare
# number. Filing status, exemptions grid, dependents, direct-deposit and signature
# blocks are namespaced (filing_status.*, dependent_N.*, age65_blind.*,
# direct_deposit.*, preparer.*, alimony_paid.*, amended_explanation.*).
#
# AcroForm. FLAT form: acroform_root = '' . Every widget /T is the raw flat id the
# form ships with. The Filing Status control is ONE /Btn named "Filing St" with
# five distinct on_states (/1../5) -> each option its own line sharing field + group
# "filing_status". The page-3 "Checking/Savings" selectors are each ONE /Btn
# ("Check Box3" acct 1, "Check Box4" acct 2) with on_states /1 (Checking) /2
# (Savings) -> grouped. The discuss-with-preparer Yes/No is ONE /Btn "Check Box1"
# (/1 Yes, /2 No) -> grouped. The "Reset"/"PrintForm" JavaScript push-buttons (no
# /Yes-style on-state; appearance-stream dict keys only) are NOT data fields and are
# intentionally NOT mapped. The page-2/3 header "SSN" echo widgets (Page2SSN,
# Page3SSN) are the same logical taxpayer SSN re-printed; mapped once as the primary
# identifying_number on page 1 and NOT re-mapped on pages 2/3 (their boxes carry the
# same value but are distinct /T names; left unmapped to avoid duplicate identity).
#
# Money vs text. Every numbered dollar line prints a ".00" whole-dollar suffix and
# is `money`. Names, address parts, county code, dependent relation letter, total-
# dependents counts (line 7, line 9), SSNs, routing/account numbers, dates, phones,
# preparer fields and amended-explanation lines stay `text`. SSN boxes are
# comb:false plain text maxlen 9 with format ssn_digits_only.
#
# Checkboxes / radio groups. Filing Status (group filing_status, one /Btn five
# states). Direct-deposit account-type selectors (groups direct_deposit.acct1_type,
# direct_deposit.acct2_type). Discuss-with-preparer (group preparer.discuss).
# Independent single-state /Yes flags: Amended, the four age-65/blind boxes,
# Farmers-or-Fishermen, Direct-Deposit-Request, Installment-Agreement-Request.
#
# Relations. Only single-box on-face arithmetic where every operand is mapped is
# declared. Per-column subtractions/sums declared per column (.a/.b). Line 9
# ("line 7 plus number of boxes checked line 8") is NOT declared -- line 8 is four
# independent checkboxes, not a summable money line. Lines that branch on a
# comparison (29 overpayment, 35 balance due -- both conditional on 28 vs 23) are
# NOT declared.
#
# Cross_form. Line 13 is "Mississippi adjusted gross income (from page 2, line 66)"
# -- MS AGI, NOT federal AGI; the federal 1040 line 11 does not flow directly to any
# 80-105 face line, so cross_form is empty.
form: "80-105"
