# Form 1040ME, 2023 -- Maine Individual Income Tax Return (resident return; the
# single form serves resident / part-year / nonresident via a RESIDENCY STATUS
# checkbox block, lines 8-11a).
#
# Provenance / freshness. Blank downloaded from the official source_url below.
# STEP 0 year gate: the MAIN-page sweep PNG (PDF page 1) was READ and prints the
# big "2023" upper-left next to the Maine state outline, title "MAINE INDIVIDUAL
# INCOME TAX / FORM 1040ME", "For tax period 1/1/2023 to 12/31/2023", and the
# scan barcode "*2302100*"; pages 2 and 3 headers print "2023 FORM 1040ME, Page
# 2" / "Page 3" (barcodes *2302101* / *2302111*). printed_year_verified = 2023.
# pdf_sha256 pinned to the exact cached file (golden test verifies it).
#
# Layout / what is FILED. This is a single 3-page PDF and ALL THREE PAGES ARE THE
# FILED RETURN (no instruction/worksheet pages in this file):
#   page 1 -- header (names + MI for you/spouse, two single-box SSNs, mailing
#             address with foreign country/province/postal, home + work phones,
#             AMENDED flag, tax-period dates), line A Property/Sales Tax Fairness
#             box, line 1 Maine Clean Election Fund (You/Spouse), line 2 commercial
#             farming/fishing, FILING STATUS lines 3-7 (ONE /Btn radio "radStatus"
#             with distinct on_states), Year-spouse-died (line 7), RESIDENCY STATUS
#             lines 8-11a (ONE /Btn radio "Residency status") + Schedule NRH box,
#             line 12 age/blind flags (12a-12d), line 13 total exemptions, line 13a
#             qualifying children/dependents count, lines 14-18 (federal AGI,
#             income modifications, Maine AGI, deduction Standard/Itemized radio,
#             exemption).
#   page 2 -- lines 19-24 (taxable income, income tax, recapture, total tax, tax
#             credits Schedule A, nonresident credit, net tax), line 25 tax
#             payments 25a-25f, lines 26-29 (amended overpayment, 25f-26, overpaid,
#             underpaid), lines 30/30a/31 (use tax, casual rental sales tax,
#             charitable contributions), line 32 net overpayment, line 33 applied-
#             to-2024 (33a) + refund (33b), direct deposit (33c routing, 33d
#             account, 33e type, outside-US box).
#   page 3 -- name/SSN header echo, line 34 (34a tax due, 34b underpayment penalty
#             + Form 2210ME box, 34c total amount due), deceased dates of death
#             (taxpayer + spouse), HEALTH CARE COVERAGE 35a-35d + 35e preferred
#             contact method (ONE /Btn radio), Third Party Designee (Yes/No radio +
#             name/phone/PIN), signature block (taxpayer/spouse sign dates +
#             occupations + email, preparer date/phone/name/PTIN), Payment Plan +
#             Injured Spouse boxes.
#
# AcroForm. FLAT form: acroform_root = '' . Every widget's /T is the raw flat id
# the form ships with (descriptive English). 129 fields reported; 4 are the
# JavaScript "CLEAR ALL" / "PRINT" pushbuttons (page 1 + page 3, no value/real
# appearance states) and are EXCLUDED. The remaining 125 fillable widgets are
# mapped.
#
# Shared /Btn radios (one AcroForm field, many physical kids -- mapped once per
# physical box with distinct on_state, sharing one group per CONVENTIONS):
#   * "radStatus"  -- FILING STATUS lines 3-7. NOTE the kid on_state names are
#     misleading: the box at the line-6 row carries on_state /Qualifying widow(er)
#     but is physically "Head of household", and the line-7 row box carries
#     /Qualifying surviving spouse. Mapped by PHYSICAL position (verified against
#     the render): 3 Single, 4 MFJ, 5 MFS, 6 HoH (/Qualifying widow(er)),
#     7 QSS (/Qualifying surviving spouse).
#   * "Residency status" -- lines 8 Resident, 8a Safe harbor, 9 Part-year,
#     10 Nonresident, 11 Nonresident alien (Maine nonresident), 11a Nonresident
#     alien (Maine resident).
#   * "Type of filing" -- line 17 deduction Standard / Itemized.
#   * "Type of account" -- line 33e Checking / Savings.
#   * "Preferred method of contact" -- line 35e Mailing(/Choice1) / Phone(/Choice2)
#     / Email(/Choice3).
#   * "Do you want someone else to discuss with MRS" -- Third Party Designee
#     Yes / No.
# Every OTHER checkbox is its own independent single-state /Btn (on_state /Yes):
# Amended flag, line A fairness box, clean-election You/Spouse, commercial
# farming/fishing, line 12 age/blind (12a-12d), Schedule NRH, 34b Form 2210ME
# box, 33d outside-US box, 35a-35d health-coverage flags, Payment Plan, Injured
# Spouse.
#
# Money vs text. Every numbered dollar line ("DO NOT ENTER $ signs, commas, or
# decimals" with a printed ".00" suffix) is mapped `money`: 14, 15a, 15b, 16, 17,
# 18, 19, 20, 20a, 21, 22, 23, 24, 25a-25f, 26, 27, 28, 29, 30, 30a, 31, 32, 33a,
# 33b, 34a, 34b, 34c. SSNs are single boxes (maxlen 11) kept `text`. Counts (line
# 13 exemptions, 13a dependents), date M/D/Y segments, year-spouse-died, routing/
# account numbers, names, occupations, phones, email, designee PIN stay `text`.
#
# Relations (on-face arithmetic, every operand mapped, unconditional only):
#   16  "Line 14 plus line 15a, minus line 15b"            -> 16 == 14 + 15a - 15b
#   22  "TOTAL TAX. Line 20 plus line 20a minus line 21"   -> 22 == 20 + 20a - 21
#   24  "NET TAX. Line 22 minus line 23"                   -> 24 == 22 - 23
#   25f "TOTAL. Add lines 25a, b, c, d, and e"             -> 25f == 25a+25b+25c+25d+25e
#   27  "Line 25f minus line 26"                           -> 27 == 25f - 26
#   34c "TOTAL AMOUNT DUE. Add lines 34a and 34b"          -> 34c == 34a + 34b
# OMITTED (conditional / floor-at-zero / branch): 19 ("Line 16 minus lines 17 and
# 18"), 28 (overpaid if 27>24), 29 (underpaid if 24>27), 32 (28 minus 30,30a,31
# with branch to 34a), 34a (add 29,30,30a,31 if total>line28).
#
# Cross_form. Line 14 "FEDERAL ADJUSTED GROSS INCOME" == federal AGI Form 1040
# line 11.
