# Arizona Form 140, 2023 — Resident Personal Income Tax Return.
#
# Authored via the taxfill pipeline: `taxfill introspect` (sentinel sweep —
# every one of the 430 AcroForm widgets rendered with its own field name) ->
# vision-map workflow (all six pages plus zoomed crops read to place each
# field on its printed line / column) -> this map.
#
# Layout. Flat AcroForm (acroform_root empty; field names are the raw sentinel
# ids the form ships with, e.g. "1a", "Filing Status", "10c First", "5Fa").
# Form 140 is six pages: pages 1-2 the return itself, page 3 the Standard
# Deduction Increase for Charitable Contributions worksheet (lines 1C-7C),
# page 4 Dependent and Other Exemption Information (Part 1 dependents 10f-10p,
# Part 2 qualifying parents 11d-11i, Part 3 Other Exemptions rows 1-10),
# page 5 Other Additions to Arizona Gross Income (rows A-T, feeds line 18),
# page 6 Other Subtractions from Arizona Gross Income (rows A-W, feeds line 36).
# Numbered return lines use the printed line number as the key ("12", "29a",
# "34c", "54a", "78"); the page-1 exemption COUNT boxes ("Enter the number
# claimed. Do not put a check mark.") keep their printed numbers "8", "9",
# "10a", "10b", "11a". Header, dependent/parent detail rows, worksheet rows,
# refund/account, signature and preparer widgets carry descriptive keys.
#
# Coverage. The blank PDF has 430 AcroForm widgets (406 distinct field names —
# 24 widgets are duplicate-named: the "Your Name"/"SSN" header pair "1b"/"1c"
# is repeated atop pages 2-6, and four detail cells ("10o First/Last/SSN/
# Relationship", "3_10 First/Last/SSN") appear twice on page 4). A text or
# money AcroForm field holds ONE value, so each duplicate-named text field is
# mapped exactly once (the filler writes that value to every widget sharing the
# name); the radio /Btn fields below are the only fields legitimately mapped to
# several lines. 429 widgets are covered. One widget is intentionally OMITTED:
#   * "cmdPrintForm" — a push-button (/Btn, Ff bit 17 Pushbutton; the "Print
#     Form" button at the bottom of page 2); its "/BBox" appearance-state is the
#     button's appearance-stream dict key, not a selectable value. A form
#     action, not a data field.
#
# Radio / mutually-exclusive questions that are ONE /Btn field with several
# options are each mapped as one checkbox line per option on the shared field,
# carrying the exact on_state read from the widget AP dictionaries:
#   * "Filing Status" — /Choice1..4 read top-to-bottom = line 4 Married filing
#     joint / line 5 Head of household / line 6 Married filing separate / line 7
#     Single (verified against the blank's widget rects, y 621>609>585>573).
#   * "Itemized/Standard" (line 43) — /Choice1 = ITEMIZED (left), /Choice2 =
#     STANDARD (right).
#   * "Political Party" (line 75) — /Choice1 Democratic, /Choice2 Libertarian,
#     /Choice3 Republican (verified by widget x: 284 < 353 < 421).
#   * "Refund" (line 79 direct-deposit) — /Checking Acct, /Savings Acct.
# Single yes/no checkboxes (82F extension, 4a injured spouse, 13S Form 140-SBI,
# 44C charitable, the 58 refundable-credit boxes 581/582/583, the 77 penalty-
# method boxes 771/772/773, 79A foreign account, the per-dependent age/educ
# boxes, per-parent age65/died boxes, the page-4 Other-Exemption age65/stillborn
# boxes, and the "more space, complete page 4" boxes) are one /Btn each.
#
# Money vs text. Every dollar box on the form prints a ".00" cents suffix, so
# all numbered amount lines (12-89, 29a/29b, 34a-c, 54a-c) and every lettered
# worksheet amount (page 3 1C-7C, page 5 A-T incl. F/G/H sub-rows, page 6 A-W)
# are typed `money`. The page-1 exemption tallies (8, 9, 10a, 10b, 11a) and the
# page-2 Other-Exemptions count box "40E" are integer counts, but the pack
# schema has no integer type, so they stay `text`. SSN/ITIN boxes (1c, 1f, every
# "* SSN") are text maxlen 11; bank routing (9) / account (17) carry their comb
# lengths. Every text field carries a `maxlen` equal to the widget's cell
# capacity (derived from its /Rect width at the form's fixed /Helv 10 Tf font),
# so values cannot visually clip (pitfall P-001). All other names, address,
# city/state/ZIP, fiscal-year, relationship, months-in-home, occupation and
# preparer fields stay text.
#
# Relations. Only unconditional equalities with every operand mapped as money
# are declared (14 = 12 - 13; 19 = 14..18; 34c = 34a + 34b; 48 = 46 + 47;
# 54c = 54a + 54b; 63 = 61 - 62; 78 = 64..74 + 76). Lines whose printed
# instruction is a rate multiplication (24 = .25 x line 23; 46 tax tables; 45 =
# .025 x line 44), a floored/capped subtraction or a refund/owe branch
# (35, 42, 52, 59, 60, 61, 79, 80) are OMITTED per the conservative house style.
#
# Cross_form. Line 12's printed label is "Federal adjusted gross income (from
# your federal return)", so the single cross_form equality 12 == f1040.11
# (Form 1040, 2023, line 11 = AGI) is declared.
