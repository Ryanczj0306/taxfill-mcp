# Form 1, 2023 — Wisconsin Income Tax (resident return).
#
# Authored via the taxfill pipeline: `taxfill introspect` (sentinel sweep —
# every AcroForm widget rendered with its own field name) -> vision-map
# workflow (all four pages, zoomed crops read to place each field on its
# printed line / column) -> this map.
#
# Layout. Flat AcroForm (acroform_root empty; field names are the raw sentinel
# ids the form ships with, e.g. "lname", "1" .. "45", "sch1-5", "ss3"). The
# multi-option button fields (status, district, allow) are single /Btn fields
# whose kid widgets each carry one appearance state; they are mapped as one
# checkbox line per state on the SHARED field, each carrying the exact on_state
# read from the blank. WI Form 1 is a four-page return:
#   page 1 — header (name/SSN, address, filing status, tax district, special
#            conditions), income lines 1-10c;
#   page 2 — header SSN repeat, lines 11-31 (tax, credits, donations, EIC,
#            farmland);
#   page 3 — header SSN repeat, lines 32-45 (homestead, refundable credits,
#            refund/owe), Third Party Designee block, Sign Here block;
#   page 4 — Schedule 1 (Itemized Deduction Credit) and Schedule 2 (Married
#            Couple Credit When Both Spouses Are Employed).
#
# Coverage. The blank PDF has 181 fillable AcroForm widget entries (the
# introspect skeleton). 177 are mapped here. FOUR are intentionally omitted:
#   - SaveAs, Print, Clear — JS PUSHBUTTONS (/Btn, Ff bit-17 = 65536, no real
#     export value; the skeleton's "/BBox" on_state is an appearance-dict key,
#     not a fillable state). The grey Save / Print / Clear buttons at the top
#     of the form; not data fields.
#   - Purpose — READONLY tooltip text field (/Tx, Ff = 4097, bit-1 readonly
#     set); the yellow "Purpose" banner, not a data field.
#
# Money vs text. Every numbered dollar line prints a ".00" cents suffix and is
# mapped `money`. Genuine text widgets stay text: names, address,
# city/state/ZIP, the SSN comb cells (ss3/ss2/ss4 = 3/2/4 digits, repeated per
# page), tax-district / county / school-district / special-condition / reason
# strings, signature dates, phone area+number cells, the PIN comb cells, and
# the line-19 state abbreviation. Boxes that hold a COUNT (not dollars) are
# also `text` (the schema has no int type): line 10a exemptions allowed, line
# 10b 65-or-older count, line 29 number of qualifying children. CRITICAL: line
# 29's "%" box (29percent) holds a PERCENTAGE and is `text`, never money (money
# would round the fraction).
# The two preprinted constant multipliers ".33" (line 24), ".05" (Schedule 1
# line 8), ".03" (Schedule 2 line 7) are NOT widgets and never appeared in the
# sweep — they are not fields.
#
# Worksheet sub-boxes. Several lines carry a worksheet input plus a looked-up
# result, each a distinct widget:
#   line 15a/b school property tax credit: 15a = rent (heat included), 15aa =
#     rent (heat NOT included), Line15aaa = the line-15a credit (table p.19);
#     15b = property taxes paid, 15bb = the line-15b credit (table p.20).
#   line 10: 10a = exemptions count, line10a = 10a x $700 result; 10b = 65+
#     count, line10b = 10b x $250 result; 10c = add 10a + 10b.
#   line 24: 24penalties = penalty base, 24 = base x .33 result.
#   line 29: 29a = federal EIC, 29percent = % , line29 = result.
#   line 43: 43code = underpayment-interest exception code, 43 = the interest.
#
# Relations. Only unconditional equalities with every operand mapped to a
# single line are declared. Lines whose printed instruction floors at zero
# ("If line X is larger than line Y, fill in 0": lines 9, 21, Sch1 line 7,
# Sch2 line 5) or branches on a comparison (lines 39, 42, 36's "Add lines 27
# through 35" where 27-35 span ambiguous sub-lines, 20's "Add lines 13 through
# 19" likewise) or apply a constant multiplier (14a = 14 x 50%, 24 = base x
# .33, Sch1 line 9, Sch2 line 8) are OMITTED per the conservative house style.
#
# Cross_form. Line 1's printed label is "Federal adjusted gross income from
# Form 1040, line 11", so the single cross_form equality 1 == f1040.11 (Form
# 1040, 2023, line 11 = AGI) is declared.
form: Form 1
