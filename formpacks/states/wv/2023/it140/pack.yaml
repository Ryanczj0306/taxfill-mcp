relations:
  # Core Form IT-140 on-face arithmetic (every operand mapped to a bare digit
  # line; unconditional single-box sums only).
  - "4 == 1 + 2 - 3"                       # 4 "line 1 plus line 2 minus line 3"
  - "13 == 10 + 11 + 12"                   # 13 "Add lines 10 through 12"
  - "21 == 14 + 15 + 16 + 17 + 18 + 19 + 20"  # 21 "add lines 14 through 20"
  - "24 == 24a + 24b + 24c"                # 24 "sum of columns 24A, 24B, and 24C"
  # NOTE: line 6 = box(e) count x $2,000, line 7 = line 4 - (5+6) floored at
  # zero, line 8 = tax table/rate-schedule lookup, and lines 22/23/26 branch on
  # a balance-due-vs-refund comparison; none are declared as unconditional
  # single-box arithmetic. Schedule totals (Schedule M 50/59, RECAP 27, UT 11,
  # HEPTC 9, FTC 8, E 10) are dotted namespaced ids the relations evaluator does
  # not accept, so their on-face sums live only as comments beside their fields.
cross_form:
  # Form IT-140 line 1 "Federal Adjusted Gross Income" == federal AGI (1040 l.11).
  - "1 == f1040.11"
identity_fields:
  - name.first
  - name.last
  - identifying_number
  - mailing_address.street
  - mailing_address.city
  - mailing_address.state
  - mailing_address.zip
signature: {page: 2}
mailing: null
