# Form IT-140, 2023 -- West Virginia Personal Income Tax Return (RESIDENT).
#
# Provenance / freshness. The blank is the 45-page "2023 Personal Income Tax
# Information and Instructions" PIT packet downloaded from the official
# source_url below. STEP 0 year gate: the sweep PNG of the IT-140 MAIN page
# (PDF page 1) was READ and prints the green banner "WEST VIRGINIA / PERSONAL
# INCOME TAX RETURN" with form id "IT-140 REV 06-22 F" and the year "2023" in
# the top-right corner -- printed_year_verified = 2023. Every mapped
# return/schedule page header prints "... 2023" (Schedule M, RECAP, HEPTC-1,
# FTC-1, E, F, UT, DP, Schedule H all print the 2023 revision year).
# pdf_sha256 pinned to the exact cached file (golden test verifies it); the
# real digest of the cached blank equals the value below.
#
# Layout / what is FILED vs SKIPPED. The packet is mostly an INSTRUCTION
# BOOKLET (tax tables, worksheets, where-to-file). Fillable AcroForm widgets
# cluster on PDF pages 1-5, 7-10, 12-14, 16-19; PDF pages 20-45 are
# instruction/tax-table pages whose only widget is the shared page-footer
# "Return to the first page" navigation button (plus a few JS calc-helper /
# worksheet fields). Same discipline as OK 511 / LA IT-540, which mapped only
# the filed return + attached schedules and SKIPPED the booklet. The IT-140
# packet numbers its physical PDF pages differently from the printed "-N-"
# footer; the map below is by 1-indexed PDF page (the introspect page index),
# with the printed footer noted in parentheses.
#
# MAPPED pages (1-indexed PDF page):
#   page 1  (printed -1-)  = Form IT-140 Page 1 -- header (2 SSNs + deceased
#            flags, names/suffix/MI, mailing address, phone, email, extended-
#            due-date), 4 top checkboxes (amended, nonresident special,
#            nonresident/part-year, WV-8379 injured spouse), Filing Status (ONE
#            /Btn radio, 5 on_states), Exemptions boxes (a)-(e), Dependents
#            table (4 rows) + surviving-spouse decedent SSN / year-died, lines
#            1-8 (line 8 has a ONE /Btn method radio: Tax Table / Rate Schedule
#            / Nonresident-PY).
#   page 2  (printed -2-)  = Form IT-140 Page 2 -- lines 9-26 (11 penalty-waiver
#            flag; 12 no-use-tax flag; 14 NRSR-withholding flag; 24 donations
#            24A/24B/24C + total), Direct Deposit (checking/savings radio +
#            routing/account), discuss-with-preparer Yes/No, preparer NOT-to-
#            efile flag, preparer EIN/signature/phone, signature block.
#   pages 3-4 (printed -3-,-4-) = Schedule M "Modifications to Adjusted Gross
#            Income" -- decreasing mods lines 27-49 (col A You / col B Spouse;
#            31/44 have (a)/(b) sub-boxes; 32 has (a)/(b)/(c) social-security
#            sub-boxes stored as M33*_*), line 47 age/disability grid, line 48
#            surviving-spouse deduction, line 50 TOTAL SUBTRACTIONS (-> IT-140
#            line 3), increasing mods lines 51-58, line 59 TOTAL ADDITIONS
#            (-> IT-140 line 2). Namespaced sch_m.*.
#   pages 5-6 (printed -5-,-6-) = Tax Credit RECAP Schedule -- credit lines
#            1-26 (line 1 has 5 "for what states?" combo boxes) + line 27 TOTAL
#            NON REFUNDABLE CREDITS (-> IT-140 line 9). Namespaced recap.*.
#   page 9  (printed -9-)  = Schedule HEPTC-1 "Homestead Excess Property Tax
#            Credit" -- Part I AMT flag + required-to-file Yes/No, Part II lines
#            1-9 (line 4 has a-e sub-lines; line 8 eligibility Yes/No radio);
#            line 9 -> IT-140 line 18. Namespaced heptc.*.
#   page 10 (printed -11-) = Schedule FTC-1 "Family Tax Credit" -- lines 1-8;
#            line 8 -> RECAP line 2. Namespaced ftc.*.
#   page 12 (printed -13-) = Schedule H "Certification for Permanent and Total
#            Disability" -- disabled-taxpayer name/SSN, physician name/FEIN/
#            address/date. Supports the Schedule M disability modification.
#            Namespaced sch_h.*.
#   page 13 (printed -14-) = Schedule E "Credit for Income Tax Paid to Another
#            State" -- residency-status radio (E_rg1), part-year sub-radio
#            (E_rg2), date-of-move, state-abbrev combo, lines 1-10; line 10 ->
#            RECAP line 1. Namespaced sch_e.*.
#   page 14 (printed -41-) = Schedule F "Statement of Claimant to Refund Due
#            Deceased Taxpayer" -- decedent/claimant identity, filing-as radio
#            (Group1: A/B/C), and box-C Yes/No question pairs (lines 1, 2a, 2b,
#            3). Namespaced sch_f.*.
#   page 16 (printed -44-) = Schedule UT "West Virginia Purchaser's Use Tax
#            Schedule" -- Part I state use tax (line 1 purchases, line 3 tax),
#            Part II municipal rows 4-7 (a City / b purchases / c rate /
#            d tax) + line 8 total, Part III lines 9-11; line 11 -> IT-140
#            line 12. Namespaced sch_ut.*.
#   page 18 (printed -47-) = Amended Return Information free-text box + written
#            request for waiver of estimated penalty free-text box. Namespaced
#            amended.* / penalty_waiver.*.
#   page 19 (printed -49-) = Schedule DP "Schedule of Additional Dependents" --
#            continuation rows for dependents 1-21 (first/last/SSN/DOB).
#            Namespaced sch_dp.*.
#
# SKIPPED pages and why:
#   pages 7-8 (Schedule A -- Nonresidents/Part-Year Residents Schedule of Income
#            + Part I/II nonresident tax calc + reciprocal-state block): this is
#            a RESIDENT return; Schedule A is filed ONLY by nonresidents/part-
#            year residents ("To Be Completed By Nonresidents and Part-Year
#            Residents Only"). Not part of a resident IT-140 -> SKIPPED.
#   page 17 (WV4868 -- Application for Extension of Time to File): a STANDALONE
#            form filed BEFORE the return's due date, with its own separate
#            where-to-file (PO Box 2585). Not part of the filed return -> SKIPPED
#            (its header widgets share the same /T as the IT-140 page-1 header,
#            so they are already covered by the page-1 identity fields).
#   page 11 (blank/instruction), page 15 (instruction), pages 20-45
#            (tax tables, rate schedules, low-income-exclusion worksheet on
#            page 34, senior-citizen worksheet on page 39, etc.): instruction /
#            worksheet / table pages, not filed forms -> SKIPPED. Their only
#            widgets are the shared "returnToFirstPage" nav button and internal
#            JS calc/worksheet helper fields.
#
# AcroForm. FLAT form: acroform_root = ''. Every widget's /T is the raw flat id
# the form ships with (descriptive names like "it140_1", "M50", "recap01",
# "homestead09", "E10", "SchF_DOD", "totaluse", "fname_1"). No /Parent chain.
# NAV / JS-helper widgets are NOT mapped: the per-page "returnToFirstPage"
# footer button (43 copies), the page-1 header nav buttons
# (headerNavigation*, calcOrderStartingPoint, "Test"), and every "*_button*" /
# "Clear" / "*validate*" / "YouDisvalid*" / "Choice1" widget (these carry only
# the bogus appearance-state list /BBox /Filter /FormType /Matrix /Resources
# /Subtype /Type -- i.e. an XObject dict's keys, not real /AP on-states -- and
# fire JavaScript rather than store a value).
#
# Shared /T across pages (map ONCE). The IT-140 page-1 header identity fields
# (last name, primary SSN, spouse SSN, names/suffix/MI, address lines, city,
# state combo, zip, phone, email, extended-due-date MM/DD/CCYY) are echoed as
# read-only header repeaters on PDF pages 2, 8, 17, 18 that SHARE the same /T;
# they are mapped ONCE here (on page 1 / page 2) and the duplicate header copies
# are intentionally NOT re-mapped. (The sweep introspect exposed only the leaf
# /T of each widget, so the page-4 Schedule-M line-47 age/disability boxes LOOK
# like one shared /T "yearOfBirthIf65OrOlder"/"yearOfDisability"; pypdf's
# fully-qualified names reveal they are FOUR distinct fields --
# scheduleM.comboBox.47.{you,spouse}.{yearOfBirthIf65OrOlder,yearOfDisability}
# -- so You and Spouse are mapped separately below.) On page 16, Schedule UT
# "total3" (line 3 = line
# 9) and "totalmuni" (line 8 = line 10) each appear twice sharing one /T (the
# subtotal is echoed in Part III); mapped ONCE.
#
# Money vs text. Every numbered dollar box prints a ".00" whole-dollar suffix
# and is `money`. SSNs are text with format ssn_digits_only. Exemption count
# boxes (ex1..ex6, maxlen 1/2), the RECAP "for what states?" combo boxes, the
# Schedule E state-abbrev combo, dates of death/birth/move, names, addresses,
# phones, email, EIN, and the two Amended/penalty free-text boxes stay `text`.
#
# Checkboxes / radio groups. Filing Status is ONE /Btn "it140_filingStatus_
# radioGroup" with five distinct on_states -> shared group filing_status.
# The line-8 tax-method selector is ONE /Btn "it140_8_radioGroup" with three
# on_states -> group tax_method. Direct-deposit checking/savings is ONE /Btn
# with two on_states -> group refund.account_type. Schedule H line-8 eligibility
# ("homestead08_checkbox") is ONE /Btn Yes/No -> group heptc.8. Schedule E
# residency ("E_rg1", 3 states) and part-year sub-status ("E_rg2", 3 states)
# are each ONE /Btn -> groups sch_e.residency / sch_e.part_year. Schedule F
# filing-as ("Group1", A/B/C) -> group sch_f.filing_as; its box-C Yes/No
# questions are DISTINCT single-state /Btn fields (Check BoxA..H) each mapped as
# its own line with a shared group per question. All other boxes are independent
# single-state /Yes flags (deceased primary/spouse on /Primary; amended;
# nonresident special; nonresident/PY; injured spouse; penalty-waiver-attached;
# no-use-tax; NRSR; discuss Yes and No are two separate fields; preparer-not-
# efile; HEPTC AMT flag on /FAMT; HEPTC required-to-file Yes and No are two
# separate fields each on /Yes).
#
# Relations. Only single-box on-face arithmetic where every operand is mapped to
# a bare digit line of THIS core return (IT-140 lines 1-26) is declared. The
# relations evaluator accepts bare digit+letter ids only, not the dotted
# namespaced schedule ids, so schedule internal sums (Schedule M line 50/59,
# RECAP line 27, UT line 11, etc.) live only as comments. Lines that floor at
# zero ("if less than zero enter zero": 7; "if line 9 > line 8 enter 0": 10) or
# branch on a comparison (22/23/26 refund-vs-owe) are NOT declared.
#
# Cross_form. Form IT-140 line 1 prints "Federal Adjusted Gross Income or income
# to claim senior citizen tax credit from Schedule SCTC-A" -- for a normal
# resident return this is federal AGI = f1040.11.
form: "IT-140"
jurisdiction: states/wv
tax_year: 2023
source_url: https://tax.wv.gov/Documents/PIT/2023/it140.2023.pdf
pdf_sha256: "3bdf69eefcdd542536dda99b790f47a63a2bc1d3641eac78d54ffecd3916aa1c"
acroform_root: ''
fields:
  # ============================================ page 1 -- Form IT-140 Page 1 header
  - line: identifying_number              # "SOCIAL SECURITY NUMBER" (primary)
    field: "primaryTaxpayerSSN"
    type: text
    maxlen: 11
    format: ssn_digits_only
  - line: deceased.taxpayer               # "Deceased / Date of Death*" primary flag
    field: "it140_checkbox_deceasedPrimary"
    type: checkbox
    on_state: /Primary
  - line: deceased.taxpayer.date_of_death # "Date of Death*" (primary)
    field: "DOD_1"
    type: text
  - line: spouse.identifying_number       # "**SPOUSE'S SOCIAL SECURITY NUMBER"
    field: "primaryTaxpayerSpouseSSN"
    type: text
    maxlen: 11
    format: ssn_digits_only
  - line: spouse.deceased                 # "Deceased" spouse flag
    field: "it140_checkbox_deceasedSpouse"
    type: checkbox
    on_state: /Primary
  - line: spouse.deceased.date_of_death   # "Date of Death*" (spouse)
    field: "DOD_2"
    type: text
  - line: name.last                       # "LAST NAME"
    field: "primaryTaxpayerLastName"
    type: text
  - line: name.suffix                     # "SUFFIX" (primary); narrow widget (~25pt) -> cap at 3
    field: "it140_suffixPrimaryTaxpayer"
    type: text
    maxlen: 3
  - line: name.first                      # "YOUR FIRST NAME"
    field: "it140_PrimaryTaxpayerFirstName"
    type: text
  - line: name.middle_initial             # "MI" (primary)
    field: "it140_middleInitialPrimaryTaxpayer"
    type: text
    maxlen: 1
  - line: spouse.name.last                # "SPOUSE'S LAST NAME"
    field: "it140_SpouseLastName"
    type: text
  - line: spouse.name.suffix              # "SUFFIX" (spouse)
    field: "it140_suffixSpouse"
    type: text
    maxlen: 3
  - line: spouse.name.first               # "SPOUSE'S FIRST NAME"
    field: "it140_SpouseFirstName"
    type: text
  - line: spouse.name.middle_initial      # "MI" (spouse)
    field: "it140_middleInitialSpouse"
    type: text
    maxlen: 1
  - line: mailing_address.street          # "FIRST LINE OF ADDRESS"
    field: "it140_PrimaryTaxPayerAddress1"
    type: text
  - line: mailing_address.street2         # "SECOND LINE OF ADDRESS"
    field: "it140_PrimaryTaxPayerAddress2"
    type: text
  - line: mailing_address.city            # "CITY"
    field: "it140_PrimaryTaxPayerCityOrPostOffice"
    type: text
  - line: mailing_address.state           # "STATE" (combo)
    field: "it140_combobox_taxpayerState"
    type: text
    maxlen: 2
  - line: mailing_address.zip             # "ZIP CODE"
    field: "it140_PrimaryTaxPayerZipCode"
    type: text
  - line: telephone_number                # "TELEPHONE NUMBER"
    field: "it140_PrimaryTaxpayerDaytimeTelephoneNumber"
    type: text
  - line: email                           # "EMAIL"
    field: "email3"
    type: text
    maxlen: 30
  - line: extended_due_date.month         # "EXTENDED DUE DATE MM/DD/YYYY" MM
    field: "it140_extendedDueDateMM"
    type: text
  - line: extended_due_date.day           # DD
    field: "it140_extendedDueDateDD"
    type: text
  - line: extended_due_date.year          # YYYY
    field: "it140_extendedDueDateCCYY"
    type: text

  # ---- top-row single checkboxes
  - line: amended_return.yes              # "AMENDED RETURN"
    field: "it140.isAmendedReturn.checkBox"
    type: checkbox
    on_state: /Yes
  - line: nonresident_special.yes         # "NONRESIDENT SPECIAL"
    field: "it140_checkbox_filingAsNonResidentSpecial"
    type: checkbox
    on_state: /Yes
  - line: nonresident_part_year.yes       # "NONRESIDENT/PART YEAR RESIDENT"
    field: "it140_checkbox_filingAsNonOrPartYearResident"
    type: checkbox
    on_state: /Yes
  - line: injured_spouse.yes              # "FORM WV-8379 FILED AS AN INJURED SPOUSE"
    field: "it140_isFormWV8379FiledAsAnInjuredSpouse"
    type: checkbox
    on_state: /Yes

  # ---- Filing Status (ONE /Btn radio, group filing_status)
  - line: filing_status.single            # "1 SINGLE"
    field: "it140_filingStatus_radioGroup"
    type: checkbox
    on_state: /Single
    group: filing_status
  - line: filing_status.head_of_household # "2 HEAD OF HOUSEHOLD"
    field: "it140_filingStatus_radioGroup"
    type: checkbox
    on_state: /Head of Household
    group: filing_status
  - line: filing_status.married_filing_joint  # "3 MARRIED, FILING JOINT"
    field: "it140_filingStatus_radioGroup"
    type: checkbox
    on_state: /Married Filing Joint
    group: filing_status
  - line: filing_status.married_filing_separate  # "4 MARRIED, FILING SEPARATE"
    field: "it140_filingStatus_radioGroup"
    type: checkbox
    on_state: /Married filing Separate
    group: filing_status
  - line: filing_status.widow             # "5 WIDOW(ER) WITH DEPENDENT CHILD"
    field: "it140_filingStatus_radioGroup"
    type: checkbox
    on_state: /Widower with Dependent child
    group: filing_status

  # ---- Exemptions boxes (a) Yourself, (b) Spouse, (c) Dependents, (d) surviving spouse, (e) Total
  - line: exemptions.a                    # "(a) YOURSELF" (enter 1)
    field: "it140_ex1"
    type: text
    maxlen: 1
  - line: exemptions.b                    # "(b) SPOUSE" (enter 1)
    field: "it140_ex2"
    type: text
    maxlen: 1
  - line: exemptions.c                    # "(c) DEPENDENTS -- total number of dependents"
    field: "it140_ex3"
    type: text
    maxlen: 2
  - line: exemptions.d                    # "(d) SURVIVING SPOUSE" box
    field: "it140_ex4"
    type: text
    maxlen: 1
  - line: exemptions.e                    # "(e) Total Exemptions (add boxes a,b,c,d)"
    field: "it140_totex5"
    type: text
  - line: exemptions.d.decedent_ssn       # "(d) (See page 21) Decedents SSN"
    field: "it140_exemptionsDecedentSSN"
    type: text
  - line: exemptions.d.year_spouse_died   # "(d) Year Spouse Died"
    field: "it140_exemptions_yearSpouseDied"
    type: text

  # ---- Dependents table (4 rows on page 1; more on Schedule DP page 19)
  - line: dependent_1.name.first
    field: "firstname_1"
    type: text
  - line: dependent_1.name.last
    field: "lastname_1"
    type: text
  - line: dependent_1.ssn
    field: "ssnum_1"
    type: text
  - line: dependent_1.date_of_birth
    field: "DOB_1"
    type: text
  - line: dependent_2.name.first
    field: "firstname_2"
    type: text
  - line: dependent_2.name.last
    field: "lastname_2"
    type: text
  - line: dependent_2.ssn
    field: "ssnum_2"
    type: text
  - line: dependent_2.date_of_birth
    field: "DOB_2"
    type: text
  - line: dependent_3.name.first
    field: "firstname_3"
    type: text
  - line: dependent_3.name.last
    field: "lastname_3"
    type: text
  - line: dependent_3.ssn
    field: "ssnum_3"
    type: text
  - line: dependent_3.date_of_birth
    field: "DOB_3"
    type: text
  - line: dependent_4.name.first
    field: "firstname_4"
    type: text
  - line: dependent_4.name.last
    field: "lastname_4"
    type: text
  - line: dependent_4.ssn
    field: "ssnum_4"
    type: text
  - line: dependent_4.date_of_birth
    field: "DOB_4"
    type: text

  # ---- Lines 1-8 (Part: WV AGI & tax)
  - line: "1"                             # 1 Federal Adjusted Gross Income (or SCTC-A income)
    field: "it140_1"
    type: money
  - line: "2"                             # 2 Additions to income (line 59 of Schedule M)
    field: "it140_2"
    type: money
  - line: "3"                             # 3 Subtractions from income (line 50 of Schedule M)
    field: "it140_3"
    type: money
  - line: "4"                             # 4 WV Adjusted Gross Income (line 1 plus line 2 minus line 3)
    field: "it140_4"
    type: money
  - line: "5"                             # 5 Low-Income Earned Income Exclusion
    field: "it140_5"
    type: money
  - line: 6.count                         # 6 "Total Exemptions as shown above on Exemption Box (e)" count
    field: "it140_ex6"
    type: text
    maxlen: 2
  - line: "6"                             # 6 Total Exemptions x $2,000 (amount)
    field: "it140_6"
    type: money
  - line: "7"                             # 7 WV Taxable Income (line 4 minus lines 5 & 6; if < 0 enter 0)
    field: "it140_7"
    type: money
  - line: "8"                             # 8 Income Tax Due (Check One)
    field: "it140_8"
    type: money
  # line 8 method selector (ONE /Btn radio, group tax_method)
  - line: 8.method.tax_table              # 8 "Tax Table"
    field: "it140_8_radioGroup"
    type: checkbox
    on_state: /Tax Table
    group: tax_method
  - line: 8.method.rate_schedule          # 8 "Rate Schedule"
    field: "it140_8_radioGroup"
    type: checkbox
    on_state: /Rate Schedule
    group: tax_method
  - line: 8.method.nonresident_part_year  # 8 "Nonresident/Part-Year Resident Calculation Schedule"
    field: "it140_8_radioGroup"
    type: checkbox
    on_state: /Nonresident/Part Year Resident
    group: tax_method

  # ============================================ page 2 -- Form IT-140 Page 2
  - line: "9"                             # 9 Credits from Tax Credit Recap Schedule
    field: "it140_9"
    type: money
  - line: "10"                            # 10 Total Income Tax Due (line 8 minus 9; if 9>8 enter 0)
    field: "it140_10"
    type: money
  - line: "11"                            # 11 Overpayment previously refunded or credited (amended only)
    field: "it140_11"
    type: money
  - line: 11.penalty_waiver_requested     # "Penalty Due -- CHECK IF REQUESTING WAIVER/ANNUALIZED"
    field: "it140_RequestingWaiverOrAnnualizedWorksheetAttached"
    type: checkbox
    on_state: /Yes
  - line: "12"                            # 12 West Virginia Use Tax Due on out-of-state purchases
    field: "it140_12"
    type: money
  - line: 12.no_use_tax                   # 12 "CHECK IF NO USE TAX DUE"
    field: "it140_NoTaxDue"
    type: checkbox
    on_state: /Yes
  - line: "13"                            # 13 Add lines 10 through 12. Total amount due.
    field: "it140_13"
    type: money
  - line: "14"                            # 14 West Virginia Income Tax Withheld
    field: "it140_14"
    type: money
  - line: 14.nrsr_withholding             # 14 "Check if withholding from NRSR (Nonresident Sale of Real Estate)"
    field: "it140_NRSR"
    type: checkbox
    on_state: /Yes
  - line: "15"                            # 15 Estimated Tax Payments and Payments with Schedule 4868
    field: "it140_15"
    type: money
  - line: "16"                            # 16 Non-Family Adoption Tax Credit
    field: "it140_16"
    type: money
  - line: "17"                            # 17 Senior Citizen Tax Credit (Schedule SCTC-A)
    field: "it140_17"
    type: money
  - line: "18"                            # 18 Homestead Excess Property Tax Credit (Schedule HEPTC-1)
    field: "it140_18"
    type: money
  - line: "19"                            # 19 Build WV Property Value Adjustment Refundable Tax Credit
    field: "it140_19"
    type: money
  - line: "20"                            # 20 Amount paid with original return (amended only)
    field: "it140_20"
    type: money
  - line: "21"                            # 21 Payments and Refundable Credits (add lines 14 through 20)
    field: "it140_21"
    type: money
  - line: "22"                            # 22 Balance Due (line 13 minus line 21)
    field: "it140_22"
    type: money
  - line: "23"                            # 23 Line 21 minus line 13. Overpayment.
    field: "it140_23"
    type: money
  - line: 24a                             # 24A Children's Trust Fund
    field: "it140_24A"
    type: money
  - line: 24b                             # 24B WV Dept. of Veterans Assistance
    field: "it140_24B"
    type: money
  - line: 24c                             # 24C State Veterans Cemetery
    field: "it140_24C"
    type: money
  - line: "24"                            # 24 Donations (sum of 24A, 24B, 24C)
    field: "it140_24"
    type: money
  - line: "25"                            # 25 Overpayment credited to 2024 estimated tax
    field: "it140_25"
    type: money
  - line: "26"                            # 26 Refund due to you (line 23 minus line 24 and line 25)
    field: "it140_26"
    type: money

  # ---- Direct Deposit of Refund
  - line: refund.account_type.checking    # "Direct Deposit of Refund: CHECKING"
    field: "it140_DirectDepositOfRefund_RadioGroup"
    type: checkbox
    on_state: /Checking
    group: refund.account_type
  - line: refund.account_type.savings     # "... SAVINGS"
    field: "it140_DirectDepositOfRefund_RadioGroup"
    type: checkbox
    on_state: /Savings
    group: refund.account_type
  - line: refund.routing_number           # "ROUTING NUMBER"
    field: "it140_DirectDepositOfRefund_RoutingNumber"
    type: text
    maxlen: 10
  - line: refund.account_number           # "ACCOUNT NUMBER"
    field: "it140_DirectDepositOfRefundAccountNumber"
    type: text
    maxlen: 30

  # ---- Signature block
  - line: signature.discuss_with_preparer.yes  # "authorize the Tax Division to discuss ... YES"
    field: "Check Box1"
    type: checkbox
    on_state: /Yes
    group: signature.discuss_with_preparer
  - line: signature.discuss_with_preparer.no   # "... NO"
    field: "Check Box2"
    type: checkbox
    on_state: /No
    group: signature.discuss_with_preparer
  - line: preparer.not_efile               # "Preparer: Check HERE if client is requesting NOT to efile"
    field: "Check Box3"
    type: checkbox
    on_state: /Yes
