# Form NJ-1040, 2023 - New Jersey Resident Income Tax Return.
#
# Authored via the taxfill pipeline: `taxfill introspect` (sentinel sweep -
# every widget rendered with its own field name) -> vision-map workflow (all
# four pages rendered from the official blank, with per-widget rect overlays
# read against the printed line labels to place every cell) -> this map.
#
# Layout. Flat AcroForm (acroform_root empty). The shipped field names are the
# raw, often-scrambled sentinel ids the form ships with (e.g. "undefined_42",
# "Text146", "Group168", "x  1000") - they do NOT track the printed line
# numbers, so every line key below was assigned from the widget's PAGE +
# POSITION, not from its field name. The blank's get_fields order is identical
# to the page/widget order, which is how each raw field path was tied to its
# spot on the form.
#
# NJ-1040 prints nearly every dollar amount as a row of single-character COMB
# cells (one digit per box, with pre-printed comma/decimal separators that are
# NOT widgets). Each money line is therefore a run of one-character `text`
# widgets (maxlen 1), keyed "<line>_dNN" left-to-right (d01 = leftmost /
# highest-order digit). They are kept as `text` (matching the skeleton) rather
# than `money` because no single widget holds a whole dollar value - the engine
# fills each cell with one character. SSNs, the county/municipality code,
# part-year-resident dates, birth years, the driver's-license number, and the
# preparer / firm federal-id numbers are comb runs too and use the same
# "<name>_dNN" scheme. Genuine single-value text widgets (name, address,
# city, state, ZIP, firm name) keep descriptive keys.
#
# Sections. Page 1: header (taxpayer/spouse SSN, name, address, county code,
# the three header checkboxes), part-year-resident & fiscal-year date combs,
# Filing Status (Group1, one radio /Choice1..5), the MFS spouse-SSN comb, the
# qualifying-widow year-of-death radio, Exemptions 6-13 (each: self/spouse
# oval(s) + a count box + the "x $N,NNN =" result amount), and the four
# Dependent rows (name + SSN comb + birth-year comb + "no health insurance"
# box). Pages 2-4: the numbered income / tax / credit / payment / contribution
# lines, each a comb amount, plus line-level checkboxes (NJ-2210 enclosed,
# health-coverage 53a/53b, the REQUIRED NJ-HCC box, the EIC and Child-and-
# Dependent-Care CU-couple boxes, line-79 e-check), the line-40b residency
# radio (Homeowner/Tenant/Both), the line-70..77 designated-contribution
# radios ($10 / $20 / Other), the Gubernatorial Elections Fund Yes/No radios,
# the signature dates, and the paid-preparer block.
#
# Checkboxes / radios. on_state strings are copied verbatim from the skeleton
# (the widget AP /N keys), preserving the odd values the form uses: filing
# status & several contributions use "/Choice1".."/Choice5"; the contribution
# radios on lines 70/71 and 75-77 use "/0" "/1" "/2"; single yes/no boxes use
# "/Yes"; the line-79 e-check box uses "/On". Radio questions that are ONE
# AcroForm field with several mutually exclusive options share that field and
# carry one line per option (e.g. "filing_status::single", "::mfj", ...).
#
# Relations / cross_form. OMITTED. Every NJ-1040 total (e.g. 27, 38, 54, 66) is
# split across many single-character comb cells; no line key holds a whole
# numeric value, so no intra-form equality can be expressed over mapped money
# fields, and the conservative house style declares none. No printed label
# names a federal source line directly (NJ gross income is built on Schedule
# NJ-BUS / NJ-COJ etc., not a federal 1040 line), so cross_form is empty too.
#
# Coverage. The blank has 840 AcroForm widgets; 838 lines are mapped here. The
# two widgets NOT given their own line are mirror twins: the NJ-1040 reuses the
# AcroForm field name "undefined_118" for two adjacent line-41 comb cells, and
# "undefined_114" for one line-42 cell AND one line-55 cell. Widgets that share
# a field name always display the same value, and the engine writes a field
# once, so each duplicated name is mapped a single time (the twin still renders
# the value) - flagged inline at the kept line. There are no JS pushbuttons or
# readonly tooltips to omit. The pre-printed comma/period separators, the greyed
# ".00" cents, and the "Division use" boxes are static artwork, not widgets.

