relations:
  - "3 == 1 + 2"                         # "Modified Federal AGI. Combine lines 1 and 2"
  - "9d == 9a + 9b + 9c"                 # "Total RI credits. Add lines 9a, 9b and 9c"
  - "13a == 10a + 10b + 11 + 12a + 12b"  # "TOTAL RI TAX ... Add lines 10a, 10b, 11, 12a and 12b"
  - "14g == 14a + 14b + 14c + 14d + 14e + 14f"  # "TOTAL PAYMENTS AND CREDITS. Add ..."
  - "14i == 14g - 14h"                   # "NET PAYMENTS. Subtract line 14h from line 14g"
  - "15c == 15a + 15b"                   # "TOTAL AMOUNT DUE. Add lines 15a and 15b"
  - "22 == min(19, 21)"                  # "MAXIMUM CREDIT. Line 19 or 21, whichever is SMALLER"
  - "37 == 30 + 31 + 32 + 33 + 34 + 35 + 36"  # "TOTAL CONTRIBUTIONS. Add lines 30 through 36"
cross_form:
  # Page 1 line 1 "Federal AGI from Federal Form 1040 or 1040-SR, line 11".
  - "1 == f1040.11"
