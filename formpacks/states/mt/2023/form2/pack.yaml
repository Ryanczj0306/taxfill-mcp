# Montana Form 2, tax year 2023 -- Montana Individual Income Tax Return (the
# single Form 2 serves resident full-year / nonresident full-year / part-year
# via a RESIDENCY STATUS radio on page 1). This pack maps the RESIDENT full-year
# return (residency.resident_full_year). LARGE integrated return: 11 filed PDF
# pages, 791 widgets / 755 unique AcroForm fields.
#
# Provenance / freshness. Blank downloaded from source_url below.
# STEP 0 YEAR GATE: the page-1 sweep PNG was READ and prints the large title
# "2023 Montana Individual Income Tax Return", "Form 2", "For the year Jan 1 -
# Dec 31, 2023", scan barcode "*23CE0101*", footer "2023v3 / 11/2023". Every
# subsequent page header prints "Form 2-Page N-2023" with barcodes *23CE0N01*.
# printed_year_verified = 2023. pdf_sha256 pinned to the exact cached file
# (golden verifies it): 13f2a0e0...421d06da.
#
# Pages mapped: ALL 11 pages are the FILED return -- Form 2 integrates its
# schedules and worksheets into the single filed document (Montana files the
# whole booklet). No page is a detachable instruction/tax-table page, so none
# are excluded. Page contents:
#   p1  Form 2 main body: identity header, filing status (radio /1 Single,
#       /3 HoH, /4 MFJ, /2a-/2c MFS variants), residency status (radio /1 res
#       full-year, /2 nonres full-year, /3 res part-year) + separate ND-recip /
#       Military-Spouse boxes, up to 3 dependents, exemptions rows a/b (65+/blind
#       flags, on_state /Spouse) and exemption-count boxes 16a-16d, income & tax
#       lines 1-27. Lines carry TWO money columns: Column A (you / joint) and
#       Column B (spouse, only when filing status 2a). Mapped <line>.a / <line>.b.
#       Line 23a (federal EITC) is a single Column-A-only box -> line "23a".
#   p2  Filing Status 2a Payment Schedule (status2a), Refund Schedule (refund),
#       Direct Deposit (dd.*, incl. 529/529A dd529.2/dd529.3), signature block,
#       paid preparer, third-party designee, farming NOL carryback waiver,
#       Amended Return information table.
#   p3  Schedule 1 (federal add'l income & adjustments, sch1 lines 1-25) +
#       Montana Medical Savings Account schedule (msa). NOTE: the MSA /T names
#       run "MSA ... Line 1..11": lines 1-5 = the Subtraction sub-part (printed
#       1-5), lines 6-11 = the Nonqualified Withdrawal & Penalty sub-part
#       (printed 1-6). Kept as msa.1..msa.11 to preserve unique field identity.
#   p4  Montana Additions schedule (add 1-18) + Recovery of amounts deducted in
#       earlier years (recovery 1-16).
#   p5  Montana Subtractions schedule (sub 1-38).
#   p6  Partial Pension/Annuity income exemption worksheet (pension) + Taxable
#       Social Security / Tier-1 benefits worksheet (benefits).
#   p7  Standard Deduction worksheet (stdded 1-6) + Montana Itemized Deductions
#       schedule (itemized 1-19).
#   p8  Part-Year/Nonresident Ratio schedule (ratio, incl. line-18 whole/decimal
#       split .18/.18.decimal) + Tax Liability schedule (liability).
#   p9  Nonrefundable Credits schedule (nrcredits) + Credit for tax paid to
#       another state/country (othertax; line 6/8 whole+decimal ratio splits).
#   p10 Elderly Homeowner/Renter Credit worksheet (ehrc, single Column-A layout;
#       lines 13/21 whole+decimal splits) + Long-Term Care rent worksheet (ltc).
#   p11 Other Payments & Refundable Credits (payments 1-11), Voluntary
#       Contributions (volcontrib; per line a-d a $5/$10/$20 radio + Other text
#       box, Column A & B) , Contributions/Penalties/Interest (cpi) + its farming
#       & annualization flags, Underpayment Interest schedule (upint 1-13).
#
# AcroForm. FLAT form: acroform_root = ''. Field /T names are descriptive and
# unique (755 distinct top-level fields); the "Col A/B Line N" and
# "<Section> Col A/B Line N" naming encodes section+column+printed line, which
# was mapped to <namespace>.<line>.a/.b. Verified against physical render
# position, not the /T name alone, for radios and the misaligned Amended rows.
#
# SHARED fields mapped ONCE (one /T, many widgets):
#   * "Primary Taxpayer's SSN" -> identifying_number: ONE comb field whose kid
#     widget echoes on every page header; mapped a single time.
#   * Radios (one /Btn, distinct on_state per option, one shared group):
#     "Filing Status" (6 options), "Residency Status" (3), "Bank Account Type"
#     (Checking/Savings), "Line 2/3 - 529 or 529A" (529/529A), and the eight
#     "Vol Contribution Col A/B Line a-d" ($5/$10/$20) radios.
#
# NOTABLE on_state oddities (dumped from the blank, never guessed):
#   * exemptions 65+/blind and Spouse boxes all use on_state "/Spouse".
#   * "Foreign bank account" (refund to account outside US) uses on_state
#     "/Savings".
#   * Amended Return reason rows are independent single checkboxes whose /T
#     labels are offset from their appearance states: row c field on_state /d,
#     row d field on_state /c. Each mapped to its PHYSICAL row with its own real
#     on_state -- one field per row, no field+state collision.
#
# comb / format. Fields with the PDF comb flag set AND a MaxLen are mapped
# type: text, comb: true, maxlen: <cells>; SSN combs additionally carry
# format: ssn_digits_only. All numbered dollar boxes are type: money. Decimal
# sub-boxes for ratio/percentage lines (ratio.18.decimal, othertax.6/8.decimal,
# ehrc.13/21.decimal) are text with their MaxLen.
#
# relations: []  -- all arithmetic on this form is per-COLUMN and every money
# line is a column-split dotted id (e.g. 9.a / 9.b); the relation grammar's LINE
# token is [0-9]+[a-z]? and cannot reference dotted ids, so no on-face relation
# can be expressed cleanly. Left empty rather than approximated.
# cross_form: []  -- Federal AGI is page-1 line 11, but it is column-split
# (11.a / 11.b); cross_form refs must be undotted local lines, so no clean
# federal-AGI reference is expressible.
