# Form MO-1040, 2023 - Missouri Individual Income Tax Return (Long Form),
# together with every schedule and worksheet bundled in the official
# "MO-1040 Fillable Calculating" PDF: the 5-page MO-1040 return; the Tax
# Chart / Tax Calculation Worksheet; Form MO-A (Individual Income Tax
# Adjustments, Parts 1-5 + the Itemized-Deductions, Long-Term-Care and
# Qualified-Health-Insurance worksheets); Form MO-CR (resident credit for
# tax paid to other states - two copies + MO-CR Schedule 1); Form MO-NRI
# (Missouri Income Percentage); Form MO-TC (Miscellaneous Income Tax
# Credits); Form MO-PTS (Property Tax Credit Schedule); Form MO-CRP
# (Certification of Rent Paid - five copies); Form 5632 (529 Direct
# Deposit); and Form 5766 (First-Time Home Buyers Bank Worksheet).
#
# Authored via the taxfill pipeline: `taxfill introspect` produced the
# sentinel sweep (every AcroForm widget rendered with its own field name at
# its position, 32 pages) and the skeleton pack; each printed line label was
# then read off the sweep PNGs (zoomed per section) to type and key every
# widget.
#
# Layout. Hierarchical AcroForm (acroform_root empty; field paths are the
# fully-qualified names the PDF ships with - e.g. flat ids like "line1-Y",
# dotted parent/child ids like "c.single" or "nri_3Ya", and the column-split
# "<line>-Y" / "<line>-S" pairs that the form uses wherever a married couple
# files a combined return with a Yourself and a Spouse column). field: paths
# are copied verbatim from the skeleton.
#
# Coverage. The blank PDF has 878 distinct fillable AcroForm field objects
# (1,017 terminal /Tx and /Btn fields; 1,172 sentinel widgets counting every
# repeated occurrence). 879 pack lines map every fillable widget - all 878
# distinct fields, plus the single shared CalcOption radio mapped once per
# option (/X "DO Automatic Calculations" and /N "DON'T DO Automatic
# Calculations"). A field that prints on several pages (e.g. SSN-1, firstname-1,
# address, nri_city, mocr_name-1, printlid.12) is ONE AcroForm object and is
# mapped on ONE line - the duplicate sentinel occurrences (SSN-1#2, #3, ...)
# are the same field and are not re-mapped (a field holds one value).
#
# Intentionally OMITTED - 140 distinct widgets, none accept taxpayer data,
# every one a JavaScript pushbutton (/Btn with Ff bit-17 Pushbutton set;
# their sole appearance state is the stream-dict key /BBox, not a selectable
# value):
#   * Per-line "calculate" buttons the calculating PDF places beside computed
#     cells: "Line 1".."Line 56", "MO-A Line 1".."MO-A Part 5 Line 5",
#     "MO-CR Line 1".."MO-CR Line 11", "MO-NRI Line 1".."Line 3",
#     "MO-PTS Line 2".."Line 14", "MO-CRP Lines 1-5"/"Line 6".."Line 9",
#     "CRP2023", and "UF_L1".."UF_L10".
#   * Navigation / action buttons: every "btnGoto*" (Back to 1040, go to a
#     schedule), btnP1, btnCalculate, btnPrint, btnreset, btnRstWSNRI,
#     RstWorksheetMOA, finish, and the image buttons "Instructions_af_image",
#     "do calculations_af_image", "don't do calculations_af_image".
#   * "Privacy Notice" (the "CLICK HERE" link button repeated on every page).
# Each was confirmed a pushbutton by reading the blank PDF's field flags
# (Ff & 0x10000) - none are data inputs, exactly like IL-1040's "Reset"/"Print".
#
# Money vs text. Dollar boxes (every numbered income/tax/credit line and
# computed total, the MO-A/MO-CR/MO-PTS/MO-CRP/MO-TC amount columns, the
# 529/FTHB amounts, and the percentage cells the form computes) are `money`.
# Genuine text widgets stay text: names / initials / suffixes, SSN boxes
# (maxlen carried from the skeleton: 11 for the comb SSN_1/SSN_2, 9 for the
# schedule SSN-1/SSN-2), addresses / city / state / ZIP / county, the 2- and
# 4-digit fiscal-year and birth-date comb cells, bank routing (9) / account
# (17), preparer ids, the "Other (description)" and explanation text boxes,
# the 2-digit trust-fund codes (line51m_tfcd / line51n_tfcd), and the
# auto-populated helper / label strings (Texto7-9, Text1, txt01/02,
# 1040_30Text, 1040_32Text2/3, lblNRI, MOAText, amendedTXT, vendorid,
# printlid.*, fdata, ProtectBarcode).
#
# Checkboxes. Every real checkbox is its own /Btn with export state /X
# (verified against the blank). The one multi-option /Btn is CalcOption (a
# radio with /X and /N appearance states), mapped as two lines on the shared
# field carrying each on_state. on_state values are copied verbatim from the
# skeleton.
#
# Relations / cross_form. OMITTED. MO-1040 splits nearly every income/tax
# line into Yourself ("<n>-Y") and Spouse ("<n>-S") columns whose keys carry
# a hyphen; the verifier's relation grammar tokenizes operands as digits +
# optional single letter or [A-Za-z_][A-Za-z0-9_]* names only (no hyphen, dot
# or space), so these column lines cannot be referenced as relation operands.
# Per the conservative house style every relation/cross_form rule is omitted
# rather than risk an unparseable or partial equality.
