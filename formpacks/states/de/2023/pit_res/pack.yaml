relations:
  # Column-split lines use a single-letter suffix (Column A = <line>a, Column B =
  # <line>b) so they parse as digit+letter line ids. Relations declared for
  # Column B (used by every filing status). Line 9 ("Add Lines 5 through 8b") is
  # OMITTED: two of its operands are printed lines 8a/8b whose column widgets are
  # ids "8a.b"/"8b.b" (dotted, since the printed label already carries a letter)
  # and the relation grammar accepts only undotted digit+letter ids.
  - "4b == 1b + 2b + 3b"                 # 4 "TOTAL - Add Lines 1 through 3"
  - "16b == 13b + 14b + 15b"             # 16 "SUBTOTAL - Add Line 13 through Line 15"
  - "21b == 19b + 20b"                   # 21 "TOTAL DEDUCTIONS - Add Line 19 and Line 20"
  - "25b == 23b + 24b"                   # 25 "TOTAL TAX - Add Line 23 and Line 24"
cross_form:
  # SECTION A line 1 "FEDERAL AGI AMOUNT FROM FEDERAL FORM 1040" == federal AGI 1040 line 11.
  - "1b == f1040.11"
identity_fields:
  - name.first
  - name.last
  - identifying_number
  - mailing_address.street
  - mailing_address.city
  - mailing_address.state
  - mailing_address.zip
signature: {page: 2}
mailing: null
