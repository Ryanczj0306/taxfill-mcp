# Form PIT-RES, 2023 -- Delaware Individual RESIDENT Income Tax Return
# (formerly Form 200-01). Resident return.
#
# Provenance / freshness. Blank downloaded from the official source_url below.
# STEP 0 year gate: the MAIN-page sweep PNG (PDF page 1) was READ and prints the
# big "2023" upper-right beside "DELAWARE / DIVISION OF REVENUE / FORM PIT-RES",
# title "DELAWARE INDIVIDUAL RESIDENT INCOME TAX RETURN"; the footer prints
# "DFPITRES2023019999V1 / Revision 20231113 / Page 1". Pages 2 and 3 footers
# print "DFPITRES2023029999V1 ... Page 2" / "DFPITRES2023039999V1 ... Page 3".
# printed_year_verified = 2023. pdf_sha256 pinned to the exact cached file
# (golden test verifies it).
#
# Layout / what is FILED. Single 3-page PDF; ALL THREE PAGES ARE THE FILED RETURN
# (no instruction/worksheet pages in this file). Every dollar line has TWO printed
# columns: COLUMN A (spouse, Filing Status 4 -- Married & Filing Combined Separate
# -- only) and COLUMN B (all other filing statuses). Each split dollar line is
# mapped with a single-letter column suffix: <line>a (Column A) and <line>b
# (Column B), so the ids stay digit+letter (referenceable in relations). The two
# printed lines that ALREADY carry a letter (8a, 8b) take their columns as the
# dotted ids 8a.a/8a.b and 8b.a/8b.b.
#   page 1 -- header (two 9-box comb Taxpayer IDs you/spouse; first/MI/last/suffix
#             for you + spouse; home address + apartment merged into one street
#             box; city/state/zip; fiscal-year begin/end; Amended flag; Form
#             PIT-UND attached flag; Claimed-as-dependent flag; part-year residency
#             start/end dates), FILING STATUS lines 1-5 (ONE /Btn radio
#             "filingStatusRadio", 5 distinct on_states), SECTION A additions
#             lines 1-4, SECTION B subtractions 5-12 (line 6 military-pension
#             spouse/self flags; line 8b 529/ABLE spouse/self flags), SECTION C
#             deductions 13-21 (line 19 standard/itemized election ONE /Btn
#             "ln19DeductionType"; line 20 age65/blind flags spouse/self), SECTION
#             D calculations 22-24.
#   page 2 -- SECTION D continued lines 25-46 (26a exemption count + per-column
#             counts; 26b 60-or-over flags spouse/self + boxes-checked count; 28
#             volunteer-firefighter company # spouse/self; line 33 EITC refundable
#             /non-refundable ONE /Btn "eitcRefundable"). Lines 42-46 and 43 are
#             COLUMN B only (no Column A widget). SECTION E direct deposit (account
#             type checking/savings ONE /Btn; routing; account; outside-US Yes/No
#             ONE /Btn "foreignAccount"); DMV State ID; signature block (you/spouse
#             sign dates, home/business phone, email); Paid Preparer block.
#   page 3 -- FOR AMENDED RETURNS ONLY: lines 47-58 (47-54 have Column A + B; 55-58
#             Column B only); line 59 amended-federal Yes/No + detail; line 60
#             audit-advised Yes/No; line 61 protective-claim Yes/No + detail.
#
# AcroForm. FLAT form: acroform_root = '' . Every widget /T is the raw flat id the
# form ships with (descriptive: fiscalStart, ln01ColA, filingStatusRadio, ...). No
# /Parent chain. 190 widget entries reported. EXCLUDED: 'resetForm' + 'printForm'
# (JavaScript RESET/PRINT pushbuttons, page 1, their "on_states" are just XObject
# dict keys /BBox /Filter /Matrix /Resources /Subtype, not real states) and
# 'machPrintID' (a 7pt machine-print scan id in the page-1 margin, not a fillable
# taxpayer field). All other widgets are mapped.
#
# Shared /Btn radios (ONE AcroForm field, many physical kid widgets; mapped once
# per physical box with distinct on_state, sharing one group per CONVENTIONS):
#   * "filingStatusRadio" -- FILING STATUS lines 1-5, mapped by PHYSICAL position
#     verified against the render: 1 Single/Divorced/Widow(er) (/SINGLE), 2 Joint
#     (/JOINT), 3 Married & Filing Separate Forms (/MFS), 4 Married & Filing
#     Combined Separate on this form (/MFC), 5 Head of Household (/HOH).
#   * "ln19DeductionType" -- line 19 election: 19a Standard (/STANDARD) / 19b
#     Itemized (/ITEMIZED). (Two widget copies share this one field.)
#   * "eitcRefundable" -- line 33 EITC: Refundable (/REFUNDABLE) / Non-refundable
#     (/NONREFUNDABLE).
#   * "directDepositType" -- Section E account type: Checking (/CHECKING) /
#     Savings (/SAVINGS).
#   * "foreignAccount" -- Section E "account located outside the US?" Yes (/YES) /
#     No (/NO).
#   * "amendedFederal" (line 59) / "auditAdvised" (line 60) / "protectiveClaim"
#     (line 61) -- each ONE /Btn with Yes (/YES) / No (/NO).
# Every OTHER checkbox is its own independent single-state /Btn: Amended flag
# (/Yes), PIT-UND attached (/X), Claimed-as-dependent (/X), line 6 military
# pension spouse/self (/X), line 8b 529/ABLE spouse/self (/X), line 20 age65/blind
# spouse/self (/Yes), line 26b 60-or-over spouse/self (/Yes).
#
# Money vs text. Every numbered dollar line prints a "$ ... .00" whole-dollar cell
# and is mapped `money` (lines 1-58, split a/b where both columns exist). The
# two Taxpayer IDs are 9-char comb SSN boxes -> text, maxlen 9, format
# ssn_digits_only. Counts (26a number-of-exemptions + per-column, 26b boxes
# checked), the line-28 volunteer-firefighter company #s, names, address, city/
# state/zip, fiscal & part-year dates, routing/account numbers, DMV ID, phones,
# email, signature dates, preparer address/city/state/zip/EIN/phone/email, and the
# line 59/61 free-text explanations stay `text`.
#
# Relations (on-face arithmetic, unconditional, every operand mapped; declared for
# Column B which every filing status uses). OMITTED: conditional / floor-at-zero /
# branch lines (10 "subtract 9 from 4", 22 "subtract 21 from 12 [if positive]", 32
# balance floored at 0, 40/41 balance-due vs overpayment branch, 45/46 net, and
# all amended-only page-3 conditionals).
#   4  "TOTAL - Add Lines 1 through 3"            -> 4b == 1b + 2b + 3b
#   16 "SUBTOTAL - Add Line 13 through Line 15"   -> 16b == 13b + 14b + 15b
#   21 "TOTAL DEDUCTIONS - Add Line 19 and 20"    -> 21b == 19b + 20b
#   25 "TOTAL TAX - Add Line 23 and Line 24"      -> 25b == 23b + 24b
# Line 9 ("Add Lines 5 through 8b") OMITTED: operands 8a/8b use dotted column ids.
#
# Cross_form. SECTION A line 1 "FEDERAL AGI AMOUNT FROM FEDERAL FORM 1040" ==
# federal AGI Form 1040 line 11 (Column B, used by all non-status-4 filers).
form: "PIT-RES"
